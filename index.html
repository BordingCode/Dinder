<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dinder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a16;--card:#252520;--card2:#2e2e27;--accent:#6DBE45;--green:#4CAF50;--blue:#00b4d8;--gold:#F2C94C;--text:#f0ece4;--muted:#8a8a7a;--dim:#3a3a32;--dim2:#2e2e27;--radius:22px}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}
body{display:flex;flex-direction:column;align-items:center;max-width:480px;margin:0 auto;position:relative}
.header{width:100%;padding:14px 20px 8px;display:flex;align-items:center;justify-content:space-between;z-index:100}
.logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;display:flex;align-items:center;gap:6px}
.logo-text{background:linear-gradient(135deg,#E8723A,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-icon{flex-shrink:0}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:var(--card);border-top:1px solid var(--dim);z-index:150;padding:6px 0 env(safe-area-inset-bottom,8px)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;background:none;border:none;color:var(--muted);font-size:10px;font-family:inherit;cursor:pointer;transition:.2s;position:relative}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
.nav-btn.active{color:var(--accent)}.nav-btn.active svg{stroke:var(--accent)}
.nav-badge{position:absolute;top:2px;right:calc(50% - 20px);min-width:16px;height:16px;border-radius:8px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px}
.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;transition:opacity .2s;z-index:10;padding-bottom:72px}
.screen.hidden{opacity:0;pointer-events:none;z-index:1}
/* INPUT */
.input-screen{padding:56px 20px 80px;overflow-y:auto}
.input-screen h1{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;margin-bottom:4px;text-align:center}
.input-screen .sub{color:var(--muted);font-size:13px;margin-bottom:20px;text-align:center}
.ing-form{width:100%;max-width:400px;display:flex;flex-direction:column;gap:8px}
.ing-row{display:flex;gap:8px;align-items:center;animation:si .25s ease}
@keyframes si{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.ing-row input{flex:1;padding:13px 16px;border-radius:14px;border:1.5px solid var(--dim);background:var(--card);color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border .2s}
.ing-row input:focus{border-color:var(--accent)}.ing-row input::placeholder{color:#444}
.rb{width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,68,88,.1);color:var(--accent);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ab{padding:12px;border-radius:14px;border:1.5px dashed var(--dim);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit}
.fsec{width:100%;max-width:400px;margin-top:16px}
.fsec h3{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.chip{padding:7px 14px;border-radius:18px;border:1.5px solid var(--dim);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:.15s}
.chip.active{border-color:var(--accent);color:var(--accent);background:rgba(255,68,88,.08)}
.tslider{width:100%}.tslider input[type=range]{-webkit-appearance:none;width:100%;height:3px;border-radius:2px;background:var(--dim);outline:none}
.tslider input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 2px 8px rgba(255,68,88,.4)}
.tlabel{font-size:12px;color:var(--muted);text-align:center;margin-top:4px}
.gobtn{margin-top:20px;margin-bottom:30px;padding:16px;border-radius:28px;border:none;background:linear-gradient(135deg,var(--accent),#ff6b6b);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 20px rgba(255,68,88,.35);width:100%;max-width:400px}
/* SWIPE */
.swipe-screen{padding-top:52px;justify-content:center;overflow:hidden}
.card-stack{position:relative;width:min(370px,88vw);height:min(520px,70vh)}
.card{position:absolute;width:100%;height:100%;border-radius:var(--radius);overflow:hidden;background:var(--card);cursor:grab;touch-action:none;user-select:none;will-change:transform;animation:pop .3s ease}
.card:active{cursor:grabbing}
@keyframes pop{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
.card-img{width:100%;height:55%;object-fit:cover;display:block;background:linear-gradient(135deg,#1a1a2e,#16213e)}
.card-grad{position:absolute;top:25%;left:0;width:100%;height:75%;background:linear-gradient(to top,var(--bg) 0%,rgba(10,10,11,.92) 32%,transparent 100%);pointer-events:none}
.card-info{position:absolute;bottom:0;left:0;right:0;padding:14px 20px 18px;z-index:4}
.card-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;line-height:1.2;margin-bottom:4px}
.card-meta{display:flex;gap:10px;margin-bottom:6px}
.mt{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:3px}
.mt svg{width:13px;height:13px;fill:currentColor}
.card-match{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;margin-bottom:6px}
.mh{background:rgba(0,212,106,.12);color:var(--green)}.mm{background:rgba(252,163,17,.12);color:var(--gold)}.ml{background:rgba(0,180,216,.12);color:var(--blue)}
.card-ing{font-size:11px;color:var(--muted);line-height:1.5;max-height:36px;overflow:hidden}
.card-ing .hl{color:var(--green);font-weight:600}
.ctags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.ctags span{font-size:9px;padding:2px 7px;border-radius:6px;background:rgba(255,255,255,.06);color:var(--muted)}
.stamp{position:absolute;top:45px;padding:8px 18px;border-radius:8px;font-size:24px;font-weight:700;letter-spacing:2px;border:3px solid;opacity:0;z-index:5;pointer-events:none}
.stamp-l{left:20px;color:var(--green);border-color:var(--green);transform:rotate(-15deg)}
.stamp-r{right:20px;color:#c0392b;border-color:#c0392b;transform:rotate(15deg)}
.actions{display:flex;gap:14px;margin-top:14px;z-index:50}
.abtn{width:50px;height:50px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.12s;background:transparent;color:inherit;font-size:17px}
.abtn:active{transform:scale(.85)}
.bn{border-color:var(--accent);color:var(--accent)}.bf{border-color:var(--gold);color:var(--gold)}.bf.on{background:var(--gold);color:#fff}
.bs{border-color:var(--blue);color:var(--blue)}.bl{border-color:var(--green);color:var(--green)}
/* COOKBOOK */
.cook-screen{padding:52px 16px 80px;overflow-y:auto}
.cook-screen h1{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin-bottom:12px;text-align:center}
.tabs{display:flex;width:100%;max-width:400px;margin-bottom:12px;border-radius:12px;overflow:hidden;border:1.5px solid var(--dim)}
.tab{flex:1;padding:9px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--muted);border:none;font-family:inherit;transition:.15s}
.tab.active{background:var(--accent);color:#fff}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:400px}
.sc{border-radius:14px;overflow:hidden;background:var(--card);cursor:pointer;transition:.15s;position:relative}
.sc:active{transform:scale(.97)}
.sc img{width:100%;height:100px;object-fit:cover;display:block;background:linear-gradient(135deg,#1a1a2e,#16213e)}
.sc .sci{padding:9px 11px}.sc .sct{font-size:12px;font-weight:600;line-height:1.3}
.sc .scm{font-size:10px;color:var(--muted);margin-top:3px}
.sc .fstar{position:absolute;top:6px;right:6px;z-index:5;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;font-size:13px;backdrop-filter:blur(4px);color:#fff}
.empty-s{text-align:center;color:var(--muted);margin-top:30px;font-size:13px;grid-column:1/-1;line-height:1.7}
.empty-s .big{font-size:44px;display:block;margin-bottom:6px}
/* PLANNER */
.plan-screen{padding:52px 12px 80px;overflow-y:auto}
.plan-screen h1{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin-bottom:4px;text-align:center}
.plan-screen .sub{color:var(--muted);font-size:12px;margin-bottom:12px;text-align:center}
.plan-actions{display:flex;gap:8px;margin-bottom:12px;width:100%;max-width:420px;justify-content:center;flex-wrap:wrap}
.plan-actions button{padding:7px 14px;border-radius:14px;border:1.5px solid var(--dim);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.plan-actions button.accent{border-color:var(--green);color:var(--green)}
.plan-actions button.accent:hover{background:var(--green);color:#fff}
.plan-actions button.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.week-grid{width:100%;max-width:420px;display:flex;flex-direction:column;gap:5px}
.day-row{background:var(--card);border-radius:12px;padding:10px 12px;border:1.5px solid transparent;min-height:56px}
.day-row.selected{border-color:var(--accent);background:rgba(255,68,88,.04)}
.day-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.day-name{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.day-date{font-size:10px;color:var(--muted)}
.day-meals{display:flex;flex-wrap:wrap;gap:5px}
.meal-chip{display:flex;flex-wrap:wrap;align-items:center;gap:4px 6px;padding:6px 8px;border-radius:10px;background:var(--dim2);font-size:11px;font-weight:500;cursor:pointer;position:relative}
.meal-chip img{width:28px;height:28px;border-radius:6px;object-fit:cover;flex-shrink:0}
.meal-chip .mx{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--dim);border:1.5px solid var(--muted);color:var(--muted);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;z-index:2}
.meal-chip .mx:hover{color:#e05;border-color:#e05;background:var(--card)}
.meal-portions{display:flex;align-items:center;gap:2px;width:100%;justify-content:center;padding-top:2px}
.mp-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--dim);background:transparent;color:var(--muted);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;font-family:inherit;line-height:1}
.mp-btn:active{transform:scale(.9);background:var(--dim)}
.mp-val{font-size:12px;font-weight:700;min-width:18px;text-align:center;color:var(--text)}
.add-meal{padding:5px 10px;border-radius:8px;border:1.5px dashed var(--dim);background:transparent;color:var(--muted);font-size:10px;cursor:pointer;font-family:inherit}
/* WEEK NAV */
.week-nav{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:420px;margin-bottom:12px;gap:8px}
.week-nav button{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--dim);background:transparent;color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;font-family:inherit;flex-shrink:0}
.week-nav button:hover{border-color:var(--accent);color:var(--accent)}
.week-nav .wn-label{text-align:center;flex:1}
.week-nav .wn-title{font-size:14px;font-weight:700}
.week-nav .wn-dates{font-size:11px;color:var(--muted)}
.week-nav .wn-today{padding:4px 12px;border-radius:10px;font-size:10px;font-weight:600;border:1.5px solid var(--dim);background:transparent;color:var(--muted);cursor:pointer;width:auto;height:auto}
.week-nav .wn-today:hover{border-color:var(--accent);color:var(--accent)}
/* WEEK TEMPLATES */
.tpl-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:210;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(4px)}
.tpl-overlay.open{opacity:1;pointer-events:all}
.tpl-modal{width:100%;max-width:480px;max-height:80vh;background:var(--bg);border-radius:22px 22px 0 0;overflow-y:auto;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);padding:16px 20px 40px}
.tpl-overlay.open .tpl-modal{transform:translateY(0)}
.tpl-modal h2{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:4px;text-align:center}
.tpl-modal .tpl-sub{color:var(--muted);font-size:12px;text-align:center;margin-bottom:14px}
.tpl-save-form{display:flex;gap:8px;margin-bottom:16px}
.tpl-save-form input{flex:1;padding:11px 14px;border-radius:12px;border:1.5px solid var(--dim);background:var(--card);color:var(--text);font-size:13px;font-family:inherit;outline:none}
.tpl-save-form input:focus{border-color:var(--accent)}
.tpl-save-form button{padding:11px 18px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.tpl-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;background:var(--card);margin-bottom:8px;cursor:pointer;transition:.15s}
.tpl-item:hover{background:var(--card2)}
.tpl-item .tpl-info{flex:1}
.tpl-item .tpl-name{font-size:14px;font-weight:600}
.tpl-item .tpl-preview{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.tpl-item .tpl-del{width:28px;height:28px;border-radius:50%;border:none;background:rgba(255,68,88,.12);color:var(--accent);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tpl-empty{text-align:center;color:var(--muted);padding:24px;font-size:13px}
/* PORTION ADJUSTER */
.portion-adj{display:flex;align-items:center;gap:12px;margin:12px 0 6px;padding:12px 16px;border-radius:14px;background:var(--card2);border:1px solid var(--dim)}
.portion-adj .pa-label{font-size:12px;color:var(--muted);flex:1}
.portion-adj .pa-controls{display:flex;align-items:center;gap:10px}
.portion-adj .pa-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--dim);background:transparent;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:.15s}
.portion-adj .pa-btn:hover{border-color:var(--accent);color:var(--accent)}
.portion-adj .pa-btn:active{transform:scale(.9)}
.portion-adj .pa-val{font-size:18px;font-weight:700;min-width:24px;text-align:center}
.portion-adj .pa-unit{font-size:12px;color:var(--muted)}
/* PICKER */
.picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(3px)}
.picker-overlay.open{opacity:1;pointer-events:all}
.picker{width:100%;max-width:480px;max-height:70vh;background:var(--card);border-radius:20px 20px 0 0;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);padding:16px 16px 30px}
.picker-overlay.open .picker{transform:translateY(0)}
.picker h3{font-size:16px;font-weight:700;margin-bottom:10px;text-align:center}
.picker-search{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--dim);background:var(--dim2);color:var(--text);font-size:13px;font-family:inherit;outline:none;margin-bottom:10px}
.picker-item{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;cursor:pointer;transition:.1s}
.picker-item:hover{background:var(--dim2)}
.picker-item img{width:42px;height:42px;border-radius:8px;object-fit:cover;flex-shrink:0}
.picker-item .pi-name{font-size:13px;font-weight:600}.picker-item .pi-time{font-size:11px;color:var(--muted)}
/* SHOPPING */
.shop-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:210;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(4px)}
.shop-overlay.open{opacity:1;pointer-events:all}
.shop-modal{width:100%;max-width:480px;max-height:85vh;background:var(--bg);border-radius:22px 22px 0 0;overflow-y:auto;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);padding:16px 20px 40px}
.shop-overlay.open .shop-modal{transform:translateY(0)}
.shop-modal h2{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:4px;text-align:center}
.shop-sub{color:var(--muted);font-size:12px;text-align:center;margin-bottom:14px}
.shop-section h4{font-size:13px;font-weight:700;color:var(--accent);margin:12px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--dim)}
.shop-item{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:13px;color:#ccc;cursor:pointer}
.shop-check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;color:transparent}
.shop-item.done{opacity:.35;text-decoration:line-through}.shop-item.done .shop-check{background:var(--green);border-color:var(--green);color:#fff}
.recipe-tip{position:absolute;bottom:calc(100% + 4px);left:8px;right:8px;background:var(--card2);border:1px solid var(--dim);border-radius:10px;padding:8px 12px;font-size:11px;color:var(--text);line-height:1.6;z-index:10;box-shadow:0 4px 16px rgba(0,0,0,.4);animation:si .2s ease}
.recipe-tip strong{color:var(--gold);font-size:10px;text-transform:uppercase;letter-spacing:.5px}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(4px)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{width:100%;max-width:480px;max-height:90vh;background:var(--bg);border-radius:22px 22px 0 0;overflow-y:auto;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal .modal-img{width:100%;height:200px;object-fit:cover;display:block}
.modal-body{padding:18px 22px 44px}
.modal-body h2{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:5px}
.modal-body .mmeta{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.modal-acts{display:flex;gap:8px;margin-bottom:14px}
.modal-acts button{padding:7px 16px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:1.5px solid;background:transparent;display:flex;align-items:center;gap:5px;transition:.15s}
.modal-acts .fbtn{border-color:var(--gold);color:var(--gold)}.modal-acts .fbtn.on{background:var(--gold);color:#fff}
.modal-acts .sbtn{border-color:var(--green);color:var(--green)}
.modal-body h3{font-size:14px;font-weight:700;margin:16px 0 8px}
.modal-body ul{padding-left:18px;font-size:13px;color:#bbb;line-height:1.8}
.modal-body ul .hl{color:var(--green);font-weight:600}
.modal-body ol{padding-left:18px;font-size:13px;color:#bbb;line-height:1.8}
.modal-body ol li{margin-bottom:5px}
.mcl{position:sticky;top:8px;float:right;margin:8px;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.6);border:none;color:#fff;font-size:18px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.no-res{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);font-size:14px;text-align:center;padding:40px}
.no-res .big{font-size:48px}
.rbtn{padding:10px 28px;border-radius:18px;border:1.5px solid var(--dim);background:transparent;color:var(--text);font-size:13px;cursor:pointer;font-family:inherit}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
</style>
</head>
<body>

const R=[
{id:1,name:"Creamy Tuscan Chicken",time:30,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/958/41815498651_3ea65ee748_c.jpg",ing:[{n:"chicken breast",q:"600g"},{n:"spinach",q:"150g"},{n:"sun-dried tomatoes",q:"80g"},{n:"garlic",q:"3 cloves"},{n:"heavy cream",q:"250ml"},{n:"parmesan",q:"50g"},{n:"olive oil",q:"2 tbsp"},{n:"italian seasoning",q:"2 tsp"}],steps:["Season and sear chicken breast 4-5 min per side. Remove.","Sauté garlic and sun-dried tomatoes 1 min. Add spinach, cream, parmesan.","Return chicken, simmer 5 min until sauce thickens. Serve with crusty bread."]},
{id:2,name:"Thai Coconut Curry",time:25,servings:4,diff:"Easy",tags:["dairy-free","gluten-free"],img:"https://live.staticflickr.com/65535/54985484411_a643294032_c.jpg",ing:[{n:"chicken thighs",q:"500g"},{n:"coconut milk",q:"400ml"},{n:"red curry paste",q:"3 tbsp"},{n:"bell pepper",q:"2"},{n:"fish sauce",q:"2 tbsp"},{n:"basil",q:"handful"},{n:"lime",q:"1"},{n:"brown sugar",q:"1 tbsp"},{n:"rice",q:"for serving"}],steps:["Fry curry paste in coconut cream until fragrant. Add sliced chicken, cook 3 min.","Pour in remaining coconut milk, add peppers, fish sauce, sugar. Simmer 12-15 min.","Stir in basil and lime juice. Serve over jasmine rice."]},
{id:3,name:"Spaghetti Bolognese",time:45,servings:6,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55098645758_238c077a5c_c.jpg",ing:[{n:"ground beef",q:"500g"},{n:"spaghetti",q:"400g"},{n:"onion",q:"1 large"},{n:"garlic",q:"4 cloves"},{n:"canned tomatoes",q:"800g"},{n:"tomato paste",q:"2 tbsp"},{n:"carrot",q:"1"},{n:"celery",q:"2 stalks"},{n:"red wine",q:"100ml"},{n:"parmesan",q:"for serving"},{n:"oregano",q:"1 tsp"}],steps:["Dice onion, carrot, celery finely. Brown beef in batches, remove.","Sauté soffritto 5 min. Return beef, add paste, deglaze with wine.","Add tomatoes and oregano. Simmer 25-30 min. Toss with spaghetti, top with parmesan."]},
{id:4,name:"Vegetable Pad Thai",time:20,servings:2,diff:"Easy",tags:["vegan","vegetarian","dairy-free"],img:"https://live.staticflickr.com/65535/51751512320_82d3e3dec9_c.jpg",ing:[{n:"rice noodles",q:"200g"},{n:"firm tofu",q:"200g"},{n:"bean sprouts",q:"100g"},{n:"carrot",q:"1"},{n:"peanuts",q:"40g"},{n:"lime",q:"1"},{n:"soy sauce",q:"2 tbsp"},{n:"tamarind paste",q:"2 tbsp"},{n:"brown sugar",q:"1 tbsp"},{n:"garlic",q:"2 cloves"},{n:"green onion",q:"2"}],steps:["Soak noodles. Press and cube tofu. Mix sauce: tamarind, soy, sugar, water.","Fry tofu golden. Stir-fry garlic and julienned carrot 2 min.","Add noodles, sauce, sprouts. Toss well. Serve with peanuts, lime, green onion."]},
{id:5,name:"Honey Garlic Salmon",time:20,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/49183907016_96a6b40ef9_c.jpg",ing:[{n:"salmon fillets",q:"4"},{n:"honey",q:"3 tbsp"},{n:"soy sauce",q:"2 tbsp"},{n:"garlic",q:"4 cloves, minced"},{n:"lemon juice",q:"2 tbsp"},{n:"olive oil",q:"2 tbsp"},{n:"sesame seeds",q:"1 tsp"}],steps:["Mix honey, soy sauce, minced garlic, and lemon juice for the glaze.","Sear salmon in olive oil skin-side down 3-4 min. Flip.","Pour glaze over, cook 3-4 min basting often. Garnish with sesame seeds."]},
{id:6,name:"Mushroom Risotto",time:35,servings:4,diff:"Medium",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/65535/54809209105_b8b0f01a75_c.jpg",ing:[{n:"arborio rice",q:"300g"},{n:"mixed mushrooms",q:"300g"},{n:"onion",q:"1"},{n:"garlic",q:"2 cloves"},{n:"white wine",q:"150ml"},{n:"vegetable broth",q:"1L, warm"},{n:"parmesan",q:"60g"},{n:"butter",q:"30g"},{n:"thyme",q:"fresh sprigs"}],steps:["Sauté mushrooms with thyme until golden, 5-6 min. Set aside.","Cook onion and garlic 3 min. Toast rice 1 min. Add wine, stir until absorbed.","Add broth one ladle at a time, stirring 18-20 min. Fold in mushrooms, butter, parmesan."]},
{id:7,name:"Chicken Fajitas",time:25,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54839652206_bb9246f223_c.jpg",ing:[{n:"chicken breast",q:"500g"},{n:"bell pepper",q:"3 mixed"},{n:"onion",q:"1 large"},{n:"lime",q:"2"},{n:"cumin",q:"1 tsp"},{n:"chili powder",q:"1 tsp"},{n:"smoked paprika",q:"1 tsp"},{n:"olive oil",q:"3 tbsp"},{n:"tortillas",q:"8"}],steps:["Slice chicken, peppers, and onion. Toss with spices and oil.","Cook on a smoking hot skillet or sheet pan at 220C for 18-22 min.","Squeeze fresh lime over everything. Serve in warm tortillas."]},
{id:8,name:"Chickpea Spinach Curry",time:25,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/52041654983_5f50d08da8_c.jpg",ing:[{n:"chickpeas",q:"2 cans, drained"},{n:"spinach",q:"200g"},{n:"onion",q:"1"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch, grated"},{n:"canned tomatoes",q:"400g"},{n:"coconut milk",q:"200ml"},{n:"curry powder",q:"2 tbsp"},{n:"cumin",q:"1 tsp"},{n:"rice",q:"for serving"}],steps:["Sauté diced onion 5 min. Add garlic, ginger, curry powder, cumin. Cook 1 min.","Add tomatoes, chickpeas, coconut milk. Simmer 10 min.","Stir in spinach until wilted. Season with salt. Serve over basmati rice."]},
{id:9,name:"Beef & Broccoli Stir-Fry",time:20,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/51115762227_a24c64066b_c.jpg",ing:[{n:"beef sirloin",q:"400g, thinly sliced"},{n:"broccoli florets",q:"300g"},{n:"soy sauce",q:"3 tbsp"},{n:"oyster sauce",q:"2 tbsp"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"cornstarch",q:"1 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"rice",q:"for serving"}],steps:["Toss beef with soy sauce and cornstarch. Blanch broccoli 2 min, drain.","Stir-fry beef in batches over high heat 2 min. Remove.","Add garlic, ginger, broccoli. Return beef. Pour in oyster sauce and sesame oil. Serve over rice."]},
{id:10,name:"Caprese Stuffed Chicken",time:30,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/853/40679423495_5d41637fa3_c.jpg",ing:[{n:"chicken breast",q:"4 large"},{n:"fresh mozzarella",q:"150g, sliced"},{n:"tomato",q:"2, sliced"},{n:"fresh basil",q:"bunch"},{n:"balsamic vinegar",q:"2 tbsp"},{n:"olive oil",q:"2 tbsp"},{n:"salt and pepper",q:"to taste"}],steps:["Cut a deep pocket in each chicken breast. Season inside and out.","Stuff with mozzarella, tomato slices, and basil leaves. Secure with toothpicks.","Sear 3 min per side. Bake at 200C for 15-18 min. Drizzle with balsamic."]},
{id:11,name:"Lemon Garlic Shrimp Pasta",time:20,servings:4,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54653325141_8f70b2529a_c.jpg",ing:[{n:"large shrimp",q:"400g, peeled"},{n:"linguine",q:"350g"},{n:"garlic",q:"5 cloves, sliced"},{n:"lemon",q:"2"},{n:"butter",q:"40g"},{n:"olive oil",q:"2 tbsp"},{n:"red pepper flakes",q:"1/2 tsp"},{n:"parsley",q:"fresh, chopped"},{n:"parmesan",q:"40g"}],steps:["Cook linguine al dente. Reserve 200ml pasta water.","Sauté garlic and pepper flakes in olive oil 1 min. Cook shrimp 2 min per side.","Add lemon juice, butter, pasta water. Toss with linguine. Top with parsley and parmesan."]},
{id:12,name:"Black Bean Tacos",time:15,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","nut-free"],img:"https://live.staticflickr.com/65535/54199309824_99cb00c8aa_c.jpg",ing:[{n:"black beans",q:"2 cans, drained"},{n:"corn tortillas",q:"8"},{n:"avocado",q:"2"},{n:"lime",q:"2"},{n:"red onion",q:"1, diced"},{n:"cilantro",q:"bunch"},{n:"cumin",q:"1 tsp"},{n:"chili powder",q:"1 tsp"},{n:"garlic",q:"2 cloves"}],steps:["Sauté garlic, add beans, cumin, chili powder. Cook 5 min, mash slightly.","Make guacamole: mash avocado with lime, onion, cilantro, salt.","Warm tortillas. Fill with beans and guacamole. Top with extra cilantro."]},
{id:13,name:"Creamy Pesto Pasta",time:15,servings:4,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54721211727_68fc0f7660_c.jpg",ing:[{n:"penne",q:"400g"},{n:"basil pesto",q:"120g"},{n:"heavy cream",q:"150ml"},{n:"cherry tomatoes",q:"200g, halved"},{n:"parmesan",q:"50g, grated"},{n:"pine nuts",q:"30g, toasted"},{n:"garlic",q:"2 cloves"}],steps:["Cook penne al dente. Toast pine nuts in a dry pan until golden.","Sauté garlic 1 min. Add pesto and cream, stir until combined.","Toss with pasta and tomatoes. Top with pine nuts and parmesan."]},
{id:14,name:"Korean Bibimbap",time:35,servings:2,diff:"Medium",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/54894534735_6d6bd43e5a_c.jpg",ing:[{n:"rice",q:"300g"},{n:"ground beef",q:"250g"},{n:"spinach",q:"150g"},{n:"carrot",q:"1, julienned"},{n:"zucchini",q:"1, sliced"},{n:"egg",q:"2"},{n:"soy sauce",q:"2 tbsp"},{n:"sesame oil",q:"2 tbsp"},{n:"gochujang",q:"2 tbsp"},{n:"garlic",q:"3 cloves"},{n:"sesame seeds",q:"1 tbsp"}],steps:["Cook rice. Marinate and brown beef with soy sauce and garlic.","Sauté each vegetable separately with sesame oil. Fry eggs sunny-side up.","Assemble bowls: rice, arranged toppings, egg. Serve with gochujang and sesame seeds."]},

{id:16,name:"Garlic Butter Steak Bites",time:15,servings:3,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://images.unsplash.com/photo-1572014228772-d67640f1e39f?w=600&h=400&fit=crop",ing:[{n:"sirloin steak",q:"500g, cubed"},{n:"butter",q:"40g"},{n:"garlic",q:"5 cloves, minced"},{n:"soy sauce",q:"1 tbsp"},{n:"fresh thyme",q:"4 sprigs"},{n:"olive oil",q:"1 tbsp"},{n:"black pepper",q:"1 tsp"}],steps:["Pat steak dry, season with salt and pepper. Heat oil until smoking.","Sear steak cubes 1-2 min per side. Do not crowd the pan.","Add butter, garlic, thyme. Baste 30-60 sec. Drizzle soy sauce. Serve immediately."]},

{id:18,name:"Chicken Tikka Masala",time:40,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55111567383_e2a5d082e2_c.jpg",ing:[{n:"chicken thighs",q:"600g, cubed"},{n:"plain yogurt",q:"150g"},{n:"canned tomatoes",q:"400g"},{n:"heavy cream",q:"150ml"},{n:"onion",q:"1, diced"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"1 inch, grated"},{n:"garam masala",q:"2 tsp"},{n:"turmeric",q:"1 tsp"},{n:"butter",q:"30g"},{n:"rice",q:"for serving"}],steps:["Marinate chicken in yogurt, garam masala, turmeric 30 min. Grill or pan-fry until charred.","Sauté onion in butter 5 min. Add garlic, ginger, remaining spices. Add tomatoes, simmer 10 min.","Stir in cream and chicken. Simmer 8-10 min. Serve over basmati rice."]},
{id:19,name:"Veggie Fried Rice",time:15,servings:3,diff:"Easy",tags:["vegetarian","dairy-free","nut-free"],img:"https://live.staticflickr.com/65535/55065914818_9d470a20cc_c.jpg",ing:[{n:"cooked jasmine rice",q:"400g, day-old"},{n:"carrot",q:"1, diced"},{n:"frozen peas",q:"100g"},{n:"green onion",q:"3, sliced"},{n:"egg",q:"2"},{n:"soy sauce",q:"3 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"garlic",q:"2 cloves"},{n:"white pepper",q:"pinch"}],steps:["Push rice aside, scramble eggs in hot wok. Break into pieces.","Add garlic, carrot, peas. Stir-fry 2 min over high heat.","Add rice and soy sauce. Toss vigorously 2 min. Finish with sesame oil and green onion."]},
{id:20,name:"Baked Lemon Herb Chicken",time:40,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/7893/45504257135_6aeeca935f_c.jpg",ing:[{n:"chicken thighs",q:"8 bone-in, skin-on"},{n:"lemon",q:"2, sliced"},{n:"garlic",q:"6 cloves, crushed"},{n:"rosemary",q:"3 sprigs"},{n:"thyme",q:"4 sprigs"},{n:"olive oil",q:"3 tbsp"},{n:"baby potatoes",q:"500g, halved"}],steps:["Toss potatoes with oil, salt, pepper. Arrange in roasting pan.","Place chicken on top. Scatter garlic, herbs, lemon slices. Drizzle with more oil.","Roast at 220C for 35-40 min until skin is crispy and potatoes are tender."]},
{id:21,name:"Pasta Aglio e Olio",time:15,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","nut-free"],img:"https://live.staticflickr.com/5124/29913798135_0c4243a75b_c.jpg",ing:[{n:"spaghetti",q:"400g"},{n:"garlic",q:"8 cloves, thinly sliced"},{n:"extra virgin olive oil",q:"80ml"},{n:"red pepper flakes",q:"1 tsp"},{n:"flat-leaf parsley",q:"large bunch, chopped"},{n:"salt",q:"to taste"}],steps:["Cook spaghetti in salted water until al dente. Reserve 150ml pasta water.","Gently cook garlic in olive oil over medium-low until golden. Add pepper flakes.","Add pasta water to emulsify. Toss spaghetti in the pan with parsley. Serve immediately."]},
{id:22,name:"Teriyaki Chicken Bowl",time:25,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/54209212905_ccd07ecbe3_c.jpg",ing:[{n:"boneless chicken thighs",q:"500g"},{n:"soy sauce",q:"60ml"},{n:"mirin",q:"3 tbsp"},{n:"brown sugar",q:"2 tbsp"},{n:"garlic",q:"2 cloves"},{n:"rice",q:"300g"},{n:"broccoli",q:"200g"},{n:"carrot",q:"1, sliced"},{n:"sesame seeds",q:"1 tbsp"}],steps:["Whisk soy sauce, mirin, brown sugar, garlic for sauce. Cook rice and steam broccoli.","Sear chicken 4-5 min per side until golden. Pour sauce over, simmer until glazed.","Slice chicken. Assemble bowls with rice, broccoli, carrot, chicken, sesame seeds."]},
{id:23,name:"Stuffed Bell Peppers",time:40,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54860166045_bcaf93b191_c.jpg",ing:[{n:"bell peppers",q:"4 large"},{n:"ground beef",q:"400g"},{n:"cooked rice",q:"150g"},{n:"canned tomatoes",q:"400g"},{n:"onion",q:"1, diced"},{n:"garlic",q:"3 cloves"},{n:"mozzarella",q:"100g, shredded"},{n:"cumin",q:"1 tsp"},{n:"paprika",q:"1 tsp"}],steps:["Brown beef with onion, garlic, cumin, paprika. Mix with rice and half the tomatoes.","Cut tops off peppers, remove seeds. Fill with beef mixture.","Place in baking dish with remaining tomatoes. Bake covered 25 min. Top with cheese, bake 10 more."]},
{id:24,name:"Coconut Lentil Dal",time:30,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/4176/33839000844_32281f4505_c.jpg",ing:[{n:"red lentils",q:"250g, rinsed"},{n:"coconut milk",q:"400ml"},{n:"onion",q:"1, diced"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch, grated"},{n:"canned tomatoes",q:"400g"},{n:"turmeric",q:"1 tsp"},{n:"cumin",q:"1 tsp"},{n:"garam masala",q:"1 tsp"},{n:"spinach",q:"100g"},{n:"lime",q:"1"},{n:"rice",q:"for serving"}],steps:["Sauté onion 5 min. Add garlic, ginger, all spices. Cook 1 min.","Add lentils, tomatoes, coconut milk, 200ml water. Simmer 18-20 min until lentils break down.","Stir in spinach and lime juice. Adjust consistency. Serve over rice."]},
{id:25,name:"Greek Lemon Chicken",time:50,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/54612707524_5aa18093be_c.jpg",ing:[{n:"chicken thighs",q:"6 bone-in"},{n:"potatoes",q:"600g, quartered"},{n:"lemon",q:"2, juiced and zested"},{n:"garlic",q:"6 cloves"},{n:"dried oregano",q:"2 tbsp"},{n:"olive oil",q:"80ml"},{n:"chicken broth",q:"200ml"}],steps:["Whisk olive oil, lemon juice, zest, oregano, garlic. Toss potatoes in half the marinade.","Place potatoes in roasting pan, top with chicken. Pour remaining marinade and broth over.","Roast at 200C for 45-50 min, basting halfway. Chicken should be golden and potatoes crisp."]},
{id:26,name:"Shakshuka",time:25,servings:3,diff:"Easy",tags:["vegetarian","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/55123764430_2108174dc6_c.jpg",ing:[{n:"eggs",q:"6"},{n:"canned tomatoes",q:"800g"},{n:"onion",q:"1, diced"},{n:"bell pepper",q:"2, diced"},{n:"garlic",q:"3 cloves"},{n:"cumin",q:"1 tsp"},{n:"smoked paprika",q:"1 tsp"},{n:"cayenne",q:"1/4 tsp"},{n:"feta cheese",q:"50g, crumbled"},{n:"olive oil",q:"2 tbsp"},{n:"crusty bread",q:"for serving"}],steps:["Sauté onion and peppers in olive oil 5 min. Add garlic, spices, cook 1 min.","Add tomatoes, simmer 10 min until slightly thickened.","Make 6 wells, crack eggs in. Cover, cook 5-8 min. Top with feta. Serve with bread."]},
{id:27,name:"Peanut Noodle Bowl",time:15,servings:2,diff:"Easy",tags:["vegan","vegetarian","dairy-free"],img:"https://live.staticflickr.com/65535/54776951982_68a418b35e_c.jpg",ing:[{n:"rice noodles",q:"200g"},{n:"peanut butter",q:"3 tbsp"},{n:"soy sauce",q:"2 tbsp"},{n:"lime",q:"1, juiced"},{n:"sriracha",q:"1 tsp"},{n:"carrot",q:"1, julienned"},{n:"cucumber",q:"1/2, julienned"},{n:"red cabbage",q:"100g, shredded"},{n:"roasted peanuts",q:"30g, crushed"},{n:"cilantro",q:"fresh"}],steps:["Cook noodles per package. Whisk peanut butter, soy sauce, lime, sriracha, 2 tbsp warm water.","Toss noodles with peanut sauce until evenly coated.","Top with julienned vegetables, crushed peanuts, and cilantro."]},
{id:28,name:"Meatball Marinara Pasta",time:35,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/52316778197_4c3353d53c_c.jpg",ing:[{n:"ground beef",q:"500g"},{n:"breadcrumbs",q:"50g"},{n:"egg",q:"1"},{n:"parmesan",q:"40g, grated"},{n:"garlic",q:"4 cloves"},{n:"canned tomatoes",q:"800g"},{n:"onion",q:"1"},{n:"fresh basil",q:"bunch"},{n:"spaghetti",q:"400g"},{n:"olive oil",q:"2 tbsp"}],steps:["Mix beef, breadcrumbs, egg, half the parmesan, 2 minced garlic cloves. Form 16 meatballs.","Brown meatballs in olive oil. Remove. Sauté onion, remaining garlic. Add tomatoes, simmer 10 min.","Return meatballs, simmer 15 min. Serve over spaghetti with basil and remaining parmesan."]},
{id:29,name:"Cauliflower Mac & Cheese",time:30,servings:4,diff:"Easy",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/65535/52782532836_99685148ed_c.jpg",ing:[{n:"cauliflower",q:"1 head, cut into florets"},{n:"sharp cheddar",q:"200g, grated"},{n:"milk",q:"200ml"},{n:"butter",q:"30g"},{n:"garlic",q:"2 cloves"},{n:"Dijon mustard",q:"1 tsp"},{n:"panko breadcrumbs",q:"40g"},{n:"paprika",q:"1/2 tsp"}],steps:["Steam cauliflower until tender, 8-10 min. Place in baking dish.","Make cheese sauce: melt butter, add garlic, milk, mustard. Stir in cheddar until smooth.","Pour sauce over cauliflower. Top with breadcrumbs and paprika. Bake 200C for 15 min."]},
{id:30,name:"Fish Tacos with Slaw",time:20,servings:4,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/500/31466724403_71c717c6da_c.jpg",ing:[{n:"white fish fillets",q:"400g"},{n:"small tortillas",q:"8"},{n:"red cabbage",q:"200g, shredded"},{n:"lime",q:"2"},{n:"sour cream",q:"80ml"},{n:"cumin",q:"1 tsp"},{n:"chili powder",q:"1 tsp"},{n:"avocado",q:"1"},{n:"cilantro",q:"fresh"}],steps:["Make slaw: toss cabbage with lime juice and salt. Make crema: mix sour cream with lime and chili.","Season fish with cumin, chili, salt. Pan-fry 3-4 min per side.","Warm tortillas. Assemble: tortilla, slaw, flaked fish, avocado, crema, cilantro."]},
{id:31,name:"Eggplant Parmesan",time:45,servings:4,diff:"Medium",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/55056992774_21d262f9d7_c.jpg",ing:[{n:"eggplant",q:"2 large, sliced 1cm"},{n:"mozzarella",q:"200g, sliced"},{n:"parmesan",q:"60g, grated"},{n:"canned tomatoes",q:"800g"},{n:"breadcrumbs",q:"100g"},{n:"eggs",q:"2, beaten"},{n:"flour",q:"50g"},{n:"garlic",q:"3 cloves"},{n:"fresh basil",q:"bunch"},{n:"olive oil",q:"for frying"}],steps:["Salt eggplant slices 15 min, pat dry. Dredge in flour, egg, breadcrumbs. Fry until golden.","Make sauce: sauté garlic, add tomatoes, basil. Simmer 10 min.","Layer sauce, eggplant, mozzarella in baking dish. Repeat. Top with parmesan. Bake 190C 20 min."]},
{id:32,name:"Honey Garlic Chicken",time:25,servings:4,diff:"Easy",tags:["dairy-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/55141657715_8d46803288_c.jpg",ing:[{n:"chicken thighs",q:"8 boneless, skin-on"},{n:"honey",q:"3 tbsp"},{n:"soy sauce",q:"3 tbsp"},{n:"garlic",q:"5 cloves, minced"},{n:"red pepper flakes",q:"1/2 tsp"},{n:"sesame seeds",q:"for garnish"},{n:"green onion",q:"2, sliced"},{n:"rice vinegar",q:"1 tbsp"}],steps:["Sear chicken skin-side down 4-5 min until crispy. Flip, cook 4 min more.","Mix honey, soy sauce, garlic, vinegar, pepper flakes. Pour over chicken.","Simmer 3-4 min until sauce is thick and glossy. Garnish with sesame seeds and green onion."]},
{id:33,name:"Vegetable Minestrone",time:30,servings:6,diff:"Easy",tags:["vegan","vegetarian","dairy-free","nut-free"],img:"https://live.staticflickr.com/65535/54521999358_31ee10a7c6_c.jpg",ing:[{n:"canned tomatoes",q:"400g"},{n:"vegetable broth",q:"1L"},{n:"onion",q:"1, diced"},{n:"carrot",q:"2, diced"},{n:"celery",q:"2 stalks, diced"},{n:"zucchini",q:"1, diced"},{n:"small pasta",q:"100g"},{n:"cannellini beans",q:"1 can, drained"},{n:"garlic",q:"3 cloves"},{n:"fresh basil",q:"for serving"},{n:"olive oil",q:"2 tbsp"}],steps:["Sauté onion, carrot, celery in olive oil 5 min. Add garlic 1 min.","Add broth, tomatoes, zucchini. Bring to boil. Add pasta, simmer 12-15 min.","Add beans, warm through. Season well. Serve with basil and olive oil drizzle."]},
{id:34,name:"Pan-Seared Duck Breast",time:25,servings:2,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/681/23064107222_048638a11c_c.jpg",ing:[{n:"duck breast",q:"2, scored skin"},{n:"honey",q:"2 tbsp"},{n:"orange",q:"1, juiced and zested"},{n:"fresh thyme",q:"3 sprigs"},{n:"red wine",q:"60ml"},{n:"butter",q:"15g"},{n:"salt and pepper",q:"to taste"}],steps:["Score duck skin in crosshatch. Season generously. Place skin-down in cold pan.","Cook skin-down over medium 8-10 min until fat renders and skin is crispy. Flip 3-4 min. Rest 5 min.","Deglaze pan with wine. Add OJ, zest, honey, thyme. Reduce. Slice duck, drizzle sauce."]},
{id:35,name:"Vegetable Lo Mein",time:20,servings:3,diff:"Easy",tags:["vegan","vegetarian","dairy-free"],img:"https://live.staticflickr.com/65535/54612511256_156f6b9b20_c.jpg",ing:[{n:"lo mein or egg noodles",q:"250g"},{n:"broccoli florets",q:"150g"},{n:"carrot",q:"1, julienned"},{n:"bell pepper",q:"1, sliced"},{n:"shiitake mushrooms",q:"100g, sliced"},{n:"soy sauce",q:"3 tbsp"},{n:"sesame oil",q:"1 tbsp"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 tsp, grated"}],steps:["Cook noodles per package. Drain and toss with a splash of sesame oil.","Stir-fry vegetables in hot wok 3-4 min. Add garlic and ginger 30 sec.","Add noodles and soy sauce. Toss vigorously over high heat 2 min. Finish with sesame oil."]},
{id:36,name:"Lamb Kofta with Tzatziki",time:30,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/8235/8597586187_1af73be8d0_c.jpg",ing:[{n:"ground lamb",q:"500g"},{n:"onion",q:"1/2, grated"},{n:"garlic",q:"3 cloves, minced"},{n:"cumin",q:"1 tsp"},{n:"smoked paprika",q:"1 tsp"},{n:"cinnamon",q:"1/4 tsp"},{n:"Greek yogurt",q:"200g"},{n:"cucumber",q:"1/2, grated"},{n:"lemon",q:"1"},{n:"fresh mint",q:"chopped"},{n:"pita bread",q:"for serving"}],steps:["Make tzatziki: mix yogurt, grated cucumber, lemon juice, mint, garlic. Chill.","Mix lamb with onion, garlic, cumin, paprika, cinnamon, salt. Shape into oval kofta.","Grill or pan-fry kofta 4-5 min per side. Serve with tzatziki and warm pita."]},
{id:37,name:"Chicken Burrito Bowl",time:25,servings:3,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/52374582599_429f1412cf_c.jpg",ing:[{n:"chicken breast",q:"400g"},{n:"rice",q:"250g"},{n:"black beans",q:"1 can, drained"},{n:"corn",q:"1 can, drained"},{n:"avocado",q:"1, sliced"},{n:"lime",q:"2"},{n:"cumin",q:"1 tsp"},{n:"chili powder",q:"1 tsp"},{n:"sour cream",q:"80ml"},{n:"salsa",q:"100ml"},{n:"cilantro",q:"fresh"}],steps:["Season chicken with cumin, chili powder, salt. Grill or pan-fry 5-6 min per side. Slice.","Cook rice with lime juice and cilantro (cilantro-lime rice).","Assemble bowls: rice, beans, corn, chicken, avocado, salsa, sour cream, lime wedge."]},
{id:38,name:"Provencal Ratatouille",time:45,servings:4,diff:"Medium",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/4757/39669219771_68b8aaa163_c.jpg",ing:[{n:"eggplant",q:"1, sliced thin"},{n:"zucchini",q:"2, sliced thin"},{n:"bell pepper",q:"2, diced"},{n:"tomato",q:"4 large, sliced thin"},{n:"onion",q:"1, diced"},{n:"garlic",q:"4 cloves"},{n:"canned tomatoes",q:"400g"},{n:"fresh thyme",q:"sprigs"},{n:"fresh basil",q:"for serving"},{n:"olive oil",q:"4 tbsp"}],steps:["Make base: sauté onion, garlic, peppers. Add canned tomatoes. Spread in baking dish.","Arrange alternating thin slices of eggplant, zucchini, tomato in spiral on top.","Drizzle olive oil, add thyme. Bake covered 200C 30 min, uncover 15 min more. Top with basil."]},
{id:39,name:"Crispy Tofu Stir-Fry",time:20,servings:2,diff:"Easy",tags:["vegan","vegetarian","dairy-free","nut-free"],img:"https://live.staticflickr.com/65535/52764610733_64c6447c6b_c.jpg",ing:[{n:"extra-firm tofu",q:"400g, pressed"},{n:"soy sauce",q:"3 tbsp"},{n:"cornstarch",q:"2 tbsp"},{n:"broccoli",q:"200g"},{n:"bell pepper",q:"1, sliced"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch, grated"},{n:"sriracha",q:"1 tbsp"},{n:"maple syrup",q:"1 tbsp"},{n:"rice",q:"for serving"}],steps:["Cube tofu, coat in cornstarch. Fry in oil until crispy on all sides, 6-8 min.","Stir-fry broccoli and pepper 3 min. Add garlic and ginger 30 sec.","Return tofu. Add soy sauce, sriracha, maple syrup. Toss to coat. Serve over rice."]},
{id:40,name:"Shepherds Pie",time:50,servings:6,diff:"Medium",tags:["nut-free"],img:"https://live.staticflickr.com/65535/55133975902_9859e685d1_c.jpg",ing:[{n:"ground lamb",q:"500g"},{n:"potatoes",q:"800g, peeled and cubed"},{n:"onion",q:"1, diced"},{n:"carrot",q:"2, diced"},{n:"frozen peas",q:"100g"},{n:"garlic",q:"3 cloves"},{n:"tomato paste",q:"2 tbsp"},{n:"beef broth",q:"200ml"},{n:"butter",q:"50g"},{n:"milk",q:"100ml"},{n:"Worcestershire sauce",q:"1 tbsp"}],steps:["Boil potatoes until tender. Mash with butter and milk. Season.","Brown lamb, drain fat. Add onion, carrot, garlic 5 min. Add paste, broth, Worcestershire. Simmer 10 min. Add peas.","Top with mashed potatoes, rough up surface with fork. Bake 200C 20-25 min until golden."]},
{id:41,name:"Butter Chicken",time:35,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55153211682_849938c39c_c.jpg",ing:[{n:"chicken thighs",q:"600g, cubed"},{n:"butter",q:"40g"},{n:"onion",q:"1, diced"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"1 inch, grated"},{n:"canned tomatoes",q:"400g"},{n:"heavy cream",q:"200ml"},{n:"garam masala",q:"2 tsp"},{n:"turmeric",q:"1 tsp"},{n:"chili powder",q:"1 tsp"},{n:"fenugreek leaves",q:"1 tsp, dried"},{n:"rice",q:"for serving"}],steps:["Sauté onion in butter 5 min. Add garlic, ginger, all spices. Cook 1 min.","Add tomatoes, simmer 10 min. Blend smooth. Stir in cream.","Add cubed chicken. Simmer 12-15 min. Serve with basmati rice and naan."]},
{id:42,name:"Penne alla Vodka",time:25,servings:4,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/52753238054_7b633d6319_c.jpg",ing:[{n:"penne",q:"400g"},{n:"canned San Marzano tomatoes",q:"400g"},{n:"heavy cream",q:"100ml"},{n:"vodka",q:"60ml"},{n:"onion",q:"1, finely diced"},{n:"garlic",q:"3 cloves"},{n:"parmesan",q:"50g, grated"},{n:"red pepper flakes",q:"1/2 tsp"},{n:"fresh basil",q:"for serving"},{n:"olive oil",q:"2 tbsp"}],steps:["Sauté onion in olive oil 5 min. Add garlic and pepper flakes 1 min. Add tomatoes, simmer 10 min.","Add vodka, cook 5 min. Stir in cream.","Cook penne al dente. Toss with sauce, parmesan, and pasta water to loosen. Top with basil."]},
{id:43,name:"Swedish Meatballs",time:35,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55121156677_3935eba7bc_c.jpg",ing:[{n:"ground beef",q:"300g"},{n:"ground pork",q:"200g"},{n:"onion",q:"1, finely grated"},{n:"egg",q:"1"},{n:"breadcrumbs",q:"40g"},{n:"heavy cream",q:"200ml"},{n:"beef broth",q:"200ml"},{n:"butter",q:"30g"},{n:"flour",q:"2 tbsp"},{n:"allspice",q:"1/2 tsp"},{n:"nutmeg",q:"1/4 tsp"}],steps:["Mix meats with onion, egg, breadcrumbs, allspice, nutmeg, salt, pepper. Form small balls.","Brown meatballs in butter in batches. Remove.","Make gravy: add flour to pan, cook 1 min. Whisk in broth and cream. Return meatballs, simmer 10 min."]},
{id:44,name:"Shrimp Scampi",time:15,servings:3,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55121203814_766ee13287_c.jpg",ing:[{n:"large shrimp",q:"500g, peeled"},{n:"garlic",q:"6 cloves, sliced"},{n:"dry white wine",q:"100ml"},{n:"butter",q:"40g"},{n:"lemon",q:"1"},{n:"red pepper flakes",q:"1/2 tsp"},{n:"flat-leaf parsley",q:"fresh, chopped"},{n:"linguine",q:"300g"}],steps:["Cook linguine al dente. Reserve pasta water.","Sauté garlic in butter 1 min. Add shrimp, cook 2 min per side until pink.","Deglaze with wine. Add lemon juice, pepper flakes. Toss with linguine and parsley."]},
{id:45,name:"Moroccan Chickpea Stew",time:30,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/488/18986779283_b0a52483e4_c.jpg",ing:[{n:"chickpeas",q:"2 cans, drained"},{n:"canned tomatoes",q:"400g"},{n:"sweet potato",q:"1 large, cubed"},{n:"onion",q:"1, diced"},{n:"garlic",q:"3 cloves"},{n:"ground cumin",q:"2 tsp"},{n:"cinnamon",q:"1/2 tsp"},{n:"smoked paprika",q:"1 tsp"},{n:"vegetable broth",q:"300ml"},{n:"cilantro",q:"fresh"},{n:"lemon",q:"1"}],steps:["Sauté onion 5 min. Add garlic, cumin, cinnamon, paprika. Cook 1 min.","Add sweet potato, chickpeas, tomatoes, broth. Simmer 20 min until tender.","Season with salt, lemon juice. Serve garnished with cilantro."]},
{id:46,name:"Chicken Parmesan",time:30,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55141657715_8d46803288_c.jpg",ing:[{n:"chicken breast",q:"4, pounded thin"},{n:"breadcrumbs",q:"100g"},{n:"parmesan",q:"60g, grated"},{n:"eggs",q:"2, beaten"},{n:"mozzarella",q:"150g, sliced"},{n:"canned tomatoes",q:"400g"},{n:"garlic",q:"3 cloves"},{n:"fresh basil",q:"bunch"},{n:"flour",q:"50g"},{n:"olive oil",q:"for frying"}],steps:["Dredge chicken in flour, beaten egg, then breadcrumbs mixed with half the parmesan.","Fry until golden, 3-4 min per side. Place in baking dish.","Spoon tomato sauce over, top with mozzarella. Bake 200C 10 min. Garnish with basil."]},
{id:47,name:"Thai Basil Fried Rice",time:15,servings:2,diff:"Easy",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/52909189866_2e30090999_c.jpg",ing:[{n:"cooked jasmine rice",q:"400g, day-old"},{n:"chicken breast",q:"200g, diced"},{n:"garlic",q:"4 cloves, minced"},{n:"Thai basil",q:"large bunch"},{n:"soy sauce",q:"2 tbsp"},{n:"fish sauce",q:"1 tbsp"},{n:"oyster sauce",q:"1 tbsp"},{n:"egg",q:"1"},{n:"Thai chili",q:"2, sliced"},{n:"vegetable oil",q:"2 tbsp"}],steps:["Stir-fry diced chicken in hot wok with oil 3 min. Add garlic and chili 30 sec.","Add rice, soy sauce, fish sauce, oyster sauce. Toss over high heat 2 min.","Push rice aside, scramble egg. Mix everything. Toss in Thai basil until just wilted."]},
{id:48,name:"Mushroom Stroganoff",time:25,servings:4,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54866411716_c2de59ccb9_c.jpg",ing:[{n:"mixed mushrooms",q:"500g, sliced"},{n:"onion",q:"1, diced"},{n:"garlic",q:"3 cloves"},{n:"sour cream",q:"200g"},{n:"vegetable broth",q:"150ml"},{n:"smoked paprika",q:"1 tsp"},{n:"fresh thyme",q:"sprigs"},{n:"egg noodles",q:"300g"},{n:"butter",q:"30g"},{n:"Dijon mustard",q:"1 tsp"}],steps:["Sauté mushrooms in butter over high heat until golden, 6-8 min. Add onion, garlic 3 min.","Add paprika, thyme, mustard, broth. Simmer 5 min.","Remove from heat, stir in sour cream. Serve over egg noodles."]},
{id:49,name:"Grilled Caesar Salad",time:15,servings:2,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54530765837_5811224a2d_c.jpg",ing:[{n:"romaine hearts",q:"2, halved lengthwise"},{n:"chicken breast",q:"2"},{n:"parmesan",q:"40g, shaved"},{n:"lemon",q:"1"},{n:"garlic",q:"2 cloves, minced"},{n:"olive oil",q:"3 tbsp"},{n:"anchovy paste",q:"1 tsp"},{n:"Dijon mustard",q:"1/2 tsp"},{n:"croutons",q:"handful"},{n:"egg yolk",q:"1"}],steps:["Grill seasoned chicken 5-6 min per side. Rest 5 min, slice.","Brush romaine with oil. Grill cut-side down 2 min until charred.","Whisk dressing: egg yolk, olive oil, lemon, garlic, anchovy, mustard. Assemble with croutons and parmesan."]},
{id:50,name:"Black Bean Soup",time:25,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/55100370461_994f4eb126_c.jpg",ing:[{n:"black beans",q:"2 cans"},{n:"onion",q:"1, diced"},{n:"garlic",q:"3 cloves"},{n:"cumin",q:"2 tsp"},{n:"chili powder",q:"1 tsp"},{n:"vegetable broth",q:"500ml"},{n:"lime",q:"1"},{n:"cilantro",q:"fresh"},{n:"avocado",q:"1"},{n:"chipotle in adobo",q:"1 pepper, minced"}],steps:["Sauté onion and garlic 5 min. Add cumin, chili powder, chipotle. Cook 1 min.","Add beans with liquid and broth. Simmer 15 min.","Blend half for thickness. Serve with lime, cilantro, avocado slices."]},
{id:51,name:"Chicken Piccata",time:20,servings:4,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55101536538_6acc75330a_c.jpg",ing:[{n:"chicken breast",q:"4, pounded thin"},{n:"flour",q:"50g"},{n:"butter",q:"40g"},{n:"lemon",q:"2, juiced"},{n:"capers",q:"2 tbsp"},{n:"dry white wine",q:"100ml"},{n:"chicken broth",q:"100ml"},{n:"flat-leaf parsley",q:"fresh, chopped"}],steps:["Dredge chicken in seasoned flour. Brown in butter 3 min per side. Remove.","Add wine, scraping up browned bits. Add broth, lemon juice, capers. Simmer 5 min.","Return chicken, spoon sauce over. Garnish with parsley. Serve with pasta or potatoes."]},
{id:52,name:"Coconut Shrimp Curry",time:25,servings:3,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/48518158976_bcc33aae57_c.jpg",ing:[{n:"large shrimp",q:"400g, peeled"},{n:"coconut milk",q:"400ml"},{n:"red curry paste",q:"2 tbsp"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch, grated"},{n:"lime",q:"1"},{n:"fish sauce",q:"1 tbsp"},{n:"brown sugar",q:"1 tsp"},{n:"Thai basil",q:"fresh"},{n:"rice",q:"for serving"}],steps:["Sauté curry paste with garlic and ginger in a splash of coconut cream 2 min.","Pour in remaining coconut milk, fish sauce, sugar. Simmer 5 min.","Add shrimp, cook 3-4 min. Squeeze in lime, add basil. Serve over jasmine rice."]},
{id:53,name:"Roasted Vegetable Lasagna",time:60,servings:8,diff:"Medium",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54949327682_ea2354fcb4_c.jpg",ing:[{n:"lasagna sheets",q:"12"},{n:"zucchini",q:"2, sliced"},{n:"bell peppers",q:"2, chopped"},{n:"eggplant",q:"1, cubed"},{n:"ricotta",q:"400g"},{n:"mozzarella",q:"250g, shredded"},{n:"parmesan",q:"60g, grated"},{n:"canned tomatoes",q:"800g"},{n:"garlic",q:"4 cloves"},{n:"fresh basil",q:"bunch"},{n:"spinach",q:"150g"}],steps:["Roast zucchini, peppers, eggplant with oil at 220C 20 min. Make tomato sauce with garlic and basil.","Layer: sauce, pasta, roasted veg, ricotta, spinach. Repeat 3 times.","Top with mozzarella and parmesan. Bake covered 180C 30 min, uncover 10 min until golden."]},
{id:54,name:"Tuna Poke Bowl",time:15,servings:2,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/53787842714_7e414ace18_c.jpg",ing:[{n:"sushi-grade tuna",q:"300g, cubed"},{n:"sushi rice",q:"250g, cooked"},{n:"soy sauce",q:"3 tbsp"},{n:"sesame oil",q:"1 tbsp"},{n:"avocado",q:"1, sliced"},{n:"cucumber",q:"1, diced"},{n:"edamame",q:"100g, shelled"},{n:"green onion",q:"2, sliced"},{n:"sesame seeds",q:"1 tbsp"},{n:"pickled ginger",q:"for serving"}],steps:["Season rice with rice vinegar and sugar. Let cool.","Marinate cubed tuna in soy sauce, sesame oil, chili flakes 10 min.","Assemble bowls: rice, tuna, avocado, cucumber, edamame, green onion, sesame seeds."]},
{id:55,name:"Chicken Cacciatore",time:40,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54910519854_de86522aa3_c.jpg",ing:[{n:"chicken thighs",q:"6, bone-in"},{n:"canned tomatoes",q:"400g"},{n:"onion",q:"1, sliced"},{n:"bell peppers",q:"2, sliced"},{n:"garlic",q:"4 cloves"},{n:"kalamata olives",q:"60g"},{n:"capers",q:"1 tbsp"},{n:"red wine",q:"100ml"},{n:"dried oregano",q:"1 tsp"},{n:"olive oil",q:"2 tbsp"},{n:"fresh basil",q:"for serving"}],steps:["Brown chicken in olive oil 4 min per side. Remove.","Sauté onion and peppers 5 min. Add garlic. Deglaze with wine.","Add tomatoes, olives, capers, oregano. Return chicken. Cover, simmer 25 min. Garnish with basil."]},
{id:56,name:"Zucchini Noodle Carbonara",time:15,servings:2,diff:"Easy",tags:["gluten-free","high-protein"],img:U+"1768204039597-936953b10ddf?w=600&h=400&fit=crop",ing:[{n:"large zucchini",q:"4, spiralized"},{n:"pancetta",q:"150g, diced"},{n:"egg yolks",q:"2"},{n:"parmesan",q:"50g, finely grated"},{n:"garlic",q:"2 cloves"},{n:"black pepper",q:"1 tsp, freshly cracked"}],steps:["Cook pancetta until crispy. Add sliced garlic 30 sec. Remove from heat.","Whisk egg yolks with parmesan and pepper.","Add zucchini noodles to pan, toss 2 min. Remove from heat, add egg mixture, toss quickly to coat."]},
{id:57,name:"Coconut Curry Ramen",time:25,servings:2,diff:"Easy",tags:["dairy-free"],img:"https://live.staticflickr.com/7917/46512584994_79584b2a78_c.jpg",ing:[{n:"ramen noodles",q:"200g"},{n:"coconut milk",q:"400ml"},{n:"red curry paste",q:"2 tbsp"},{n:"chicken broth",q:"300ml"},{n:"shiitake mushrooms",q:"100g, sliced"},{n:"baby spinach",q:"100g"},{n:"eggs",q:"2, soft-boiled"},{n:"green onion",q:"2, sliced"},{n:"soy sauce",q:"2 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"chili oil",q:"optional"}],steps:["Fry curry paste 1 min. Add coconut milk and broth, bring to simmer. Season with soy sauce.","Add mushrooms, cook 3 min. Cook ramen noodles per package.","Assemble bowls: noodles, broth, halved soft-boiled egg, spinach, green onion, chili oil."]},
{id:58,name:"Lemon Herb Grilled Fish",time:20,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/50046385356_c276f7deb4_c.jpg",ing:[{n:"white fish fillets",q:"4"},{n:"lemon",q:"2"},{n:"garlic",q:"3 cloves, minced"},{n:"olive oil",q:"3 tbsp"},{n:"fresh dill",q:"chopped"},{n:"flat-leaf parsley",q:"chopped"},{n:"capers",q:"1 tbsp"}],steps:["Mix olive oil, lemon juice, garlic, dill, parsley. Marinate fish 15 min.","Grill or pan-sear fish 4-5 min per side until flaky.","Serve with extra lemon, capers, and fresh herbs."]},
{id:59,name:"Beef Chili",time:40,servings:6,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55111650588_b511582f22_c.jpg",ing:[{n:"ground beef",q:"500g"},{n:"onion",q:"1 large, diced"},{n:"garlic",q:"4 cloves"},{n:"canned tomatoes",q:"800g"},{n:"kidney beans",q:"2 cans, drained"},{n:"chili powder",q:"2 tbsp"},{n:"ground cumin",q:"1 tsp"},{n:"smoked paprika",q:"1 tsp"},{n:"tomato paste",q:"2 tbsp"},{n:"beef broth",q:"200ml"}],steps:["Brown beef, breaking up with spoon. Add onion and garlic 3 min.","Add all spices, tomato paste 1 min. Add tomatoes, beans, broth.","Simmer 25-30 min until thick. Serve with sour cream, cheese, cilantro."]},
{id:60,name:"Pork Stir-Fry",time:20,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/55093649553_bf3c7d757b_c.jpg",ing:[{n:"pork tenderloin",q:"400g, thinly sliced"},{n:"bell peppers",q:"2, sliced"},{n:"sugar snap peas",q:"150g"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch, grated"},{n:"soy sauce",q:"3 tbsp"},{n:"hoisin sauce",q:"2 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"cornstarch",q:"1 tsp"},{n:"rice",q:"for serving"}],steps:["Toss pork with soy sauce and cornstarch. Stir-fry in hot wok 2-3 min. Remove.","Stir-fry peppers and snap peas 2 min. Add garlic and ginger 30 sec.","Return pork. Add hoisin and sesame oil. Toss 1 min. Serve over rice."]},
{id:61,name:"Spinach & Ricotta Stuffed Shells",time:40,servings:6,diff:"Medium",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/53955337478_52899529c1_c.jpg",ing:[{n:"jumbo pasta shells",q:"24"},{n:"ricotta",q:"400g"},{n:"frozen spinach",q:"200g, thawed and squeezed"},{n:"mozzarella",q:"200g, shredded"},{n:"parmesan",q:"40g, grated"},{n:"egg",q:"1"},{n:"garlic",q:"2 cloves, minced"},{n:"canned tomatoes",q:"800g"},{n:"fresh basil",q:"for serving"},{n:"nutmeg",q:"pinch"}],steps:["Cook shells al dente. Mix ricotta, spinach, egg, garlic, half the mozzarella, nutmeg.","Spread tomato sauce in baking dish. Fill each shell, arrange in dish.","Top with remaining mozzarella and parmesan. Bake covered 190C 20 min. Uncover 5 min. Top with basil."]},
{id:62,name:"BBQ Pulled Chicken Sandwiches",time:35,servings:4,diff:"Easy",tags:["dairy-free","nut-free"],img:"https://live.staticflickr.com/65535/55100370641_6dbf2ff3a9_c.jpg",ing:[{n:"chicken thighs",q:"600g, boneless"},{n:"BBQ sauce",q:"200ml"},{n:"onion",q:"1, sliced"},{n:"garlic",q:"3 cloves"},{n:"apple cider vinegar",q:"1 tbsp"},{n:"brown sugar",q:"1 tbsp"},{n:"smoked paprika",q:"1 tsp"},{n:"brioche buns",q:"4"},{n:"coleslaw",q:"for serving"}],steps:["Season chicken with paprika and salt. Sear both sides in a hot pan.","Add onion, garlic, BBQ sauce, vinegar, sugar. Cover, simmer 25 min until very tender.","Shred chicken with two forks. Toss in sauce. Pile onto buns with coleslaw."]},
{id:63,name:"Greek Salad with Grilled Chicken",time:20,servings:2,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/1190/909574264_3d9dc41826_c.jpg",ing:[{n:"chicken breast",q:"2"},{n:"cucumber",q:"1, chunked"},{n:"tomato",q:"2, wedged"},{n:"red onion",q:"1/2, thinly sliced"},{n:"kalamata olives",q:"50g"},{n:"feta cheese",q:"100g, cubed"},{n:"olive oil",q:"3 tbsp"},{n:"lemon",q:"1"},{n:"dried oregano",q:"1 tsp"}],steps:["Season chicken with oregano, salt, pepper. Grill 5-6 min per side. Rest 5 min, slice.","Combine cucumber, tomato, onion, olives in a bowl.","Dress with olive oil and lemon juice. Top with sliced chicken and feta cubes."]},
{id:64,name:"Creamy Garlic Tuscan Shrimp",time:20,servings:3,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/1922/44788358032_5088a8615c_c.jpg",ing:[{n:"large shrimp",q:"400g, peeled"},{n:"sun-dried tomatoes",q:"60g, chopped"},{n:"baby spinach",q:"100g"},{n:"garlic",q:"4 cloves, minced"},{n:"heavy cream",q:"200ml"},{n:"parmesan",q:"40g, grated"},{n:"butter",q:"20g"},{n:"olive oil",q:"1 tbsp"},{n:"Italian seasoning",q:"1 tsp"}],steps:["Sear shrimp in butter and oil 2 min per side. Remove.","Sauté garlic and sun-dried tomatoes 1 min. Add cream, parmesan, Italian seasoning.","Add spinach, wilt 1 min. Return shrimp. Serve with crusty bread or pasta."]},
{id:65,name:"Veggie Buddha Bowl",time:25,servings:2,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free"],img:"https://live.staticflickr.com/65535/49859044753_e69e442b60_c.jpg",ing:[{n:"sweet potato",q:"1, cubed"},{n:"chickpeas",q:"1 can, drained"},{n:"quinoa",q:"150g"},{n:"avocado",q:"1, sliced"},{n:"kale",q:"100g, stemmed"},{n:"tahini",q:"2 tbsp"},{n:"lemon",q:"1"},{n:"olive oil",q:"2 tbsp"},{n:"cumin",q:"1 tsp"},{n:"maple syrup",q:"1 tsp"}],steps:["Toss sweet potato and chickpeas with oil and cumin. Roast 220C 20 min. Cook quinoa.","Massage kale with olive oil and a squeeze of lemon.","Assemble bowls: quinoa, sweet potato, chickpeas, kale, avocado. Drizzle tahini-lemon dressing."]},
{id:66,name:"One-Pot French Onion Pasta",time:30,servings:4,diff:"Easy",tags:["vegetarian"],img:"https://images.unsplash.com/photo-1551631759-96b8377f491c?w=600&h=400&fit=crop",ing:[{n:"large onions",q:"4, thinly sliced"},{n:"penne or fusilli",q:"350g"},{n:"vegetable broth",q:"800ml"},{n:"butter",q:"40g"},{n:"garlic",q:"3 cloves"},{n:"fresh thyme",q:"sprigs"},{n:"gruyere cheese",q:"150g, grated"},{n:"parmesan",q:"40g, grated"}],steps:["Caramelize onions in butter over medium-low 15 min, stirring occasionally. Add garlic, thyme 1 min.","Add broth and pasta. Bring to boil, simmer until pasta is tender and liquid mostly absorbed.","Stir in gruyere. Top with parmesan. Broil 2 min until bubbly and golden."]},
{id:67,name:"Miso Glazed Salmon",time:20,servings:4,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/3249/4606884484_49852999d5_c.jpg",ing:[{n:"salmon fillets",q:"4"},{n:"white miso paste",q:"3 tbsp"},{n:"mirin",q:"2 tbsp"},{n:"soy sauce",q:"1 tbsp"},{n:"brown sugar",q:"1 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"rice",q:"for serving"},{n:"green onion",q:"2, sliced"},{n:"sesame seeds",q:"for garnish"}],steps:["Whisk miso, mirin, soy sauce, sugar, sesame oil. Coat salmon generously.","Marinate 10 min minimum. Place on lined baking sheet.","Broil 8-10 min until caramelized and flaky. Serve over rice with green onion and sesame seeds."]},
{id:68,name:"Chicken Quesadillas",time:15,servings:4,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55109908147_fd1947cb1e_c.jpg",ing:[{n:"cooked chicken",q:"300g, shredded"},{n:"large flour tortillas",q:"4"},{n:"cheddar cheese",q:"150g, shredded"},{n:"bell pepper",q:"1, sliced"},{n:"onion",q:"1/2, sliced"},{n:"cumin",q:"1/2 tsp"},{n:"vegetable oil",q:"for cooking"},{n:"salsa",q:"for serving"},{n:"sour cream",q:"for serving"}],steps:["Sauté peppers and onion with cumin until softened, 3-4 min.","Lay tortilla flat. Cover half with cheese, chicken, pepper-onion mix, more cheese. Fold.","Cook in oiled skillet 2-3 min per side until golden. Cut into wedges. Serve with salsa."]},
{id:69,name:"Vegetarian Chili",time:30,servings:6,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/55118721835_564def970c_c.jpg",ing:[{n:"black beans",q:"1 can, drained"},{n:"kidney beans",q:"1 can, drained"},{n:"canned tomatoes",q:"800g"},{n:"onion",q:"1, diced"},{n:"garlic",q:"4 cloves"},{n:"bell peppers",q:"2, diced"},{n:"corn",q:"1 can, drained"},{n:"chili powder",q:"2 tbsp"},{n:"ground cumin",q:"1 tsp"},{n:"smoked paprika",q:"1 tsp"},{n:"vegetable broth",q:"200ml"}],steps:["Sauté onion, garlic, and peppers 5 min.","Add beans, tomatoes, corn, broth, and all spices. Stir well.","Simmer 20 min until thick. Serve with avocado, cilantro, tortilla chips."]},
{id:70,name:"Baked Feta Pasta",time:30,servings:4,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/51100619743_5951897e80_c.jpg",ing:[{n:"feta cheese",q:"200g block"},{n:"cherry tomatoes",q:"500g"},{n:"garlic",q:"4 cloves, whole"},{n:"olive oil",q:"4 tbsp"},{n:"red pepper flakes",q:"1/2 tsp"},{n:"fresh basil",q:"bunch"},{n:"pasta",q:"350g"}],steps:["Place feta in center of baking dish. Surround with tomatoes and garlic.","Drizzle with olive oil, add pepper flakes, salt, pepper. Bake 200C 25 min.","Cook pasta. Mash roasted feta, mix with tomatoes. Toss with hot pasta and torn basil."]},
{id:71,name:"Cacio e Pepe",time:15,servings:4,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54631358172_bb94d6d844_c.jpg",ing:[{n:"spaghetti",q:"400g"},{n:"pecorino romano",q:"150g, finely grated"},{n:"black pepper",q:"2 tbsp, freshly cracked"},{n:"salt",q:"for pasta water"}],steps:["Cook spaghetti in salted water. Reserve 300ml pasta water before draining.","Toast black pepper in dry pan 1 min. Add 200ml pasta water, bring to simmer.","Add pasta, toss vigorously. Remove from heat, add pecorino gradually, tossing until creamy."]},
{id:72,name:"Japanese Chicken Katsu Curry",time:35,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54199485970_ea82d4cdf5_c.jpg",ing:[{n:"chicken breast",q:"4, pounded thin"},{n:"panko breadcrumbs",q:"150g"},{n:"eggs",q:"2, beaten"},{n:"flour",q:"50g"},{n:"Japanese curry roux",q:"1 block"},{n:"onion",q:"1, sliced"},{n:"carrot",q:"1, diced"},{n:"potato",q:"1, cubed"},{n:"rice",q:"for serving"}],steps:["Make curry: cook onion, carrot, potato in 500ml water 15 min. Add curry roux, stir until thick.","Dredge chicken in flour, egg, panko. Deep fry at 180C 5-6 min until golden.","Slice katsu. Serve over rice with curry sauce alongside."]},
{id:73,name:"Lamb Rogan Josh",time:45,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/51226723909_b01e9f94be_c.jpg",ing:[{n:"lamb shoulder",q:"600g, cubed"},{n:"onion",q:"2, sliced"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"2 inch, grated"},{n:"canned tomatoes",q:"400g"},{n:"yogurt",q:"100g"},{n:"kashmiri chili powder",q:"2 tbsp"},{n:"garam masala",q:"1 tsp"},{n:"cardamom pods",q:"4"},{n:"bay leaves",q:"2"},{n:"vegetable oil",q:"3 tbsp"},{n:"rice",q:"for serving"}],steps:["Sear lamb in batches until browned. Remove.","Fry onions until golden, 10 min. Add garlic, ginger, spices 2 min. Add yogurt gradually.","Add tomatoes and lamb. Cover, simmer 45 min until tender. Serve with basmati rice."]},
{id:74,name:"Prawn Pad See Ew",time:20,servings:2,diff:"Easy",tags:["dairy-free","high-protein"],img:U+"1650532826345-353a86334f85?w=600&h=400&fit=crop",ing:[{n:"wide rice noodles",q:"250g"},{n:"prawns",q:"300g"},{n:"Chinese broccoli",q:"200g"},{n:"garlic",q:"3 cloves"},{n:"egg",q:"1"},{n:"dark soy sauce",q:"2 tbsp"},{n:"light soy sauce",q:"1 tbsp"},{n:"oyster sauce",q:"1 tbsp"},{n:"white pepper",q:"pinch"},{n:"vegetable oil",q:"2 tbsp"}],steps:["Soak wide noodles if dried. Stir-fry prawns in hot wok 2 min. Remove.","Add broccoli, garlic, cook 2 min. Push aside, scramble egg.","Add noodles, all sauces. Return prawns. Toss over high heat until noodles are lightly charred."]},
{id:75,name:"Boeuf Bourguignon",time:120,servings:6,diff:"Hard",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/53532610666_b24179aa0e_c.jpg",ing:[{n:"beef chuck",q:"1kg, cubed"},{n:"bacon lardons",q:"150g"},{n:"red wine",q:"500ml"},{n:"beef broth",q:"250ml"},{n:"onion",q:"2, chopped"},{n:"carrot",q:"3, chunked"},{n:"garlic",q:"4 cloves"},{n:"mushrooms",q:"250g"},{n:"tomato paste",q:"2 tbsp"},{n:"thyme",q:"3 sprigs"},{n:"bay leaves",q:"2"},{n:"butter",q:"30g"},{n:"flour",q:"2 tbsp"}],steps:["Brown beef in batches. Cook bacon, remove. Sauté vegetables 5 min. Add flour and paste.","Deglaze with wine. Add broth, beef, bacon, herbs. Cover, cook in 160C oven 2 hours.","Add mushrooms last 30 min. Sauce should be thick and rich. Serve with mashed potatoes."]},
{id:76,name:"Chicken Shawarma",time:30,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55075614638_9cb0a45c5b_c.jpg",ing:[{n:"chicken thighs",q:"600g, boneless"},{n:"cumin",q:"2 tsp"},{n:"coriander",q:"1 tsp"},{n:"turmeric",q:"1 tsp"},{n:"smoked paprika",q:"2 tsp"},{n:"cinnamon",q:"1/2 tsp"},{n:"garlic",q:"4 cloves"},{n:"lemon",q:"1"},{n:"olive oil",q:"3 tbsp"},{n:"pita bread",q:"for serving"},{n:"tahini",q:"for serving"}],steps:["Mix all spices with garlic, lemon, oil. Coat chicken. Marinate 30 min or overnight.","Grill or pan-fry chicken 5-6 min per side until charred. Rest 5 min, slice.","Serve in warm pita with tahini sauce, pickled vegetables, and fresh herbs."]},
{id:77,name:"Prawn Tacos al Pastor",time:25,servings:4,diff:"Medium",tags:["dairy-free","high-protein"],img:U+"1613409385222-3d0decb6742a?w=600&h=400&fit=crop",ing:[{n:"large prawns",q:"500g"},{n:"pineapple",q:"4 rings"},{n:"chipotle in adobo",q:"2 tbsp"},{n:"achiote paste",q:"1 tbsp"},{n:"lime",q:"2"},{n:"red onion",q:"1, diced"},{n:"cilantro",q:"fresh"},{n:"corn tortillas",q:"8"},{n:"cabbage",q:"100g, shredded"},{n:"garlic",q:"2 cloves"}],steps:["Blend chipotle, achiote, garlic, lime juice. Marinate prawns 15 min.","Grill pineapple and prawns 2-3 min per side.","Chop pineapple. Serve prawns in warm tortillas with pineapple, cabbage, onion, cilantro, lime."]},
{id:78,name:"Mapo Tofu",time:20,servings:3,diff:"Easy",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/54830538861_31936c41a7_c.jpg",ing:[{n:"soft tofu",q:"400g, cubed"},{n:"ground pork",q:"150g"},{n:"doubanjiang",q:"2 tbsp"},{n:"fermented black beans",q:"1 tbsp"},{n:"Sichuan peppercorn",q:"1 tsp, ground"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"soy sauce",q:"1 tbsp"},{n:"cornstarch slurry",q:"1 tbsp"},{n:"green onion",q:"2"},{n:"rice",q:"for serving"}],steps:["Fry pork until crispy. Add doubanjiang, black beans, garlic, ginger 2 min.","Add 200ml water, soy sauce. Gently slide in tofu. Simmer 5 min.","Thicken with cornstarch slurry. Sprinkle Sichuan pepper and green onion. Serve over rice."]},
{id:79,name:"Pork Carnitas",time:120,servings:6,diff:"Easy",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/54690398534_d6db4e5bde_c.jpg",ing:[{n:"pork shoulder",q:"1kg"},{n:"orange",q:"2, juiced"},{n:"lime",q:"2, juiced"},{n:"garlic",q:"6 cloves"},{n:"cumin",q:"2 tsp"},{n:"oregano",q:"1 tsp"},{n:"onion",q:"1, quartered"},{n:"bay leaves",q:"2"},{n:"lard or oil",q:"2 tbsp"},{n:"salt",q:"1 tbsp"},{n:"tortillas",q:"for serving"}],steps:["Cut pork into 5cm chunks. Toss with all seasonings, citrus juice, garlic.","Place in pot with onion, bay leaves, 100ml water. Cover, cook at 160C for 2.5-3 hours.","Shred pork. Broil or pan-fry until crispy edges form. Serve in tortillas with salsa and lime."]},
{id:80,name:"Dan Dan Noodles",time:20,servings:2,diff:"Easy",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/55109438160_8c511efb04_c.jpg",ing:[{n:"Chinese egg noodles",q:"250g"},{n:"ground pork",q:"200g"},{n:"preserved mustard greens",q:"2 tbsp"},{n:"Sichuan peppercorn oil",q:"1 tbsp"},{n:"chili oil",q:"2 tbsp"},{n:"soy sauce",q:"2 tbsp"},{n:"Chinese sesame paste",q:"2 tbsp"},{n:"rice vinegar",q:"1 tbsp"},{n:"garlic",q:"2 cloves"},{n:"green onion",q:"2"},{n:"peanuts",q:"2 tbsp, crushed"}],steps:["Cook noodles. Stir-fry pork with preserved mustard greens until crispy.","Mix sauce: sesame paste, soy sauce, vinegar, chili oil, peppercorn oil, noodle water.","Divide sauce into bowls. Add noodles, top with pork, green onion, crushed peanuts."]},
{id:81,name:"Chicken Souvlaki",time:25,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55139651209_1cfbee450a_c.jpg",ing:[{n:"chicken breast",q:"600g, cubed"},{n:"lemon",q:"2"},{n:"garlic",q:"4 cloves"},{n:"oregano",q:"2 tbsp, dried"},{n:"olive oil",q:"4 tbsp"},{n:"red onion",q:"1, chunked"},{n:"bell pepper",q:"2, chunked"},{n:"cherry tomatoes",q:"12"},{n:"pita bread",q:"4"},{n:"tzatziki",q:"for serving"}],steps:["Marinate chicken in lemon juice, garlic, oregano, olive oil 30 min minimum.","Thread chicken and vegetables onto skewers. Grill 10-12 min, turning occasionally.","Serve with warm pita, tzatziki, and a simple salad."]},
{id:82,name:"Mushroom & Thyme Risotto Cakes",time:30,servings:4,diff:"Medium",tags:["vegetarian"],img:"https://live.staticflickr.com/5573/31276057541_50c0f54982_c.jpg",ing:[{n:"leftover risotto",q:"400g"},{n:"egg",q:"1"},{n:"breadcrumbs",q:"60g"},{n:"parmesan",q:"30g, grated"},{n:"thyme",q:"1 tsp, fresh"},{n:"olive oil",q:"for frying"},{n:"mixed salad",q:"for serving"}],steps:["Mix cold risotto with egg, half the breadcrumbs, parmesan, and thyme.","Form into 8 patties. Coat in remaining breadcrumbs.","Shallow fry 3-4 min per side until golden and crispy. Serve with dressed salad."]},
{id:83,name:"Pho Bo",time:60,servings:4,diff:"Medium",tags:["dairy-free","gluten-free"],img:"https://live.staticflickr.com/65535/55010862899_9dc8ac99b3_c.jpg",ing:[{n:"beef bones",q:"1kg"},{n:"star anise",q:"3"},{n:"cinnamon stick",q:"1"},{n:"cloves",q:"3"},{n:"ginger",q:"3 inch, charred"},{n:"onion",q:"1, charred"},{n:"fish sauce",q:"3 tbsp"},{n:"rice noodles",q:"400g"},{n:"beef sirloin",q:"200g, thinly sliced"},{n:"bean sprouts",q:"100g"},{n:"Thai basil",q:"fresh"},{n:"lime",q:"2"},{n:"hoisin sauce",q:"for serving"},{n:"sriracha",q:"for serving"}],steps:["Simmer bones, spices, charred ginger and onion in 2L water for 45 min. Strain. Season with fish sauce.","Cook rice noodles. Divide into bowls.","Top with raw sliced beef. Ladle boiling broth over to cook the beef. Serve with sprouts, basil, lime."]},
{id:84,name:"Lamb Tagine",time:60,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/53524169802_7a81b9c5b7_c.jpg",ing:[{n:"lamb shoulder",q:"600g, cubed"},{n:"onion",q:"1, diced"},{n:"garlic",q:"3 cloves"},{n:"preserved lemon",q:"1, chopped"},{n:"green olives",q:"80g"},{n:"canned tomatoes",q:"400g"},{n:"honey",q:"1 tbsp"},{n:"cumin",q:"2 tsp"},{n:"cinnamon",q:"1 tsp"},{n:"saffron",q:"pinch"},{n:"chicken broth",q:"300ml"},{n:"cilantro",q:"fresh"},{n:"couscous",q:"for serving"}],steps:["Brown lamb in oil. Remove. Sauté onion 5 min. Add garlic, spices 1 min.","Return lamb. Add tomatoes, broth, preserved lemon, olives, honey. Cover, simmer 1 hour.","Serve over couscous garnished with fresh cilantro."]},
{id:85,name:"Seafood Paella",time:45,servings:6,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55125794576_dd0289608d_c.jpg",ing:[{n:"bomba or arborio rice",q:"300g"},{n:"shrimp",q:"300g"},{n:"mussels",q:"500g"},{n:"chorizo",q:"100g, sliced"},{n:"chicken thigh",q:"2, cubed"},{n:"onion",q:"1"},{n:"garlic",q:"4 cloves"},{n:"canned tomatoes",q:"200g"},{n:"saffron",q:"large pinch"},{n:"chicken broth",q:"750ml"},{n:"peas",q:"100g"},{n:"lemon",q:"1"},{n:"olive oil",q:"3 tbsp"}],steps:["Sauté chorizo and chicken. Remove. Cook onion, garlic. Add tomatoes, rice, saffron.","Add broth. Arrange chicken, chorizo back. Simmer 15 min without stirring.","Nestle mussels and shrimp into rice. Add peas. Cook 8-10 min until socarrat forms. Serve with lemon."]},
{id:86,name:"Chicken Katsu Sandwich",time:20,servings:2,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/1979/30725103137_d04833e61f_c.jpg",ing:[{n:"chicken breast",q:"2, pounded thin"},{n:"panko breadcrumbs",q:"100g"},{n:"egg",q:"1, beaten"},{n:"flour",q:"40g"},{n:"tonkatsu sauce",q:"3 tbsp"},{n:"white bread",q:"4 slices"},{n:"cabbage",q:"100g, finely shredded"},{n:"Japanese mayonnaise",q:"2 tbsp"},{n:"mustard",q:"1 tsp"}],steps:["Dredge chicken in flour, egg, panko. Deep fry at 180C 4-5 min until golden.","Spread mayo and mustard on bread. Layer shredded cabbage.","Place katsu on bread, drizzle tonkatsu sauce. Close, cut diagonally."]},
{id:87,name:"Chana Masala",time:30,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/53437578151_3fbe3bf365_c.jpg",ing:[{n:"chickpeas",q:"2 cans, drained"},{n:"onion",q:"1, diced"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"1 inch, grated"},{n:"canned tomatoes",q:"400g"},{n:"garam masala",q:"2 tsp"},{n:"cumin",q:"1 tsp"},{n:"coriander",q:"1 tsp"},{n:"turmeric",q:"1/2 tsp"},{n:"chili powder",q:"1 tsp"},{n:"lemon",q:"1"},{n:"cilantro",q:"fresh"},{n:"rice or naan",q:"for serving"}],steps:["Sauté onion until golden, 8 min. Add garlic, ginger, all spices 2 min.","Add tomatoes and chickpeas. Simmer 15-20 min, mashing some for thickness.","Finish with lemon juice and cilantro. Serve with basmati rice or warm naan."]},

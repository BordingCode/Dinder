{id:540,name:"Thai Basil Chicken",time:15,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:U+"1621515554656-3da68ba128b1?w=600&h=400&fit=crop",ing:[{n:"ground chicken",q:"400g"},{n:"Thai holy basil",q:"large bunch"},{n:"garlic",q:"5 cloves, minced"},{n:"Thai chili",q:"3, minced"},{n:"oyster sauce",q:"2 tbsp"},{n:"soy sauce",q:"1 tbsp"},{n:"fish sauce",q:"1 tbsp"},{n:"sugar",q:"1 tsp"},{n:"egg",q:"2, fried"},{n:"rice",q:"for serving"},{n:"vegetable oil",q:"2 tbsp"}],steps:["Stir-fry garlic and chili in hot oil 30 sec. Add chicken, cook 4 min until browned.","Add oyster sauce, soy sauce, fish sauce, sugar. Stir-fry 2 min.","Toss in holy basil until just wilted. Serve over rice with crispy fried egg."]},
{id:541,name:"Lamb Korma",time:35,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:U+"1628596188752-03f2d9b1015f?w=600&h=400&fit=crop",ing:[{n:"lamb shoulder",q:"600g, cubed"},{n:"onion",q:"1"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"1 inch"},{n:"ground almonds",q:"50g"},{n:"yogurt",q:"100g"},{n:"cream",q:"100ml"},{n:"garam masala",q:"2 tsp"},{n:"cardamom",q:"3 pods"},{n:"cinnamon",q:"1/2 tsp"},{n:"butter",q:"30g"},{n:"cilantro",q:"fresh"},{n:"rice",q:"for serving"}],steps:["Sauté onion in butter 5 min. Add garlic, ginger, spices 2 min.","Add lamb, cook 3 min. Add yogurt, almonds. Simmer 25 min.","Stir in cream. Garnish with cilantro. Serve with rice."]},
{id:542,name:"Buttermilk Fried Chicken",time:30,servings:4,diff:"Medium",tags:["high-protein"],img:U+"1642255485002-1952ee6b6fd5?w=600&h=400&fit=crop",ing:[{n:"chicken pieces",q:"1.2kg"},{n:"buttermilk",q:"400ml"},{n:"flour",q:"200g"},{n:"cornstarch",q:"60g"},{n:"paprika",q:"2 tsp"},{n:"garlic powder",q:"1 tsp"},{n:"onion powder",q:"1 tsp"},{n:"cayenne",q:"1/2 tsp"},{n:"salt",q:"2 tsp"},{n:"vegetable oil",q:"for frying"},{n:"hot sauce",q:"optional"},{n:"coleslaw",q:"for serving"}],steps:["Soak chicken in buttermilk with hot sauce 4+ hours.","Mix flour, cornstarch, all spices. Dredge chicken, let rest 10 min on rack.","Fry at 170C 12-15 min until internal temp 75C. Rest on rack 5 min. Serve with coleslaw."]},
{id:543,name:"Caprese Pasta Salad",time:15,servings:6,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/7563/30117391791_69993cf185_c.jpg",ing:[{n:"fusilli",q:"400g"},{n:"cherry tomatoes",q:"300g, halved"},{n:"fresh mozzarella",q:"250g, cubed"},{n:"basil",q:"large bunch, torn"},{n:"olive oil",q:"4 tbsp"},{n:"balsamic glaze",q:"2 tbsp"},{n:"garlic",q:"1 clove, minced"},{n:"salt and pepper",q:"to taste"},{n:"pine nuts",q:"30g, toasted"}],steps:["Cook fusilli, rinse under cold water.","Combine pasta, tomatoes, mozzarella, basil.","Dress with olive oil, garlic, salt, pepper. Drizzle balsamic. Top with pine nuts."]},
{id:544,name:"Aloo Paratha",time:30,servings:6,diff:"Easy",tags:["vegetarian","dairy-free"],img:"https://live.staticflickr.com/65535/51801948707_453dc785ef_c.jpg",ing:[{n:"whole wheat flour",q:"300g"},{n:"potato",q:"3, boiled and mashed"},{n:"green chili",q:"2, minced"},{n:"cumin seeds",q:"1 tsp"},{n:"garam masala",q:"1 tsp"},{n:"cilantro",q:"fresh, chopped"},{n:"salt",q:"to taste"},{n:"ghee or butter",q:"for cooking"},{n:"yogurt",q:"for serving"},{n:"pickle",q:"for serving"}],steps:["Make dough with flour, salt, water. Knead, rest 20 min.","Mix mashed potato with chili, cumin, garam masala, cilantro, salt.","Roll dough, fill with potato, seal, roll flat. Cook on griddle with ghee 2-3 min per side. Serve with yogurt and pickle."]},
{id:545,name:"Grilled Chicken Salad",time:20,servings:2,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55101536408_15c9718226_c.jpg",ing:[{n:"chicken breast",q:"2"},{n:"mixed greens",q:"200g"},{n:"avocado",q:"1"},{n:"cherry tomatoes",q:"100g"},{n:"cucumber",q:"1"},{n:"red onion",q:"1/4"},{n:"corn",q:"from 1 ear"},{n:"olive oil",q:"3 tbsp"},{n:"lemon juice",q:"2 tbsp"},{n:"Dijon mustard",q:"1 tsp"},{n:"honey",q:"1 tsp"}],steps:["Season and grill chicken 5-6 min per side. Rest 5 min, slice.","Arrange greens, avocado, tomatoes, cucumber, onion, charred corn in bowls.","Whisk oil, lemon, mustard, honey. Drizzle over salad. Top with sliced chicken."]},
{id:546,name:"Miso Ramen with Corn",time:25,servings:2,diff:"Medium",tags:["dairy-free"],img:"https://live.staticflickr.com/8608/16000838574_5c247cdebf_c.jpg",ing:[{n:"ramen noodles",q:"200g"},{n:"white miso paste",q:"2 tbsp"},{n:"chicken broth",q:"500ml"},{n:"ground pork",q:"100g"},{n:"corn",q:"from 1 ear"},{n:"butter",q:"15g"},{n:"garlic",q:"2 cloves"},{n:"ginger",q:"1 inch"},{n:"soft-boiled egg",q:"2"},{n:"green onion",q:"2"},{n:"bean sprouts",q:"50g"},{n:"nori",q:"for serving"}],steps:["Stir-fry pork, garlic, ginger. Char corn.","Heat broth, whisk in miso. Add butter. Cook noodles.","Assemble: noodles, miso broth, pork, charred corn, egg, sprouts, green onion, nori."]},
{id:547,name:"Chicken Schnitzel",time:20,servings:4,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55128073156_3f1116a9f7_c.jpg",ing:[{n:"chicken breast",q:"4, pounded thin"},{n:"flour",q:"80g"},{n:"eggs",q:"2, beaten"},{n:"breadcrumbs",q:"150g"},{n:"lemon",q:"2"},{n:"butter",q:"40g"},{n:"vegetable oil",q:"for frying"},{n:"salt and pepper",q:"to taste"},{n:"potato salad",q:"for serving"},{n:"arugula",q:"for serving"}],steps:["Season chicken. Dredge in flour, egg, breadcrumbs.","Fry in butter and oil 3-4 min per side until golden and crispy.","Serve with lemon wedges, potato salad, and arugula."]},
{id:548,name:"Mole Negro",time:90,servings:6,diff:"Hard",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54612707279_746d17e2d4_c.jpg",ing:[{n:"chicken pieces",q:"1.5kg"},{n:"dried mulato chilies",q:"4"},{n:"dried negro chilies",q:"3"},{n:"dried chipotle",q:"2"},{n:"plantain",q:"1"},{n:"chocolate",q:"40g"},{n:"sesame seeds",q:"3 tbsp"},{n:"pumpkin seeds",q:"2 tbsp"},{n:"onion",q:"1, charred"},{n:"garlic",q:"6 cloves"},{n:"cumin",q:"1 tsp"},{n:"oregano",q:"1 tsp"},{n:"chicken broth",q:"500ml"},{n:"rice",q:"for serving"}],steps:["Toast and char chilies until blackened. Rehydrate. Toast seeds. Char onion, plantain.","Blend everything with broth into smooth paste. Fry 20 min, stirring constantly.","Add chocolate, simmer until melted. Braise chicken in mole 30 min. Serve with rice."]},
{id:549,name:"Chicken Alfredo Bake",time:35,servings:6,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/4347/36762841166_db05bbc050_c.jpg",ing:[{n:"penne",q:"400g"},{n:"chicken breast",q:"400g, cubed"},{n:"heavy cream",q:"300ml"},{n:"parmesan",q:"100g"},{n:"mozzarella",q:"150g"},{n:"garlic",q:"4 cloves"},{n:"butter",q:"30g"},{n:"Italian seasoning",q:"1 tsp"},{n:"spinach",q:"100g"},{n:"breadcrumbs",q:"40g"}],steps:["Cook penne. Brown chicken in butter with garlic.","Add cream, parmesan, Italian seasoning. Toss with pasta and spinach.","Transfer to baking dish. Top with mozzarella and breadcrumbs. Bake 190C 15 min."]},
{id:550,name:"Seared Tuna with Sesame",time:15,servings:2,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/4427/36318162531_c10e9a87b5_c.jpg",ing:[{n:"sushi-grade tuna steaks",q:"2"},{n:"sesame seeds",q:"4 tbsp (mix black and white)"},{n:"soy sauce",q:"3 tbsp"},{n:"wasabi",q:"1 tsp"},{n:"ginger",q:"1 inch, grated"},{n:"rice vinegar",q:"1 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"mixed greens",q:"for serving"},{n:"pickled ginger",q:"for serving"}],steps:["Press sesame seeds onto all sides of tuna steaks.","Sear in smoking hot oiled pan 1 min per side for rare. Slice thin.","Mix soy, wasabi, ginger, vinegar, sesame oil for dipping sauce. Serve with greens and pickled ginger."]},
{id:551,name:"Chicken Tikka Kebab",time:25,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://images.unsplash.com/photo-1673238114980-47d4e9cc793e?w=600&h=400&fit=crop",ing:[{n:"chicken breast",q:"600g, cubed"},{n:"yogurt",q:"150g"},{n:"ginger-garlic paste",q:"2 tbsp"},{n:"tikka masala",q:"2 tbsp"},{n:"lemon juice",q:"2 tbsp"},{n:"kashmiri chili",q:"1 tbsp"},{n:"oil",q:"1 tbsp"},{n:"bell pepper",q:"2, chunked"},{n:"onion",q:"1, chunked"},{n:"mint chutney",q:"for serving"},{n:"naan",q:"for serving"}],steps:["Marinate chicken in yogurt, spices, lemon 30 min minimum.","Thread onto skewers with peppers and onion. Grill 10-12 min, turning.","Serve with mint chutney and warm naan."]},
{id:552,name:"Pecan Pie",time:60,servings:8,diff:"Medium",tags:["vegetarian"],img:"https://www.themealdb.com/images/media/meals/rqvwxt1511384809.jpg/preview",ing:[{n:"pie crust",q:"1"},{n:"pecans",q:"250g, halved"},{n:"dark corn syrup",q:"200ml"},{n:"brown sugar",q:"100g"},{n:"eggs",q:"3"},{n:"butter",q:"60g, melted"},{n:"vanilla",q:"1 tsp"},{n:"bourbon",q:"1 tbsp, optional"},{n:"salt",q:"1/4 tsp"}],steps:["Arrange pecans in unbaked pie crust.","Whisk corn syrup, sugar, eggs, melted butter, vanilla, bourbon, salt.","Pour over pecans. Bake 175C 50-55 min until filling is set but slightly jiggly in center. Cool completely."]},
{id:553,name:"Lamb Shawarma Bowl",time:25,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/4867/31411398987_2a50f8eb86_c.jpg",ing:[{n:"lamb leg",q:"600g, sliced thin"},{n:"cumin",q:"2 tsp"},{n:"coriander",q:"1 tsp"},{n:"turmeric",q:"1 tsp"},{n:"paprika",q:"2 tsp"},{n:"garlic",q:"4 cloves"},{n:"lemon",q:"1"},{n:"olive oil",q:"3 tbsp"},{n:"rice",q:"300g"},{n:"hummus",q:"for serving"},{n:"pickled turnip",q:"for serving"},{n:"tahini",q:"for drizzle"},{n:"fresh salad",q:"for serving"}],steps:["Marinate lamb in spices, garlic, lemon, oil 2 hours. Pan-fry until charred.","Cook rice. Prepare salad and toppings.","Build bowls: rice, lamb, hummus, salad, pickled turnip, generous tahini drizzle."]},
{id:554,name:"Garlic Bread",time:10,servings:4,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/55123315427_8b7abd354a_c.jpg",ing:[{n:"French baguette",q:"1, halved"},{n:"butter",q:"80g, softened"},{n:"garlic",q:"6 cloves, minced"},{n:"parsley",q:"2 tbsp, chopped"},{n:"parmesan",q:"30g, grated"},{n:"salt",q:"pinch"}],steps:["Mix softened butter with garlic, parsley, parmesan, salt.","Spread generously on cut baguette halves.","Bake 200C 10-12 min until golden and crispy. Or wrap in foil for softer bread."]},
{id:555,name:"Thai Massaman Chicken",time:30,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/50661391497_8328d0cbdf_c.jpg",ing:[{n:"chicken thighs",q:"600g, cubed"},{n:"coconut milk",q:"600ml"},{n:"massaman paste",q:"3 tbsp"},{n:"potato",q:"2, cubed"},{n:"onion",q:"1"},{n:"peanuts",q:"50g"},{n:"tamarind paste",q:"2 tbsp"},{n:"fish sauce",q:"2 tbsp"},{n:"palm sugar",q:"2 tbsp"},{n:"cinnamon stick",q:"1"},{n:"cardamom",q:"3 pods"},{n:"rice",q:"for serving"}],steps:["Fry paste in coconut cream 2 min. Add chicken, cook 3 min.","Add remaining coconut milk, potato, onion, spices. Simmer 20 min.","Add peanuts, tamarind, fish sauce, sugar. Serve over rice."]},
{id:556,name:"Carbonara Risotto",time:30,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54612509566_074cf51836_c.jpg",ing:[{n:"arborio rice",q:"300g"},{n:"guanciale",q:"150g, cubed"},{n:"egg yolks",q:"4"},{n:"pecorino",q:"80g, grated"},{n:"chicken broth",q:"1L"},{n:"onion",q:"1"},{n:"white wine",q:"100ml"},{n:"black pepper",q:"2 tsp"},{n:"parsley",q:"fresh"}],steps:["Cook guanciale until crispy. Set aside. Sauté onion, toast rice, add wine.","Add broth one ladle at a time, stirring 18-20 min.","Off heat, stir in yolk-pecorino mixture quickly. Add guanciale, pepper, parsley. Serve immediately."]},
{id:557,name:"Chicken Pot Pie Soup",time:30,servings:6,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/4874/46297486471_eabfbb185d_c.jpg",ing:[{n:"chicken breast",q:"400g, cubed"},{n:"potato",q:"2, cubed"},{n:"carrot",q:"2, diced"},{n:"celery",q:"2 stalks"},{n:"onion",q:"1"},{n:"garlic",q:"3 cloves"},{n:"chicken broth",q:"1L"},{n:"heavy cream",q:"150ml"},{n:"butter",q:"30g"},{n:"flour",q:"30g"},{n:"thyme",q:"fresh"},{n:"puff pastry",q:"for croutons"},{n:"peas",q:"100g"}],steps:["Sauté onion, carrot, celery in butter 5 min. Add flour, cook 1 min. Whisk in broth.","Add chicken, potato, thyme. Simmer 15 min. Add cream and peas.","Bake puff pastry squares until golden. Serve soup topped with pastry croutons."]},
{id:558,name:"Seared Duck Salad",time:20,servings:2,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/3325/3670465122_a06cbc7294_c.jpg",ing:[{n:"duck breast",q:"2"},{n:"mixed greens",q:"200g"},{n:"orange",q:"1, segmented"},{n:"pomegranate seeds",q:"2 tbsp"},{n:"walnuts",q:"30g, toasted"},{n:"red onion",q:"1/4, sliced"},{n:"raspberry vinegar",q:"2 tbsp"},{n:"olive oil",q:"3 tbsp"},{n:"Dijon mustard",q:"1 tsp"},{n:"honey",q:"1 tsp"}],steps:["Score duck skin. Cook skin-down 8 min, flip 3-4 min. Rest 5 min, slice.","Arrange greens, orange segments, pomegranate, walnuts, onion.","Whisk vinegar, oil, mustard, honey. Drizzle over salad. Top with sliced duck."]},
{id:559,name:"One-Pot Chicken and Rice",time:30,servings:4,diff:"Easy",tags:["gluten-free","high-protein","nut-free"],img:U+"1700323449261-5332ce054718?w=600&h=400&fit=crop",ing:[{n:"chicken thighs",q:"6, bone-in"},{n:"rice",q:"300g"},{n:"onion",q:"1"},{n:"garlic",q:"3 cloves"},{n:"chicken broth",q:"500ml"},{n:"bell pepper",q:"1"},{n:"cumin",q:"1 tsp"},{n:"paprika",q:"1 tsp"},{n:"lemon",q:"1"},{n:"peas",q:"100g"},{n:"olive oil",q:"2 tbsp"},{n:"cilantro",q:"fresh"}],steps:["Brown chicken. Remove. Sauté onion, garlic, pepper 3 min. Add spices, rice.","Add broth, lemon slices. Nestle chicken on top. Cover, simmer 20 min.","Add peas last 5 min. Rest 5 min. Garnish with cilantro."]},
{id:560,name:"Croquetas de Jamon",time:25,servings:20,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/52858709973_f4d56b4c3d_c.jpg",ing:[{n:"Serrano ham",q:"100g, diced"},{n:"butter",q:"60g"},{n:"flour",q:"60g"},{n:"milk",q:"500ml"},{n:"nutmeg",q:"pinch"},{n:"eggs",q:"2, beaten"},{n:"breadcrumbs",q:"100g"},{n:"olive oil",q:"for frying"}],steps:["Make thick bechamel: butter, flour, milk, nutmeg. Stir in ham. Chill 2+ hours until firm.","Shape into small cylinders. Coat in flour, egg, breadcrumbs.","Deep fry at 180C 3-4 min until deep golden. Rest 1 min. Serve hot."]},
{id:561,name:"Spicy Peanut Chicken",time:25,servings:4,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/55111744875_a47bf4eb70_c.jpg",ing:[{n:"chicken thighs",q:"600g, cubed"},{n:"peanut butter",q:"3 tbsp"},{n:"soy sauce",q:"2 tbsp"},{n:"coconut milk",q:"200ml"},{n:"lime",q:"1"},{n:"sriracha",q:"2 tsp"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"bell pepper",q:"1"},{n:"rice",q:"for serving"},{n:"cilantro",q:"fresh"},{n:"peanuts",q:"30g, crushed"}],steps:["Sear chicken 4 min. Add garlic, ginger, bell pepper 2 min.","Mix peanut butter, soy, coconut milk, lime, sriracha. Pour over chicken. Simmer 10 min.","Serve over rice. Top with crushed peanuts and cilantro."]},
{id:562,name:"Mushroom & Truffle Pizza",time:25,servings:2,diff:"Medium",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/53776953873_c96271c99d_c.jpg",ing:[{n:"pizza dough",q:"300g"},{n:"mozzarella",q:"150g, torn"},{n:"mixed mushrooms",q:"200g, sliced"},{n:"garlic",q:"2 cloves"},{n:"truffle oil",q:"2 tbsp"},{n:"thyme",q:"fresh"},{n:"arugula",q:"handful"},{n:"parmesan",q:"30g, shaved"},{n:"olive oil",q:"2 tbsp"}],steps:["Sauté mushrooms with garlic and thyme until golden.","Stretch dough, brush with olive oil. Top with mozzarella and mushrooms.","Bake at max heat 8-12 min. Top with arugula, shaved parmesan, truffle oil drizzle."]},
{id:563,name:"Chicken and Waffles",time:30,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/5490/10951701464_a755488810_c.jpg",ing:[{n:"chicken tenders",q:"8"},{n:"buttermilk",q:"200ml"},{n:"flour",q:"150g"},{n:"paprika",q:"1 tsp"},{n:"cayenne",q:"1/4 tsp"},{n:"garlic powder",q:"1 tsp"},{n:"waffle batter",q:"from recipe"},{n:"maple syrup",q:"for serving"},{n:"hot sauce",q:"for serving"},{n:"butter",q:"for serving"}],steps:["Soak chicken in buttermilk 30 min. Dredge in seasoned flour.","Fry at 180C 5-6 min until golden. Make waffles.","Stack crispy chicken on waffles. Drizzle maple syrup, dot with butter, add hot sauce."]},
{id:564,name:"Korean Bibim Guksu",time:15,servings:2,diff:"Easy",tags:["dairy-free"],img:U+"1531263539449-56fdf29dfc4d?w=600&h=400&fit=crop",ing:[{n:"somen noodles",q:"200g"},{n:"gochujang",q:"2 tbsp"},{n:"rice vinegar",q:"2 tbsp"},{n:"sesame oil",q:"1 tbsp"},{n:"sugar",q:"1 tbsp"},{n:"cucumber",q:"1, julienned"},{n:"kimchi",q:"100g"},{n:"hard-boiled egg",q:"2"},{n:"sesame seeds",q:"1 tbsp"}],steps:["Cook somen noodles, rinse in cold water until chilled.","Mix gochujang, vinegar, sesame oil, sugar for sauce.","Toss noodles with sauce. Top with cucumber, kimchi, egg, sesame seeds."]},
{id:565,name:"Saffron Risotto",time:30,servings:4,diff:"Medium",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/65535/54705196516_30d8326464_c.jpg",ing:[{n:"arborio rice",q:"300g"},{n:"saffron",q:"large pinch"},{n:"onion",q:"1"},{n:"white wine",q:"150ml"},{n:"chicken broth",q:"1L"},{n:"parmesan",q:"80g"},{n:"butter",q:"50g"}],steps:["Bloom saffron in warm broth. Sauté onion 3 min. Toast rice 1 min. Add wine.","Add saffron broth one ladle at a time, stirring 18-20 min.","Stir in butter and parmesan. Rest 2 min before serving."]},
{id:566,name:"Gimbap",time:30,servings:6,diff:"Easy",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/55146317755_ef2f99bdc3_c.jpg",ing:[{n:"sushi rice",q:"300g, seasoned"},{n:"beef bulgogi",q:"150g"},{n:"spinach",q:"100g, blanched"},{n:"carrot",q:"1, julienned"},{n:"pickled radish",q:"strips"},{n:"egg",q:"2, made into thin omelette"},{n:"sesame oil",q:"2 tbsp"},{n:"nori sheets",q:"6"},{n:"sesame seeds",q:"1 tbsp"}],steps:["Prepare all fillings: cook bulgogi, blanch and season spinach, julienne carrot, make egg crepe strips.","Lay nori on bamboo mat. Spread thin layer of rice. Arrange fillings in center.","Roll tightly. Brush with sesame oil. Cut into 2cm pieces. Sprinkle sesame seeds."]},
{id:567,name:"Pasta Carbonara al Forno",time:40,servings:6,diff:"Medium",tags:["high-protein"],img:U+"1626108962941-61b46dd705a5?w=600&h=400&fit=crop",ing:[{n:"rigatoni",q:"400g"},{n:"guanciale",q:"200g"},{n:"egg yolks",q:"6"},{n:"pecorino",q:"100g"},{n:"mozzarella",q:"100g"},{n:"black pepper",q:"2 tsp"},{n:"parmesan",q:"40g"}],steps:["Cook rigatoni. Crisp guanciale. Mix yolks, pecorino, pepper.","Toss pasta with guanciale, egg mixture (off heat). Add mozzarella.","Transfer to baking dish. Top with parmesan. Bake 200C 15 min until golden and bubbly on top."]},
{id:568,name:"Beef Wellington",time:90,servings:4,diff:"Hard",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55135991261_d0c866c28c_c.jpg",ing:[{n:"beef tenderloin",q:"800g"},{n:"mushrooms",q:"400g, finely chopped"},{n:"puff pastry",q:"1 sheet"},{n:"prosciutto",q:"8 slices"},{n:"Dijon mustard",q:"2 tbsp"},{n:"egg yolk",q:"1, for wash"},{n:"shallot",q:"2"},{n:"garlic",q:"3 cloves"},{n:"thyme",q:"fresh"},{n:"English mustard",q:"for serving"}],steps:["Sear tenderloin all over. Brush with Dijon. Cool.","Make duxelles: cook mushrooms, shallot, garlic, thyme until completely dry.","Wrap beef in prosciutto and duxelles, then pastry. Egg wash. Bake 220C 25-30 min for medium-rare."]},
{id:569,name:"Tandoori Fish",time:20,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/53638230473_540bea8c23_c.jpg",ing:[{n:"white fish fillets",q:"4"},{n:"yogurt",q:"100g"},{n:"tandoori masala",q:"2 tbsp"},{n:"ginger-garlic paste",q:"1 tbsp"},{n:"lemon juice",q:"2 tbsp"},{n:"kashmiri chili",q:"1 tbsp"},{n:"oil",q:"1 tbsp"},{n:"lime",q:"for serving"},{n:"mint chutney",q:"for serving"},{n:"rice",q:"for serving"}],steps:["Marinate fish in yogurt, tandoori masala, ginger-garlic, chili, lemon 20 min.","Grill or broil 4-5 min per side until charred and flaky.","Serve with lime, mint chutney, and rice."]},
{id:570,name:"Chicken and Dumplings",time:40,servings:6,diff:"Easy",tags:["high-protein","nut-free"],img:"https://live.staticflickr.com/65535/52485426936_677a6e2b50_c.jpg",ing:[{n:"chicken thighs",q:"6"},{n:"carrot",q:"2, sliced"},{n:"celery",q:"2 stalks"},{n:"onion",q:"1"},{n:"garlic",q:"3 cloves"},{n:"chicken broth",q:"1.5L"},{n:"heavy cream",q:"100ml"},{n:"flour",q:"200g"},{n:"baking powder",q:"1 tbsp"},{n:"butter",q:"30g"},{n:"milk",q:"100ml"},{n:"thyme",q:"fresh"},{n:"salt and pepper",q:"to taste"}],steps:["Simmer chicken in broth 20 min. Shred. Add carrot, celery, onion, garlic, thyme. Simmer 10 min. Add cream.","Make dumplings: mix flour, baking powder, salt, butter, milk until just combined.","Drop spoonfuls of dough into simmering stew. Cover, cook 15 min without lifting lid."]},
{id:571,name:"Grilled Peach Salad",time:15,servings:4,diff:"Easy",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/1900/43521950514_51de28e663_c.jpg",ing:[{n:"peaches",q:"4, halved and pitted"},{n:"burrata",q:"200g"},{n:"prosciutto",q:"100g"},{n:"arugula",q:"150g"},{n:"basil",q:"fresh"},{n:"walnuts",q:"30g, toasted"},{n:"balsamic glaze",q:"2 tbsp"},{n:"olive oil",q:"3 tbsp"},{n:"salt flakes",q:"to taste"}],steps:["Grill peach halves cut-side down 3-4 min until caramelized.","Arrange arugula on platter. Place grilled peaches, torn burrata, prosciutto.","Scatter walnuts and basil. Drizzle olive oil and balsamic glaze. Season with salt flakes."]},
{id:572,name:"Seafood Linguine",time:25,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55101988125_6aa58dea65_c.jpg",ing:[{n:"linguine",q:"400g"},{n:"mixed seafood",q:"500g (shrimp, mussels, calamari)"},{n:"garlic",q:"5 cloves"},{n:"white wine",q:"150ml"},{n:"cherry tomatoes",q:"200g"},{n:"chili flakes",q:"1/2 tsp"},{n:"olive oil",q:"3 tbsp"},{n:"parsley",q:"large bunch"},{n:"lemon",q:"1"}],steps:["Cook linguine. Sauté garlic and chili in oil. Add wine and tomatoes, simmer 3 min.","Add seafood: mussels first (3 min), then shrimp and calamari (2 min).","Toss with linguine, parsley, lemon juice, pasta water. Serve immediately."]},
{id:573,name:"Pork Belly Bao",time:60,servings:8,diff:"Medium",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/51090303277_d556a4cdd4_c.jpg",ing:[{n:"pork belly",q:"500g"},{n:"bao buns",q:"8"},{n:"soy sauce",q:"4 tbsp"},{n:"five spice",q:"1 tsp"},{n:"honey",q:"2 tbsp"},{n:"ginger",q:"2 inch"},{n:"garlic",q:"4 cloves"},{n:"hoisin sauce",q:"for serving"},{n:"cucumber",q:"1, sliced"},{n:"pickled daikon",q:"for serving"},{n:"green onion",q:"3"},{n:"sriracha mayo",q:"optional"}],steps:["Braise pork belly in soy, five spice, ginger, garlic, honey, water 45 min. Slice.","Steam bao buns 8 min.","Fill bao with pork, hoisin, cucumber, pickled daikon, green onion, sriracha mayo."]},
{id:574,name:"Shakshuka with Eggplant",time:30,servings:4,diff:"Medium",tags:["vegetarian","gluten-free","nut-free"],img:U+"1636692323820-cb6139b8d4d2?w=600&h=400&fit=crop",ing:[{n:"eggs",q:"6"},{n:"eggplant",q:"1, cubed"},{n:"canned tomatoes",q:"800g"},{n:"onion",q:"1"},{n:"garlic",q:"4 cloves"},{n:"cumin",q:"1 tsp"},{n:"harissa",q:"1 tbsp"},{n:"feta",q:"60g"},{n:"cilantro",q:"fresh"},{n:"olive oil",q:"3 tbsp"},{n:"bread",q:"for serving"}],steps:["Fry eggplant until golden. Remove. Sauté onion, garlic, cumin, harissa.","Add tomatoes, return eggplant. Simmer 10 min.","Make wells, crack eggs. Cover 5-8 min. Top with feta and cilantro. Serve with bread."]},
{id:575,name:"Chickpea Salad Sandwich",time:10,servings:2,diff:"Easy",tags:["vegan","vegetarian","dairy-free","nut-free"],img:"https://live.staticflickr.com/65535/53818823675_ff18777602_c.jpg",ing:[{n:"chickpeas",q:"1 can, drained and mashed"},{n:"celery",q:"1 stalk, diced"},{n:"red onion",q:"1/4, diced"},{n:"Dijon mustard",q:"1 tsp"},{n:"lemon juice",q:"1 tbsp"},{n:"olive oil",q:"1 tbsp"},{n:"dill",q:"fresh"},{n:"salt and pepper",q:"to taste"},{n:"bread",q:"4 slices"},{n:"lettuce",q:"leaves"},{n:"tomato",q:"1, sliced"}],steps:["Mash chickpeas with fork (leave some chunky). Mix with celery, onion, mustard, lemon, oil, dill.","Season well with salt and pepper.","Serve on bread with lettuce and tomato."]},
{id:576,name:"Chicken Milanese",time:20,servings:4,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54859003457_4ac10eba3e_c.jpg",ing:[{n:"chicken breast",q:"4, pounded thin"},{n:"breadcrumbs",q:"100g"},{n:"parmesan",q:"40g, grated"},{n:"eggs",q:"2"},{n:"flour",q:"50g"},{n:"arugula",q:"150g"},{n:"cherry tomatoes",q:"100g"},{n:"lemon",q:"2"},{n:"olive oil",q:"for frying"}],steps:["Dredge chicken in flour, egg, breadcrumbs mixed with parmesan.","Fry in olive oil 3-4 min per side until golden and crispy.","Top with arugula, halved tomatoes, and generous lemon squeeze."]},
{id:577,name:"Crispy Pork Tacos",time:20,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/3747/13837933953_2f1e5ca825_c.jpg",ing:[{n:"pulled pork or carnitas",q:"400g"},{n:"corn tortillas",q:"8"},{n:"lime",q:"2"},{n:"onion",q:"1, diced"},{n:"cilantro",q:"fresh"},{n:"salsa verde",q:"for serving"},{n:"radish",q:"4, sliced"},{n:"avocado",q:"1"},{n:"vegetable oil",q:"1 tbsp"}],steps:["Crisp pulled pork in a hot skillet until edges are golden and crunchy.","Warm tortillas. Fill with crispy pork.","Top with onion, cilantro, radish, avocado, salsa verde, lime."]},
{id:578,name:"Pork Chop Tonkatsu",time:20,servings:2,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/7507/16348059955_44877d8d0c_c.jpg",ing:[{n:"pork loin chops",q:"2, boneless"},{n:"panko breadcrumbs",q:"150g"},{n:"egg",q:"1"},{n:"flour",q:"50g"},{n:"tonkatsu sauce",q:"for serving"},{n:"cabbage",q:"200g, shredded"},{n:"rice",q:"for serving"},{n:"lemon",q:"1"},{n:"Japanese mustard",q:"optional"}],steps:["Pound pork evenly. Season with salt and pepper.","Dredge in flour, egg, panko. Deep fry at 170C 5-6 min until deep golden.","Slice. Serve with shredded cabbage, rice, tonkatsu sauce, lemon."]},
{id:579,name:"Roasted Red Pepper Soup",time:25,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/54973839223_ba316cabe8_c.jpg",ing:[{n:"red bell peppers",q:"6, roasted"},{n:"onion",q:"1"},{n:"garlic",q:"3 cloves"},{n:"vegetable broth",q:"500ml"},{n:"canned tomatoes",q:"200g"},{n:"olive oil",q:"3 tbsp"},{n:"basil",q:"fresh"},{n:"smoked paprika",q:"1 tsp"},{n:"salt and pepper",q:"to taste"}],steps:["Roast peppers at 220C until blackened. Peel and seed.","Sauté onion and garlic 5 min. Add peppers, tomatoes, broth, paprika. Simmer 10 min.","Blend until smooth. Season. Serve with basil and olive oil drizzle."]},
{id:580,name:"Shakshuka Grilled Cheese",time:15,servings:2,diff:"Easy",tags:["vegetarian"],img:U+"1584278859380-c94d92e083dd?w=600&h=400&fit=crop",ing:[{n:"sourdough bread",q:"4 slices"},{n:"leftover shakshuka sauce",q:"150ml"},{n:"mozzarella",q:"100g, shredded"},{n:"feta",q:"30g, crumbled"},{n:"butter",q:"30g"},{n:"basil",q:"fresh"}],steps:["Spread shakshuka sauce on 2 bread slices. Top with mozzarella and feta.","Close sandwiches. Butter outsides.","Cook in pan 3-4 min per side until golden and cheese melts. Serve with basil."]},
{id:581,name:"Chicken Gyudon",time:20,servings:2,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/3646/3362574141_502145a52a_c.jpg",ing:[{n:"chicken thighs",q:"300g, sliced thin"},{n:"onion",q:"1, sliced"},{n:"dashi broth",q:"200ml"},{n:"soy sauce",q:"3 tbsp"},{n:"mirin",q:"2 tbsp"},{n:"sugar",q:"1 tsp"},{n:"egg",q:"2"},{n:"rice",q:"for serving"},{n:"green onion",q:"2"},{n:"pickled ginger",q:"for serving"}],steps:["Simmer onion in dashi, soy sauce, mirin, sugar 5 min.","Add sliced chicken, cook 5-6 min. Drizzle beaten egg over. Cover 1 min.","Slide over hot rice. Top with green onion and pickled ginger."]},
{id:582,name:"Creamy Polenta with Mushrooms",time:25,servings:4,diff:"Easy",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/3395/3275674560_7af0a251bd_c.jpg",ing:[{n:"polenta",q:"200g"},{n:"mushrooms",q:"400g, sliced"},{n:"vegetable broth",q:"800ml"},{n:"parmesan",q:"60g"},{n:"butter",q:"40g"},{n:"garlic",q:"3 cloves"},{n:"thyme",q:"fresh"},{n:"olive oil",q:"2 tbsp"},{n:"truffle oil",q:"optional"}],steps:["Bring broth to boil. Whisk in polenta. Cook 15-20 min, stirring. Add butter and parmesan.","Sauté mushrooms in olive oil 6-8 min until golden. Add garlic, thyme.","Serve creamy polenta topped with mushrooms. Drizzle truffle oil if using."]},
{id:583,name:"Korean Beef Bowl",time:20,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/54105575748_6684743e0a_c.jpg",ing:[{n:"ground beef",q:"500g"},{n:"soy sauce",q:"4 tbsp"},{n:"brown sugar",q:"2 tbsp"},{n:"sesame oil",q:"2 tbsp"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"1 inch"},{n:"gochujang",q:"1 tbsp"},{n:"rice",q:"for serving"},{n:"green onion",q:"3"},{n:"sesame seeds",q:"1 tbsp"},{n:"fried egg",q:"for topping"},{n:"kimchi",q:"for serving"}],steps:["Brown beef. Add soy sauce, sugar, sesame oil, garlic, ginger, gochujang. Cook 5 min.","Cook rice.","Serve beef over rice with fried egg, green onion, sesame seeds, and kimchi."]},
{id:584,name:"Croque Madame",time:20,servings:2,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54199301263_6ed5a4b70e_c.jpg",ing:[{n:"white bread",q:"4 slices"},{n:"ham",q:"4 slices"},{n:"gruyere",q:"150g"},{n:"eggs",q:"2"},{n:"butter",q:"40g"},{n:"flour",q:"20g"},{n:"milk",q:"200ml"},{n:"Dijon mustard",q:"1 tsp"},{n:"nutmeg",q:"pinch"}],steps:["Make bechamel: butter, flour, milk, half the gruyere, nutmeg.","Spread mustard on bread. Layer ham and bechamel. Close sandwich. Spread bechamel on top, add gruyere.","Broil until bubbly. Fry eggs. Place egg on top of each sandwich."]},
{id:585,name:"Lamb Samosa",time:40,servings:12,diff:"Medium",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/52291865553_62278c160e_c.jpg",ing:[{n:"ground lamb",q:"300g"},{n:"potato",q:"2, diced small"},{n:"onion",q:"1, diced"},{n:"peas",q:"60g"},{n:"garam masala",q:"2 tsp"},{n:"cumin",q:"1 tsp"},{n:"ginger-garlic paste",q:"1 tbsp"},{n:"green chili",q:"2"},{n:"cilantro",q:"fresh"},{n:"samosa pastry or spring roll wrappers",q:"12"},{n:"oil",q:"for frying"}],steps:["Cook lamb with onion, ginger-garlic, spices 5 min. Add potato and water, cook 10 min. Add peas. Cool.","Wrap filling in pastry triangles, sealing edges.","Deep fry at 170C 4-5 min until golden. Serve with mint chutney."]},
{id:586,name:"Miso Caramel Brownies",time:35,servings:12,diff:"Medium",tags:["vegetarian"],img:U+"1598305764173-6ac4d74dbc5c?w=600&h=400&fit=crop",ing:[{n:"dark chocolate",q:"200g"},{n:"butter",q:"150g"},{n:"sugar",q:"180g"},{n:"eggs",q:"3"},{n:"flour",q:"80g"},{n:"cocoa powder",q:"20g"},{n:"white miso paste",q:"2 tbsp"},{n:"caramel sauce",q:"60ml"},{n:"flaky salt",q:"for topping"}],steps:["Melt chocolate and butter. Whisk in sugar, eggs, miso.","Fold in flour and cocoa. Pour into lined pan. Swirl in caramel.","Bake 180C 22-25 min. Sprinkle flaky salt while warm. Cool completely."]},
{id:587,name:"Shakshuka with Swiss Chard",time:25,servings:3,diff:"Easy",tags:["vegetarian","gluten-free","nut-free"],img:U+"1749632934747-c46544e5935a?w=600&h=400&fit=crop",ing:[{n:"eggs",q:"6"},{n:"Swiss chard",q:"200g, chopped"},{n:"canned tomatoes",q:"800g"},{n:"onion",q:"1"},{n:"garlic",q:"3 cloves"},{n:"cumin",q:"1 tsp"},{n:"smoked paprika",q:"1 tsp"},{n:"goat cheese",q:"50g"},{n:"olive oil",q:"2 tbsp"},{n:"bread",q:"for serving"}],steps:["Sauté onion, garlic 5 min. Add spices. Add chard, cook 3 min.","Add tomatoes. Simmer 8 min.","Make wells, crack eggs. Cover 5-8 min. Dot with goat cheese. Serve with bread."]},
{id:588,name:"Fried Calamari",time:15,servings:4,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54866872136_63c108681a_c.jpg",ing:[{n:"calamari",q:"500g, cleaned and sliced into rings"},{n:"flour",q:"100g"},{n:"cornstarch",q:"50g"},{n:"salt",q:"1 tsp"},{n:"paprika",q:"1/2 tsp"},{n:"cayenne",q:"1/4 tsp"},{n:"vegetable oil",q:"for frying"},{n:"lemon",q:"2"},{n:"marinara sauce",q:"for dipping"},{n:"aioli",q:"for dipping"}],steps:["Pat calamari very dry. Mix flour, cornstarch, salt, paprika, cayenne.","Toss calamari in seasoned flour. Fry at 190C 2-3 min until golden. Do not overcook.","Drain on paper towels. Serve immediately with lemon, marinara, and aioli."]},
{id:589,name:"Mushroom Bolognese",time:40,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","nut-free"],img:"https://live.staticflickr.com/4505/37547134760_662b02de97_c.jpg",ing:[{n:"mushrooms",q:"500g, finely diced"},{n:"spaghetti",q:"400g"},{n:"onion",q:"1"},{n:"carrot",q:"1"},{n:"celery",q:"1 stalk"},{n:"garlic",q:"4 cloves"},{n:"canned tomatoes",q:"400g"},{n:"tomato paste",q:"2 tbsp"},{n:"red wine",q:"100ml"},{n:"soy sauce",q:"2 tbsp"},{n:"walnuts",q:"60g, finely chopped"},{n:"olive oil",q:"3 tbsp"}],steps:["Dice mushrooms and walnuts very fine (food processor works). Sauté 8 min until browned.","Add onion, carrot, celery, garlic 5 min. Add paste, wine, soy sauce.","Add tomatoes. Simmer 20 min. Toss with spaghetti."]},
{id:590,name:"Chicken Souvlaki Plate",time:25,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/53450630541_ffe818a928_c.jpg",ing:[{n:"chicken thighs",q:"600g, cubed"},{n:"lemon",q:"2"},{n:"garlic",q:"4 cloves"},{n:"oregano",q:"2 tbsp"},{n:"olive oil",q:"4 tbsp"},{n:"pita bread",q:"4"},{n:"tzatziki",q:"200g"},{n:"tomato",q:"2"},{n:"onion",q:"1/2"},{n:"lettuce",q:"shredded"},{n:"French fries",q:"for serving"}],steps:["Marinate chicken in lemon, garlic, oregano, oil 1+ hour. Thread onto skewers.","Grill 10-12 min, turning. Rest 5 min.","Serve with pita, tzatziki, tomato, onion, lettuce, fries."]},
{id:591,name:"Mississippi Pot Roast",time:240,servings:6,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/1782/42593664734_75ea39ff18_c.jpg",ing:[{n:"beef chuck roast",q:"1.5kg"},{n:"ranch seasoning",q:"1 packet"},{n:"au jus gravy mix",q:"1 packet"},{n:"butter",q:"60g"},{n:"pepperoncini peppers",q:"10"},{n:"garlic",q:"4 cloves"},{n:"mashed potatoes",q:"for serving"}],steps:["Place roast in slow cooker. Sprinkle with ranch and au jus mix.","Top with butter, pepperoncini, and garlic.","Cook on low 8 hours or high 5 hours until fork-tender. Shred. Serve over mashed potatoes with juices."]},
{id:592,name:"Butter Garlic Shrimp",time:10,servings:3,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54865476308_638445bc9c_c.jpg",ing:[{n:"large shrimp",q:"500g, peeled"},{n:"butter",q:"50g"},{n:"garlic",q:"6 cloves, minced"},{n:"lemon",q:"1"},{n:"white wine",q:"60ml"},{n:"red pepper flakes",q:"1/4 tsp"},{n:"parsley",q:"fresh"},{n:"pasta or rice",q:"for serving"}],steps:["Melt butter. Sauté garlic and pepper flakes 1 min.","Add shrimp, cook 2 min per side until pink.","Add wine, lemon juice. Cook 1 min. Garnish with parsley. Serve with pasta or crusty bread."]},
{id:593,name:"Shakshuka with Chickpeas & Kale",time:25,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:U+"1708782341766-0d360d02975c?w=600&h=400&fit=crop",ing:[{n:"chickpeas",q:"1 can"},{n:"kale",q:"200g, chopped"},{n:"canned tomatoes",q:"800g"},{n:"onion",q:"1"},{n:"garlic",q:"4 cloves"},{n:"cumin",q:"1 tsp"},{n:"harissa",q:"1 tbsp"},{n:"lemon",q:"1"},{n:"cilantro",q:"fresh"},{n:"olive oil",q:"2 tbsp"},{n:"flatbread",q:"for serving"}],steps:["Sauté onion, garlic. Add cumin, harissa. Add tomatoes, chickpeas.","Simmer 10 min. Add kale, cook until wilted.","Finish with lemon juice and cilantro. Serve with flatbread."]},
{id:594,name:"Beef Pho with Brisket",time:50,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/51966726389_5a098888fd_c.jpg",ing:[{n:"beef brisket",q:"500g"},{n:"beef bones",q:"500g"},{n:"star anise",q:"3"},{n:"cinnamon stick",q:"1"},{n:"ginger",q:"3 inch, charred"},{n:"onion",q:"1, charred"},{n:"fish sauce",q:"3 tbsp"},{n:"rock sugar",q:"1 tbsp"},{n:"rice noodles",q:"400g"},{n:"beef sirloin",q:"200g, sliced thin"},{n:"bean sprouts",q:"100g"},{n:"Thai basil",q:"fresh"},{n:"lime",q:"2"}],steps:["Simmer brisket and bones with spices, charred ginger, onion in 2L water 40 min. Strain. Slice brisket.","Season broth with fish sauce, sugar. Cook noodles.","Assemble: noodles, brisket, raw sirloin. Ladle boiling broth over. Serve with sprouts, basil, lime."]},
{id:595,name:"Stuffed Acorn Squash",time:40,servings:2,diff:"Medium",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/65535/55121152094_ec7db881fd_c.jpg",ing:[{n:"acorn squash",q:"2, halved"},{n:"wild rice",q:"100g, cooked"},{n:"cranberries",q:"40g, dried"},{n:"pecans",q:"30g, chopped"},{n:"goat cheese",q:"60g"},{n:"sage",q:"fresh"},{n:"maple syrup",q:"1 tbsp"},{n:"olive oil",q:"2 tbsp"},{n:"salt and pepper",q:"to taste"}],steps:["Brush squash with oil, season. Roast cut-side down 220C 25 min until tender.","Mix wild rice with cranberries, pecans, sage, maple syrup.","Fill squash halves. Top with goat cheese. Bake 10 min more until cheese softens."]},
{id:596,name:"Honey Chili Chicken",time:20,servings:4,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/55139651214_3f9f9c37bb_c.jpg",ing:[{n:"chicken thighs",q:"600g, boneless"},{n:"honey",q:"3 tbsp"},{n:"soy sauce",q:"2 tbsp"},{n:"sriracha",q:"2 tbsp"},{n:"garlic",q:"3 cloves"},{n:"rice vinegar",q:"1 tbsp"},{n:"cornstarch",q:"1 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"sesame seeds",q:"1 tbsp"},{n:"green onion",q:"2"},{n:"rice",q:"for serving"}],steps:["Sear chicken 4-5 min per side. Remove, slice.","Mix honey, soy sauce, sriracha, garlic, vinegar, cornstarch. Simmer until thick.","Toss chicken in sauce. Serve over rice with sesame seeds and green onion."]},
{id:597,name:"Lemon Olive Oil Cake",time:45,servings:8,diff:"Easy",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/65535/48959021003_e4908ee729_c.jpg",ing:[{n:"almond flour",q:"200g"},{n:"eggs",q:"3"},{n:"sugar",q:"150g"},{n:"olive oil",q:"100ml"},{n:"lemon",q:"2, zested and juiced"},{n:"baking powder",q:"1 tsp"},{n:"salt",q:"pinch"},{n:"powdered sugar",q:"for dusting"},{n:"whipped cream",q:"for serving"}],steps:["Whisk eggs with sugar until thick. Add olive oil, lemon zest and juice.","Fold in almond flour, baking powder, salt.","Pour into lined pan. Bake 175C 30-35 min until golden. Cool. Dust with powdered sugar."]},
{id:598,name:"Chicken Makhani",time:35,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54461844467_52c6bfeae2_c.jpg",ing:[{n:"chicken thighs",q:"600g, cubed"},{n:"butter",q:"50g"},{n:"onion",q:"1"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"1 inch"},{n:"canned tomatoes",q:"400g"},{n:"cream",q:"200ml"},{n:"garam masala",q:"2 tsp"},{n:"kashmiri chili",q:"1 tbsp"},{n:"fenugreek leaves",q:"1 tsp"},{n:"sugar",q:"1 tsp"},{n:"rice",q:"for serving"}],steps:["Sauté onion in butter. Add garlic, ginger, spices. Add tomatoes, simmer 10 min. Blend smooth.","Add cream, sugar, fenugreek. Return to simmer.","Add chicken, cook 12-15 min. Finish with a swirl of cream. Serve with rice and naan."]},
{id:599,name:"Crispy Fish Sandwich",time:15,servings:2,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/51941200584_1326b4371d_c.jpg",ing:[{n:"white fish fillets",q:"2"},{n:"flour",q:"80g"},{n:"panko breadcrumbs",q:"100g"},{n:"egg",q:"1"},{n:"brioche buns",q:"2"},{n:"tartare sauce",q:"3 tbsp"},{n:"lettuce",q:"2 leaves"},{n:"tomato",q:"2 slices"},{n:"pickles",q:"sliced"},{n:"lemon",q:"1"}],steps:["Season fish. Coat in flour, egg, panko. Fry 3-4 min per side until golden.","Toast buns. Spread tartare sauce generously.","Layer lettuce, fish, tomato, pickles. Squeeze lemon. Close."]},
{id:600,name:"Lamb Chop Masala",time:25,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/52204527690_cb6ef2e1e4_c.jpg",ing:[{n:"lamb chops",q:"8"},{n:"onion",q:"2, diced"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"2 inch"},{n:"canned tomatoes",q:"200g"},{n:"yogurt",q:"100g"},{n:"garam masala",q:"2 tsp"},{n:"cumin",q:"1 tsp"},{n:"kashmiri chili",q:"1 tbsp"},{n:"oil",q:"3 tbsp"},{n:"cilantro",q:"fresh"},{n:"rice",q:"for serving"}],steps:["Brown lamb chops. Remove. Sauté onions golden. Add garlic, ginger, spices 2 min.","Add yogurt, tomatoes. Return chops. Cover, cook 15 min.","Garnish with cilantro. Serve with rice."]},
{id:601,name:"Szechuan Kung Pao Shrimp",time:20,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/54612816795_dc562a0170_c.jpg",ing:[{n:"large shrimp",q:"400g"},{n:"peanuts",q:"50g"},{n:"dried red chilies",q:"8"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"soy sauce",q:"2 tbsp"},{n:"rice vinegar",q:"2 tbsp"},{n:"hoisin sauce",q:"1 tbsp"},{n:"cornstarch",q:"1 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"green onion",q:"3"},{n:"rice",q:"for serving"}],steps:["Toss shrimp with cornstarch. Stir-fry until pink. Remove.","Fry chilies, garlic, ginger 30 sec. Add peanuts.","Return shrimp with soy, vinegar, hoisin, sesame oil. Toss. Top with green onion. Serve over rice."]},
{id:602,name:"Creamy Tomato Tortellini Soup",time:25,servings:6,diff:"Easy",tags:["vegetarian"],img:U+"1730312382513-62e9454f4797?w=600&h=400&fit=crop",ing:[{n:"cheese tortellini",q:"400g"},{n:"canned tomatoes",q:"800g"},{n:"onion",q:"1"},{n:"garlic",q:"4 cloves"},{n:"heavy cream",q:"150ml"},{n:"vegetable broth",q:"500ml"},{n:"spinach",q:"100g"},{n:"basil",q:"fresh"},{n:"Italian seasoning",q:"1 tsp"},{n:"olive oil",q:"2 tbsp"},{n:"parmesan",q:"for serving"}],steps:["Sauté onion, garlic 3 min. Add tomatoes, broth, seasoning. Simmer 10 min. Blend.","Add tortellini, cook 5 min. Stir in cream and spinach.","Serve with basil and parmesan."]},
{id:603,name:"Chicken Fried Rice",time:15,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://www.themealdb.com/images/media/meals/wuyd2h1765655837.jpg/preview",ing:[{n:"cooked rice",q:"400g, day-old"},{n:"chicken",q:"200g, diced"},{n:"egg",q:"2"},{n:"garlic",q:"3 cloves"},{n:"green onion",q:"3"},{n:"peas and carrot",q:"100g"},{n:"soy sauce",q:"3 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"oyster sauce",q:"1 tbsp"},{n:"white pepper",q:"pinch"}],steps:["Stir-fry chicken 3 min. Add garlic, peas, carrot 2 min.","Push aside, scramble eggs. Add rice, soy sauce, oyster sauce.","Toss 3 min over high heat. Finish with sesame oil, pepper, green onion."]},
{id:604,name:"Beef Rendang Dry Curry",time:120,servings:6,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:U+"1642821372719-46b426afd8b1?w=600&h=400&fit=crop",ing:[{n:"beef chuck",q:"1kg, cubed"},{n:"coconut milk",q:"800ml"},{n:"lemongrass",q:"3 stalks"},{n:"galangal",q:"3 slices"},{n:"kaffir lime leaves",q:"5"},{n:"rendang paste",q:"4 tbsp"},{n:"toasted coconut",q:"3 tbsp"},{n:"salt",q:"to taste"},{n:"rice",q:"for serving"}],steps:["Fry rendang paste 5 min. Add beef, coconut milk, lemongrass, galangal, lime leaves.","Simmer uncovered 2+ hours, stirring occasionally. Liquid should evaporate completely.","Meat should be dark, tender, and coated in dry spice paste. Stir in toasted coconut."]},
{id:605,name:"Shakshuka with Sausage & Peppers",time:30,servings:4,diff:"Medium",tags:["gluten-free","nut-free"],img:U+"1655179532611-b9be17d78ec5?w=600&h=400&fit=crop",ing:[{n:"Italian sausage",q:"4 links"},{n:"canned tomatoes",q:"800g"},{n:"bell peppers",q:"3, sliced"},{n:"onion",q:"1"},{n:"garlic",q:"4 cloves"},{n:"eggs",q:"6"},{n:"cumin",q:"1 tsp"},{n:"paprika",q:"1 tsp"},{n:"oregano",q:"1 tsp"},{n:"feta",q:"50g"},{n:"basil",q:"fresh"},{n:"bread",q:"for serving"}],steps:["Brown sausage, slice. Add onion, peppers 5 min. Add garlic, spices.","Add tomatoes and sausage. Simmer 10 min.","Make wells, crack eggs. Cover 5-8 min. Top with feta and basil."]},
{id:606,name:"Chicken Pesto Sandwich",time:10,servings:2,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/52060004609_bcc5c59b66_c.jpg",ing:[{n:"grilled chicken breast",q:"200g, sliced"},{n:"ciabatta",q:"2, split"},{n:"basil pesto",q:"3 tbsp"},{n:"mozzarella",q:"100g, sliced"},{n:"sun-dried tomatoes",q:"40g"},{n:"arugula",q:"handful"},{n:"olive oil",q:"1 tbsp"}],steps:["Toast ciabatta. Spread pesto on both sides.","Layer chicken, mozzarella, sun-dried tomatoes, arugula.","Press slightly and serve."]},
{id:607,name:"Thai Coconut Chicken Soup",time:25,servings:4,diff:"Easy",tags:["dairy-free","gluten-free"],img:U+"1677029969063-23ecbb98d0af?w=600&h=400&fit=crop",ing:[{n:"chicken breast",q:"400g, sliced"},{n:"coconut milk",q:"800ml"},{n:"galangal",q:"5 slices"},{n:"lemongrass",q:"2 stalks"},{n:"kaffir lime leaves",q:"5"},{n:"mushrooms",q:"150g"},{n:"fish sauce",q:"3 tbsp"},{n:"lime juice",q:"3 tbsp"},{n:"chili paste",q:"1 tbsp"},{n:"cilantro",q:"fresh"},{n:"Thai chili",q:"2"}],steps:["Simmer coconut milk with galangal, lemongrass, lime leaves 5 min.","Add chicken and mushrooms. Cook 10 min.","Season with fish sauce, lime juice, chili paste. Top with cilantro and chili."]},
{id:608,name:"Pork Medallions with Mustard Cream",time:20,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:U+"1622707835706-1dbc97022cf7?w=600&h=400&fit=crop",ing:[{n:"pork tenderloin",q:"600g, sliced into medallions"},{n:"heavy cream",q:"150ml"},{n:"whole grain mustard",q:"2 tbsp"},{n:"garlic",q:"2 cloves"},{n:"white wine",q:"80ml"},{n:"butter",q:"20g"},{n:"thyme",q:"fresh"},{n:"olive oil",q:"1 tbsp"},{n:"mashed potatoes",q:"for serving"}],steps:["Season and sear pork medallions 3 min per side. Remove.","Sauté garlic, deglaze with wine. Add cream, mustard, thyme. Simmer 3 min.","Return pork. Spoon sauce over. Serve with mashed potatoes."]},
{id:609,name:"Chicken Tikka Pizza",time:25,servings:2,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/746/22360192272_206d84870d_c.jpg",ing:[{n:"pizza dough",q:"300g"},{n:"tikka masala sauce",q:"150ml"},{n:"cooked chicken tikka",q:"200g"},{n:"mozzarella",q:"150g"},{n:"red onion",q:"1/2, sliced"},{n:"cilantro",q:"fresh"},{n:"green chili",q:"1, sliced"},{n:"mint yogurt",q:"for drizzle"}],steps:["Stretch dough. Spread tikka sauce instead of tomato sauce. Add mozzarella.","Top with chicken tikka pieces and red onion.","Bake at max heat 8-12 min. Top with cilantro, green chili, drizzle of mint yogurt."]},
{id:610,name:"Pasta al Pomodoro",time:15,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","nut-free"],img:"https://live.staticflickr.com/65535/54503972017_c3c0b22099_c.jpg",ing:[{n:"spaghetti",q:"400g"},{n:"ripe tomatoes",q:"800g, or canned San Marzano"},{n:"garlic",q:"3 cloves"},{n:"basil",q:"large bunch"},{n:"olive oil",q:"60ml"},{n:"salt",q:"to taste"},{n:"parmesan",q:"optional, for serving"}],steps:["Crush tomatoes by hand. Sauté garlic in oil 1 min (do not brown).","Add tomatoes, salt. Simmer 10-12 min.","Cook spaghetti. Toss with sauce, torn basil, and a drizzle of raw olive oil."]},
{id:611,name:"Misir Wot (Ethiopian Lentil Stew)",time:30,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:U+"1546240916-8e4ea875dd2f?w=600&h=400&fit=crop",ing:[{n:"red lentils",q:"300g"},{n:"onion",q:"2, finely diced"},{n:"berbere spice",q:"3 tbsp"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"1 inch"},{n:"tomato paste",q:"2 tbsp"},{n:"vegetable oil",q:"3 tbsp"},{n:"injera",q:"for serving"}],steps:["Dry-sauté onions 10 min. Add oil, cook 5 min more. Add berbere, garlic, ginger, paste 3 min.","Add lentils, 600ml water. Simmer 20-25 min.","Should be thick and rich. Serve with injera."]},
{id:612,name:"Salmon Poke Bowl",time:15,servings:2,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:U+"1584689070416-6fa78dd07fc0?w=600&h=400&fit=crop",ing:[{n:"sushi-grade salmon",q:"300g, cubed"},{n:"sushi rice",q:"250g"},{n:"soy sauce",q:"3 tbsp"},{n:"sesame oil",q:"1 tbsp"},{n:"avocado",q:"1"},{n:"cucumber",q:"1"},{n:"mango",q:"1/2"},{n:"edamame",q:"80g"},{n:"pickled ginger",q:"for serving"},{n:"wasabi",q:"to taste"},{n:"sesame seeds",q:"1 tbsp"},{n:"nori",q:"shredded"}],steps:["Season rice with vinegar. Marinate salmon in soy and sesame oil.","Build bowls: rice, salmon, avocado, cucumber, mango, edamame.","Top with nori, sesame seeds, pickled ginger, wasabi."]},
{id:613,name:"Beef Taco Salad Bowl",time:15,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/7418/26874640172_8713f6a41d_c.jpg",ing:[{n:"ground beef",q:"400g"},{n:"taco seasoning",q:"2 tbsp"},{n:"romaine lettuce",q:"1 head"},{n:"black beans",q:"1 can"},{n:"corn",q:"1 can"},{n:"tomato",q:"2, diced"},{n:"avocado",q:"1"},{n:"cheddar",q:"100g"},{n:"tortilla chips",q:"crushed"},{n:"sour cream",q:"80ml"},{n:"salsa",q:"100ml"},{n:"lime",q:"1"}],steps:["Cook beef with seasoning 5 min. Chop lettuce.","Layer: lettuce, beef, beans, corn, tomato, avocado, cheese.","Top with crushed chips, sour cream, salsa, lime."]},
{id:614,name:"Chicken Drumsticks with Honey Mustard",time:30,servings:4,diff:"Easy",tags:["gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/54612511146_2b265b1661_c.jpg",ing:[{n:"chicken drumsticks",q:"8"},{n:"honey",q:"3 tbsp"},{n:"Dijon mustard",q:"3 tbsp"},{n:"garlic",q:"3 cloves"},{n:"olive oil",q:"2 tbsp"},{n:"paprika",q:"1 tsp"},{n:"salt and pepper",q:"to taste"},{n:"thyme",q:"fresh"}],steps:["Mix honey, mustard, garlic, oil, paprika, thyme. Coat drumsticks.","Arrange on sheet pan. Season.","Bake 200C 35-40 min, basting halfway, until golden and cooked through."]},
{id:615,name:"Tofu Pad Kra Pao",time:15,servings:2,diff:"Easy",tags:["vegan","vegetarian","dairy-free"],img:"https://live.staticflickr.com/2774/4469621884_aa7c94b3e2_c.jpg",ing:[{n:"firm tofu",q:"400g, crumbled"},{n:"Thai holy basil",q:"large bunch"},{n:"garlic",q:"5 cloves"},{n:"Thai chili",q:"3"},{n:"soy sauce",q:"2 tbsp"},{n:"oyster sauce alternative",q:"1 tbsp"},{n:"sugar",q:"1 tsp"},{n:"vegetable oil",q:"2 tbsp"},{n:"rice",q:"for serving"}],steps:["Crumble tofu, fry until golden and crispy.","Add garlic, chili 30 sec. Add soy sauce, oyster sauce alt, sugar.","Toss in basil until wilted. Serve over rice with fried egg."]},
{id:616,name:"Mushroom Tacos with Walnut Crema",time:15,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:U+"1722239309962-0bbb45547a0e?w=600&h=400&fit=crop",ing:[{n:"mixed mushrooms",q:"500g, sliced"},{n:"chipotle powder",q:"1 tsp"},{n:"cumin",q:"1 tsp"},{n:"corn tortillas",q:"8"},{n:"walnuts",q:"60g"},{n:"lime",q:"2"},{n:"cashew cream",q:"80ml"},{n:"cilantro",q:"fresh"},{n:"red onion",q:"1/2, diced"},{n:"olive oil",q:"2 tbsp"}],steps:["Sauté mushrooms over high heat until golden, 6-8 min. Season with chipotle, cumin.","Blend walnuts, lime juice, cashew cream, salt for crema.","Fill tortillas with mushrooms, walnut crema, red onion, cilantro, lime."]},
{id:617,name:"One-Pot Creamy Chicken Pasta",time:20,servings:4,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54612814810_e3b439585b_c.jpg",ing:[{n:"chicken breast",q:"400g, sliced"},{n:"penne",q:"350g"},{n:"heavy cream",q:"200ml"},{n:"chicken broth",q:"500ml"},{n:"garlic",q:"3 cloves"},{n:"sun-dried tomatoes",q:"60g"},{n:"spinach",q:"100g"},{n:"parmesan",q:"50g"},{n:"Italian seasoning",q:"1 tsp"},{n:"olive oil",q:"2 tbsp"}],steps:["Sear chicken. Remove. Add garlic, sun-dried tomatoes 1 min.","Add broth and pasta. Cover, simmer 12 min until pasta tender.","Add cream, parmesan, spinach, chicken. Stir until spinach wilts and sauce is creamy."]},
{id:618,name:"Thai Beef Salad",time:15,servings:3,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:U+"1696824818313-1a1563281d22?w=600&h=400&fit=crop",ing:[{n:"beef sirloin",q:"400g"},{n:"mixed greens",q:"150g"},{n:"cucumber",q:"1"},{n:"cherry tomatoes",q:"100g"},{n:"red onion",q:"1/2, sliced"},{n:"mint",q:"fresh"},{n:"cilantro",q:"fresh"},{n:"Thai chili",q:"2"},{n:"fish sauce",q:"3 tbsp"},{n:"lime juice",q:"3 tbsp"},{n:"sugar",q:"1 tsp"},{n:"toasted rice powder",q:"1 tbsp"}],steps:["Grill steak 4 min per side for medium-rare. Rest 5 min, slice thin.","Mix fish sauce, lime juice, sugar, chili for dressing.","Toss sliced beef with greens, cucumber, tomatoes, onion, herbs, dressing. Top with rice powder."]},
{id:619,name:"Butter Paneer Masala",time:25,servings:4,diff:"Easy",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/65535/53545195937_8a79f78d98_c.jpg",ing:[{n:"paneer",q:"300g, cubed"},{n:"butter",q:"40g"},{n:"canned tomatoes",q:"400g"},{n:"onion",q:"1"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"cream",q:"150ml"},{n:"garam masala",q:"2 tsp"},{n:"kashmiri chili",q:"1 tbsp"},{n:"fenugreek",q:"1 tsp"},{n:"naan",q:"for serving"}],steps:["Sauté onion in butter 5 min. Add garlic, ginger, spices. Add tomatoes, simmer 10 min. Blend smooth.","Stir in cream and fenugreek. Add paneer cubes.","Simmer 5 min. Serve with naan and rice."]},
{id:620,name:"Chicken Yakitori Bowl",time:20,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/50071865638_a5aa1a5329_c.jpg",ing:[{n:"chicken thighs",q:"500g, cubed"},{n:"soy sauce",q:"4 tbsp"},{n:"mirin",q:"4 tbsp"},{n:"sake",q:"2 tbsp"},{n:"sugar",q:"1 tbsp"},{n:"rice",q:"300g"},{n:"green onion",q:"4"},{n:"pickled ginger",q:"for serving"},{n:"nori",q:"for garnish"},{n:"sesame seeds",q:"1 tbsp"}],steps:["Make tare: simmer soy, mirin, sake, sugar until syrupy.","Thread chicken and green onion on skewers. Grill 3-4 min per side, basting with tare.","Remove from skewers. Serve over rice with extra tare, pickled ginger, nori, sesame seeds."]},
{id:621,name:"Crispy Chicken Thighs",time:25,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/54552135768_a91bf7bb2d_c.jpg",ing:[{n:"chicken thighs",q:"8, bone-in, skin-on"},{n:"garlic powder",q:"1 tsp"},{n:"paprika",q:"1 tsp"},{n:"onion powder",q:"1 tsp"},{n:"salt",q:"1 tsp"},{n:"black pepper",q:"1/2 tsp"},{n:"olive oil",q:"1 tbsp"}],steps:["Pat chicken very dry. Season with all spices.","Place skin-side down in cold oiled skillet. Cook on medium 12-15 min without moving until skin is deeply golden.","Flip, cook 8-10 min more until cooked through. Rest 5 min."]},
{id:622,name:"Shrimp Tacos",time:15,servings:4,diff:"Easy",tags:["dairy-free","high-protein"],img:U+"1698854633001-39d4e6806316?w=600&h=400&fit=crop",ing:[{n:"large shrimp",q:"400g"},{n:"cumin",q:"1 tsp"},{n:"chili powder",q:"1 tsp"},{n:"lime",q:"2"},{n:"corn tortillas",q:"8"},{n:"red cabbage slaw",q:"200g"},{n:"avocado",q:"1"},{n:"cilantro",q:"fresh"},{n:"chipotle crema",q:"for serving"}],steps:["Season shrimp with cumin, chili, salt. Sear 2 min per side.","Make slaw: cabbage, lime, salt.","Fill tortillas with shrimp, slaw, avocado, cilantro, chipotle crema, lime."]},
{id:623,name:"Mushroom Risotto with Truffle",time:35,servings:4,diff:"Medium",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/65535/52551682647_d8c41303c4_c.jpg",ing:[{n:"arborio rice",q:"300g"},{n:"mixed mushrooms",q:"400g"},{n:"truffle oil",q:"2 tbsp"},{n:"white wine",q:"150ml"},{n:"vegetable broth",q:"1L"},{n:"parmesan",q:"60g"},{n:"butter",q:"40g"},{n:"shallot",q:"2"},{n:"garlic",q:"2 cloves"},{n:"thyme",q:"fresh"}],steps:["Sauté mushrooms until golden. Sauté shallot, garlic. Toast rice, add wine.","Add broth gradually, stirring 18-20 min.","Fold in mushrooms, butter, parmesan. Drizzle truffle oil generously."]},
{id:624,name:"Chicken Tikka Wraps",time:15,servings:4,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/628/21118280743_a1ac7b0387_c.jpg",ing:[{n:"chicken tikka",q:"400g, cooked"},{n:"naan bread",q:"4"},{n:"mint yogurt",q:"100g"},{n:"lettuce",q:"shredded"},{n:"red onion",q:"1/2, sliced"},{n:"cucumber",q:"1/2, diced"},{n:"mango chutney",q:"2 tbsp"},{n:"cilantro",q:"fresh"}],steps:["Warm naan. Spread mint yogurt and mango chutney.","Add shredded lettuce, chicken tikka, onion, cucumber.","Roll up tightly. Cut in half to serve. Garnish with cilantro."]},
{id:625,name:"Beef Brisket",time:300,servings:8,diff:"Medium",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/55141658045_fc6bde9580_c.jpg",ing:[{n:"beef brisket",q:"2kg"},{n:"salt",q:"2 tbsp"},{n:"black pepper",q:"2 tbsp"},{n:"garlic powder",q:"1 tbsp"},{n:"onion powder",q:"1 tbsp"},{n:"paprika",q:"1 tbsp"},{n:"brown sugar",q:"1 tbsp"}],steps:["Rub brisket generously with all seasonings. Wrap and refrigerate overnight.","Smoke at 110C for 10-12 hours (or oven at 130C 8-10 hours wrapped in foil).","Brisket is done when a probe slides in like butter (96C internal). Rest 1 hour. Slice against grain."]},
{id:626,name:"Prawn Tempura Sushi Roll",time:30,servings:4,diff:"Medium",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/7387/14101881404_e4f90d20c9_c.jpg",ing:[{n:"sushi rice",q:"300g"},{n:"nori sheets",q:"4"},{n:"prawn tempura",q:"8"},{n:"cucumber",q:"1, julienned"},{n:"avocado",q:"1, sliced"},{n:"cream cheese",q:"optional"},{n:"soy sauce",q:"for serving"},{n:"wasabi",q:"for serving"},{n:"pickled ginger",q:"for serving"},{n:"sesame seeds",q:"1 tbsp"}],steps:["Cook and season sushi rice. Fry prawn tempura.","Place nori on mat, spread rice, flip. Add tempura, cucumber, avocado in center.","Roll tightly using mat. Slice with wet knife into 8 pieces. Serve with soy, wasabi, ginger."]},
{id:627,name:"Chicken Biryani Bowl",time:40,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/814/41454427571_24ae3363e6_c.jpg",ing:[{n:"chicken thighs",q:"500g, cubed"},{n:"basmati rice",q:"300g"},{n:"onion",q:"2, sliced"},{n:"yogurt",q:"100g"},{n:"biryani masala",q:"2 tbsp"},{n:"ginger-garlic paste",q:"2 tbsp"},{n:"saffron",q:"pinch in milk"},{n:"mint",q:"fresh"},{n:"cilantro",q:"fresh"},{n:"ghee",q:"40g"},{n:"raita",q:"for serving"}],steps:["Marinate chicken in yogurt, biryani masala, ginger-garlic 30 min.","Brown chicken with fried onions. Par-boil rice. Layer rice over chicken. Add saffron milk, herbs, ghee.","Seal tight, cook on low 25 min. Serve with raita."]},
{id:628,name:"Miso Mushroom Pasta",time:20,servings:4,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/4415/35824986103_794b146c4f_c.jpg",ing:[{n:"spaghetti",q:"400g"},{n:"mixed mushrooms",q:"400g"},{n:"white miso paste",q:"2 tbsp"},{n:"butter",q:"40g"},{n:"garlic",q:"3 cloves"},{n:"soy sauce",q:"1 tbsp"},{n:"lemon juice",q:"1 tbsp"},{n:"parmesan",q:"40g"},{n:"thyme",q:"fresh"},{n:"black pepper",q:"1 tsp"}],steps:["Cook spaghetti. Sauté mushrooms in butter until golden 6-8 min. Add garlic, thyme.","Dissolve miso in 100ml pasta water. Add to mushrooms with soy sauce, lemon.","Toss with spaghetti and parmesan. Season with pepper."]},
{id:629,name:"Chicken Tikka Masala Pizza",time:25,servings:2,diff:"Medium",tags:["high-protein"],img:U+"1632221622104-06557f3eee3c?w=600&h=400&fit=crop",ing:[{n:"pizza dough",q:"300g"},{n:"tikka masala sauce",q:"150ml"},{n:"cooked chicken",q:"200g, diced"},{n:"mozzarella",q:"150g"},{n:"red onion",q:"1/2, sliced"},{n:"cilantro",q:"fresh"},{n:"green chili",q:"1"},{n:"mint yogurt drizzle",q:"2 tbsp"}],steps:["Stretch dough. Spread tikka sauce. Add mozzarella, chicken, onion.","Bake at max heat 8-12 min until charred and bubbly.","Top with cilantro, sliced chili, and drizzle of mint yogurt."]},
{id:630,name:"Beef Bulgogi Bowl",time:25,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/52390312870_e95d8b68dc_c.jpg",ing:[{n:"beef ribeye",q:"500g, thinly sliced"},{n:"soy sauce",q:"4 tbsp"},{n:"sesame oil",q:"2 tbsp"},{n:"brown sugar",q:"2 tbsp"},{n:"Asian pear",q:"1/2, grated"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"1 inch"},{n:"rice",q:"300g"},{n:"kimchi",q:"for serving"},{n:"pickled radish",q:"for serving"},{n:"egg",q:"fried"},{n:"green onion",q:"3"},{n:"sesame seeds",q:"1 tbsp"}],steps:["Marinate beef in soy, sesame, sugar, pear, garlic, ginger 30+ min.","Grill or pan-fry over high heat 1-2 min per side.","Serve over rice with kimchi, pickled radish, fried egg, green onion, sesame seeds."]},
{id:631,name:"Pork Banh Mi Bowl",time:20,servings:3,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54552080574_72a62f1a23_c.jpg",ing:[{n:"pork tenderloin",q:"400g, sliced"},{n:"lemongrass",q:"2 stalks, minced"},{n:"fish sauce",q:"3 tbsp"},{n:"sugar",q:"1 tbsp"},{n:"garlic",q:"3 cloves"},{n:"rice vermicelli",q:"200g"},{n:"pickled daikon and carrot",q:"100g"},{n:"cucumber",q:"1, sliced"},{n:"cilantro",q:"fresh"},{n:"mint",q:"fresh"},{n:"jalapeño",q:"1"},{n:"nuoc cham sauce",q:"for serving"}],steps:["Marinate pork in lemongrass, fish sauce, sugar, garlic. Grill 3-4 min per side.","Cook vermicelli. Prepare vegetables.","Build bowls: noodles, sliced pork, pickled vegetables, cucumber, herbs, jalapeño. Drizzle nuoc cham."]},
{id:632,name:"Chicken Enchilada Casserole",time:35,servings:6,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54950475769_220c7302e7_c.jpg",ing:[{n:"chicken",q:"500g, cooked and shredded"},{n:"enchilada sauce",q:"600ml"},{n:"corn tortillas",q:"12"},{n:"cheddar",q:"200g, shredded"},{n:"black beans",q:"1 can"},{n:"corn",q:"1 can"},{n:"sour cream",q:"100ml"},{n:"green onion",q:"3"},{n:"cilantro",q:"fresh"},{n:"cumin",q:"1 tsp"}],steps:["Mix chicken with beans, corn, half the cheese, cumin.","Layer tortillas, chicken mixture, enchilada sauce in baking dish. Repeat.","Top with remaining cheese. Bake 180C 25 min. Top with sour cream, green onion, cilantro."]},
{id:633,name:"Coconut Curry Lentil Soup",time:30,servings:6,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/50400016417_eea7662b45_c.jpg",ing:[{n:"red lentils",q:"250g"},{n:"coconut milk",q:"400ml"},{n:"onion",q:"1"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"curry powder",q:"2 tbsp"},{n:"canned tomatoes",q:"200g"},{n:"vegetable broth",q:"500ml"},{n:"spinach",q:"100g"},{n:"lime",q:"1"},{n:"cilantro",q:"fresh"}],steps:["Sauté onion 5 min. Add garlic, ginger, curry powder 1 min.","Add lentils, coconut milk, tomatoes, broth. Simmer 20 min.","Add spinach. Finish with lime. Serve with cilantro."]},
{id:634,name:"Steak Bites with Garlic Butter",time:10,servings:3,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/1980/44330547095_8ddf15f44c_c.jpg",ing:[{n:"sirloin steak",q:"500g, cubed"},{n:"butter",q:"40g"},{n:"garlic",q:"5 cloves, minced"},{n:"soy sauce",q:"1 tbsp"},{n:"thyme",q:"fresh"},{n:"olive oil",q:"1 tbsp"},{n:"salt and pepper",q:"to taste"}],steps:["Pat steak dry. Season generously. Heat oil in cast iron until smoking.","Sear cubes 1-2 min per side. Don't crowd.","Add butter, garlic, thyme. Baste 30 sec. Drizzle soy sauce. Serve."]},
{id:635,name:"Chicken Gyro Bowl",time:20,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54400743068_31cc5137b5_c.jpg",ing:[{n:"chicken thighs",q:"600g"},{n:"Greek yogurt",q:"100g"},{n:"garlic",q:"4 cloves"},{n:"cumin",q:"2 tsp"},{n:"paprika",q:"2 tsp"},{n:"oregano",q:"1 tsp"},{n:"rice",q:"300g"},{n:"cucumber",q:"1"},{n:"tomato",q:"2"},{n:"red onion",q:"1/2"},{n:"tzatziki",q:"for serving"},{n:"hummus",q:"for serving"},{n:"pita",q:"for serving"}],steps:["Marinate chicken in yogurt, garlic, spices. Grill 5-6 min per side. Slice.","Cook rice. Dice cucumber, tomato, onion for salad.","Build bowls: rice, chicken, salad, tzatziki, hummus. Serve with pita."]},
{id:636,name:"Chocolate Peanut Butter Cups",time:20,servings:12,diff:"Easy",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/65535/54515670706_bd6e8b11e5_c.jpg",ing:[{n:"dark chocolate",q:"200g"},{n:"peanut butter",q:"100g"},{n:"powdered sugar",q:"30g"},{n:"salt",q:"pinch"},{n:"coconut oil",q:"1 tbsp"}],steps:["Melt chocolate with coconut oil. Spoon thin layer into mini cupcake liners. Freeze 5 min.","Mix peanut butter with powdered sugar and salt. Drop small spoonfuls onto chocolate.","Cover with more melted chocolate. Freeze 15 min until set."]},
{id:637,name:"Shrimp Pad Thai",time:20,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/54050566105_28de07b091_c.jpg",ing:[{n:"rice noodles",q:"250g"},{n:"large shrimp",q:"300g"},{n:"tamarind paste",q:"2 tbsp"},{n:"fish sauce",q:"2 tbsp"},{n:"palm sugar",q:"2 tbsp"},{n:"garlic",q:"3 cloves"},{n:"egg",q:"2"},{n:"bean sprouts",q:"100g"},{n:"green onion",q:"3"},{n:"peanuts",q:"40g"},{n:"lime",q:"1"},{n:"chili flakes",q:"optional"}],steps:["Soak noodles. Mix tamarind, fish sauce, sugar for sauce.","Stir-fry shrimp and garlic 2 min. Push aside, scramble egg.","Add noodles and sauce. Toss 2 min. Add sprouts. Serve with peanuts, lime, green onion."]},
{id:638,name:"Chicken Katsu Bao",time:25,servings:4,diff:"Medium",tags:["high-protein"],img:U+"1747228469031-c5fc60b9d9f9?w=600&h=400&fit=crop",ing:[{n:"chicken breast",q:"2, pounded"},{n:"panko",q:"100g"},{n:"egg",q:"1"},{n:"flour",q:"40g"},{n:"bao buns",q:"4, steamed"},{n:"tonkatsu sauce",q:"for serving"},{n:"cabbage",q:"100g, shredded"},{n:"Japanese mayo",q:"2 tbsp"},{n:"pickled cucumber",q:"for serving"}],steps:["Bread chicken: flour, egg, panko. Deep fry 5 min until golden. Slice.","Steam bao buns 8 min.","Fill bao with shredded cabbage, katsu slices, tonkatsu sauce, mayo, pickled cucumber."]},
{id:639,name:"Chicken Korma Biryani",time:50,servings:6,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/698/21750004408_8ac1964eac_c.jpg",ing:[{n:"chicken thighs",q:"600g, cubed"},{n:"basmati rice",q:"400g"},{n:"korma sauce",q:"300ml"},{n:"yogurt",q:"100g"},{n:"onion",q:"2, sliced"},{n:"ginger-garlic paste",q:"2 tbsp"},{n:"saffron",q:"pinch in milk"},{n:"mint",q:"fresh"},{n:"ghee",q:"40g"},{n:"fried onions",q:"for garnish"},{n:"raita",q:"for serving"}],steps:["Marinate chicken in korma sauce and yogurt. Cook with fried onions.","Par-boil rice. Layer rice over chicken. Add saffron milk, mint, ghee.","Seal tightly, cook on low 25-30 min. Serve with raita and fried onions."]},
{id:640,name:"Grilled Steak Salad",time:20,servings:2,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55120033842_97e98538ba_c.jpg",ing:[{n:"sirloin steak",q:"300g"},{n:"mixed greens",q:"200g"},{n:"cherry tomatoes",q:"100g"},{n:"avocado",q:"1"},{n:"red onion",q:"1/4"},{n:"corn",q:"from 1 ear, grilled"},{n:"blue cheese",q:"40g, crumbled"},{n:"olive oil",q:"3 tbsp"},{n:"balsamic vinegar",q:"2 tbsp"},{n:"Dijon mustard",q:"1 tsp"}],steps:["Season and grill steak 4 min per side for medium-rare. Rest 5 min, slice thin.","Grill corn. Arrange greens, tomatoes, avocado, onion, corn in bowls.","Top with sliced steak and blue cheese. Whisk dressing: oil, vinegar, mustard. Drizzle."]},
{id:641,name:"Chicken Noodle Soup",time:30,servings:6,diff:"Easy",tags:["dairy-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/55100737955_6278e5174f_c.jpg",ing:[{n:"chicken breast",q:"400g"},{n:"egg noodles",q:"200g"},{n:"carrot",q:"2, diced"},{n:"celery",q:"2 stalks, diced"},{n:"onion",q:"1, diced"},{n:"garlic",q:"3 cloves"},{n:"chicken broth",q:"1.5L"},{n:"bay leaf",q:"1"},{n:"thyme",q:"fresh"},{n:"parsley",q:"fresh"},{n:"olive oil",q:"2 tbsp"},{n:"lemon juice",q:"1 tbsp"}],steps:["Sauté onion, carrot, celery 5 min. Add garlic, bay leaf, thyme.","Add broth and chicken. Simmer 15 min. Remove chicken, shred.","Return chicken, add noodles. Cook 8 min. Finish with lemon juice and parsley."]},
{id:642,name:"Bruschetta Chicken",time:20,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:U+"1660635269292-2e899b070230?w=600&h=400&fit=crop",ing:[{n:"chicken breast",q:"4"},{n:"cherry tomatoes",q:"300g, diced"},{n:"garlic",q:"3 cloves, minced"},{n:"basil",q:"large bunch, torn"},{n:"mozzarella",q:"100g, sliced"},{n:"balsamic glaze",q:"2 tbsp"},{n:"olive oil",q:"3 tbsp"},{n:"salt and pepper",q:"to taste"}],steps:["Season chicken. Sear 5 min per side.","Mix tomatoes, garlic, basil, oil. Top chicken with mozzarella. Broil 2 min.","Spoon bruschetta topping over. Drizzle balsamic glaze."]},
{id:643,name:"Lemon Herb Shrimp",time:10,servings:3,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/53083224564_04cb56e142_c.jpg",ing:[{n:"large shrimp",q:"500g, peeled"},{n:"garlic",q:"5 cloves, minced"},{n:"lemon",q:"2"},{n:"olive oil",q:"3 tbsp"},{n:"parsley",q:"fresh, chopped"},{n:"red pepper flakes",q:"1/4 tsp"},{n:"white wine",q:"60ml"},{n:"butter",q:"20g"}],steps:["Sauté garlic and pepper flakes in oil 1 min.","Add shrimp, cook 2 min per side. Add wine, lemon juice.","Finish with butter and parsley. Serve with bread or over pasta."]},
{id:644,name:"Chicken Parm Sandwich",time:20,servings:2,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54004718523_1063a24126_c.jpg",ing:[{n:"chicken breast",q:"2, pounded"},{n:"breadcrumbs",q:"100g"},{n:"parmesan",q:"40g"},{n:"egg",q:"1"},{n:"flour",q:"40g"},{n:"mozzarella",q:"80g"},{n:"marinara sauce",q:"100ml"},{n:"ciabatta rolls",q:"2"},{n:"basil",q:"fresh"},{n:"olive oil",q:"for frying"}],steps:["Bread chicken: flour, egg, breadcrumbs with parmesan. Fry 4 min per side.","Top with marinara and mozzarella. Broil 2 min.","Place on ciabatta with basil. Close sandwich."]},
{id:645,name:"Pumpkin Curry",time:25,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free"],img:"https://live.staticflickr.com/65535/54891915297_00c3275deb_c.jpg",ing:[{n:"pumpkin or butternut squash",q:"500g, cubed"},{n:"coconut milk",q:"400ml"},{n:"red curry paste",q:"2 tbsp"},{n:"onion",q:"1"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"fish sauce or soy sauce",q:"2 tbsp"},{n:"brown sugar",q:"1 tsp"},{n:"Thai basil",q:"fresh"},{n:"lime",q:"1"},{n:"rice",q:"for serving"}],steps:["Fry curry paste 1 min. Add onion, garlic, ginger 2 min.","Add pumpkin, coconut milk. Simmer 15-18 min until tender.","Season with fish sauce/soy, sugar, lime. Garnish with basil. Serve over rice."]},
{id:646,name:"Bacon Cheeseburger",time:15,servings:4,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55146331923_b81840a4a7_c.jpg",ing:[{n:"ground beef",q:"600g"},{n:"bacon",q:"8 strips"},{n:"cheddar cheese",q:"4 slices"},{n:"brioche buns",q:"4"},{n:"lettuce",q:"leaves"},{n:"tomato",q:"1, sliced"},{n:"onion",q:"4 rings"},{n:"pickles",q:"sliced"},{n:"ketchup",q:"for serving"},{n:"mustard",q:"for serving"}],steps:["Form 4 patties. Cook bacon crispy.","Grill burgers 4 min per side. Add cheese last min to melt.","Assemble: bun, lettuce, patty with cheese, bacon, tomato, onion, pickles, ketchup, mustard."]},
{id:647,name:"Lemon Chicken Piccata Pasta",time:25,servings:4,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/8058/27959334994_507f4b3168_c.jpg",ing:[{n:"chicken breast",q:"400g, sliced"},{n:"linguine",q:"400g"},{n:"lemon",q:"2"},{n:"capers",q:"2 tbsp"},{n:"white wine",q:"100ml"},{n:"butter",q:"40g"},{n:"garlic",q:"4 cloves"},{n:"parsley",q:"fresh"},{n:"parmesan",q:"30g"}],steps:["Cook linguine. Season and sear chicken 3 min per side. Remove.","Add garlic, wine, lemon juice, capers. Simmer 3 min. Add butter.","Toss with linguine and chicken. Top with parsley and parmesan."]},
{id:648,name:"Lamb Chops with Salsa Verde",time:15,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/7040/6959847029_cae6c8c7b8_c.jpg",ing:[{n:"lamb chops",q:"8"},{n:"parsley",q:"large bunch"},{n:"mint",q:"small bunch"},{n:"capers",q:"1 tbsp"},{n:"anchovy",q:"2 fillets"},{n:"garlic",q:"1 clove"},{n:"red wine vinegar",q:"2 tbsp"},{n:"olive oil",q:"80ml"},{n:"Dijon mustard",q:"1 tsp"}],steps:["Blend herbs, capers, anchovy, garlic, vinegar, oil, mustard for salsa verde.","Season lamb. Sear in hot pan 3-4 min per side for medium-rare.","Rest 5 min. Serve with generous salsa verde."]},
{id:649,name:"Tofu Scramble Burrito",time:15,servings:2,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/7118/6854827358_1fb3bbde76_c.jpg",ing:[{n:"extra-firm tofu",q:"400g"},{n:"flour tortillas",q:"2"},{n:"black beans",q:"100g"},{n:"avocado",q:"1"},{n:"nutritional yeast",q:"2 tbsp"},{n:"turmeric",q:"1/2 tsp"},{n:"cumin",q:"1/2 tsp"},{n:"spinach",q:"50g"},{n:"salsa",q:"for serving"},{n:"hot sauce",q:"for serving"}],steps:["Crumble tofu. Sauté with turmeric, cumin, nutritional yeast 5 min. Add spinach.","Warm tortillas. Layer beans, tofu scramble, avocado.","Add salsa and hot sauce. Roll into burritos."]},
{id:650,name:"Chicken Cacciatore Pasta",time:30,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/8518/8515142508_81c49437a9_c.jpg",ing:[{n:"chicken thighs",q:"4, boneless"},{n:"rigatoni",q:"400g"},{n:"canned tomatoes",q:"400g"},{n:"bell peppers",q:"2"},{n:"onion",q:"1"},{n:"garlic",q:"4 cloves"},{n:"olives",q:"50g"},{n:"capers",q:"1 tbsp"},{n:"red wine",q:"100ml"},{n:"oregano",q:"1 tsp"},{n:"parmesan",q:"40g"},{n:"basil",q:"fresh"}],steps:["Brown chicken. Add onion, peppers, garlic 5 min. Add wine, tomatoes, olives, capers, oregano.","Simmer 15 min. Shred chicken back into sauce.","Toss with cooked rigatoni. Top with parmesan and basil."]},
{id:651,name:"Shakshuka with Lamb Kofta",time:30,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:U+"1677051707492-db8aae903d0f?w=600&h=400&fit=crop",ing:[{n:"ground lamb",q:"300g"},{n:"cumin",q:"1 tsp"},{n:"coriander",q:"1 tsp"},{n:"cinnamon",q:"1/4 tsp"},{n:"canned tomatoes",q:"800g"},{n:"eggs",q:"6"},{n:"onion",q:"1"},{n:"garlic",q:"3 cloves"},{n:"harissa",q:"1 tbsp"},{n:"feta",q:"60g"},{n:"cilantro",q:"fresh"},{n:"olive oil",q:"2 tbsp"}],steps:["Mix lamb with cumin, coriander, cinnamon. Form small meatballs. Brown.","Sauté onion, garlic. Add tomatoes, harissa. Simmer 8 min. Nestle meatballs in.","Make wells, crack eggs. Cover 5-8 min. Top with feta and cilantro."]},
{id:652,name:"Honey Butter Chicken Biscuit",time:20,servings:4,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/707/22728339594_afc896a60f_c.jpg",ing:[{n:"chicken breast",q:"4, pounded"},{n:"buttermilk",q:"200ml"},{n:"flour",q:"120g"},{n:"paprika",q:"1 tsp"},{n:"cayenne",q:"1/4 tsp"},{n:"biscuits",q:"4 (from recipe or store)"},{n:"honey",q:"3 tbsp"},{n:"butter",q:"40g, melted"},{n:"pickles",q:"sliced"},{n:"salt",q:"to taste"}],steps:["Soak chicken in buttermilk. Dredge in seasoned flour. Fry 4 min per side.","Mix honey with melted butter and pinch of cayenne.","Split biscuits. Place chicken, drizzle honey butter, add pickles."]},
{id:653,name:"Gnocchi with Pesto",time:15,servings:4,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/4449/26277016449_7aeac042c8_c.jpg",ing:[{n:"potato gnocchi",q:"500g"},{n:"basil pesto",q:"120g"},{n:"cherry tomatoes",q:"150g"},{n:"pine nuts",q:"30g, toasted"},{n:"parmesan",q:"40g, shaved"},{n:"olive oil",q:"1 tbsp"}],steps:["Cook gnocchi in salted water until they float. Reserve pasta water.","Toss with pesto and splash of pasta water.","Add halved tomatoes. Top with pine nuts, shaved parmesan, olive oil."]},
{id:654,name:"Chicken Tikka Biryani",time:50,servings:6,diff:"Medium",tags:["gluten-free","high-protein"],img:U+"1606234157216-2e1fcbf0c140?w=600&h=400&fit=crop",ing:[{n:"chicken tikka",q:"400g, cooked"},{n:"basmati rice",q:"400g"},{n:"onion",q:"2, sliced"},{n:"saffron",q:"pinch in milk"},{n:"mint",q:"fresh"},{n:"cilantro",q:"fresh"},{n:"ghee",q:"40g"},{n:"fried onions",q:"for garnish"},{n:"raita",q:"for serving"}],steps:["Fry onion slices until golden. Layer in pot with chicken tikka.","Par-boil rice. Layer over chicken. Add saffron milk, herbs, ghee.","Seal tight, cook on low 25 min. Serve with raita."]},
{id:655,name:"Grilled Salmon Salad",time:20,servings:2,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://images.unsplash.com/photo-1735315050688-010b5b548054?w=600&h=400&fit=crop",ing:[{n:"salmon fillet",q:"300g"},{n:"mixed greens",q:"200g"},{n:"avocado",q:"1"},{n:"cherry tomatoes",q:"100g"},{n:"cucumber",q:"1"},{n:"red onion",q:"1/4"},{n:"lemon juice",q:"2 tbsp"},{n:"olive oil",q:"3 tbsp"},{n:"Dijon mustard",q:"1 tsp"},{n:"honey",q:"1 tsp"},{n:"dill",q:"fresh"}],steps:["Season salmon. Grill 4-5 min per side. Flake.","Arrange greens, avocado, tomatoes, cucumber, onion.","Whisk lemon, oil, mustard, honey. Drizzle over salad. Top with flaked salmon and dill."]},
{id:656,name:"Chicken Teriyaki Bowl",time:25,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:U+"1768966741466-95aec5f70d0a?w=600&h=400&fit=crop",ing:[{n:"chicken thighs",q:"500g, boneless"},{n:"soy sauce",q:"4 tbsp"},{n:"mirin",q:"3 tbsp"},{n:"sake",q:"2 tbsp"},{n:"sugar",q:"1 tbsp"},{n:"rice",q:"300g"},{n:"steamed broccoli",q:"for serving"},{n:"carrot",q:"1, julienned"},{n:"sesame seeds",q:"1 tbsp"},{n:"green onion",q:"2"}],steps:["Simmer soy, mirin, sake, sugar until syrupy for teriyaki sauce.","Sear chicken 4-5 min per side. Slice. Brush with teriyaki.","Serve over rice with broccoli, carrot, extra sauce, sesame seeds, green onion."]},
{id:657,name:"One-Pot Chili Mac",time:25,servings:6,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/5603/30111652164_1d24de03af_c.jpg",ing:[{n:"ground beef",q:"500g"},{n:"elbow macaroni",q:"300g"},{n:"canned tomatoes",q:"400g"},{n:"kidney beans",q:"1 can"},{n:"onion",q:"1"},{n:"garlic",q:"3 cloves"},{n:"chili powder",q:"2 tbsp"},{n:"cumin",q:"1 tsp"},{n:"beef broth",q:"400ml"},{n:"cheddar",q:"100g, shredded"},{n:"sour cream",q:"for serving"},{n:"green onion",q:"for serving"}],steps:["Brown beef with onion, garlic. Add chili powder, cumin.","Add tomatoes, beans, broth, pasta. Cover, simmer 12-15 min until pasta tender.","Stir in cheese. Top with sour cream and green onion."]},
{id:658,name:"Shakshuka with Sweet Potato",time:30,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:U+"1728414862381-45ac206a05b7?w=600&h=400&fit=crop",ing:[{n:"sweet potato",q:"1, cubed small"},{n:"canned tomatoes",q:"800g"},{n:"onion",q:"1"},{n:"garlic",q:"3 cloves"},{n:"cumin",q:"1 tsp"},{n:"smoked paprika",q:"1 tsp"},{n:"harissa",q:"1 tbsp"},{n:"spinach",q:"100g"},{n:"cilantro",q:"fresh"},{n:"olive oil",q:"3 tbsp"},{n:"flatbread",q:"for serving"}],steps:["Sauté sweet potato 8 min. Add onion, garlic, spices.","Add tomatoes, harissa. Simmer 10 min until potato is tender. Add spinach.","Top with cilantro. Serve with flatbread. (Omit eggs for vegan version)"]},

{id:425,name:"Ackee and Saltfish",time:25,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/2704/4298967733_f465d47bea_c.jpg",ing:[{n:"saltfish",q:"300g, soaked and flaked"},{n:"ackee",q:"1 can, drained"},{n:"onion",q:"1, diced"},{n:"bell pepper",q:"1, diced"},{n:"scotch bonnet",q:"1, minced"},{n:"tomato",q:"2, diced"},{n:"thyme",q:"3 sprigs"},{n:"garlic",q:"3 cloves"},{n:"green onion",q:"3"},{n:"black pepper",q:"1 tsp"},{n:"coconut oil",q:"2 tbsp"},{n:"bammy or fried dumplings",q:"for serving"}],steps:["Soak saltfish overnight. Boil 10 min, drain, flake.","Sauté onion, pepper, garlic, thyme, scotch bonnet 5 min. Add saltfish, tomato.","Gently fold in ackee, cook 3 min (don't break it up). Serve with bammy or fried dumplings."]},
{id:426,name:"Rigatoni alla Gricia",time:20,servings:4,diff:"Easy",tags:["high-protein"],img:U+"1606853181531-a3a54d2ad57b?w=600&h=400&fit=crop",ing:[{n:"rigatoni",q:"400g"},{n:"guanciale",q:"200g, sliced"},{n:"pecorino romano",q:"100g, grated"},{n:"black pepper",q:"2 tsp, cracked"}],steps:["Cook rigatoni. Reserve 300ml pasta water.","Cook guanciale until fat renders and meat is crispy. Remove from heat.","Add pasta to guanciale with pasta water. Toss off heat with pecorino and pepper until creamy emulsion forms."]},
{id:427,name:"Tempeh Stir-Fry",time:20,servings:3,diff:"Easy",tags:["vegan","vegetarian","dairy-free"],img:"https://live.staticflickr.com/65535/53271872192_a709b15511_c.jpg",ing:[{n:"tempeh",q:"300g, cubed"},{n:"broccoli",q:"200g"},{n:"bell pepper",q:"1"},{n:"carrot",q:"1"},{n:"soy sauce",q:"3 tbsp"},{n:"maple syrup",q:"1 tbsp"},{n:"sriracha",q:"1 tsp"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"sesame oil",q:"1 tsp"},{n:"cornstarch",q:"1 tbsp"},{n:"rice",q:"for serving"}],steps:["Steam tempeh 10 min. Cube, toss with cornstarch. Pan-fry until crispy.","Stir-fry vegetables 3 min. Add garlic, ginger 30 sec.","Return tempeh with soy sauce, maple syrup, sriracha. Toss. Finish with sesame oil. Serve over rice."]},
{id:428,name:"Ossobuco alla Milanese",time:150,servings:4,diff:"Hard",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/49212213468_beaf6192dd_c.jpg",ing:[{n:"veal shanks",q:"4, cross-cut"},{n:"onion",q:"1"},{n:"carrot",q:"1"},{n:"celery",q:"2 stalks"},{n:"garlic",q:"4 cloves"},{n:"white wine",q:"200ml"},{n:"canned tomatoes",q:"200g"},{n:"beef broth",q:"300ml"},{n:"lemon zest",q:"1 lemon"},{n:"parsley",q:"bunch"},{n:"flour",q:"for dredging"},{n:"butter",q:"40g"},{n:"olive oil",q:"2 tbsp"},{n:"risotto alla Milanese",q:"for serving"}],steps:["Season and flour veal. Brown in butter and oil 4 min per side.","Add vegetables, wine, tomatoes, broth. Cover, braise 160C 2 hours.","Make gremolata: parsley, lemon zest, raw garlic. Serve ossobuco on saffron risotto with gremolata."]},
{id:429,name:"Fish Amok",time:30,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54048834612_5858a4f50a_c.jpg",ing:[{n:"white fish",q:"500g, cubed"},{n:"coconut cream",q:"300ml"},{n:"lemongrass",q:"2 stalks"},{n:"galangal",q:"3 slices"},{n:"kaffir lime leaves",q:"5"},{n:"turmeric",q:"1 tsp"},{n:"fish sauce",q:"2 tbsp"},{n:"palm sugar",q:"1 tsp"},{n:"egg",q:"1"},{n:"Thai basil",q:"fresh"},{n:"red chili",q:"for garnish"},{n:"banana leaves",q:"for steaming"}],steps:["Blend lemongrass, galangal, turmeric, garlic, shallots into kroeung paste. Fry 3 min.","Mix paste with coconut cream, fish sauce, sugar, egg. Fold in fish.","Steam in banana leaf cups 15-20 min until custard-like. Or bake at 180C 20 min. Top with coconut cream, basil, chili."]},
{id:430,name:"Smoked Salmon Bagel",time:10,servings:2,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54750920377_f207c44b22_c.jpg",ing:[{n:"bagels",q:"2, split and toasted"},{n:"smoked salmon",q:"150g"},{n:"cream cheese",q:"80g"},{n:"capers",q:"1 tbsp"},{n:"red onion",q:"1/4, thinly sliced"},{n:"lemon",q:"1/2"},{n:"dill",q:"fresh"},{n:"everything bagel seasoning",q:"optional"}],steps:["Toast bagels. Spread generously with cream cheese.","Layer smoked salmon on top.","Garnish with capers, red onion, dill, lemon squeeze. Add everything seasoning if desired."]},
{id:431,name:"Chicken Satay Noodles",time:20,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/8357/28425411983_1e39e279b7_c.jpg",ing:[{n:"chicken breast",q:"400g, sliced"},{n:"rice noodles",q:"250g"},{n:"peanut butter",q:"3 tbsp"},{n:"soy sauce",q:"2 tbsp"},{n:"coconut milk",q:"100ml"},{n:"lime",q:"1"},{n:"sriracha",q:"1 tsp"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"bell pepper",q:"1"},{n:"bean sprouts",q:"100g"},{n:"cilantro",q:"fresh"},{n:"peanuts",q:"30g, crushed"}],steps:["Cook noodles. Stir-fry chicken with garlic, ginger 4 min. Add bell pepper 2 min.","Make sauce: peanut butter, soy sauce, coconut milk, lime, sriracha.","Toss noodles with chicken and sauce. Top with sprouts, cilantro, crushed peanuts."]},
{id:432,name:"Stuffed Zucchini Boats",time:30,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54620779921_fe96c0695c_c.jpg",ing:[{n:"zucchini",q:"4 large"},{n:"Italian sausage",q:"300g"},{n:"canned tomatoes",q:"200g"},{n:"mozzarella",q:"100g, shredded"},{n:"onion",q:"1/2, diced"},{n:"garlic",q:"2 cloves"},{n:"parmesan",q:"30g"},{n:"basil",q:"fresh"},{n:"olive oil",q:"2 tbsp"}],steps:["Halve zucchini, scoop out centers. Dice scooped flesh.","Brown sausage with onion, garlic, diced zucchini. Add tomatoes. Fill boats.","Top with mozzarella and parmesan. Bake 190C 20 min until golden. Top with basil."]},
{id:433,name:"Ropa Vieja",time:120,servings:6,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54553623324_5c7d63009f_c.jpg",ing:[{n:"flank steak",q:"800g"},{n:"onion",q:"1, sliced"},{n:"bell pepper",q:"2, sliced"},{n:"garlic",q:"6 cloves"},{n:"canned tomatoes",q:"400g"},{n:"tomato paste",q:"2 tbsp"},{n:"cumin",q:"1 tsp"},{n:"oregano",q:"1 tsp"},{n:"bay leaves",q:"2"},{n:"dry white wine",q:"100ml"},{n:"olives",q:"50g"},{n:"capers",q:"1 tbsp"},{n:"rice and beans",q:"for serving"}],steps:["Sear steak on both sides. Place in pot with onion, garlic, tomatoes, paste, wine, spices.","Cover, simmer 2-2.5 hours until meat shreds easily with forks.","Shred meat. Add peppers, olives, capers. Cook 15 min more. Serve with rice and black beans."]},
{id:434,name:"Galette des Rois",time:60,servings:8,diff:"Medium",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54247965697_8e88efcbb2_c.jpg",ing:[{n:"puff pastry",q:"2 sheets"},{n:"almond flour",q:"100g"},{n:"butter",q:"80g, softened"},{n:"sugar",q:"80g"},{n:"eggs",q:"2 plus 1 for wash"},{n:"vanilla extract",q:"1 tsp"},{n:"rum",q:"1 tbsp"},{n:"almond extract",q:"1/2 tsp"}],steps:["Cream butter with sugar. Add eggs one at a time, almond flour, vanilla, rum, almond extract.","Place one pastry circle on tray. Spread frangipane, leaving border. Top with second circle. Seal.","Score decorative pattern. Egg wash. Bake 200C 25-30 min until deeply golden and puffed."]},
{id:435,name:"Bibim Naengmyeon",time:20,servings:2,diff:"Easy",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/52032348892_4a03cfdb44_c.jpg",ing:[{n:"Korean buckwheat noodles",q:"200g"},{n:"gochujang",q:"3 tbsp"},{n:"rice vinegar",q:"2 tbsp"},{n:"sugar",q:"1 tbsp"},{n:"sesame oil",q:"1 tbsp"},{n:"Asian pear",q:"1/2, sliced"},{n:"cucumber",q:"1, julienned"},{n:"hard-boiled egg",q:"2"},{n:"kimchi",q:"100g"},{n:"beef brisket",q:"100g, sliced"},{n:"sesame seeds",q:"1 tbsp"},{n:"ice",q:"for serving"}],steps:["Cook noodles. Rinse in ice water until very cold.","Mix sauce: gochujang, vinegar, sugar, sesame oil.","Toss noodles with sauce. Top with pear, cucumber, egg, kimchi, beef, sesame seeds. Add ice cubes for extra chill."]},
{id:436,name:"Prawn Linguine",time:20,servings:4,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54563596972_02cf4b4045_c.jpg",ing:[{n:"linguine",q:"400g"},{n:"large prawns",q:"400g"},{n:"garlic",q:"5 cloves, sliced"},{n:"white wine",q:"100ml"},{n:"cherry tomatoes",q:"200g, halved"},{n:"chili flakes",q:"1/2 tsp"},{n:"butter",q:"30g"},{n:"olive oil",q:"2 tbsp"},{n:"parsley",q:"fresh"},{n:"lemon",q:"1"}],steps:["Cook linguine. Sauté garlic and chili in oil 1 min. Cook prawns 2 min per side.","Add wine and tomatoes. Simmer 3 min. Add butter.","Toss with linguine and pasta water. Garnish with parsley and lemon."]},
{id:437,name:"Chicken Tenders",time:20,servings:4,diff:"Easy",tags:["high-protein","nut-free"],img:"https://live.staticflickr.com/65535/55149976424_2664530121_c.jpg",ing:[{n:"chicken breast",q:"500g, cut into strips"},{n:"buttermilk",q:"200ml"},{n:"flour",q:"120g"},{n:"cornstarch",q:"40g"},{n:"garlic powder",q:"1 tsp"},{n:"paprika",q:"1 tsp"},{n:"cayenne",q:"1/4 tsp"},{n:"salt",q:"1 tsp"},{n:"vegetable oil",q:"for frying"},{n:"honey mustard",q:"for dipping"}],steps:["Marinate chicken in buttermilk 30 min. Mix flour, cornstarch, spices.","Coat chicken strips in seasoned flour. Let rest 5 min on rack.","Fry at 180C 4-5 min per side until golden. Serve with honey mustard."]},
{id:438,name:"Caponata",time:30,servings:6,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/54612706709_285f6f3ec8_c.jpg",ing:[{n:"eggplant",q:"2, cubed"},{n:"celery",q:"2 stalks, diced"},{n:"onion",q:"1, diced"},{n:"canned tomatoes",q:"400g"},{n:"capers",q:"2 tbsp"},{n:"green olives",q:"60g"},{n:"red wine vinegar",q:"3 tbsp"},{n:"sugar",q:"2 tbsp"},{n:"pine nuts",q:"30g, toasted"},{n:"basil",q:"fresh"},{n:"olive oil",q:"60ml"}],steps:["Fry eggplant in oil until golden. Drain. Sauté onion and celery 5 min.","Add tomatoes, simmer 10 min. Add eggplant, capers, olives, vinegar, sugar.","Cook 5 min more. Serve at room temperature with pine nuts and basil. Great on crostini."]},
{id:439,name:"Grilled Chicken Caesar Wrap",time:10,servings:2,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/51315607911_ea1b03248c_c.jpg",ing:[{n:"grilled chicken",q:"250g, sliced"},{n:"flour tortillas",q:"2 large"},{n:"romaine lettuce",q:"4 leaves"},{n:"parmesan",q:"30g, shaved"},{n:"Caesar dressing",q:"3 tbsp"},{n:"croutons",q:"handful, crushed"},{n:"black pepper",q:"to taste"}],steps:["Toss lettuce with dressing and parmesan.","Lay tortillas, add lettuce, chicken, croutons.","Roll tightly into wraps. Cut diagonally."]},
{id:440,name:"Mussels Marinara",time:20,servings:4,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/53012984910_1e4cb45ca8_c.jpg",ing:[{n:"mussels",q:"1.5kg, cleaned"},{n:"canned tomatoes",q:"400g"},{n:"garlic",q:"6 cloves, sliced"},{n:"white wine",q:"150ml"},{n:"red pepper flakes",q:"1/2 tsp"},{n:"parsley",q:"large bunch"},{n:"olive oil",q:"3 tbsp"},{n:"crusty bread",q:"for serving"}],steps:["Sauté garlic and pepper flakes in oil 1 min. Add tomatoes, wine. Simmer 5 min.","Add mussels. Cover, cook 5-7 min until all opened. Discard any unopened.","Shower with parsley. Serve with crusty bread to soak up the broth."]},
{id:441,name:"Gado Gado",time:25,servings:4,diff:"Medium",tags:["vegan","vegetarian","dairy-free","gluten-free"],img:"https://live.staticflickr.com/65535/55145497715_a38b7535c9_c.jpg",ing:[{n:"tofu",q:"200g, fried"},{n:"cabbage",q:"100g, blanched"},{n:"bean sprouts",q:"100g"},{n:"green beans",q:"100g, blanched"},{n:"hard-boiled eggs",q:"2"},{n:"cucumber",q:"1"},{n:"tempeh",q:"100g, fried"},{n:"peanut butter",q:"4 tbsp"},{n:"coconut milk",q:"100ml"},{n:"lime",q:"1"},{n:"kecap manis",q:"2 tbsp"},{n:"chili",q:"1"},{n:"garlic",q:"2 cloves"},{n:"prawn crackers",q:"for serving"}],steps:["Prepare all vegetables and proteins. Fry tofu and tempeh until crispy.","Make peanut sauce: blend peanut butter, coconut milk, lime, kecap manis, chili, garlic, water.","Arrange vegetables, tofu, tempeh, egg on plate. Pour peanut sauce over. Serve with prawn crackers."]},
{id:442,name:"Lamb Pide",time:45,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54059821522_ca9ab90f0d_c.jpg",ing:[{n:"ground lamb",q:"300g"},{n:"onion",q:"1, diced"},{n:"garlic",q:"3 cloves"},{n:"tomato",q:"2, diced"},{n:"green pepper",q:"1, diced"},{n:"cumin",q:"1 tsp"},{n:"Aleppo pepper",q:"1 tsp"},{n:"parsley",q:"fresh"},{n:"bread dough",q:"400g"},{n:"egg",q:"1"},{n:"kashar cheese",q:"100g, shredded"},{n:"butter",q:"for brushing"}],steps:["Cook lamb with onion, garlic, peppers, spices 8 min. Add tomatoes, parsley.","Roll dough into oval boats. Fill with lamb mixture and cheese. Pinch ends.","Bake 220C 12-15 min. Crack egg into center last 3 min. Brush crust with butter."]},
{id:443,name:"Lemon Garlic Chicken Thighs",time:25,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/54528272612_2bda6bf894_c.jpg",ing:[{n:"chicken thighs",q:"8, bone-in"},{n:"lemon",q:"2"},{n:"garlic",q:"8 cloves, crushed"},{n:"olive oil",q:"3 tbsp"},{n:"oregano",q:"1 tbsp"},{n:"salt and pepper",q:"to taste"},{n:"roasted vegetables",q:"for serving"}],steps:["Score chicken. Rub with lemon juice, garlic, oregano, oil, salt, pepper.","Sear skin-side down 6-7 min until very crispy. Flip, add garlic cloves to pan.","Cook 6 more min. Squeeze remaining lemon over. Serve with roasted vegetables."]},
{id:444,name:"Classic Ratatouille",time:40,servings:4,diff:"Medium",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/54521941429_7e3584f72f_c.jpg",ing:[{n:"eggplant",q:"1"},{n:"zucchini",q:"2"},{n:"bell pepper",q:"2"},{n:"tomato",q:"4"},{n:"onion",q:"1"},{n:"garlic",q:"4 cloves"},{n:"canned tomatoes",q:"200g"},{n:"herbes de Provence",q:"2 tsp"},{n:"olive oil",q:"4 tbsp"},{n:"basil",q:"fresh"}],steps:["Slice all vegetables 3mm thin. Make piperade base with onion, garlic, canned tomatoes.","Arrange alternating vegetable slices in spiral over base.","Drizzle oil, herbs. Bake covered 200C 40 min. Uncover 15 min. Top with basil."]},
{id:445,name:"Panang Curry",time:25,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/53697114760_d0a2407bdf_c.jpg",ing:[{n:"chicken thighs",q:"500g, sliced"},{n:"coconut milk",q:"400ml"},{n:"panang curry paste",q:"3 tbsp"},{n:"kaffir lime leaves",q:"5, shredded"},{n:"fish sauce",q:"2 tbsp"},{n:"palm sugar",q:"1 tbsp"},{n:"Thai basil",q:"handful"},{n:"peanuts",q:"30g, crushed"},{n:"red chili",q:"1, sliced"},{n:"rice",q:"for serving"}],steps:["Fry curry paste in coconut cream 2 min. Add chicken, cook 3 min.","Add remaining coconut milk, lime leaves, fish sauce, sugar. Simmer 12-15 min.","Top with basil, crushed peanuts, sliced chili. Serve with jasmine rice."]},
{id:446,name:"Green Goddess Salad",time:15,servings:2,diff:"Easy",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/65535/54866656898_2ec7e245d4_c.jpg",ing:[{n:"mixed greens",q:"200g"},{n:"cucumber",q:"1, diced"},{n:"avocado",q:"1"},{n:"green onion",q:"3"},{n:"basil",q:"large bunch"},{n:"chives",q:"2 tbsp"},{n:"lemon",q:"1"},{n:"olive oil",q:"3 tbsp"},{n:"Greek yogurt",q:"60g"},{n:"garlic",q:"1 clove"},{n:"salt and pepper",q:"to taste"},{n:"sunflower seeds",q:"2 tbsp"}],steps:["Make dressing: blend avocado half, basil, chives, yogurt, lemon, garlic, oil.","Arrange greens, diced cucumber, sliced avocado in bowls.","Drizzle green goddess dressing. Top with sunflower seeds."]},
{id:447,name:"Sticky Ginger Chicken",time:25,servings:4,diff:"Easy",tags:["dairy-free","high-protein"],img:U+"1673238114766-f84c88e44598?w=600&h=400&fit=crop",ing:[{n:"chicken thighs",q:"600g, boneless"},{n:"ginger",q:"3 tbsp, grated"},{n:"soy sauce",q:"3 tbsp"},{n:"honey",q:"3 tbsp"},{n:"rice vinegar",q:"1 tbsp"},{n:"garlic",q:"4 cloves"},{n:"sesame oil",q:"1 tsp"},{n:"cornstarch",q:"1 tbsp"},{n:"green onion",q:"3"},{n:"sesame seeds",q:"1 tbsp"},{n:"rice",q:"for serving"}],steps:["Sear chicken 4-5 min per side until golden. Remove, slice.","Mix soy, honey, ginger, garlic, vinegar, sesame oil, cornstarch.","Pour sauce into pan, simmer until thick. Return chicken, toss. Serve over rice with green onion, sesame seeds."]},
{id:448,name:"Tabbouleh",time:15,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","nut-free"],img:"https://live.staticflickr.com/65535/54998807089_cc09c45f3d_c.jpg",ing:[{n:"bulgur wheat",q:"100g"},{n:"parsley",q:"2 large bunches, finely chopped"},{n:"mint",q:"1/2 bunch, chopped"},{n:"tomato",q:"3, finely diced"},{n:"cucumber",q:"1, finely diced"},{n:"green onion",q:"4, sliced"},{n:"lemon juice",q:"80ml"},{n:"olive oil",q:"60ml"},{n:"salt and pepper",q:"to taste"}],steps:["Pour boiling water over bulgur, cover 15 min. Drain, cool.","Chop parsley and mint very finely (parsley is the star, not the bulgur).","Combine everything. Dress generously with lemon juice and olive oil. Season well."]},
{id:449,name:"Chicken Supreme with Mushroom Sauce",time:30,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54531994525_2d407556ac_c.jpg",ing:[{n:"chicken supreme",q:"4 (breast with wing bone)"},{n:"mushrooms",q:"250g, sliced"},{n:"shallot",q:"2, diced"},{n:"garlic",q:"2 cloves"},{n:"white wine",q:"100ml"},{n:"heavy cream",q:"150ml"},{n:"chicken broth",q:"100ml"},{n:"thyme",q:"fresh"},{n:"butter",q:"30g"},{n:"olive oil",q:"1 tbsp"},{n:"Dijon mustard",q:"1 tsp"}],steps:["Season chicken. Sear skin-side down 6-7 min until crispy. Flip, cook 5 min. Rest.","Sauté mushrooms and shallot in same pan 5 min. Add garlic, wine.","Add broth, reduce. Stir in cream, mustard, thyme. Spoon sauce over chicken."]},
{id:450,name:"Kimchi Fried Rice",time:15,servings:2,diff:"Easy",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/53954110373_df8c95791a_c.jpg",ing:[{n:"cooked rice",q:"400g, day-old"},{n:"aged kimchi",q:"200g, chopped"},{n:"pork belly or bacon",q:"100g, diced"},{n:"gochujang",q:"1 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"soy sauce",q:"1 tbsp"},{n:"egg",q:"2, fried"},{n:"green onion",q:"2"},{n:"sesame seeds",q:"1 tbsp"},{n:"nori",q:"shredded"}],steps:["Fry pork until crispy. Add chopped kimchi, stir-fry 3 min.","Add rice, gochujang, soy sauce. Toss over high heat 3 min.","Finish with sesame oil. Top with fried egg, green onion, sesame seeds, nori."]},
{id:451,name:"Italian Sausage & Peppers",time:25,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/53508161234_fe36c783c0_c.jpg",ing:[{n:"Italian sausage links",q:"6"},{n:"bell peppers",q:"3, sliced"},{n:"onion",q:"2, sliced"},{n:"garlic",q:"4 cloves"},{n:"canned tomatoes",q:"400g"},{n:"oregano",q:"1 tsp"},{n:"basil",q:"fresh"},{n:"olive oil",q:"2 tbsp"},{n:"hoagie rolls",q:"for serving"}],steps:["Brown sausages in oil. Remove. Sauté peppers and onion 8 min. Add garlic.","Add tomatoes, oregano. Return sausages. Simmer 15 min.","Serve in rolls with peppers and sauce, or with polenta."]},
{id:452,name:"Miso Eggplant",time:20,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free"],img:"https://live.staticflickr.com/65535/54557457749_4713d60be3_c.jpg",ing:[{n:"Japanese eggplant",q:"4, halved"},{n:"white miso paste",q:"3 tbsp"},{n:"mirin",q:"2 tbsp"},{n:"sake",q:"1 tbsp"},{n:"sugar",q:"1 tbsp"},{n:"sesame oil",q:"1 tbsp"},{n:"sesame seeds",q:"1 tbsp"},{n:"green onion",q:"2"},{n:"rice",q:"for serving"}],steps:["Score eggplant flesh in crosshatch. Brush with oil. Broil 8-10 min until soft.","Mix miso, mirin, sake, sugar, sesame oil.","Spread miso glaze on eggplant. Broil 3-4 min until caramelized. Top with sesame seeds and green onion."]},
{id:453,name:"Beef Barbacoa",time:120,servings:6,diff:"Medium",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/54058950159_99f4f92f78_c.jpg",ing:[{n:"beef cheeks or chuck",q:"1kg"},{n:"dried ancho chilies",q:"3"},{n:"dried guajillo chilies",q:"3"},{n:"chipotle in adobo",q:"2"},{n:"garlic",q:"6 cloves"},{n:"cumin",q:"1 tsp"},{n:"oregano",q:"1 tsp"},{n:"cloves",q:"2"},{n:"apple cider vinegar",q:"2 tbsp"},{n:"beef broth",q:"200ml"},{n:"lime",q:"for serving"},{n:"tortillas",q:"for serving"},{n:"onion",q:"for serving"},{n:"cilantro",q:"for serving"}],steps:["Toast and rehydrate chilies. Blend with chipotles, garlic, spices, vinegar.","Coat beef in sauce. Add broth. Cover, braise at 160C 3 hours until fork-tender.","Shred beef. Serve in tortillas with onion, cilantro, lime, salsa."]},
{id:454,name:"French Toast Casserole",time:50,servings:8,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54951264859_52ba696f53_c.jpg",ing:[{n:"brioche or challah",q:"500g, cubed"},{n:"eggs",q:"6"},{n:"milk",q:"300ml"},{n:"heavy cream",q:"100ml"},{n:"vanilla",q:"2 tsp"},{n:"cinnamon",q:"1 tsp"},{n:"brown sugar",q:"60g"},{n:"butter",q:"40g"},{n:"maple syrup",q:"for serving"},{n:"powdered sugar",q:"for dusting"},{n:"berries",q:"for serving"}],steps:["Arrange bread cubes in buttered baking dish. Whisk eggs, milk, cream, vanilla, cinnamon.","Pour custard over bread. Press down to absorb. Sprinkle brown sugar and dot with butter.","Bake 180C 40-45 min until golden and puffed. Dust with powdered sugar, serve with syrup and berries."]},
{id:455,name:"Sweet and Sour Pork",time:25,servings:4,diff:"Medium",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/54865561507_c7d76cabd1_c.jpg",ing:[{n:"pork loin",q:"500g, cubed"},{n:"pineapple",q:"150g, chunks"},{n:"bell pepper",q:"2, chunked"},{n:"onion",q:"1, chunked"},{n:"ketchup",q:"3 tbsp"},{n:"rice vinegar",q:"3 tbsp"},{n:"sugar",q:"3 tbsp"},{n:"soy sauce",q:"1 tbsp"},{n:"cornstarch",q:"60g"},{n:"egg",q:"1"},{n:"vegetable oil",q:"for frying"},{n:"rice",q:"for serving"}],steps:["Coat pork in cornstarch and egg. Deep fry until golden and crispy.","Make sauce: ketchup, vinegar, sugar, soy sauce. Simmer. Add pineapple, pepper, onion 2 min.","Toss crispy pork in sauce. Serve immediately over rice."]},
{id:456,name:"Shakshuka with Potatoes",time:30,servings:4,diff:"Easy",tags:["vegetarian","gluten-free","nut-free"],img:U+"1641898378503-327316fdde77?w=600&h=400&fit=crop",ing:[{n:"eggs",q:"6"},{n:"potatoes",q:"2, cubed small"},{n:"canned tomatoes",q:"800g"},{n:"onion",q:"1"},{n:"bell pepper",q:"1"},{n:"garlic",q:"3 cloves"},{n:"cumin",q:"1 tsp"},{n:"paprika",q:"1 tsp"},{n:"feta",q:"50g"},{n:"cilantro",q:"fresh"},{n:"olive oil",q:"3 tbsp"}],steps:["Par-cook cubed potatoes in oil 8 min until golden. Add onion, pepper, garlic, spices.","Add tomatoes. Simmer 8 min.","Make wells, crack eggs. Cover 5-8 min. Top with feta and cilantro."]},
{id:457,name:"Spicy Tuna Roll Bowl",time:15,servings:2,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/5167/5359121006_0b082f5cec_c.jpg",ing:[{n:"sushi-grade tuna",q:"300g, diced"},{n:"sushi rice",q:"250g"},{n:"sriracha",q:"1 tbsp"},{n:"mayonnaise",q:"2 tbsp"},{n:"soy sauce",q:"2 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"avocado",q:"1"},{n:"cucumber",q:"1"},{n:"nori",q:"shredded"},{n:"sesame seeds",q:"1 tbsp"},{n:"green onion",q:"2"}],steps:["Season rice with vinegar. Mix tuna with sriracha mayo, soy sauce, sesame oil.","Build bowls: rice, spicy tuna, sliced avocado, cucumber.","Top with shredded nori, sesame seeds, green onion."]},
{id:458,name:"Tuscan Ribollita",time:40,servings:6,diff:"Easy",tags:["vegan","vegetarian","dairy-free","nut-free"],img:"https://live.staticflickr.com/7849/46608554234_2cca72c572_c.jpg",ing:[{n:"cannellini beans",q:"2 cans"},{n:"cavolo nero",q:"200g"},{n:"stale bread",q:"200g, cubed"},{n:"onion",q:"1"},{n:"carrot",q:"1"},{n:"celery",q:"2 stalks"},{n:"canned tomatoes",q:"400g"},{n:"vegetable broth",q:"750ml"},{n:"garlic",q:"4 cloves"},{n:"rosemary",q:"1 sprig"},{n:"parmesan rind",q:"1"},{n:"olive oil",q:"4 tbsp"}],steps:["Sauté onion, carrot, celery 5 min. Add garlic, rosemary.","Add tomatoes, broth, beans, parmesan rind. Simmer 20 min. Add cavolo nero 5 min.","Stir in bread cubes, let absorb 5 min. Drizzle generously with olive oil."]},
{id:459,name:"Chicken Saltimbocca",time:20,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/53467421284_ca726551cc_c.jpg",ing:[{n:"chicken breast",q:"4, pounded thin"},{n:"prosciutto",q:"8 slices"},{n:"sage",q:"12 leaves"},{n:"flour",q:"40g"},{n:"white wine",q:"100ml"},{n:"chicken broth",q:"100ml"},{n:"butter",q:"40g"},{n:"olive oil",q:"1 tbsp"},{n:"lemon juice",q:"1 tbsp"}],steps:["Top each chicken with sage leaves and prosciutto. Secure with toothpick. Dust with flour.","Sear prosciutto-side down 3 min. Flip, cook 3 min. Remove.","Deglaze with wine and broth. Reduce by half. Swirl in butter and lemon. Spoon over chicken."]},
{id:460,name:"Maple Glazed Carrots",time:15,servings:4,diff:"Easy",tags:["vegetarian","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/55154485120_acd8d8c519_c.jpg",ing:[{n:"carrots",q:"500g, peeled"},{n:"butter",q:"30g"},{n:"maple syrup",q:"2 tbsp"},{n:"thyme",q:"fresh"},{n:"salt and pepper",q:"to taste"},{n:"orange zest",q:"1 orange"}],steps:["Cut carrots on diagonal. Simmer in salted water 8 min until just tender. Drain.","Melt butter, add maple syrup, thyme. Add carrots, toss to coat.","Cook 3-4 min until glazed. Season. Top with orange zest."]},
{id:461,name:"Fish Pie",time:45,servings:6,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55126154266_53a33bd5aa_c.jpg",ing:[{n:"mixed fish",q:"600g (salmon, cod, smoked haddock)"},{n:"prawns",q:"200g"},{n:"potatoes",q:"800g"},{n:"milk",q:"400ml"},{n:"butter",q:"60g"},{n:"flour",q:"30g"},{n:"onion",q:"1"},{n:"bay leaf",q:"1"},{n:"peas",q:"100g"},{n:"dill",q:"fresh"},{n:"cheddar",q:"50g, grated"}],steps:["Poach fish in milk with bay leaf 5 min. Flake fish, reserve milk.","Make sauce: butter, flour, reserved milk until thick. Add peas, dill, fish, prawns.","Mash potatoes with butter. Top fish in baking dish with mash and cheese. Bake 200C 25 min."]},
{id:462,name:"Spicy Pork Ramen",time:30,servings:2,diff:"Medium",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/54415220899_2649e24a04_c.jpg",ing:[{n:"ramen noodles",q:"200g"},{n:"ground pork",q:"200g"},{n:"chicken broth",q:"500ml"},{n:"miso paste",q:"2 tbsp"},{n:"gochujang",q:"1 tbsp"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"soy sauce",q:"1 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"soft-boiled egg",q:"2"},{n:"corn",q:"from 1 ear"},{n:"green onion",q:"2"},{n:"nori",q:"for serving"}],steps:["Stir-fry pork with garlic, ginger until crispy. Char corn.","Heat broth, whisk in miso and gochujang. Add soy sauce.","Cook noodles. Assemble: noodles, spicy broth, pork, corn, egg, green onion, nori."]},
{id:463,name:"Lamb Souvlaki Plate",time:25,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/52387469314_14e447db34_c.jpg",ing:[{n:"lamb leg",q:"600g, cubed"},{n:"lemon",q:"2"},{n:"garlic",q:"4 cloves"},{n:"oregano",q:"2 tbsp"},{n:"olive oil",q:"4 tbsp"},{n:"pita bread",q:"4"},{n:"tzatziki",q:"200g"},{n:"tomato",q:"2"},{n:"red onion",q:"1/2"},{n:"lettuce",q:"shredded"},{n:"French fries",q:"for serving"}],steps:["Marinate lamb in lemon, garlic, oregano, oil 2+ hours. Thread on skewers.","Grill 10-12 min, turning. Rest 5 min.","Serve with pita, tzatziki, tomato, onion, lettuce, and fries."]},
{id:464,name:"Banana Pancakes",time:15,servings:4,diff:"Easy",tags:["vegetarian","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/55057352235_7e30612bbb_c.jpg",ing:[{n:"ripe bananas",q:"2"},{n:"eggs",q:"2"},{n:"cinnamon",q:"1/2 tsp"},{n:"vanilla extract",q:"1/2 tsp"},{n:"butter",q:"for cooking"},{n:"maple syrup",q:"for serving"},{n:"berries",q:"for serving"},{n:"nut butter",q:"optional"}],steps:["Mash bananas. Whisk in eggs, cinnamon, vanilla.","Cook small pancakes in butter 2-3 min per side until golden (they're delicate).","Stack and serve with maple syrup, berries, and nut butter if desired."]},
{id:465,name:"Moqueca",time:30,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55135336252_4e19fd4d5a_c.jpg",ing:[{n:"white fish",q:"500g, cubed"},{n:"shrimp",q:"200g"},{n:"coconut milk",q:"400ml"},{n:"palm oil",q:"3 tbsp"},{n:"onion",q:"1"},{n:"bell pepper",q:"2"},{n:"garlic",q:"4 cloves"},{n:"tomato",q:"3, diced"},{n:"lime",q:"2"},{n:"cilantro",q:"bunch"},{n:"chili pepper",q:"1"},{n:"rice",q:"for serving"}],steps:["Marinate fish and shrimp in lime juice 15 min. Sauté onion, pepper, garlic in palm oil.","Add tomatoes, coconut milk, chili. Simmer 10 min.","Add fish 5 min, then shrimp 3 min. Garnish with cilantro. Serve with rice."]},
{id:466,name:"Shakshuka Verde with Zucchini",time:25,servings:3,diff:"Easy",tags:["vegetarian","gluten-free","nut-free"],img:U+"1726996656165-7dcda461d9b2?w=600&h=400&fit=crop",ing:[{n:"eggs",q:"6"},{n:"zucchini",q:"2, diced"},{n:"tomatillos",q:"300g"},{n:"jalapeno",q:"2"},{n:"garlic",q:"3 cloves"},{n:"spinach",q:"100g"},{n:"feta",q:"50g"},{n:"cilantro",q:"fresh"},{n:"cumin",q:"1 tsp"},{n:"olive oil",q:"2 tbsp"},{n:"tortillas",q:"for serving"}],steps:["Roast tomatillos, jalapenos. Blend with garlic. Sauté zucchini 3 min, add sauce and spinach.","Simmer 5 min. Make wells, crack eggs.","Cover 5-8 min. Top with feta and cilantro. Serve with warm tortillas."]},
{id:467,name:"Thai Green Papaya Salad",time:15,servings:4,diff:"Easy",tags:["dairy-free","gluten-free"],img:U+"1637184170418-e71f34f3e164?w=600&h=400&fit=crop",ing:[{n:"green papaya",q:"300g, shredded"},{n:"cherry tomatoes",q:"8, halved"},{n:"green beans",q:"50g, cut"},{n:"garlic",q:"2 cloves"},{n:"Thai chili",q:"2"},{n:"dried shrimp",q:"1 tbsp"},{n:"peanuts",q:"30g"},{n:"fish sauce",q:"2 tbsp"},{n:"lime juice",q:"3 tbsp"},{n:"palm sugar",q:"1 tbsp"}],steps:["Pound garlic and chili in mortar. Add green beans and tomatoes, bruise lightly.","Add papaya, dried shrimp, peanuts.","Dress with fish sauce, lime juice, sugar. Pound and toss to combine."]},
{id:468,name:"Chicken Francese",time:20,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54025336011_93109ddf5d_c.jpg",ing:[{n:"chicken breast",q:"4, pounded thin"},{n:"eggs",q:"3, beaten"},{n:"flour",q:"60g"},{n:"butter",q:"40g"},{n:"olive oil",q:"2 tbsp"},{n:"lemon",q:"2"},{n:"white wine",q:"100ml"},{n:"chicken broth",q:"100ml"},{n:"parsley",q:"fresh"},{n:"capers",q:"1 tbsp"}],steps:["Season chicken, dredge in flour, dip in beaten egg. Fry in butter and oil 3 min per side.","Remove chicken. Add wine, broth, lemon juice to pan. Simmer 3 min. Add capers.","Return chicken. Spoon sauce over. Garnish with parsley."]},
{id:469,name:"Moroccan Couscous with Vegetables",time:30,servings:6,diff:"Easy",tags:["vegan","vegetarian","dairy-free","nut-free"],img:"https://live.staticflickr.com/65535/53523809387_06ef68277c_c.jpg",ing:[{n:"couscous",q:"300g"},{n:"onion",q:"1"},{n:"carrot",q:"2"},{n:"zucchini",q:"1"},{n:"chickpeas",q:"1 can"},{n:"canned tomatoes",q:"200g"},{n:"cumin",q:"2 tsp"},{n:"cinnamon",q:"1/2 tsp"},{n:"turmeric",q:"1/2 tsp"},{n:"raisins",q:"40g"},{n:"vegetable broth",q:"400ml"},{n:"cilantro",q:"fresh"},{n:"harissa",q:"for serving"}],steps:["Sauté onion 5 min. Add spices, carrot, zucchini, chickpeas, tomatoes, broth. Simmer 15 min.","Add raisins last 5 min. Steam couscous with boiling broth.","Fluff couscous, serve topped with vegetable stew, cilantro, and harissa."]},
{id:470,name:"Beef Taco Bowl",time:20,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54578650249_87e5fddeb6_c.jpg",ing:[{n:"ground beef",q:"500g"},{n:"rice",q:"250g"},{n:"black beans",q:"1 can"},{n:"corn",q:"1 can"},{n:"avocado",q:"1"},{n:"cherry tomatoes",q:"100g"},{n:"romaine lettuce",q:"shredded"},{n:"cheddar",q:"100g, shredded"},{n:"lime",q:"2"},{n:"taco seasoning",q:"2 tbsp"},{n:"sour cream",q:"for serving"},{n:"salsa",q:"for serving"}],steps:["Brown beef with taco seasoning and splash of water. Simmer 5 min.","Cook cilantro-lime rice. Warm beans.","Assemble bowls: rice, beef, beans, corn, lettuce, tomatoes, avocado, cheese, sour cream, salsa, lime."]},
{id:471,name:"Lemon Tart",time:45,servings:8,diff:"Medium",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/55141502729_a97934b04b_c.jpg",ing:[{n:"shortcrust pastry",q:"1"},{n:"lemons",q:"4, juiced and zested"},{n:"eggs",q:"4"},{n:"sugar",q:"200g"},{n:"heavy cream",q:"150ml"},{n:"butter",q:"30g"},{n:"powdered sugar",q:"for dusting"}],steps:["Blind bake pastry 15 min with weights, 5 min without.","Whisk eggs, sugar, lemon juice, zest, cream. Strain.","Pour into shell. Bake 150C 30-35 min until just set (slight wobble). Cool completely. Dust with sugar."]},
{id:472,name:"Lamb Burgers",time:20,servings:4,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/537/18808472742_a65aab92da_c.jpg",ing:[{n:"ground lamb",q:"500g"},{n:"feta cheese",q:"60g, crumbled"},{n:"mint",q:"2 tbsp, chopped"},{n:"cumin",q:"1 tsp"},{n:"garlic",q:"2 cloves, minced"},{n:"brioche buns",q:"4"},{n:"tzatziki",q:"for serving"},{n:"tomato",q:"1, sliced"},{n:"red onion",q:"sliced"},{n:"arugula",q:"handful"}],steps:["Mix lamb with feta, mint, cumin, garlic, salt, pepper. Form 4 patties.","Grill 4-5 min per side for medium. Toast buns.","Assemble: bun, arugula, patty, tomato, onion, tzatziki."]},
{id:473,name:"Miso Butter Mushrooms",time:15,servings:4,diff:"Easy",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/4876/39733459083_6065e40247_c.jpg",ing:[{n:"mixed mushrooms",q:"500g"},{n:"white miso paste",q:"2 tbsp"},{n:"butter",q:"40g"},{n:"garlic",q:"3 cloves"},{n:"soy sauce",q:"1 tbsp"},{n:"mirin",q:"1 tbsp"},{n:"thyme",q:"fresh"},{n:"rice",q:"for serving"},{n:"green onion",q:"2"}],steps:["Sauté mushrooms in butter over high heat 6-8 min until golden.","Add garlic, thyme 1 min. Mix miso with mirin, add to pan with soy sauce.","Toss until glazed. Serve over rice with green onion."]},
{id:474,name:"Fish Cakes",time:25,servings:8,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55111744565_da9a8b5c82_c.jpg",ing:[{n:"white fish",q:"400g"},{n:"potatoes",q:"300g, boiled and mashed"},{n:"green onion",q:"3"},{n:"dill",q:"2 tbsp"},{n:"lemon zest",q:"1 lemon"},{n:"egg",q:"1"},{n:"breadcrumbs",q:"80g"},{n:"flour",q:"40g"},{n:"butter",q:"30g"},{n:"salt and pepper",q:"to taste"},{n:"tartare sauce",q:"for serving"}],steps:["Poach fish, flake. Mix with mashed potato, green onion, dill, lemon zest, seasoning.","Form into 8 patties. Coat in flour, egg, breadcrumbs.","Fry in butter 3-4 min per side until golden. Serve with tartare sauce and lemon."]},
{id:475,name:"Vietnamese Lemongrass Chicken",time:25,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/52735829249_00c64f7d69_c.jpg",ing:[{n:"chicken thighs",q:"600g, boneless"},{n:"lemongrass",q:"3 stalks, minced"},{n:"garlic",q:"4 cloves"},{n:"fish sauce",q:"3 tbsp"},{n:"sugar",q:"2 tbsp"},{n:"chili",q:"2, minced"},{n:"green onion",q:"3"},{n:"vegetable oil",q:"2 tbsp"},{n:"rice",q:"for serving"},{n:"Vietnamese herbs",q:"for serving"}],steps:["Mince lemongrass finely. Mix with garlic, fish sauce, sugar, chili. Marinate chicken 30 min.","Grill or pan-fry chicken 5-6 min per side until charred and cooked through.","Slice. Serve over rice with fresh herbs and green onion."]},
{id:476,name:"Croissant Ham & Cheese",time:10,servings:2,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54955426145_67d080501d_c.jpg",ing:[{n:"croissants",q:"2, split"},{n:"ham",q:"4 slices"},{n:"gruyere",q:"80g, sliced"},{n:"Dijon mustard",q:"1 tsp"},{n:"honey",q:"1 tsp"},{n:"butter",q:"for cooking"}],steps:["Split croissants. Spread with Dijon mixed with honey.","Fill with ham and gruyere.","Press in hot pan 2-3 min per side until golden and cheese melts. Serve warm."]},
{id:477,name:"Pasta Fagioli",time:30,servings:6,diff:"Easy",tags:["dairy-free","nut-free"],img:U+"1610657400673-7fc8941f403f?w=600&h=400&fit=crop",ing:[{n:"cannellini beans",q:"2 cans"},{n:"ditalini",q:"150g"},{n:"pancetta",q:"100g"},{n:"onion",q:"1"},{n:"carrot",q:"1"},{n:"celery",q:"1 stalk"},{n:"garlic",q:"3 cloves"},{n:"canned tomatoes",q:"400g"},{n:"chicken broth",q:"750ml"},{n:"rosemary",q:"1 sprig"},{n:"parmesan rind",q:"1"},{n:"olive oil",q:"3 tbsp"}],steps:["Cook pancetta. Add onion, carrot, celery 5 min. Add garlic, rosemary.","Add tomatoes, broth, beans, parmesan rind. Simmer 15 min.","Add pasta, cook until tender. Drizzle olive oil and parmesan to serve."]},
{id:478,name:"Korean Chicken Stew",time:40,servings:4,diff:"Medium",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/7304/27659566470_e000e7dbe5_c.jpg",ing:[{n:"chicken pieces",q:"1kg"},{n:"potato",q:"2, cubed"},{n:"carrot",q:"1, chunked"},{n:"onion",q:"1, quartered"},{n:"zucchini",q:"1, chunked"},{n:"gochugaru",q:"2 tbsp"},{n:"gochujang",q:"2 tbsp"},{n:"soy sauce",q:"3 tbsp"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"1 inch"},{n:"rice cakes",q:"100g"},{n:"green onion",q:"3"},{n:"rice",q:"for serving"}],steps:["Mix gochugaru, gochujang, soy sauce, garlic, ginger for sauce.","Place chicken, potato, carrot, onion in pot. Add sauce and 400ml water. Simmer 25 min.","Add zucchini and rice cakes. Cook 10 min more. Serve over rice with green onion."]},
{id:479,name:"Croissant Pudding",time:45,servings:6,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54612721418_aa0bfe13a2_c.jpg",ing:[{n:"croissants",q:"4, day-old, torn"},{n:"eggs",q:"4"},{n:"milk",q:"300ml"},{n:"heavy cream",q:"100ml"},{n:"sugar",q:"80g"},{n:"vanilla",q:"2 tsp"},{n:"cinnamon",q:"1/2 tsp"},{n:"butter",q:"for greasing"},{n:"chocolate chips",q:"60g"},{n:"powdered sugar",q:"for dusting"}],steps:["Arrange torn croissants in buttered baking dish. Scatter chocolate chips.","Whisk eggs, milk, cream, sugar, vanilla, cinnamon. Pour over croissants. Press to absorb. Rest 15 min.","Bake 180C 35-40 min until golden and puffed. Dust with powdered sugar."]},
{id:480,name:"Harira",time:40,servings:6,diff:"Easy",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/54997319014_26d00ac05c_c.jpg",ing:[{n:"lamb shoulder",q:"300g, cubed"},{n:"chickpeas",q:"1 can"},{n:"lentils",q:"100g"},{n:"canned tomatoes",q:"400g"},{n:"onion",q:"1"},{n:"celery",q:"2 stalks"},{n:"ginger",q:"1 inch"},{n:"turmeric",q:"1 tsp"},{n:"cinnamon",q:"1/2 tsp"},{n:"cilantro",q:"large bunch"},{n:"parsley",q:"large bunch"},{n:"lemon",q:"1"},{n:"vermicelli",q:"50g"},{n:"olive oil",q:"3 tbsp"}],steps:["Brown lamb. Add onion, celery 5 min. Add spices, tomatoes, 1L water.","Add chickpeas, lentils. Simmer 30 min until lamb is tender.","Add vermicelli, herbs, lemon juice 5 min before serving."]},
{id:481,name:"Chicken Katsu Curry Rice",time:35,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54441964264_3d6e1bd9bb_c.jpg",ing:[{n:"chicken breast",q:"4, pounded"},{n:"panko",q:"150g"},{n:"egg",q:"2"},{n:"flour",q:"50g"},{n:"Japanese curry roux",q:"1 block"},{n:"onion",q:"1"},{n:"carrot",q:"1"},{n:"potato",q:"1"},{n:"rice",q:"for serving"},{n:"pickled ginger",q:"for serving"},{n:"vegetable oil",q:"for frying"}],steps:["Make curry: cook onion, carrot, potato in 500ml water 15 min. Add roux, stir until thick.","Dredge chicken in flour, egg, panko. Deep fry 5-6 min until golden. Slice.","Serve katsu over rice with curry alongside. Add pickled ginger."]},
{id:482,name:"Garlic Naan",time:20,servings:6,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54529284266_0c7ca4b964_c.jpg",ing:[{n:"flour",q:"300g"},{n:"yogurt",q:"100g"},{n:"baking powder",q:"1 tsp"},{n:"baking soda",q:"1/2 tsp"},{n:"salt",q:"1 tsp"},{n:"sugar",q:"1 tsp"},{n:"milk",q:"60ml"},{n:"garlic",q:"4 cloves, minced"},{n:"butter",q:"50g, melted"},{n:"cilantro",q:"fresh, chopped"}],steps:["Mix flour, yogurt, baking powder, soda, sugar, salt, milk. Knead 5 min. Rest 1-2 hours.","Divide into 6. Roll into teardrops. Cook on very hot skillet 2-3 min per side.","Brush with garlic butter and cilantro while hot."]},
{id:483,name:"Pork Gyoza",time:30,servings:24,diff:"Medium",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/54062801026_b382d08b12_c.jpg",ing:[{n:"ground pork",q:"300g"},{n:"cabbage",q:"150g, finely chopped"},{n:"ginger",q:"1 tbsp, grated"},{n:"garlic",q:"2 cloves"},{n:"soy sauce",q:"2 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"green onion",q:"3"},{n:"gyoza wrappers",q:"24"},{n:"vegetable oil",q:"2 tbsp"},{n:"rice vinegar",q:"2 tbsp"},{n:"chili oil",q:"for serving"}],steps:["Mix pork, chopped cabbage, ginger, garlic, soy, sesame oil, green onion.","Fill wrappers, fold and pleat.","Pan-fry 2 min until golden bottom. Add 60ml water, cover, steam 5 min. Serve with soy-vinegar dip."]},
{id:484,name:"Chicken Yassa",time:35,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/49503946948_b88e993aec_c.jpg",ing:[{n:"chicken thighs",q:"8, bone-in"},{n:"onion",q:"4, thinly sliced"},{n:"lemon",q:"3, juiced"},{n:"Dijon mustard",q:"2 tbsp"},{n:"garlic",q:"6 cloves"},{n:"scotch bonnet",q:"1"},{n:"olives",q:"50g"},{n:"vegetable oil",q:"3 tbsp"},{n:"thyme",q:"3 sprigs"},{n:"rice",q:"for serving"}],steps:["Marinate chicken in lemon juice, mustard, garlic, scotch bonnet 2 hours. Brown chicken.","Slowly cook onions 15 min. Add chicken, marinade, olives, thyme.","Cover, simmer 20 min. Sauce should be tangy with sweet onions. Serve with rice."]},
{id:485,name:"Tres Leches Cake",time:45,servings:12,diff:"Medium",tags:["vegetarian"],img:U+"1773064988857-6689a485f8f0?w=600&h=400&fit=crop",ing:[{n:"flour",q:"200g"},{n:"eggs",q:"5, separated"},{n:"sugar",q:"150g"},{n:"vanilla",q:"1 tsp"},{n:"whole milk",q:"200ml"},{n:"condensed milk",q:"400g"},{n:"evaporated milk",q:"350ml"},{n:"heavy cream",q:"300ml"},{n:"cinnamon",q:"for dusting"},{n:"maraschino cherries",q:"for topping"}],steps:["Beat yolks with sugar until fluffy. Beat whites stiff. Fold together with flour and vanilla. Bake 175C 25 min.","Poke holes all over. Mix 3 milks, pour over slowly. Chill 4+ hours.","Top with whipped cream, cinnamon dust, and cherries."]},
{id:486,name:"Steak Tacos",time:15,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55129162789_879fc82cd5_c.jpg",ing:[{n:"flank steak",q:"500g"},{n:"cumin",q:"1 tsp"},{n:"chili powder",q:"1 tsp"},{n:"lime",q:"2"},{n:"garlic",q:"3 cloves"},{n:"corn tortillas",q:"8"},{n:"onion",q:"1, diced"},{n:"cilantro",q:"fresh"},{n:"radish",q:"4, sliced"},{n:"salsa verde",q:"for serving"},{n:"avocado",q:"1"}],steps:["Season steak with cumin, chili, garlic, salt. Sear 4 min per side. Rest 10 min.","Slice thin against the grain.","Serve in warm tortillas with onion, cilantro, radish, avocado, salsa verde, lime."]},
{id:487,name:"Spinach Artichoke Dip",time:25,servings:8,diff:"Easy",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/65535/55049009770_33661643cd_c.jpg",ing:[{n:"frozen spinach",q:"300g, thawed"},{n:"artichoke hearts",q:"1 can, chopped"},{n:"cream cheese",q:"200g"},{n:"sour cream",q:"100g"},{n:"mozzarella",q:"100g, shredded"},{n:"parmesan",q:"50g, grated"},{n:"garlic",q:"3 cloves"},{n:"salt and pepper",q:"to taste"},{n:"tortilla chips",q:"for serving"}],steps:["Squeeze excess water from spinach. Mix with cream cheese, sour cream, garlic, most of the cheeses, artichokes.","Transfer to baking dish. Top with remaining cheese.","Bake 190C 20-25 min until bubbly. Serve hot with chips, bread, or vegetables."]},
{id:488,name:"Okra Stew",time:30,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/55128308179_0e4e796558_c.jpg",ing:[{n:"okra",q:"400g, sliced"},{n:"onion",q:"1, diced"},{n:"garlic",q:"3 cloves"},{n:"canned tomatoes",q:"400g"},{n:"tomato paste",q:"2 tbsp"},{n:"cumin",q:"1 tsp"},{n:"coriander",q:"1 tsp"},{n:"turmeric",q:"1/2 tsp"},{n:"lemon juice",q:"2 tbsp"},{n:"cilantro",q:"fresh"},{n:"olive oil",q:"3 tbsp"},{n:"rice",q:"for serving"}],steps:["Sauté onion 5 min. Add garlic, spices 1 min.","Add okra, cook 5 min. Add tomatoes, paste. Simmer 15 min.","Finish with lemon juice and cilantro. Serve over rice."]},
{id:489,name:"Chicken Katsu Sandwich",time:15,servings:2,diff:"Easy",tags:["high-protein"],img:U+"1742054292309-d07b8f18b0ef?w=600&h=400&fit=crop",ing:[{n:"chicken breast",q:"2, pounded thin"},{n:"panko",q:"100g"},{n:"egg",q:"1"},{n:"flour",q:"40g"},{n:"tonkatsu sauce",q:"3 tbsp"},{n:"milk bread",q:"4 slices"},{n:"cabbage",q:"100g, finely shredded"},{n:"Japanese mayo",q:"2 tbsp"}],steps:["Bread chicken in flour, egg, panko. Deep fry at 180C 5 min until golden.","Spread mayo on bread. Add shredded cabbage.","Place katsu on bread, drizzle tonkatsu sauce. Close, remove crusts, cut diagonally."]},
{id:490,name:"Beef Kofta",time:20,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/51855541275_371034e4e4_c.jpg",ing:[{n:"ground beef",q:"500g"},{n:"onion",q:"1, grated"},{n:"garlic",q:"3 cloves"},{n:"cumin",q:"2 tsp"},{n:"coriander",q:"1 tsp"},{n:"paprika",q:"1 tsp"},{n:"parsley",q:"fresh, chopped"},{n:"salt",q:"1 tsp"},{n:"pita bread",q:"for serving"},{n:"tahini",q:"for serving"},{n:"pickled vegetables",q:"for serving"}],steps:["Mix beef with onion, garlic, spices, parsley, salt. Knead well.","Shape onto skewers or form into oval patties. Grill 4-5 min per side.","Serve with warm pita, tahini sauce, pickled vegetables."]},
{id:491,name:"Mushroom & Spinach Lasagna",time:50,servings:8,diff:"Medium",tags:["vegetarian"],img:"https://live.staticflickr.com/5609/15298404268_475cb3a28f_c.jpg",ing:[{n:"lasagna sheets",q:"12"},{n:"mushrooms",q:"500g, sliced"},{n:"spinach",q:"300g"},{n:"ricotta",q:"400g"},{n:"mozzarella",q:"250g"},{n:"parmesan",q:"60g"},{n:"garlic",q:"4 cloves"},{n:"bechamel sauce",q:"500ml"},{n:"nutmeg",q:"pinch"},{n:"thyme",q:"fresh"}],steps:["Sauté mushrooms with garlic and thyme until golden. Wilt spinach. Mix ricotta with nutmeg.","Layer: bechamel, pasta, mushrooms, ricotta, spinach. Repeat.","Top with mozzarella and parmesan. Bake 180C 35-40 min until golden."]},
{id:492,name:"Bibimbap with Tofu",time:30,servings:2,diff:"Medium",tags:["vegan","vegetarian","dairy-free"],img:"https://live.staticflickr.com/65535/54589603180_e3e0f19a3b_c.jpg",ing:[{n:"firm tofu",q:"200g, cubed"},{n:"rice",q:"300g"},{n:"spinach",q:"100g"},{n:"carrot",q:"1"},{n:"zucchini",q:"1"},{n:"bean sprouts",q:"100g"},{n:"gochujang",q:"3 tbsp"},{n:"sesame oil",q:"2 tbsp"},{n:"soy sauce",q:"2 tbsp"},{n:"sesame seeds",q:"1 tbsp"},{n:"garlic",q:"3 cloves"},{n:"vegetable oil",q:"2 tbsp"}],steps:["Press and cube tofu, pan-fry until golden. Sauté each vegetable separately.","Fry rice in stone bowl or skillet until crispy bottom.","Arrange toppings over rice. Serve with gochujang and sesame oil. Mix before eating."]},
{id:493,name:"Pork Vindaloo",time:45,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:U+"1624900043496-eefdb73dadf6?w=600&h=400&fit=crop",ing:[{n:"pork shoulder",q:"600g, cubed"},{n:"onion",q:"2"},{n:"garlic",q:"6 cloves"},{n:"ginger",q:"2 inch"},{n:"kashmiri chili",q:"3 tbsp"},{n:"cumin",q:"1 tsp"},{n:"cinnamon",q:"1/2 tsp"},{n:"cloves",q:"3"},{n:"white vinegar",q:"4 tbsp"},{n:"canned tomatoes",q:"200g"},{n:"mustard seeds",q:"1 tsp"},{n:"oil",q:"3 tbsp"},{n:"rice",q:"for serving"}],steps:["Blend garlic, ginger, spices, vinegar into paste. Marinate pork 1 hour.","Fry mustard seeds, add onions until golden. Add paste 5 min.","Add pork, tomatoes. Cover, simmer 35-40 min. Serve with rice."]},
{id:494,name:"Thai Iced Tea",time:5,servings:2,diff:"Easy",tags:["vegetarian","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/48518333906_e0aceb8501_c.jpg",ing:[{n:"Thai tea mix",q:"3 tbsp"},{n:"boiling water",q:"300ml"},{n:"sweetened condensed milk",q:"4 tbsp"},{n:"evaporated milk",q:"4 tbsp"},{n:"sugar",q:"2 tbsp"},{n:"ice",q:"plenty"}],steps:["Brew Thai tea in boiling water 5 min. Strain. Add sugar while hot.","Chill tea completely.","Fill glasses with ice. Pour tea. Slowly add condensed and evaporated milk for layered effect. Stir to drink."]},
{id:495,name:"Beef Lasagna",time:60,servings:8,diff:"Medium",tags:["high-protein"],img:"https://images.unsplash.com/photo-1667757043428-8942de88c00f?w=600&h=400&fit=crop",ing:[{n:"lasagna sheets",q:"12"},{n:"ground beef",q:"500g"},{n:"canned tomatoes",q:"800g"},{n:"onion",q:"1"},{n:"garlic",q:"4 cloves"},{n:"tomato paste",q:"2 tbsp"},{n:"oregano",q:"1 tsp"},{n:"ricotta",q:"300g"},{n:"mozzarella",q:"250g"},{n:"parmesan",q:"60g"},{n:"butter",q:"40g"},{n:"flour",q:"40g"},{n:"milk",q:"500ml"},{n:"nutmeg",q:"pinch"}],steps:["Brown beef with onion, garlic. Add tomatoes, paste, oregano. Simmer 15 min.","Make bechamel: butter, flour, milk, nutmeg. Layer: meat sauce, pasta, ricotta, bechamel. Repeat.","Top with mozzarella, parmesan. Bake 180C 40 min until golden. Rest 15 min."]},
{id:496,name:"Egg Fried Rice",time:10,servings:2,diff:"Easy",tags:["dairy-free","nut-free"],img:"https://live.staticflickr.com/65535/54753391068_bf75a1d797_c.jpg",ing:[{n:"cooked jasmine rice",q:"400g, day-old"},{n:"eggs",q:"3"},{n:"green onion",q:"3"},{n:"soy sauce",q:"2 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"white pepper",q:"pinch"},{n:"vegetable oil",q:"2 tbsp"},{n:"salt",q:"to taste"}],steps:["Heat wok until smoking. Scramble eggs, break into small pieces.","Add rice, toss over high heat 2 min. Season with soy sauce, salt, white pepper.","Finish with sesame oil and sliced green onion."]},
{id:497,name:"Lamb Shoulder Roast",time:180,servings:6,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:U+"1622003184404-bc0c66144534?w=600&h=400&fit=crop",ing:[{n:"lamb shoulder",q:"2kg, bone-in"},{n:"garlic",q:"8 cloves"},{n:"rosemary",q:"4 sprigs"},{n:"olive oil",q:"4 tbsp"},{n:"lemon",q:"1"},{n:"salt and pepper",q:"generous"},{n:"roasted vegetables",q:"for serving"}],steps:["Make incisions in lamb, insert garlic slivers and rosemary.","Rub with oil, lemon, salt, pepper. Place on roasting rack.","Roast at 160C for 4 hours until falling apart. Rest 20 min. Pull and serve with pan juices."]},
{id:498,name:"Mushroom Pho",time:30,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free"],img:"https://live.staticflickr.com/65535/49746685282_d116d10a79_c.jpg",ing:[{n:"rice noodles",q:"400g"},{n:"mixed mushrooms",q:"400g"},{n:"vegetable broth",q:"1.5L"},{n:"star anise",q:"3"},{n:"cinnamon stick",q:"1"},{n:"ginger",q:"3 inch, charred"},{n:"onion",q:"1, charred"},{n:"soy sauce",q:"3 tbsp"},{n:"hoisin sauce",q:"for serving"},{n:"bean sprouts",q:"100g"},{n:"Thai basil",q:"fresh"},{n:"lime",q:"2"},{n:"sriracha",q:"for serving"}],steps:["Simmer broth with charred ginger, onion, star anise, cinnamon 20 min. Strain. Season with soy.","Sauté mushrooms until golden. Cook noodles.","Assemble: noodles, mushrooms, hot broth, sprouts, basil, lime, hoisin, sriracha."]},
{id:499,name:"Fried Green Tomatoes",time:20,servings:4,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54917250262_6e1b05b31d_c.jpg",ing:[{n:"green tomatoes",q:"4, sliced 1cm"},{n:"cornmeal",q:"100g"},{n:"flour",q:"50g"},{n:"buttermilk",q:"100ml"},{n:"egg",q:"1"},{n:"cayenne",q:"1/4 tsp"},{n:"salt and pepper",q:"to taste"},{n:"vegetable oil",q:"for frying"},{n:"remoulade",q:"for serving"}],steps:["Season tomato slices with salt, let sit 5 min. Pat dry.","Dip in flour, then buttermilk-egg, then cornmeal mixed with cayenne.","Fry in oil 2-3 min per side until golden. Serve with remoulade."]},
{id:500,name:"Chicken Marsala with Mushrooms",time:25,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/52038629852_655ef07b94_c.jpg",ing:[{n:"chicken breast",q:"4, pounded thin"},{n:"mushrooms",q:"300g, sliced"},{n:"Marsala wine",q:"150ml"},{n:"chicken broth",q:"100ml"},{n:"garlic",q:"3 cloves"},{n:"flour",q:"50g"},{n:"butter",q:"40g"},{n:"olive oil",q:"2 tbsp"},{n:"thyme",q:"fresh"},{n:"parsley",q:"fresh"}],steps:["Dredge chicken in flour. Sear in butter and oil 3-4 min per side. Remove.","Sauté mushrooms and garlic 5 min. Add thyme. Deglaze with Marsala.","Add broth, reduce by half. Return chicken, simmer 3 min. Garnish with parsley. Serve with mashed potatoes."]},
{id:501,name:"Pasta alla Norcina",time:20,servings:4,diff:"Easy",tags:["high-protein"],img:U+"1675169594106-a3898f9fe59d?w=600&h=400&fit=crop",ing:[{n:"rigatoni",q:"400g"},{n:"Italian sausage",q:"300g, casings removed"},{n:"heavy cream",q:"150ml"},{n:"pecorino",q:"60g, grated"},{n:"garlic",q:"3 cloves"},{n:"white wine",q:"60ml"},{n:"truffle oil",q:"optional"},{n:"black pepper",q:"1 tsp"},{n:"parsley",q:"fresh"}],steps:["Cook rigatoni. Brown crumbled sausage. Add garlic 1 min.","Deglaze with wine. Add cream, simmer 3 min.","Toss with pasta, pecorino, pepper. Drizzle truffle oil if using. Garnish with parsley."]},
{id:502,name:"Chicken Mole Poblano",time:60,servings:6,diff:"Hard",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/3823/9437825471_319d214530_c.jpg",ing:[{n:"chicken pieces",q:"1.5kg"},{n:"dried mulato chilies",q:"3"},{n:"dried ancho chilies",q:"3"},{n:"dried pasilla chilies",q:"2"},{n:"sesame seeds",q:"2 tbsp"},{n:"pumpkin seeds",q:"2 tbsp"},{n:"almonds",q:"2 tbsp"},{n:"plantain",q:"1, ripe"},{n:"canned tomatoes",q:"200g"},{n:"dark chocolate",q:"40g"},{n:"cinnamon",q:"1/2 tsp"},{n:"chicken broth",q:"500ml"},{n:"tortillas",q:"for serving"}],steps:["Toast and rehydrate chilies. Toast seeds and nuts. Fry plantain.","Blend everything with broth until smooth. Fry paste 15 min, stirring.","Add chocolate, stir until melted. Simmer chicken in mole 30 min. Serve with rice and tortillas."]},
{id:503,name:"Tofu Larb",time:15,servings:3,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free"],img:"https://live.staticflickr.com/1629/25818464283_99da7d6774_c.jpg",ing:[{n:"extra-firm tofu",q:"400g, crumbled"},{n:"fish sauce or soy sauce",q:"3 tbsp"},{n:"lime juice",q:"3 tbsp"},{n:"toasted rice powder",q:"2 tbsp"},{n:"shallots",q:"3, sliced"},{n:"mint",q:"large bunch"},{n:"cilantro",q:"bunch"},{n:"Thai chili",q:"3, sliced"},{n:"green onion",q:"3"},{n:"lettuce cups",q:"for serving"}],steps:["Crumble tofu. Dry-fry in hot pan until golden.","Off heat, dress with fish sauce, lime juice, rice powder.","Toss with herbs, shallots, chili. Serve in lettuce cups."]},
{id:504,name:"Steak au Poivre",time:20,servings:2,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54758038323_5b1930466e_c.jpg",ing:[{n:"filet mignon",q:"2, 4cm thick"},{n:"black peppercorns",q:"3 tbsp, crushed"},{n:"butter",q:"30g"},{n:"olive oil",q:"1 tbsp"},{n:"brandy",q:"60ml"},{n:"heavy cream",q:"100ml"},{n:"Dijon mustard",q:"1 tsp"},{n:"salt",q:"to taste"}],steps:["Press crushed pepper into both sides of steaks. Sear in butter and oil 4 min per side.","Remove steaks. Deglaze with brandy (flambe optional). Add cream and mustard.","Simmer 2 min until thick. Pour sauce over rested steaks."]},
{id:505,name:"Baked Ziti",time:40,servings:8,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54950712044_7a3078dbbe_c.jpg",ing:[{n:"ziti",q:"500g"},{n:"ricotta",q:"400g"},{n:"mozzarella",q:"300g, shredded"},{n:"parmesan",q:"60g"},{n:"ground beef or sausage",q:"500g"},{n:"canned tomatoes",q:"800g"},{n:"garlic",q:"4 cloves"},{n:"onion",q:"1"},{n:"basil",q:"fresh"},{n:"egg",q:"1"},{n:"oregano",q:"1 tsp"}],steps:["Brown meat with onion, garlic. Add tomatoes, oregano. Simmer 15 min. Cook ziti.","Mix ricotta with egg, half the mozzarella, half the parmesan.","Layer: sauce, ziti, ricotta mixture. Repeat. Top with remaining mozzarella. Bake 190C 25 min."]},
{id:506,name:"Coconut Lime Chicken",time:25,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/53011069995_a0ec97b8b9_c.jpg",ing:[{n:"chicken thighs",q:"600g, boneless"},{n:"coconut milk",q:"400ml"},{n:"lime",q:"3"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"1 inch"},{n:"fish sauce",q:"2 tbsp"},{n:"brown sugar",q:"1 tbsp"},{n:"cilantro",q:"fresh"},{n:"Thai basil",q:"fresh"},{n:"chili",q:"1"},{n:"rice",q:"for serving"}],steps:["Sear chicken 4 min per side. Remove.","Add garlic, ginger, chili 1 min. Add coconut milk, lime juice, fish sauce, sugar. Simmer.","Return chicken. Cook 10 min. Garnish with cilantro, basil, lime zest. Serve over rice."]},
{id:507,name:"Kimchi Pancakes",time:15,servings:4,diff:"Easy",tags:["vegetarian","dairy-free"],img:"https://live.staticflickr.com/65535/54396995083_662be834fa_c.jpg",ing:[{n:"aged kimchi",q:"200g, chopped"},{n:"flour",q:"100g"},{n:"cornstarch",q:"2 tbsp"},{n:"kimchi brine",q:"60ml"},{n:"water",q:"60ml"},{n:"green onion",q:"3, sliced"},{n:"egg",q:"1"},{n:"vegetable oil",q:"3 tbsp"},{n:"soy sauce",q:"for dipping"},{n:"rice vinegar",q:"for dipping"}],steps:["Mix flour, cornstarch, kimchi brine, water, egg until just combined. Fold in kimchi and green onion.","Heat oil in pan. Pour batter, spread thin. Cook 3-4 min per side until very crispy.","Cut into wedges. Serve with soy-vinegar dipping sauce."]},
{id:508,name:"Grilled Lamb Cutlets",time:15,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54884807947_15e6d2403e_c.jpg",ing:[{n:"lamb cutlets",q:"12, frenched"},{n:"garlic",q:"3 cloves, minced"},{n:"rosemary",q:"2 tbsp, fresh"},{n:"olive oil",q:"3 tbsp"},{n:"lemon",q:"1"},{n:"salt and pepper",q:"generous"},{n:"mint sauce",q:"for serving"}],steps:["Rub cutlets with garlic, rosemary, oil, lemon juice, seasoning.","Grill over very high heat 2-3 min per side for medium-rare.","Rest 3 min. Serve with mint sauce."]},
{id:509,name:"Pork Belly Ramen",time:120,servings:4,diff:"Medium",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/51632144126_e4a6abae7f_c.jpg",ing:[{n:"pork belly",q:"500g"},{n:"ramen noodles",q:"400g"},{n:"chicken broth",q:"1L"},{n:"soy sauce",q:"4 tbsp"},{n:"mirin",q:"3 tbsp"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"2 inch"},{n:"soft-boiled egg",q:"4"},{n:"green onion",q:"4"},{n:"nori",q:"for serving"},{n:"corn",q:"from 1 ear"},{n:"chili oil",q:"optional"}],steps:["Braise pork belly in soy, mirin, water with garlic and ginger for 1.5 hours. Slice.","Season broth with soy sauce. Cook noodles.","Assemble: noodles, broth, sliced pork belly, egg, corn, green onion, nori, chili oil."]},
{id:510,name:"Baklava",time:60,servings:20,diff:"Medium",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/55128070209_d1deccf7a7_c.jpg",ing:[{n:"phyllo dough",q:"500g"},{n:"walnuts and pistachios",q:"300g, chopped"},{n:"butter",q:"200g, melted"},{n:"cinnamon",q:"1 tsp"},{n:"sugar",q:"200g"},{n:"water",q:"200ml"},{n:"honey",q:"100g"},{n:"lemon juice",q:"1 tbsp"},{n:"rose water",q:"1 tsp"}],steps:["Mix nuts with cinnamon. Layer 8 phyllo sheets in pan, brushing each with butter.","Spread thin layer of nuts. Add 3 more buttered sheets. Repeat until nuts are used. Top with 8 sheets.","Cut into diamonds. Bake 175C 45 min. Make syrup: sugar, water, honey, lemon, rose water. Pour hot syrup over hot baklava. Cool completely."]},
{id:511,name:"Prawn Risotto",time:30,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/52495335816_e996b7c900_c.jpg",ing:[{n:"arborio rice",q:"300g"},{n:"large prawns",q:"400g"},{n:"white wine",q:"150ml"},{n:"fish stock",q:"800ml, warm"},{n:"shallot",q:"2"},{n:"garlic",q:"3 cloves"},{n:"cherry tomatoes",q:"100g"},{n:"lemon",q:"1"},{n:"butter",q:"30g"},{n:"parmesan",q:"40g"},{n:"chili flakes",q:"pinch"},{n:"parsley",q:"fresh"}],steps:["Shell prawns. Make stock with shells. Sauté shallot, garlic. Toast rice, add wine.","Add stock one ladle at a time, stirring 16-18 min.","Add prawns and tomatoes last 3 min. Finish with butter, parmesan, lemon zest, chili, parsley."]},
{id:512,name:"Feijoada",time:120,servings:8,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55103641653_5f15a36442_c.jpg",ing:[{n:"black beans",q:"500g, soaked"},{n:"pork ribs",q:"400g"},{n:"smoked sausage",q:"200g"},{n:"bacon",q:"100g"},{n:"onion",q:"2"},{n:"garlic",q:"6 cloves"},{n:"bay leaves",q:"2"},{n:"orange",q:"1"},{n:"cumin",q:"1 tsp"},{n:"rice",q:"for serving"},{n:"farofa",q:"for serving"},{n:"collard greens",q:"for serving"},{n:"orange slices",q:"for serving"}],steps:["Cook soaked beans with pork, sausage, bacon, garlic, bay leaves, orange peel 2-2.5 hours.","Remove meats, slice. Mash some beans for thickness.","Serve beans and meats with white rice, farofa, sauteed collard greens, orange slices."]},
{id:513,name:"Smashed Cucumber Salad",time:10,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:U+"1658708009342-af5795fa4284?w=600&h=400&fit=crop",ing:[{n:"cucumber",q:"3"},{n:"garlic",q:"3 cloves, minced"},{n:"soy sauce",q:"2 tbsp"},{n:"rice vinegar",q:"2 tbsp"},{n:"sesame oil",q:"1 tbsp"},{n:"chili oil",q:"1 tbsp"},{n:"sugar",q:"1 tsp"},{n:"cilantro",q:"fresh"},{n:"sesame seeds",q:"1 tbsp"}],steps:["Smash cucumbers with flat side of knife. Tear into pieces. Salt, let sit 10 min. Drain.","Mix garlic, soy sauce, vinegar, sesame oil, chili oil, sugar.","Toss cucumbers with dressing. Top with cilantro and sesame seeds."]},
{id:514,name:"Chicken Provencal",time:35,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54612511171_ce78c699f3_c.jpg",ing:[{n:"chicken thighs",q:"6, bone-in"},{n:"canned tomatoes",q:"400g"},{n:"olives",q:"60g"},{n:"capers",q:"1 tbsp"},{n:"garlic",q:"4 cloves"},{n:"white wine",q:"100ml"},{n:"herbes de Provence",q:"2 tsp"},{n:"orange zest",q:"1 orange"},{n:"olive oil",q:"2 tbsp"},{n:"basil",q:"fresh"}],steps:["Brown chicken. Remove. Sauté garlic 1 min. Add wine.","Add tomatoes, olives, capers, herbs, orange zest. Return chicken.","Cover, simmer 25 min. Garnish with basil."]},
{id:515,name:"Katsu Curry Udon",time:25,servings:2,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/51926169625_e26f2098e0_c.jpg",ing:[{n:"chicken breast",q:"2"},{n:"panko",q:"100g"},{n:"egg",q:"1"},{n:"flour",q:"40g"},{n:"udon noodles",q:"300g"},{n:"Japanese curry roux",q:"1/2 block"},{n:"onion",q:"1"},{n:"carrot",q:"1/2"},{n:"green onion",q:"2"},{n:"vegetable oil",q:"for frying"}],steps:["Make curry sauce: cook vegetables in 300ml water, add roux, stir until thick.","Bread chicken: flour, egg, panko. Fry until golden. Slice.","Cook udon. Serve in bowls with curry sauce and sliced katsu on top."]},
{id:516,name:"Avocado Lime Crema",time:5,servings:4,diff:"Easy",tags:["vegetarian","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/51645708495_c1d4108f6d_c.jpg",ing:[{n:"avocado",q:"2"},{n:"sour cream",q:"100g"},{n:"lime",q:"2"},{n:"garlic",q:"1 clove"},{n:"cilantro",q:"bunch"},{n:"jalapeno",q:"1/2"},{n:"salt",q:"to taste"}],steps:["Blend all ingredients until smooth.","Taste and adjust salt and lime.","Use as a dip, taco topping, or salad dressing. Keeps 2 days refrigerated."]},
{id:517,name:"Beef Birria Ramen",time:30,servings:4,diff:"Medium",tags:["dairy-free","high-protein"],img:U+"1695088224651-162033438b3b?w=600&h=400&fit=crop",ing:[{n:"beef chuck",q:"400g, shredded"},{n:"dried guajillo chilies",q:"3"},{n:"dried ancho chilies",q:"2"},{n:"beef broth",q:"1L"},{n:"ramen noodles",q:"400g"},{n:"onion",q:"1, charred"},{n:"garlic",q:"4 cloves"},{n:"cumin",q:"1 tsp"},{n:"oregano",q:"1 tsp"},{n:"lime",q:"2"},{n:"cilantro",q:"fresh"},{n:"corn",q:"for topping"},{n:"soft-boiled egg",q:"4"}],steps:["Blend rehydrated chilies with charred onion, garlic, spices. Fry 5 min. Add broth.","Simmer shredded beef in birria broth 15 min. Cook noodles.","Assemble: noodles, birria broth, beef, corn, egg, cilantro, lime."]},
{id:518,name:"Mushroom Bourguignon",time:45,servings:6,diff:"Medium",tags:["vegan","vegetarian","dairy-free","gluten-free"],img:U+"1653769608622-75ba245d38fe?w=600&h=400&fit=crop",ing:[{n:"mixed mushrooms",q:"800g"},{n:"red wine",q:"400ml"},{n:"vegetable broth",q:"200ml"},{n:"pearl onions",q:"200g"},{n:"carrot",q:"2"},{n:"garlic",q:"4 cloves"},{n:"tomato paste",q:"2 tbsp"},{n:"thyme",q:"3 sprigs"},{n:"bay leaf",q:"1"},{n:"olive oil",q:"3 tbsp"},{n:"flour",q:"1 tbsp"},{n:"mashed potatoes",q:"for serving"}],steps:["Sear mushrooms in batches until golden. Remove. Sauté onions and carrot 5 min.","Add garlic, paste, flour. Deglaze with wine. Add broth, herbs.","Return mushrooms. Simmer 25-30 min until thick. Serve over mashed potatoes."]},
{id:519,name:"Salmon Teriyaki",time:20,servings:4,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/55145690818_49c4be57f5_c.jpg",ing:[{n:"salmon fillets",q:"4"},{n:"soy sauce",q:"4 tbsp"},{n:"mirin",q:"3 tbsp"},{n:"sake",q:"2 tbsp"},{n:"sugar",q:"1 tbsp"},{n:"ginger",q:"1 tsp, grated"},{n:"rice",q:"for serving"},{n:"steamed broccoli",q:"for serving"},{n:"sesame seeds",q:"1 tbsp"},{n:"green onion",q:"2"}],steps:["Mix soy, mirin, sake, sugar, ginger. Simmer until syrupy.","Sear salmon skin-down 4 min. Flip, cook 2 min. Brush with teriyaki glaze.","Serve over rice with broccoli. Drizzle remaining glaze, sesame seeds, green onion."]},
{id:520,name:"French Onion Chicken",time:30,servings:4,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54534189562_464cea6e23_c.jpg",ing:[{n:"chicken breast",q:"4"},{n:"onion",q:"3, sliced"},{n:"beef broth",q:"200ml"},{n:"gruyere",q:"150g, shredded"},{n:"butter",q:"30g"},{n:"thyme",q:"fresh"},{n:"Worcestershire sauce",q:"1 tbsp"},{n:"garlic",q:"3 cloves"},{n:"olive oil",q:"1 tbsp"}],steps:["Sear chicken 5 min per side. Remove. Caramelize onions in butter and oil 15 min.","Add garlic, thyme, Worcestershire, broth. Return chicken. Simmer 10 min.","Top chicken with gruyere. Broil 3 min until bubbly."]},
{id:521,name:"Sweet Potato Black Bean Chili",time:30,servings:6,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/945/41720553752_a2ee583c09_c.jpg",ing:[{n:"sweet potato",q:"2, cubed"},{n:"black beans",q:"2 cans"},{n:"canned tomatoes",q:"800g"},{n:"onion",q:"1"},{n:"garlic",q:"4 cloves"},{n:"chili powder",q:"2 tbsp"},{n:"cumin",q:"1 tsp"},{n:"smoked paprika",q:"1 tsp"},{n:"chipotle",q:"1 pepper"},{n:"vegetable broth",q:"200ml"},{n:"cilantro",q:"fresh"},{n:"avocado",q:"for serving"}],steps:["Sauté onion 5 min. Add garlic, spices, chipotle.","Add sweet potato, beans, tomatoes, broth. Simmer 20-25 min until potato is tender.","Serve with avocado, cilantro, sour cream."]},
{id:522,name:"Prawn Cocktail",time:15,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54977193614_644e7797fc_c.jpg",ing:[{n:"large prawns",q:"300g, cooked"},{n:"ketchup",q:"3 tbsp"},{n:"horseradish",q:"1 tbsp"},{n:"lemon juice",q:"1 tbsp"},{n:"Worcestershire sauce",q:"1 tsp"},{n:"Tabasco",q:"few drops"},{n:"iceberg lettuce",q:"shredded"},{n:"avocado",q:"1"},{n:"paprika",q:"for dusting"},{n:"lemon wedges",q:"for serving"}],steps:["Mix ketchup, horseradish, lemon juice, Worcestershire, Tabasco for Marie Rose sauce.","Arrange shredded lettuce in glasses. Add avocado.","Top with prawns and spoon sauce over. Dust with paprika. Serve with lemon."]},
{id:523,name:"Pesto Chicken",time:20,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:U+"1673238114980-47d4e9cc793e?w=600&h=400&fit=crop",ing:[{n:"chicken breast",q:"4"},{n:"basil pesto",q:"100g"},{n:"mozzarella",q:"100g, sliced"},{n:"cherry tomatoes",q:"200g"},{n:"olive oil",q:"1 tbsp"},{n:"balsamic glaze",q:"for drizzle"},{n:"basil",q:"fresh"},{n:"salt and pepper",q:"to taste"}],steps:["Season chicken. Sear 4 min per side.","Spread pesto on top of each breast. Add tomatoes to pan. Top chicken with mozzarella.","Broil 3-4 min until cheese melts. Drizzle balsamic glaze. Top with fresh basil."]},
{id:524,name:"Corn Ribs",time:20,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free"],img:"https://live.staticflickr.com/65535/54820985680_2ac17e56b6_c.jpg",ing:[{n:"corn",q:"4 ears, quartered lengthwise"},{n:"olive oil",q:"3 tbsp"},{n:"smoked paprika",q:"1 tsp"},{n:"cumin",q:"1 tsp"},{n:"chili powder",q:"1 tsp"},{n:"garlic powder",q:"1 tsp"},{n:"lime",q:"2"},{n:"cilantro",q:"fresh"},{n:"chipotle mayo",q:"for serving"}],steps:["Quarter corn ears lengthwise into ribs. Toss with oil and spices.","Air fry at 200C 12-15 min or bake until charred and curled.","Squeeze lime, top with cilantro. Serve with chipotle mayo."]},
{id:525,name:"Pasta with Sardines",time:20,servings:4,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/4607/39192786635_acd1780e9b_c.jpg",ing:[{n:"bucatini",q:"400g"},{n:"canned sardines",q:"2 tins"},{n:"garlic",q:"4 cloves"},{n:"fennel",q:"1 bulb, diced"},{n:"raisins",q:"30g"},{n:"pine nuts",q:"30g, toasted"},{n:"breadcrumbs",q:"40g, toasted"},{n:"red pepper flakes",q:"1/2 tsp"},{n:"olive oil",q:"60ml"},{n:"parsley",q:"fresh"}],steps:["Cook pasta. Sauté fennel 5 min. Add garlic, pepper flakes, raisins.","Add sardines, break up gently. Add pine nuts.","Toss with pasta, olive oil, and pasta water. Top with toasted breadcrumbs and parsley."]},
{id:526,name:"Tandoori Lamb Chops",time:25,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:U+"1713780131281-61ec701ebb6f?w=600&h=400&fit=crop",ing:[{n:"lamb chops",q:"8"},{n:"yogurt",q:"150g"},{n:"tandoori masala",q:"2 tbsp"},{n:"ginger-garlic paste",q:"2 tbsp"},{n:"lemon juice",q:"2 tbsp"},{n:"kashmiri chili",q:"1 tbsp"},{n:"salt",q:"1 tsp"},{n:"oil",q:"1 tbsp"},{n:"mint chutney",q:"for serving"},{n:"naan",q:"for serving"},{n:"sliced onion",q:"for serving"}],steps:["Marinate lamb in yogurt, tandoori masala, ginger-garlic, chili, lemon, salt 2+ hours.","Grill or broil 4-5 min per side until charred.","Serve with mint chutney, naan, and sliced onion with lemon."]},
{id:527,name:"Broccoli Cheddar Soup",time:25,servings:4,diff:"Easy",tags:["gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/54653325096_71560174fe_c.jpg",ing:[{n:"broccoli",q:"500g, florets"},{n:"onion",q:"1, diced"},{n:"garlic",q:"2 cloves"},{n:"chicken broth",q:"600ml"},{n:"heavy cream",q:"150ml"},{n:"sharp cheddar",q:"200g, grated"},{n:"butter",q:"30g"},{n:"flour",q:"20g"},{n:"nutmeg",q:"pinch"},{n:"salt and pepper",q:"to taste"}],steps:["Sauté onion and garlic in butter. Add flour 1 min. Whisk in broth.","Add broccoli, simmer 12-15 min until tender.","Blend half. Return to pot, add cream, cheese, nutmeg. Stir until smooth. Season."]},
{id:528,name:"Chicken Teriyaki Stir-Fry",time:20,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/49999445223_77e57322c6_c.jpg",ing:[{n:"chicken thighs",q:"500g, sliced"},{n:"broccoli",q:"200g"},{n:"bell pepper",q:"1"},{n:"carrot",q:"1"},{n:"soy sauce",q:"4 tbsp"},{n:"mirin",q:"3 tbsp"},{n:"honey",q:"1 tbsp"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"cornstarch",q:"1 tbsp"},{n:"sesame seeds",q:"1 tbsp"},{n:"rice",q:"for serving"}],steps:["Mix soy, mirin, honey, garlic, ginger, cornstarch for teriyaki sauce.","Stir-fry chicken 4 min. Add vegetables 3 min.","Pour in sauce, simmer until thick and glossy. Serve over rice with sesame seeds."]},
{id:529,name:"Chocolate Avocado Mousse",time:10,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free"],img:"https://live.staticflickr.com/65535/48839488586_37c33e144b_c.jpg",ing:[{n:"ripe avocado",q:"2"},{n:"cocoa powder",q:"40g"},{n:"maple syrup",q:"60ml"},{n:"vanilla extract",q:"1 tsp"},{n:"almond milk",q:"2 tbsp"},{n:"salt",q:"pinch"},{n:"raspberries",q:"for topping"},{n:"coconut cream",q:"for topping"}],steps:["Blend avocado, cocoa, maple syrup, vanilla, milk, salt until very smooth.","Taste and adjust sweetness.","Spoon into glasses. Chill 1 hour. Top with raspberries and coconut cream."]},
{id:530,name:"Grilled Halloumi Burger",time:15,servings:4,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/4392/36761825936_c5bb61a26b_c.jpg",ing:[{n:"halloumi",q:"250g, sliced thick"},{n:"brioche buns",q:"4"},{n:"avocado",q:"1"},{n:"tomato",q:"1, sliced"},{n:"red onion",q:"4 rings"},{n:"arugula",q:"handful"},{n:"harissa mayo",q:"3 tbsp"},{n:"lime",q:"1"},{n:"olive oil",q:"for grilling"}],steps:["Grill halloumi slices 2 min per side until golden grill marks form.","Grill onion rings 2 min per side. Toast buns.","Assemble: bun, arugula, halloumi, avocado, tomato, onion, harissa mayo, lime squeeze."]},
{id:531,name:"Chicken Parm Meatballs",time:30,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/4775/40072660744_86d3fc9141_c.jpg",ing:[{n:"ground chicken",q:"500g"},{n:"breadcrumbs",q:"50g"},{n:"parmesan",q:"40g, grated"},{n:"egg",q:"1"},{n:"garlic",q:"3 cloves"},{n:"Italian seasoning",q:"1 tsp"},{n:"canned tomatoes",q:"400g"},{n:"mozzarella",q:"100g, cubed"},{n:"basil",q:"fresh"},{n:"olive oil",q:"2 tbsp"}],steps:["Mix chicken, breadcrumbs, parmesan, egg, garlic, seasoning. Form balls with mozzarella cube inside.","Brown meatballs in oil. Make marinara: garlic, tomatoes, basil.","Nestle meatballs in sauce. Simmer 15 min. Serve over pasta or in sub rolls."]},
{id:532,name:"Salmon Bowl",time:15,servings:2,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55037690004_a0971c22ed_c.jpg",ing:[{n:"salmon fillet",q:"300g"},{n:"sushi rice",q:"250g"},{n:"avocado",q:"1"},{n:"cucumber",q:"1"},{n:"edamame",q:"80g"},{n:"pickled ginger",q:"for serving"},{n:"soy sauce",q:"2 tbsp"},{n:"sesame seeds",q:"1 tbsp"},{n:"nori",q:"shredded"},{n:"sriracha mayo",q:"optional"}],steps:["Season and pan-sear salmon 4 min per side. Flake.","Season rice with vinegar. Build bowls: rice, flaked salmon.","Top with avocado, cucumber, edamame, pickled ginger, nori, sesame seeds, soy sauce."]},
{id:533,name:"Chorizo & Bean Stew",time:25,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/54931671706_b0519e239d_c.jpg",ing:[{n:"chorizo",q:"250g, sliced"},{n:"cannellini beans",q:"2 cans"},{n:"canned tomatoes",q:"400g"},{n:"onion",q:"1"},{n:"garlic",q:"3 cloves"},{n:"smoked paprika",q:"1 tsp"},{n:"spinach",q:"100g"},{n:"chicken broth",q:"200ml"},{n:"olive oil",q:"1 tbsp"},{n:"crusty bread",q:"for serving"}],steps:["Cook chorizo until oils release. Add onion, garlic, paprika 3 min.","Add beans, tomatoes, broth. Simmer 12 min.","Add spinach until wilted. Serve with crusty bread."]},
{id:534,name:"Mango Coconut Curry",time:25,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free"],img:"https://live.staticflickr.com/65535/48998412823_10a3f1765b_c.jpg",ing:[{n:"chickpeas",q:"1 can"},{n:"mango",q:"1, cubed"},{n:"coconut milk",q:"400ml"},{n:"red curry paste",q:"2 tbsp"},{n:"spinach",q:"100g"},{n:"onion",q:"1"},{n:"garlic",q:"2 cloves"},{n:"ginger",q:"1 inch"},{n:"lime",q:"1"},{n:"cilantro",q:"fresh"},{n:"rice",q:"for serving"}],steps:["Sauté onion, garlic, ginger 3 min. Add curry paste 1 min.","Add coconut milk, chickpeas. Simmer 10 min. Add mango and spinach.","Finish with lime juice and cilantro. Serve over rice."]},
{id:535,name:"Chicken Shawarma Bowl",time:25,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://www.themealdb.com/images/media/meals/hcg6l91763596970.jpg/preview",ing:[{n:"chicken thighs",q:"600g"},{n:"cumin",q:"2 tsp"},{n:"paprika",q:"2 tsp"},{n:"turmeric",q:"1 tsp"},{n:"cinnamon",q:"1/2 tsp"},{n:"garlic",q:"4 cloves"},{n:"lemon",q:"1"},{n:"rice",q:"300g"},{n:"hummus",q:"for serving"},{n:"cucumber",q:"1, diced"},{n:"tomato",q:"2, diced"},{n:"pickled turnip",q:"for serving"},{n:"tahini",q:"for drizzle"}],steps:["Marinate chicken in spices, garlic, lemon, oil 30 min. Grill or pan-fry 5-6 min per side.","Slice chicken. Cook rice.","Build bowls: rice, sliced chicken, hummus, cucumber, tomato, pickled turnip, tahini drizzle."]},
{id:536,name:"Shrimp Po Boy",time:15,servings:4,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/52280335920_4d2be309d2_c.jpg",ing:[{n:"large shrimp",q:"400g, peeled"},{n:"flour",q:"100g"},{n:"cornmeal",q:"50g"},{n:"cajun seasoning",q:"1 tbsp"},{n:"buttermilk",q:"100ml"},{n:"French bread rolls",q:"4"},{n:"lettuce",q:"shredded"},{n:"tomato",q:"1, sliced"},{n:"pickles",q:"sliced"},{n:"remoulade",q:"3 tbsp"},{n:"vegetable oil",q:"for frying"}],steps:["Soak shrimp in buttermilk. Mix flour, cornmeal, cajun seasoning. Coat shrimp.","Fry at 180C 3-4 min until golden and crispy.","Split rolls, spread remoulade. Layer lettuce, tomato, pickles, fried shrimp."]},
{id:537,name:"Green Curry Fried Rice",time:15,servings:2,diff:"Easy",tags:["dairy-free","high-protein"],img:U+"1679279726937-122c49626802?w=600&h=400&fit=crop",ing:[{n:"cooked jasmine rice",q:"400g, day-old"},{n:"green curry paste",q:"2 tbsp"},{n:"chicken breast",q:"200g, diced"},{n:"green beans",q:"80g"},{n:"basil",q:"handful"},{n:"egg",q:"1"},{n:"fish sauce",q:"1 tbsp"},{n:"coconut cream",q:"2 tbsp"},{n:"lime",q:"1"},{n:"garlic",q:"2 cloves"}],steps:["Stir-fry chicken with garlic 3 min. Add curry paste, green beans 2 min.","Add rice, fish sauce, coconut cream. Toss over high heat 2 min.","Push aside, scramble egg. Mix in. Add basil and lime juice."]},
{id:538,name:"Pork Chops with Apple",time:25,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/52444384059_cd4e781f2e_c.jpg",ing:[{n:"bone-in pork chops",q:"4"},{n:"apple",q:"2, sliced"},{n:"butter",q:"30g"},{n:"sage",q:"8 leaves"},{n:"apple cider",q:"100ml"},{n:"Dijon mustard",q:"1 tbsp"},{n:"heavy cream",q:"60ml"},{n:"garlic",q:"2 cloves"},{n:"salt and pepper",q:"to taste"},{n:"mashed potatoes",q:"for serving"}],steps:["Season pork chops. Sear 5 min per side. Remove.","Cook apple slices and sage in butter 3 min. Add garlic, cider, mustard. Simmer 3 min.","Add cream. Return pork chops. Simmer 3 min. Serve with mashed potatoes."]},
{id:539,name:"Lemon Blueberry Scones",time:25,servings:8,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54413997400_c01c4e7ebb_c.jpg",ing:[{n:"flour",q:"300g"},{n:"sugar",q:"60g"},{n:"baking powder",q:"1 tbsp"},{n:"salt",q:"1/4 tsp"},{n:"butter",q:"80g, cold and cubed"},{n:"heavy cream",q:"150ml"},{n:"egg",q:"1"},{n:"lemon zest",q:"2 lemons"},{n:"blueberries",q:"150g"},{n:"powdered sugar",q:"80g"},{n:"lemon juice",q:"2 tbsp"}],steps:["Mix flour, sugar, baking powder, salt. Cut in cold butter until pea-sized. Add zest.","Mix cream and egg, add to flour. Fold in blueberries. Pat into disc, cut into wedges.","Bake 200C 15-18 min until golden. Drizzle with lemon glaze (powdered sugar + lemon juice)."]},

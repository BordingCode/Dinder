function getMon(offset){const d=new Date();d.setDate(d.getDate()+(offset||0)*7);const day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);const mon=new Date(d);mon.setDate(diff);mon.setHours(0,0,0,0);return mon}
function getWD(){const mon=getMon(weekOffset);return DAYS.map((_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return x})}
function changeWeek(delta){weekOffset+=delta;selectedDays.clear();document.getElementById('shopBtn').style.display='none';renderWeek()}
function goToday(){weekOffset=0;selectedDays.clear();document.getElementById('shopBtn').style.display='none';renderWeek()}
function formatDateShort(d){return d.getDate()+'/'+(d.getMonth()+1)}
function formatDateRange(dates){const s=dates[0],e=dates[6];const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return s.getDate()+' '+months[s.getMonth()]+' — '+e.getDate()+' '+months[e.getMonth()]+' '+e.getFullYear()}
function getWeekLabel(){if(weekOffset===0)return'This Week';if(weekOffset===1)return'Next Week';if(weekOffset===-1)return'Last Week';return(weekOffset>0?'+':'')+weekOffset+' Weeks'}
function renderWeek(){
  const g=document.getElementById('weekGrid');g.innerHTML='';
  const dates=getWD();const wp=getWeekPlan();
  document.getElementById('wnTitle').textContent=getWeekLabel();
  document.getElementById('wnDates').textContent=formatDateRange(dates);
  const today=new Date();today.setHours(0,0,0,0);
  DAYS.forEach((day,i)=>{
    const row=document.createElement('div');
    const isToday=dates[i].getTime()===today.getTime();
    row.className='day-row'+(selectedDays.has(day)?' selected':'');
    if(isToday)row.style.borderLeft='3px solid var(--accent)';
    const entry=wp[day];const rec=entry?R.find(r=>r.id===entry.id):null;
    let meals='';if(rec)meals=`<div class="meal-chip" onclick="event.stopPropagation();openDet(R.find(r=>r.id===${rec.id}))"><img src="${rec.img}" alt="">${rec.name}<span class="meal-portions" onclick="event.stopPropagation()"><button class="mp-btn" onclick="adjPlanPortion('${day}',-1)">−</button><span class="mp-val">${entry.portions||rec.servings}</span><button class="mp-btn" onclick="adjPlanPortion('${day}',1)">+</button></span><span class="mx" onclick="event.stopPropagation();rmM('${day}')">×</span></div>`;
    row.innerHTML=`<div class="day-head"><span class="day-name">${DN[day]}${isToday?' · <span style="color:var(--accent);font-size:10px">TODAY</span>':''}</span><span class="day-date">${formatDateShort(dates[i])}</span></div><div class="day-meals">${meals}<button class="add-meal" onclick="event.stopPropagation();openPicker('${day}')">+ Add</button></div>`;
    if(selMode)row.onclick=()=>{selectedDays.has(day)?selectedDays.delete(day):selectedDays.add(day);renderWeek();document.getElementById('shopBtn').style.display=selectedDays.size?'':'none'};
    g.appendChild(row);
  });
}
function rmM(day){getWeekPlan()[day]=null;sv();renderWeek()}
function toggleSelMode(){selMode=!selMode;selectedDays.clear();document.getElementById('selBtn').classList.toggle('sel',selMode);document.getElementById('shopBtn').style.display='none';renderWeek()}
function clearWeek(){const wp=getWeekPlan();DAYS.forEach(d=>wp[d]=null);sv();renderWeek()}
function adjPlanPortion(day,delta){const wp=getWeekPlan();if(!wp[day])return;wp[day].portions=Math.max(1,Math.min(20,wp[day].portions+delta));sv();renderWeek()}

// PICKER
function openPicker(day){pickerDay=day;const ov=document.getElementById('pickerOv'),pk=document.getElementById('picker');const dates=getWD();const dayIdx=DAYS.indexOf(day);const dateStr=dates[dayIdx]?formatDateShort(dates[dayIdx]):'';const all=saved.length?saved:R.slice(0,20);pk.innerHTML=`<h3>Meal for ${DN[day]} ${dateStr}</h3><input class="picker-search" placeholder="Search recipes..." oninput="filterPicker(this.value)"><div id="pickerList">${all.map(r=>`<div class="picker-item" onclick="pickR(${r.id})"><img src="${r.img}" alt=""><div><div class="pi-name">${r.name}</div><div class="pi-time">${r.time} min · ${r.diff}</div></div></div>`).join('')}</div>`;ov.classList.add('open')}
function filterPicker(q){const list=document.getElementById('pickerList');const all=saved.length?saved:R.slice(0,20);const f=all.filter(r=>r.name.toLowerCase().includes(q.toLowerCase()));list.innerHTML=f.map(r=>`<div class="picker-item" onclick="pickR(${r.id})"><img src="${r.img}" alt=""><div><div class="pi-name">${r.name}</div><div class="pi-time">${r.time} min · ${r.diff}</div></div></div>`).join('')||'<div style="text-align:center;color:var(--muted);padding:20px">No matches</div>'}
function closePicker(){document.getElementById('pickerOv').classList.remove('open')}
function pickR(id){const rec=R.find(r=>r.id===id);getWeekPlan()[pickerDay]={id,portions:rec?rec.servings:4};sv();closePicker();renderWeek()}

// SHOPPING LIST
function aggregateQty(qtyArr){const unitMap={};const misc=[];for(const q of qtyArr){const clean=q.split(',')[0].trim();const m=clean.match(/^(\d+\.?\d*)\s*(.*)$/);if(m&&m[1]){let num=parseFloat(m[1]);let unit=m[2].trim().toLowerCase()||'pcs';if(unit==='kg'){num*=1000;unit='g'}if(unit==='l'){num*=1000;unit='ml'}unitMap[unit]=(unitMap[unit]||0)+num}else{if(!misc.includes(q))misc.push(q)}}const parts=[];for(const[unit,total]of Object.entries(unitMap)){let d;if(unit==='g'&&total>=1000)d=+(total/1000).toFixed(2)+'kg';else if(unit==='ml'&&total>=1000)d=+(total/1000).toFixed(2)+'l';else d=(total%1===0?total:+total.toFixed(1))+(unit==='pcs'?'':unit);parts.push(d)}return[...parts,...misc].join(' + ')}
function genShopList(){const wp=getWeekPlan();const days=[...selectedDays].filter(d=>wp[d]);if(!days.length)return alert('Select days with meals!');const ov=document.getElementById('shopOv'),mod=document.getElementById('shopModal');const combined={};days.forEach(d=>{const entry=wp[d];const rec=R.find(r=>r.id===entry.id);if(rec){const portions=entry.portions||rec.servings;rec.ing.forEach(i=>{const k=norm(i.n);const sq=scaleQty(i.q,rec.servings,portions);if(!combined[k])combined[k]={name:i.n,qty:[],days:[],recipes:[]};combined[k].qty.push(sq);combined[k].days.push(DN[d]);if(!combined[k].recipes.includes(rec.name))combined[k].recipes.push(rec.name)})}});const cats={produce:[],protein:[],dairy:[],pantry:[],other:[]};const PW='spinach,tomato,onion,garlic,pepper,carrot,celery,zucchini,cucumber,avocado,lime,lemon,basil,cilantro,parsley,thyme,rosemary,mint,ginger,mushroom,broccoli,bean sprout,cabbage,lettuce,potato,eggplant,cauliflower,orange,green onion,green bean,pea,corn,olive,kale,sweet potato,romaine,snap pea,dill'.split(',');const PR='chicken,beef,lamb,salmon,fish,shrimp,tofu,duck,egg,ground,pork,bacon,tuna,anchovy'.split(',');const DA='cream,cheese,butter,milk,yogurt,parmesan,mozzarella,cheddar,feta,sour cream,ricotta,gruyere'.split(',');for(const[k,v]of Object.entries(combined)){const n=k;if(PW.some(w=>n.includes(w)))cats.produce.push(v);else if(PR.some(w=>n.includes(w)))cats.protein.push(v);else if(DA.some(w=>n.includes(w)))cats.dairy.push(v);else if('salt,pepper,oil,sugar,flour,cornstarch,breadcrumb,seasoning,cumin,paprika,turmeric,oregano,curry,chili,soy sauce,fish sauce,vinegar,honey,paste,broth,wine,mirin,allspice,nutmeg,cinnamon,garam masala,miso,hoisin,bbq sauce,tamarind,vodka,sesame'.split(',').some(w=>n.includes(w)))cats.pantry.push(v);else cats.other.push(v)}const CN={produce:'🥬 Produce',protein:'🥩 Protein',dairy:'🧀 Dairy',pantry:'🫙 Pantry',other:'📦 Other'};let html=`<h2>Shopping List</h2><p class="shop-sub">${getWeekLabel()} — ${days.map(d=>DN[d]).join(', ')}</p>`;for(const[cat,items]of Object.entries(cats)){if(!items.length)continue;html+=`<div class="shop-section"><h4>${CN[cat]}</h4>`;items.forEach(item=>{html+=`<div class="shop-item" data-recipes="${item.recipes.join('|||')}"><div class="shop-check">✓</div><span>${item.name} — ${aggregateQty(item.qty)}</span></div>`});html+=`</div>`}mod.innerHTML=html;attachShopListeners(mod);ov.classList.add('open')}

// LONG-PRESS ON SHOP ITEMS
function attachShopListeners(mod){mod.querySelectorAll('.shop-item').forEach(item=>{let timer=null,lp=false;const start=()=>{lp=false;timer=setTimeout(()=>{lp=true;showRecipeTip(item)},500)};const end=()=>{clearTimeout(timer);if(!lp)item.classList.toggle('done')};const cancel=()=>{clearTimeout(timer)};item.addEventListener('touchstart',start,{passive:true});item.addEventListener('touchend',e=>{e.preventDefault();end()});item.addEventListener('touchmove',cancel,{passive:true});item.addEventListener('mousedown',start);item.addEventListener('mouseup',end);item.addEventListener('mouseleave',cancel)})}
function showRecipeTip(el){document.querySelectorAll('.recipe-tip').forEach(t=>t.remove());const recipes=[...new Set((el.dataset.recipes||'').split('|||'))].filter(Boolean);if(!recipes.length)return;const tip=document.createElement('div');tip.className='recipe-tip';tip.innerHTML='<strong>Used in:</strong><br>'+recipes.map(r=>'• '+r).join('<br>');el.style.position='relative';el.appendChild(tip);const dismiss=()=>{tip.remove();document.removeEventListener('touchstart',dismiss)};setTimeout(()=>document.addEventListener('touchstart',dismiss,{once:true}),10);setTimeout(dismiss,4000)}

// WEEK TEMPLATES
let weekTemplates=[];
try{weekTemplates=JSON.parse(localStorage.getItem('ds5tpl')||'[]')}catch(e){}
function saveTpl(){try{localStorage.setItem('ds5tpl',JSON.stringify(weekTemplates))}catch(e){}}

function openTplModal(){
  const ov=document.getElementById('tplOv'),mod=document.getElementById('tplModal');
  const wp=getWeekPlan();
  const hasContent=DAYS.some(d=>wp[d]);
  let html=`<h2>Week Templates</h2><p class="tpl-sub">Save this week's plan as a template, or load a saved one</p>`;
  // Save form
  html+=`<div class="tpl-save-form"><input type="text" id="tplNameInput" placeholder="Name this week (e.g. Healthy Week)" ${!hasContent?'disabled':''}><button onclick="saveCurrentAsTemplate()" ${!hasContent?'disabled style="opacity:.4"':''}>Save Current Week</button></div>`;
  if(!hasContent) html+=`<p style="font-size:11px;color:var(--muted);margin-top:-10px;margin-bottom:14px">Add meals to this week first to save as template</p>`;
  // List templates
  if(weekTemplates.length){
    html+=weekTemplates.map((t,i)=>{
      const preview=DAYS.map(d=>{const v=t.plan[d];const rid=v?.id||v;const rec=rid?R.find(r=>r.id===rid):null;return rec?DN[d].slice(0,3)+': '+rec.name:null}).filter(Boolean).join(' · ');
      const mealCount=DAYS.filter(d=>t.plan[d]).length;
      return `<div class="tpl-item"><div class="tpl-info" onclick="loadTemplate(${i})"><div class="tpl-name">${t.name}</div><div class="tpl-preview">${mealCount} meals — ${preview||'Empty'}</div></div><button class="tpl-del" onclick="event.stopPropagation();delTemplate(${i})" title="Delete">×</button></div>`;
    }).join('');
  } else {
    html+=`<div class="tpl-empty">No saved templates yet.<br>Plan a week and save it as a template!</div>`;
  }
  mod.innerHTML=html;
  ov.classList.add('open');
}

function saveCurrentAsTemplate(){
  const name=document.getElementById('tplNameInput').value.trim();
  if(!name)return document.getElementById('tplNameInput').style.borderColor='var(--accent)';
  const wp=getWeekPlan();
  const plan={};
  DAYS.forEach(d=>plan[d]=wp[d]||null);
  weekTemplates.push({name,plan,created:Date.now()});
  saveTpl();
  openTplModal(); // refresh
}

function loadTemplate(idx){
  const tpl=weekTemplates[idx];
  if(!tpl)return;
  const wp=getWeekPlan();
  DAYS.forEach(d=>{const v=tpl.plan[d];if(!v)wp[d]=null;else if(typeof v==='number'){const rec=R.find(r=>r.id===v);wp[d]={id:v,portions:rec?rec.servings:4}}else wp[d]=v});
  sv();
  document.getElementById('tplOv').classList.remove('open');
  renderWeek();
}

function delTemplate(idx){
  weekTemplates.splice(idx,1);
  saveTpl();
  openTplModal(); // refresh
}

ub();go('input');
</script>

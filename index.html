{id:659,name:"Beef Teriyaki Stir-Fry",time:20,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/2466/5707209209_873a31bc7b_c.jpg",ing:[{n:"beef sirloin",q:"400g, sliced"},{n:"broccoli",q:"200g"},{n:"bell pepper",q:"1"},{n:"soy sauce",q:"4 tbsp"},{n:"mirin",q:"3 tbsp"},{n:"honey",q:"1 tbsp"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"cornstarch",q:"1 tbsp"},{n:"sesame seeds",q:"1 tbsp"},{n:"rice",q:"for serving"}],steps:["Mix soy, mirin, honey, garlic, ginger, cornstarch for sauce.","Stir-fry beef 2 min over high heat. Remove. Stir-fry vegetables 3 min.","Return beef, pour in sauce. Cook until glossy. Serve over rice with sesame seeds."]},
{id:660,name:"Lemon Drizzle Cake",time:40,servings:8,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/51049948817_702306dac1_c.jpg",ing:[{n:"butter",q:"175g"},{n:"sugar",q:"175g"},{n:"eggs",q:"3"},{n:"flour",q:"175g"},{n:"baking powder",q:"1 tsp"},{n:"lemon",q:"3, zested and juiced"},{n:"milk",q:"2 tbsp"},{n:"granulated sugar for drizzle",q:"80g"}],steps:["Cream butter and sugar. Add eggs one at a time. Fold in flour, baking powder, zest, milk.","Bake in loaf tin 175C 35-40 min until golden and springy.","While hot, poke holes. Mix lemon juice with granulated sugar. Pour over cake. Let soak in."]},
{id:661,name:"Chicken Katsu Curry Udon",time:30,servings:2,diff:"Medium",tags:["high-protein"],img:U+"1562599746-de35a173487a?w=600&h=400&fit=crop",ing:[{n:"chicken breast",q:"2"},{n:"panko",q:"100g"},{n:"egg",q:"1"},{n:"flour",q:"40g"},{n:"udon noodles",q:"300g"},{n:"Japanese curry roux",q:"1/2 block"},{n:"onion",q:"1"},{n:"carrot",q:"1/2"},{n:"green onion",q:"2"}],steps:["Make curry: cook vegetables in 300ml water. Add roux, stir thick.","Bread chicken: flour, egg, panko. Fry golden. Slice.","Cook udon in hot water. Serve in bowls with curry sauce and sliced katsu."]},
{id:662,name:"Pesto Prawn Pasta",time:15,servings:4,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/53096151355_47b6090beb_c.jpg",ing:[{n:"linguine",q:"400g"},{n:"large prawns",q:"400g"},{n:"basil pesto",q:"100g"},{n:"cherry tomatoes",q:"150g"},{n:"garlic",q:"3 cloves"},{n:"white wine",q:"60ml"},{n:"parmesan",q:"40g"},{n:"lemon zest",q:"1 lemon"},{n:"olive oil",q:"2 tbsp"}],steps:["Cook linguine. Sauté garlic 1 min. Cook prawns 2 min per side.","Add wine, tomatoes 2 min. Toss with pesto and linguine.","Top with parmesan and lemon zest."]},
{id:663,name:"Lamb Vindaloo",time:40,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:U+"1662307413736-82cfb4198e4c?w=600&h=400&fit=crop",ing:[{n:"lamb shoulder",q:"600g, cubed"},{n:"onion",q:"2"},{n:"garlic",q:"6 cloves"},{n:"ginger",q:"2 inch"},{n:"kashmiri chili",q:"3 tbsp"},{n:"cumin",q:"1 tsp"},{n:"cinnamon",q:"1/2 tsp"},{n:"cloves",q:"3"},{n:"white vinegar",q:"4 tbsp"},{n:"canned tomatoes",q:"200g"},{n:"mustard seeds",q:"1 tsp"},{n:"oil",q:"3 tbsp"},{n:"rice",q:"for serving"}],steps:["Blend garlic, ginger, spices, vinegar. Marinate lamb 1+ hour.","Fry mustard seeds, add onions until golden. Add paste, cook 5 min.","Add lamb, tomatoes. Cover, simmer 30-35 min. Serve with rice."]},
{id:664,name:"Pho Ga (Chicken Pho)",time:35,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/49342636048_18ebb1c3ab_c.jpg",ing:[{n:"chicken",q:"1 whole or thighs"},{n:"star anise",q:"2"},{n:"cinnamon stick",q:"1"},{n:"ginger",q:"3 inch, charred"},{n:"onion",q:"1, charred"},{n:"fish sauce",q:"3 tbsp"},{n:"sugar",q:"1 tsp"},{n:"rice noodles",q:"400g"},{n:"bean sprouts",q:"100g"},{n:"Thai basil",q:"fresh"},{n:"lime",q:"2"},{n:"hoisin",q:"for serving"},{n:"sriracha",q:"for serving"}],steps:["Simmer chicken with spices, ginger, onion 25-30 min. Shred meat. Strain broth.","Season broth with fish sauce, sugar. Cook noodles.","Assemble: noodles, chicken, broth. Serve with sprouts, basil, lime, hoisin, sriracha."]},
{id:665,name:"Chicken Caesar Salad Wrap",time:10,servings:2,diff:"Easy",tags:["high-protein"],img:U+"1580013759032-c96505e24c1f?w=600&h=400&fit=crop",ing:[{n:"grilled chicken",q:"250g, sliced"},{n:"flour tortillas",q:"2"},{n:"romaine",q:"4 leaves"},{n:"parmesan",q:"30g"},{n:"Caesar dressing",q:"3 tbsp"},{n:"croutons",q:"crushed"},{n:"lemon",q:"1/2"}],steps:["Toss romaine with dressing and parmesan.","Layer on tortillas with chicken and crushed croutons.","Squeeze lemon, roll tightly, cut diagonally."]},
{id:666,name:"Honey Sriracha Salmon",time:20,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/7294/27850172026_7f34583b26_c.jpg",ing:[{n:"salmon fillets",q:"4"},{n:"honey",q:"3 tbsp"},{n:"sriracha",q:"2 tbsp"},{n:"soy sauce",q:"1 tbsp"},{n:"garlic",q:"2 cloves"},{n:"lime",q:"1"},{n:"sesame seeds",q:"1 tbsp"},{n:"green onion",q:"2"},{n:"rice",q:"for serving"}],steps:["Mix honey, sriracha, soy sauce, garlic, lime juice. Brush over salmon.","Bake 200C 12-15 min until caramelized.","Top with sesame seeds and green onion. Serve with rice and vegetables."]},
{id:667,name:"Chicken Quesadilla Bowl",time:15,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/7190/6944164218_1f08dafefb_c.jpg",ing:[{n:"chicken breast",q:"400g, seasoned and grilled"},{n:"rice",q:"250g"},{n:"black beans",q:"1 can"},{n:"corn",q:"1 can"},{n:"cheddar",q:"100g, shredded"},{n:"sour cream",q:"80ml"},{n:"pico de gallo",q:"100g"},{n:"guacamole",q:"100g"},{n:"lime",q:"1"},{n:"cilantro",q:"fresh"}],steps:["Grill seasoned chicken. Slice.","Cook cilantro-lime rice. Warm beans.","Build bowls: rice, chicken, beans, corn, cheese, pico, guacamole, sour cream, lime."]},
{id:668,name:"Pork Tonkatsu Ramen",time:30,servings:2,diff:"Medium",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/53087204117_218dea700f_c.jpg",ing:[{n:"pork cutlets",q:"2, breaded and fried"},{n:"ramen noodles",q:"200g"},{n:"tonkotsu broth",q:"500ml"},{n:"soy sauce",q:"2 tbsp"},{n:"soft-boiled egg",q:"2"},{n:"green onion",q:"2"},{n:"corn",q:"from 1/2 ear"},{n:"nori",q:"for serving"},{n:"sesame seeds",q:"1 tbsp"}],steps:["Fry breaded pork cutlets until golden. Slice.","Heat broth, season with soy sauce. Cook noodles.","Assemble: noodles, broth, sliced tonkatsu, egg, corn, green onion, nori, sesame seeds."]},
{id:669,name:"Mediterranean Pasta Salad",time:15,servings:6,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54998718033_8c7b8a9bfd_c.jpg",ing:[{n:"fusilli",q:"400g"},{n:"cucumber",q:"1, diced"},{n:"cherry tomatoes",q:"200g"},{n:"kalamata olives",q:"60g"},{n:"red onion",q:"1/2"},{n:"feta",q:"100g, cubed"},{n:"bell pepper",q:"1, diced"},{n:"olive oil",q:"4 tbsp"},{n:"red wine vinegar",q:"2 tbsp"},{n:"oregano",q:"1 tsp"},{n:"basil",q:"fresh"}],steps:["Cook fusilli, cool under cold water.","Combine with all vegetables, olives, feta.","Dress with oil, vinegar, oregano, salt, pepper. Toss well. Best after 1 hour."]},
{id:670,name:"Chicken Tikka Masala Bowl",time:30,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://images.unsplash.com/photo-1632057153803-dece2e78310f?w=600&h=400&fit=crop",ing:[{n:"chicken thighs",q:"600g"},{n:"tikka masala sauce",q:"400ml"},{n:"basmati rice",q:"300g"},{n:"naan",q:"4"},{n:"cucumber raita",q:"for serving"},{n:"pickled onion",q:"for serving"},{n:"cilantro",q:"fresh"},{n:"lemon",q:"1"}],steps:["Marinate and cook chicken tikka. Simmer in masala sauce 10 min.","Cook basmati rice. Warm naan.","Build bowls: rice, tikka masala, raita, pickled onion, cilantro, lemon."]},
{id:671,name:"Butter Chicken Pizza",time:25,servings:2,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55150476097_ca4aebfdf3_c.jpg",ing:[{n:"pizza dough",q:"300g"},{n:"butter chicken sauce",q:"200ml"},{n:"cooked chicken tikka",q:"200g"},{n:"mozzarella",q:"150g"},{n:"red onion",q:"1/2, sliced"},{n:"cilantro",q:"fresh"},{n:"green chili",q:"1"},{n:"garlic naan seasoning",q:"optional"}],steps:["Stretch dough. Spread butter chicken sauce. Add mozzarella, chicken, onion.","Bake at max heat 8-12 min.","Top with cilantro, sliced chili."]},
{id:672,name:"Chicken Pad See Ew",time:20,servings:2,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/5450/7194203866_c12f4cb3bf_c.jpg",ing:[{n:"wide rice noodles",q:"250g"},{n:"chicken breast",q:"200g, sliced"},{n:"Chinese broccoli",q:"200g"},{n:"garlic",q:"3 cloves"},{n:"egg",q:"1"},{n:"dark soy sauce",q:"2 tbsp"},{n:"light soy sauce",q:"1 tbsp"},{n:"oyster sauce",q:"1 tbsp"},{n:"sugar",q:"1 tsp"},{n:"white pepper",q:"pinch"},{n:"vegetable oil",q:"2 tbsp"}],steps:["Soak noodles if dried. Stir-fry chicken 3 min. Remove.","Add broccoli, garlic 2 min. Push aside, scramble egg.","Add noodles, all sauces, sugar. Return chicken. Toss over high heat until slightly charred."]},
{id:673,name:"Crispy Tofu Bowl",time:20,servings:2,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free"],img:"https://live.staticflickr.com/4855/32077353867_aaa9d1f784_c.jpg",ing:[{n:"firm tofu",q:"400g"},{n:"cornstarch",q:"2 tbsp"},{n:"soy sauce",q:"3 tbsp"},{n:"maple syrup",q:"1 tbsp"},{n:"sriracha",q:"1 tsp"},{n:"rice",q:"250g"},{n:"avocado",q:"1"},{n:"cucumber",q:"1"},{n:"edamame",q:"80g"},{n:"sesame seeds",q:"1 tbsp"},{n:"green onion",q:"2"}],steps:["Cube tofu, coat in cornstarch. Pan-fry until crispy.","Toss with soy sauce, maple syrup, sriracha.","Build bowls: rice, crispy tofu, avocado, cucumber, edamame, sesame seeds, green onion."]},
{id:674,name:"Beef Enchiladas",time:35,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54973670336_1721e2b537_c.jpg",ing:[{n:"ground beef",q:"400g"},{n:"enchilada sauce",q:"500ml"},{n:"flour tortillas",q:"8"},{n:"cheddar",q:"200g, shredded"},{n:"onion",q:"1, diced"},{n:"garlic",q:"2 cloves"},{n:"cumin",q:"1 tsp"},{n:"black beans",q:"1 can"},{n:"sour cream",q:"100ml"},{n:"cilantro",q:"fresh"}],steps:["Brown beef with onion, garlic, cumin. Add beans and half the cheese.","Fill tortillas, roll, place seam-down. Pour enchilada sauce over.","Top with remaining cheese. Bake 180C 20 min. Top with sour cream and cilantro."]},
{id:675,name:"Miso Chicken",time:25,servings:4,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/54937016001_2b17818a53_c.jpg",ing:[{n:"chicken thighs",q:"8, boneless"},{n:"white miso paste",q:"3 tbsp"},{n:"mirin",q:"2 tbsp"},{n:"sake",q:"1 tbsp"},{n:"sugar",q:"1 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"rice",q:"for serving"},{n:"steamed vegetables",q:"for serving"},{n:"sesame seeds",q:"for garnish"}],steps:["Mix miso, mirin, sake, sugar, sesame oil. Coat chicken. Marinate 30+ min.","Broil or grill 5-6 min per side until caramelized.","Serve with rice and steamed vegetables. Garnish with sesame seeds."]},
{id:676,name:"Crispy Pork Belly Tacos",time:25,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55149426033_0c8e8bff02_c.jpg",ing:[{n:"pork belly",q:"500g, cubed"},{n:"five spice",q:"1 tsp"},{n:"corn tortillas",q:"8"},{n:"pickled red onion",q:"for serving"},{n:"avocado",q:"1"},{n:"cilantro",q:"fresh"},{n:"lime",q:"2"},{n:"salsa verde",q:"for serving"},{n:"radish",q:"sliced"}],steps:["Season pork belly with five spice, salt. Pan-fry 10-12 min until very crispy.","Warm tortillas.","Fill with crispy pork belly, pickled onion, avocado, cilantro, radish, salsa verde, lime."]},
{id:677,name:"Chicken Korma Curry",time:35,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/52498742951_b4e81d839a_c.jpg",ing:[{n:"chicken thighs",q:"600g, cubed"},{n:"onion",q:"1"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"almonds",q:"50g, ground"},{n:"yogurt",q:"100g"},{n:"cream",q:"100ml"},{n:"garam masala",q:"2 tsp"},{n:"cardamom",q:"3 pods"},{n:"butter",q:"30g"},{n:"cilantro",q:"fresh"},{n:"rice",q:"for serving"}],steps:["Sauté onion 5 min. Add garlic, ginger, spices. Add chicken 3 min.","Add yogurt, almonds. Simmer 20 min.","Stir in cream. Top with cilantro. Serve with rice and naan."]},
{id:678,name:"Pork Fried Noodles",time:15,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/54885259941_1d75d0b1a9_c.jpg",ing:[{n:"egg noodles",q:"300g"},{n:"pork tenderloin",q:"300g, sliced"},{n:"cabbage",q:"100g, shredded"},{n:"carrot",q:"1"},{n:"garlic",q:"3 cloves"},{n:"soy sauce",q:"3 tbsp"},{n:"oyster sauce",q:"1 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"green onion",q:"3"},{n:"chili flakes",q:"optional"}],steps:["Cook noodles. Stir-fry pork 3 min. Add garlic, cabbage, carrot 2 min.","Add noodles, soy sauce, oyster sauce. Toss over high heat 2 min.","Finish with sesame oil and green onion."]},
{id:679,name:"Banana Foster",time:10,servings:2,diff:"Easy",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/65535/52005410459_d9e32870e9_c.jpg",ing:[{n:"bananas",q:"2, halved lengthwise"},{n:"butter",q:"40g"},{n:"brown sugar",q:"60g"},{n:"dark rum",q:"60ml"},{n:"cinnamon",q:"1/2 tsp"},{n:"vanilla ice cream",q:"for serving"},{n:"walnuts",q:"optional"}],steps:["Melt butter with brown sugar and cinnamon until bubbling.","Add bananas, cook 1-2 min per side. Add rum, flambe (careful!).","Spoon bananas and caramel sauce over vanilla ice cream."]},
{id:680,name:"Chicken Green Curry",time:25,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55100738025_1d1ec0dc2e_c.jpg",ing:[{n:"chicken thighs",q:"500g, sliced"},{n:"coconut milk",q:"400ml"},{n:"green curry paste",q:"3 tbsp"},{n:"Thai eggplant",q:"100g"},{n:"bamboo shoots",q:"100g"},{n:"green beans",q:"80g"},{n:"fish sauce",q:"2 tbsp"},{n:"palm sugar",q:"1 tsp"},{n:"Thai basil",q:"handful"},{n:"kaffir lime leaves",q:"4"},{n:"rice",q:"for serving"}],steps:["Fry curry paste in coconut cream 2 min. Add chicken 3 min.","Add remaining coconut milk, vegetables, lime leaves, fish sauce, sugar. Simmer 12 min.","Add Thai basil. Serve over jasmine rice."]},
{id:681,name:"Grilled Chicken Pesto Pasta",time:20,servings:4,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/5347/8870362090_c27fa92e97_c.jpg",ing:[{n:"penne",q:"400g"},{n:"chicken breast",q:"2, grilled"},{n:"basil pesto",q:"100g"},{n:"sun-dried tomatoes",q:"60g"},{n:"pine nuts",q:"30g"},{n:"parmesan",q:"40g"},{n:"arugula",q:"50g"},{n:"olive oil",q:"1 tbsp"},{n:"lemon juice",q:"1 tbsp"}],steps:["Cook penne. Grill and slice chicken.","Toss pasta with pesto, sun-dried tomatoes, pasta water.","Add chicken, arugula, pine nuts. Top with parmesan and lemon juice."]},
{id:682,name:"Beef Pho Bo",time:45,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:U+"1692298964251-3b9550c378cd?w=600&h=400&fit=crop",ing:[{n:"beef bones",q:"1kg"},{n:"beef brisket",q:"300g"},{n:"beef sirloin",q:"200g, sliced thin"},{n:"star anise",q:"3"},{n:"cinnamon stick",q:"1"},{n:"ginger",q:"3 inch, charred"},{n:"onion",q:"1, charred"},{n:"fish sauce",q:"3 tbsp"},{n:"rock sugar",q:"1 tbsp"},{n:"rice noodles",q:"400g"},{n:"bean sprouts",q:"100g"},{n:"Thai basil",q:"fresh"},{n:"lime",q:"2"}],steps:["Simmer bones and brisket with spices 40 min. Strain. Season with fish sauce, sugar.","Cook noodles. Slice brisket thin.","Assemble: noodles, brisket, raw sirloin. Pour boiling broth over. Serve with sprouts, basil, lime."]},
{id:683,name:"Chicken Pot Pie with Biscuits",time:40,servings:6,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/2795/4253183479_07233720d8_c.jpg",ing:[{n:"chicken breast",q:"400g, cooked and diced"},{n:"carrot",q:"2"},{n:"celery",q:"2"},{n:"onion",q:"1"},{n:"peas",q:"100g"},{n:"chicken broth",q:"300ml"},{n:"heavy cream",q:"100ml"},{n:"butter",q:"40g"},{n:"flour",q:"30g"},{n:"thyme",q:"fresh"},{n:"biscuit dough",q:"from scratch or canned"}],steps:["Make filling: sauté vegetables 5 min. Add flour, broth, cream. Simmer 5 min. Add chicken, peas.","Pour into baking dish. Top with biscuit dough rounds.","Bake 200C 18-20 min until biscuits are golden and filling is bubbly."]},
{id:684,name:"Salmon Teriyaki Bowl",time:20,servings:2,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/52978050225_9c3f51ea5d_c.jpg",ing:[{n:"salmon fillet",q:"300g"},{n:"soy sauce",q:"4 tbsp"},{n:"mirin",q:"3 tbsp"},{n:"sake",q:"1 tbsp"},{n:"sugar",q:"1 tbsp"},{n:"rice",q:"250g"},{n:"avocado",q:"1"},{n:"edamame",q:"80g"},{n:"cucumber",q:"1"},{n:"sesame seeds",q:"1 tbsp"},{n:"green onion",q:"2"}],steps:["Make teriyaki: simmer soy, mirin, sake, sugar until syrupy.","Pan-sear salmon 4 min per side. Brush with teriyaki.","Build bowls: rice, salmon, avocado, cucumber, edamame, green onion, sesame seeds."]},
{id:685,name:"Shrimp Alfredo",time:20,servings:4,diff:"Easy",tags:["high-protein"],img:U+"1760390952135-12da7267ff8f?w=600&h=400&fit=crop",ing:[{n:"fettuccine",q:"400g"},{n:"large shrimp",q:"400g"},{n:"heavy cream",q:"300ml"},{n:"parmesan",q:"80g"},{n:"garlic",q:"4 cloves"},{n:"butter",q:"40g"},{n:"white wine",q:"60ml"},{n:"parsley",q:"fresh"},{n:"lemon zest",q:"1 lemon"},{n:"black pepper",q:"1 tsp"}],steps:["Cook fettuccine. Sauté shrimp and garlic in butter 2 min per side. Add wine.","Add cream, simmer 3 min. Stir in parmesan.","Toss with fettuccine. Top with parsley, lemon zest, pepper."]},
{id:686,name:"Chicken Teriyaki Stir Fry",time:20,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/5340/8869903951_27c114ea93_c.jpg",ing:[{n:"chicken thighs",q:"500g, sliced"},{n:"broccoli",q:"200g"},{n:"bell pepper",q:"1"},{n:"snap peas",q:"100g"},{n:"soy sauce",q:"4 tbsp"},{n:"mirin",q:"3 tbsp"},{n:"honey",q:"1 tbsp"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"cornstarch",q:"1 tbsp"},{n:"sesame seeds",q:"1 tbsp"},{n:"rice",q:"for serving"}],steps:["Mix soy, mirin, honey, garlic, ginger, cornstarch for sauce.","Stir-fry chicken 4 min. Add vegetables 3 min.","Pour sauce, cook until glossy. Serve over rice with sesame seeds."]},
{id:687,name:"Lamb Meatball Sub",time:25,servings:4,diff:"Medium",tags:["high-protein"],img:U+"1669251034889-33e3036a531d?w=600&h=400&fit=crop",ing:[{n:"ground lamb",q:"500g"},{n:"breadcrumbs",q:"40g"},{n:"egg",q:"1"},{n:"garlic",q:"3 cloves"},{n:"cumin",q:"1 tsp"},{n:"paprika",q:"1 tsp"},{n:"parsley",q:"fresh"},{n:"marinara sauce",q:"300ml"},{n:"provolone",q:"100g"},{n:"sub rolls",q:"4"},{n:"olive oil",q:"2 tbsp"}],steps:["Mix lamb with breadcrumbs, egg, garlic, spices, parsley. Form meatballs.","Brown in oil. Add marinara, simmer 15 min.","Fill rolls with meatballs and sauce. Top with provolone, broil until melted."]},
{id:688,name:"Chicken Tikka Bowl",time:25,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/878/41774543914_9a62995a73_c.jpg",ing:[{n:"chicken thighs",q:"600g, cubed"},{n:"yogurt",q:"150g"},{n:"tikka masala",q:"2 tbsp"},{n:"ginger-garlic paste",q:"2 tbsp"},{n:"rice",q:"300g"},{n:"cucumber raita",q:"for serving"},{n:"naan",q:"for serving"},{n:"pickled onion",q:"for serving"},{n:"cilantro",q:"fresh"}],steps:["Marinate chicken in yogurt, masala, ginger-garlic 1+ hour.","Grill or broil until charred. Cook rice.","Build bowls: rice, chicken tikka, raita, pickled onion, cilantro. Serve with naan."]},

{id:690,name:"Pork Bulgogi",time:25,servings:4,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/55108472416_2bc6b2ac6e_c.jpg",ing:[{n:"pork shoulder",q:"500g, thinly sliced"},{n:"gochujang",q:"2 tbsp"},{n:"soy sauce",q:"3 tbsp"},{n:"sesame oil",q:"2 tbsp"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"1 inch"},{n:"sugar",q:"2 tbsp"},{n:"green onion",q:"3"},{n:"sesame seeds",q:"1 tbsp"},{n:"rice",q:"for serving"},{n:"lettuce",q:"for wrapping"}],steps:["Mix gochujang, soy sauce, sesame oil, garlic, ginger, sugar. Marinate pork 30+ min.","Grill or pan-fry over high heat 2-3 min per side until caramelized.","Serve with rice, lettuce wraps, green onion, sesame seeds."]},
{id:691,name:"Chicken Fried Steak Sandwich",time:20,servings:2,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/51400718665_32921659d1_c.jpg",ing:[{n:"cube steak",q:"2"},{n:"flour",q:"100g"},{n:"buttermilk",q:"80ml"},{n:"egg",q:"1"},{n:"garlic powder",q:"1 tsp"},{n:"cayenne",q:"1/4 tsp"},{n:"brioche buns",q:"2"},{n:"pickles",q:"sliced"},{n:"lettuce",q:"leaves"},{n:"peppercorn gravy",q:"for serving"}],steps:["Dip steak in buttermilk-egg, then seasoned flour (double coat for extra crunch).","Fry 4 min per side until golden.","Serve on bun with pickles, lettuce, and peppercorn gravy."]},
{id:692,name:"Mango Curry Chicken",time:25,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:U+"1530451603554-a722fbf0a8f0?w=600&h=400&fit=crop",ing:[{n:"chicken thighs",q:"600g"},{n:"mango",q:"2 or 1 can puree"},{n:"coconut milk",q:"200ml"},{n:"curry paste",q:"2 tbsp"},{n:"onion",q:"1"},{n:"garlic",q:"3 cloves"},{n:"fish sauce",q:"1 tbsp"},{n:"lime",q:"1"},{n:"basil",q:"fresh"},{n:"rice",q:"for serving"}],steps:["Fry paste with onion, garlic 3 min. Add chicken, cook 5 min.","Add coconut milk, mango. Simmer 15 min.","Season with fish sauce, lime. Serve over rice with basil."]},
{id:693,name:"Chicken and Broccoli",time:20,servings:3,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54950416458_b9041ea39e_c.jpg",ing:[{n:"chicken breast",q:"400g, sliced"},{n:"broccoli",q:"300g"},{n:"garlic",q:"3 cloves"},{n:"soy sauce",q:"3 tbsp"},{n:"oyster sauce",q:"2 tbsp"},{n:"ginger",q:"1 inch"},{n:"cornstarch",q:"1 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"rice",q:"for serving"}],steps:["Toss chicken with cornstarch and 1 tbsp soy. Stir-fry 3 min. Remove.","Blanch broccoli. Stir-fry garlic, ginger 30 sec. Add broccoli.","Return chicken with remaining soy, oyster sauce. Toss. Serve over rice."]},
{id:694,name:"Orecchiette with Sausage and Rapini",time:20,servings:4,diff:"Easy",tags:["high-protein"],img:U+"1567608285969-48e4bbe0d399?w=600&h=400&fit=crop",ing:[{n:"orecchiette",q:"400g"},{n:"Italian sausage",q:"300g, casings removed"},{n:"broccoli rabe",q:"300g"},{n:"garlic",q:"4 cloves"},{n:"red pepper flakes",q:"1 tsp"},{n:"olive oil",q:"3 tbsp"},{n:"pecorino",q:"40g"},{n:"lemon zest",q:"1 lemon"}],steps:["Cook orecchiette with rapini last 3 min.","Brown crumbled sausage. Add garlic, pepper flakes 1 min.","Toss pasta, rapini with sausage. Add olive oil, pecorino, lemon zest, pasta water."]},
{id:695,name:"Coconut Curry Shrimp",time:20,servings:3,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:U+"1770966485209-e20d97337f1a?w=600&h=400&fit=crop",ing:[{n:"large shrimp",q:"400g"},{n:"coconut milk",q:"400ml"},{n:"red curry paste",q:"2 tbsp"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"lime",q:"1"},{n:"fish sauce",q:"1 tbsp"},{n:"basil",q:"fresh"},{n:"rice",q:"for serving"}],steps:["Fry curry paste with garlic, ginger 2 min.","Add coconut milk, fish sauce. Simmer 5 min.","Add shrimp 3-4 min. Add lime, basil. Serve over rice."]},
{id:696,name:"Shakshuka with Mushrooms",time:25,servings:3,diff:"Easy",tags:["vegetarian","gluten-free","nut-free"],img:"https://live.staticflickr.com/5161/5235256806_458e06c605_c.jpg",ing:[{n:"eggs",q:"6"},{n:"mushrooms",q:"300g, sliced"},{n:"canned tomatoes",q:"800g"},{n:"onion",q:"1"},{n:"garlic",q:"3 cloves"},{n:"thyme",q:"fresh"},{n:"smoked paprika",q:"1 tsp"},{n:"goat cheese",q:"50g"},{n:"parsley",q:"fresh"},{n:"olive oil",q:"2 tbsp"},{n:"toast",q:"for serving"}],steps:["Sauté mushrooms until golden 6 min. Add onion, garlic, spices.","Add tomatoes, thyme. Simmer 8 min.","Make wells, crack eggs. Cover 5-8 min. Top with goat cheese and parsley."]},
{id:697,name:"Vietnamese Lemongrass Pork Chops",time:25,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/5539/14283907989_100da0e836_c.jpg",ing:[{n:"pork chops",q:"4, bone-in"},{n:"lemongrass",q:"3 stalks, minced"},{n:"garlic",q:"4 cloves"},{n:"fish sauce",q:"3 tbsp"},{n:"sugar",q:"2 tbsp"},{n:"shallot",q:"2"},{n:"chili",q:"1"},{n:"green onion",q:"3"},{n:"rice",q:"for serving"},{n:"nuoc cham",q:"for serving"}],steps:["Mince lemongrass finely. Mix with garlic, fish sauce, sugar, shallot, chili. Marinate pork 1+ hour.","Grill chops 5-6 min per side until charred.","Serve with steamed rice, nuoc cham dipping sauce, and fresh herbs."]},
{id:698,name:"Chicken Parmesan Pasta",time:25,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54530770857_8cac9dc4de_c.jpg",ing:[{n:"spaghetti",q:"400g"},{n:"chicken breast",q:"4, pounded"},{n:"marinara sauce",q:"400ml"},{n:"mozzarella",q:"100g, shredded"},{n:"parmesan",q:"40g"},{n:"breadcrumbs",q:"100g"},{n:"egg",q:"1"},{n:"flour",q:"50g"},{n:"basil",q:"fresh"}],steps:["Bread and fry chicken 4 min per side. Top with marinara, mozzarella. Broil 2 min.","Cook spaghetti. Toss with remaining marinara.","Serve chicken on pasta. Top with parmesan and basil."]},
{id:699,name:"Thai Peanut Chicken",time:25,servings:4,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/54950752775_84a3184c1a_c.jpg",ing:[{n:"chicken thighs",q:"600g"},{n:"peanut butter",q:"3 tbsp"},{n:"soy sauce",q:"2 tbsp"},{n:"coconut milk",q:"200ml"},{n:"lime",q:"1"},{n:"sriracha",q:"2 tsp"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"cilantro",q:"fresh"},{n:"peanuts",q:"30g"},{n:"rice",q:"for serving"}],steps:["Sear chicken 5 min per side. Remove.","Make sauce: peanut butter, soy, coconut milk, lime, sriracha, garlic, ginger. Simmer 5 min.","Return chicken, simmer 10 min. Serve over rice with cilantro and crushed peanuts."]},
{id:700,name:"Beef Stir-Fry with Oyster Sauce",time:15,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/3642/3498205958_c863b74b6f_c.jpg",ing:[{n:"beef sirloin",q:"400g, sliced"},{n:"broccoli",q:"200g"},{n:"bell pepper",q:"1"},{n:"mushrooms",q:"100g"},{n:"oyster sauce",q:"3 tbsp"},{n:"soy sauce",q:"1 tbsp"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"cornstarch",q:"1 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"rice",q:"for serving"}],steps:["Toss beef with cornstarch and soy sauce. Sear in batches 2 min. Remove.","Stir-fry vegetables 3 min. Add garlic, ginger.","Return beef with oyster sauce, sesame oil. Toss. Serve over rice."]},
{id:701,name:"Chicken Thai Green Curry",time:25,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:U+"1658218615066-660f7c936926?w=600&h=400&fit=crop",ing:[{n:"chicken breast",q:"500g, sliced"},{n:"coconut milk",q:"400ml"},{n:"green curry paste",q:"3 tbsp"},{n:"zucchini",q:"1, sliced"},{n:"baby corn",q:"100g"},{n:"bamboo shoots",q:"100g"},{n:"fish sauce",q:"2 tbsp"},{n:"palm sugar",q:"1 tsp"},{n:"Thai basil",q:"fresh"},{n:"kaffir lime leaves",q:"4"},{n:"rice",q:"for serving"}],steps:["Fry paste in coconut cream 2 min. Add chicken 3 min.","Add remaining coconut milk, vegetables, lime leaves. Simmer 12 min.","Season with fish sauce, sugar. Add basil. Serve over rice."]},
{id:702,name:"Prawn Laksa",time:25,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54125754125_3b6ef47c55_c.jpg",ing:[{n:"large prawns",q:"400g"},{n:"laksa paste",q:"4 tbsp"},{n:"coconut milk",q:"400ml"},{n:"chicken broth",q:"400ml"},{n:"rice noodles",q:"300g"},{n:"tofu puffs",q:"100g"},{n:"bean sprouts",q:"100g"},{n:"hard-boiled egg",q:"2"},{n:"cilantro",q:"fresh"},{n:"lime",q:"1"},{n:"fish sauce",q:"2 tbsp"}],steps:["Fry laksa paste 2 min. Add coconut milk and broth.","Add prawns, cook 3-4 min. Season with fish sauce.","Cook noodles. Assemble: noodles, broth, prawns, tofu, sprouts, egg, cilantro, lime."]},
{id:703,name:"Miso Salmon Bowl",time:20,servings:2,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/51033578091_893bd61560_c.jpg",ing:[{n:"salmon fillet",q:"300g"},{n:"white miso paste",q:"2 tbsp"},{n:"mirin",q:"1 tbsp"},{n:"soy sauce",q:"1 tbsp"},{n:"rice",q:"250g"},{n:"avocado",q:"1"},{n:"cucumber",q:"1"},{n:"edamame",q:"80g"},{n:"sesame seeds",q:"1 tbsp"},{n:"green onion",q:"2"},{n:"pickled ginger",q:"for serving"}],steps:["Glaze salmon with miso, mirin, soy. Broil 8-10 min until caramelized.","Season rice with vinegar.","Build bowls: rice, flaked salmon, avocado, cucumber, edamame, green onion, sesame seeds, ginger."]},
{id:704,name:"One-Pot Tuscan Chicken Pasta",time:25,servings:4,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/6127/5919551885_fc7804fce9_c.jpg",ing:[{n:"chicken breast",q:"400g, sliced"},{n:"penne",q:"350g"},{n:"sun-dried tomatoes",q:"60g"},{n:"spinach",q:"100g"},{n:"chicken broth",q:"500ml"},{n:"heavy cream",q:"150ml"},{n:"parmesan",q:"50g"},{n:"garlic",q:"4 cloves"},{n:"Italian seasoning",q:"1 tsp"},{n:"olive oil",q:"2 tbsp"}],steps:["Sear chicken with garlic. Add broth, pasta. Cover, simmer 12 min.","Add sun-dried tomatoes, cream, parmesan, seasoning.","Add spinach, stir until wilted. Serve immediately."]},
{id:705,name:"Crispy Chicken Sandwich",time:20,servings:4,diff:"Easy",tags:["high-protein"],img:U+"1761515397046-44035db91504?w=600&h=400&fit=crop",ing:[{n:"chicken breast",q:"4, pounded"},{n:"buttermilk",q:"200ml"},{n:"flour",q:"120g"},{n:"paprika",q:"1 tsp"},{n:"cayenne",q:"1/4 tsp"},{n:"brioche buns",q:"4"},{n:"pickles",q:"sliced"},{n:"mayo",q:"2 tbsp"},{n:"lettuce",q:"leaves"},{n:"hot sauce",q:"optional"}],steps:["Soak chicken in buttermilk 30 min. Coat in seasoned flour.","Fry at 180C 5-6 min per side until golden and crispy.","Assemble: bun, mayo, lettuce, chicken, pickles, hot sauce."]},
{id:706,name:"Beef Noodle Stir-Fry",time:15,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/54484257377_678c6be0ed_c.jpg",ing:[{n:"egg noodles",q:"300g"},{n:"beef sirloin",q:"300g, sliced"},{n:"broccoli",q:"150g"},{n:"bell pepper",q:"1"},{n:"soy sauce",q:"3 tbsp"},{n:"oyster sauce",q:"1 tbsp"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"sesame oil",q:"1 tsp"},{n:"green onion",q:"3"}],steps:["Cook noodles. Sear beef 2 min. Remove.","Stir-fry vegetables 3 min. Add garlic, ginger.","Return beef with noodles, soy sauce, oyster sauce. Toss. Finish with sesame oil, green onion."]},
{id:707,name:"Chicken Katsu Salad Bowl",time:20,servings:2,diff:"Easy",tags:["high-protein"],img:U+"1721076011480-0e6e3470eba8?w=600&h=400&fit=crop",ing:[{n:"chicken breast",q:"2"},{n:"panko",q:"100g"},{n:"egg",q:"1"},{n:"flour",q:"40g"},{n:"mixed greens",q:"150g"},{n:"avocado",q:"1"},{n:"cucumber",q:"1"},{n:"edamame",q:"80g"},{n:"sesame dressing",q:"3 tbsp"},{n:"sesame seeds",q:"1 tbsp"}],steps:["Bread chicken: flour, egg, panko. Fry golden. Slice.","Arrange greens, avocado, cucumber, edamame in bowls.","Top with sliced katsu, sesame dressing, sesame seeds."]},

{id:710,name:"Honey Garlic Chicken Stir-Fry",time:20,servings:4,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/54612816390_d8d7d07a74_c.jpg",ing:[{n:"chicken thighs",q:"600g, cubed"},{n:"broccoli",q:"200g"},{n:"bell pepper",q:"1"},{n:"honey",q:"3 tbsp"},{n:"soy sauce",q:"3 tbsp"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"1 inch"},{n:"cornstarch",q:"1 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"sesame seeds",q:"1 tbsp"},{n:"rice",q:"for serving"}],steps:["Toss chicken with cornstarch. Stir-fry 4 min. Remove.","Stir-fry vegetables 3 min.","Mix honey, soy, garlic, ginger. Return chicken. Pour sauce, cook until glossy. Serve over rice."]},

{id:978,name:"Spicy Salmon Chirashi",time:15,servings:2,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:U+"1728069930280-8023a4226706?w=600&h=400&fit=crop",ing:[{n:"sushi-grade salmon",q:"300g, diced"},{n:"sushi rice",q:"250g"},{n:"sriracha mayo",q:"2 tbsp"},{n:"soy sauce",q:"2 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"tobiko",q:"2 tbsp"},{n:"avocado",q:"1"},{n:"cucumber",q:"1"},{n:"nori",q:"shredded"},{n:"sesame seeds",q:"1 tbsp"},{n:"green onion",q:"2"}],steps:["Season rice. Dice salmon.","Spread rice in bowls. Scatter salmon, avocado, cucumber on top.","Drizzle sriracha mayo, soy. Top with tobiko, nori, sesame, green onion."]},
{id:979,name:"Lamb Rack with Herb Crust",time:30,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/5771/22829475098_47f18a1087_c.jpg",ing:[{n:"rack of lamb",q:"2, frenched"},{n:"Dijon mustard",q:"3 tbsp"},{n:"breadcrumbs",q:"80g"},{n:"parsley",q:"2 tbsp"},{n:"rosemary",q:"1 tbsp"},{n:"garlic",q:"3 cloves"},{n:"olive oil",q:"2 tbsp"},{n:"salt and pepper",q:"to taste"},{n:"roasted potatoes",q:"for serving"}],steps:["Season and sear rack on all sides. Brush with mustard.","Mix breadcrumbs, herbs, garlic, oil. Press onto lamb.","Roast 200C 18-22 min for medium-rare. Rest 10 min. Carve between bones."]},
{id:980,name:"Tom Yum Noodle Soup",time:20,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/938/43711012341_893fb5fba0_c.jpg",ing:[{n:"rice noodles",q:"300g"},{n:"shrimp",q:"300g"},{n:"mushrooms",q:"150g"},{n:"lemongrass",q:"3 stalks"},{n:"galangal",q:"5 slices"},{n:"kaffir lime leaves",q:"5"},{n:"fish sauce",q:"3 tbsp"},{n:"lime juice",q:"3 tbsp"},{n:"chili paste",q:"2 tbsp"},{n:"chicken broth",q:"1L"},{n:"cilantro",q:"fresh"}],steps:["Simmer broth with lemongrass, galangal, lime leaves 5 min.","Add mushrooms, shrimp 3 min. Season with fish sauce, lime, chili paste.","Cook noodles. Serve in broth. Top with cilantro."]},
{id:981,name:"Buttermilk Pancakes",time:20,servings:6,diff:"Easy",tags:["vegetarian","nut-free"],img:"https://live.staticflickr.com/65535/55057085270_417e4b17c0_c.jpg",ing:[{n:"flour",q:"250g"},{n:"buttermilk",q:"300ml"},{n:"eggs",q:"2"},{n:"baking powder",q:"2 tsp"},{n:"baking soda",q:"1/2 tsp"},{n:"sugar",q:"2 tbsp"},{n:"butter",q:"40g, melted"},{n:"vanilla",q:"1 tsp"},{n:"maple syrup",q:"for serving"},{n:"berries",q:"for serving"}],steps:["Mix dry. Mix wet. Combine until just mixed - lumps are good.","Cook on buttered griddle until bubbles form 2-3 min. Flip 1-2 min.","Stack with butter, maple syrup, berries."]},
{id:982,name:"Chicken Congee with Ginger",time:40,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:U+"1561560561-6ac9ff6402ab?w=600&h=400&fit=crop",ing:[{n:"jasmine rice",q:"150g"},{n:"chicken thighs",q:"4, bone-in"},{n:"ginger",q:"3 inch, sliced"},{n:"garlic",q:"4 cloves"},{n:"chicken broth",q:"1.5L"},{n:"soy sauce",q:"2 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"green onion",q:"3"},{n:"fried shallots",q:"for serving"},{n:"white pepper",q:"to taste"}],steps:["Combine rice, chicken, ginger, garlic, broth. Simmer 35-40 min until porridge.","Remove chicken, shred. Return to pot. Season.","Top with green onion, fried shallots, sesame oil, white pepper."]},
{id:983,name:"Chocolate Truffles",time:30,servings:20,diff:"Easy",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/65535/55138525902_22afc5fe54_c.jpg",ing:[{n:"dark chocolate",q:"200g"},{n:"heavy cream",q:"100ml"},{n:"butter",q:"20g"},{n:"cocoa powder",q:"for rolling"},{n:"sea salt",q:"pinch"},{n:"espresso powder",q:"optional, 1 tsp"}],steps:["Heat cream until simmering. Pour over chopped chocolate. Stir until smooth. Add butter, salt.","Chill 2 hours until firm. Scoop and roll into balls.","Roll in cocoa powder. Store in fridge. Let sit 5 min before serving."]},
{id:984,name:"Chicken Katsu Curry Rice",time:35,servings:4,diff:"Medium",tags:["high-protein"],img:U+"1679279727895-bd5c9fb9c1a0?w=600&h=400&fit=crop",ing:[{n:"chicken breast",q:"4"},{n:"panko",q:"150g"},{n:"egg",q:"2"},{n:"flour",q:"50g"},{n:"Japanese curry roux",q:"1 block"},{n:"onion",q:"1"},{n:"carrot",q:"1"},{n:"potato",q:"1"},{n:"rice",q:"400g"},{n:"pickled ginger",q:"for serving"}],steps:["Make curry with vegetables and roux. Bread and fry chicken. Slice.","Cook rice.","Serve katsu on rice with curry ladled alongside."]},
{id:985,name:"Beef Rendang Complete",time:120,servings:6,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://www.themealdb.com/images/media/meals/bc8v651619789840.jpg/preview",ing:[{n:"beef chuck",q:"1kg"},{n:"coconut milk",q:"800ml"},{n:"rendang paste",q:"5 tbsp"},{n:"lemongrass",q:"3 stalks"},{n:"galangal",q:"3 slices"},{n:"kaffir lime leaves",q:"5"},{n:"toasted coconut",q:"4 tbsp"},{n:"rice",q:"for serving"},{n:"sambal",q:"for serving"}],steps:["Fry paste. Add beef, coconut milk, aromatics. Simmer uncovered 2+ hours.","Stir often. Sauce should evaporate completely. Add toasted coconut.","Serve with steamed rice and sambal."]},
{id:986,name:"Mushroom and Parmesan Risotto",time:35,servings:4,diff:"Medium",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/65535/54611628982_16a82c3969_c.jpg",ing:[{n:"arborio rice",q:"300g"},{n:"mixed mushrooms",q:"350g"},{n:"onion",q:"1"},{n:"garlic",q:"2 cloves"},{n:"white wine",q:"150ml"},{n:"vegetable broth",q:"1L"},{n:"parmesan",q:"70g"},{n:"butter",q:"40g"},{n:"thyme",q:"fresh"},{n:"truffle oil",q:"optional"}],steps:["Sauté mushrooms golden. Sauté onion, garlic. Toast rice, add wine.","Add broth gradually, stirring 18-20 min.","Fold in mushrooms, butter, parmesan, thyme. Optional truffle oil drizzle."]},
{id:987,name:"Vietnamese Caramel Chicken",time:25,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/4313/36174628655_f3fbfed533_c.jpg",ing:[{n:"chicken thighs",q:"600g, bone-in"},{n:"sugar",q:"3 tbsp"},{n:"fish sauce",q:"3 tbsp"},{n:"garlic",q:"4 cloves"},{n:"shallots",q:"3"},{n:"black pepper",q:"1 tsp"},{n:"green onion",q:"3"},{n:"chili",q:"1"},{n:"ginger",q:"1 inch"},{n:"rice",q:"for serving"}],steps:["Make caramel: melt sugar until amber. Carefully add fish sauce.","Add chicken, garlic, shallots, ginger, pepper. Simmer covered 20 min.","Top with green onion and chili. Serve over rice."]},
{id:988,name:"Apple Pie",time:75,servings:8,diff:"Medium",tags:["vegetarian"],img:U+"1673646961306-3487ac6147f4?w=600&h=400&fit=crop",ing:[{n:"apples",q:"6 large, sliced"},{n:"sugar",q:"100g"},{n:"cinnamon",q:"2 tsp"},{n:"nutmeg",q:"1/4 tsp"},{n:"lemon juice",q:"1 tbsp"},{n:"cornstarch",q:"2 tbsp"},{n:"butter",q:"20g"},{n:"pie crust",q:"2 (top and bottom)"},{n:"egg",q:"1, for wash"},{n:"vanilla ice cream",q:"for serving"}],steps:["Mix apples with sugar, cinnamon, nutmeg, lemon, cornstarch.","Line pie dish with bottom crust. Fill with apples. Dot with butter. Top with crust, crimp, egg wash, cut slits.","Bake 200C 15 min, then 175C 35-40 min until golden and bubbling. Cool 2 hours. Serve with ice cream."]},
{id:989,name:"Dan Dan Mian",time:20,servings:2,diff:"Easy",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/53987140268_67feef3818_c.jpg",ing:[{n:"Chinese wheat noodles",q:"250g"},{n:"ground pork",q:"200g"},{n:"preserved mustard greens",q:"2 tbsp"},{n:"chili oil",q:"3 tbsp"},{n:"sesame paste",q:"2 tbsp"},{n:"soy sauce",q:"2 tbsp"},{n:"black vinegar",q:"1 tbsp"},{n:"Sichuan peppercorn",q:"1 tsp, ground"},{n:"garlic",q:"2 cloves"},{n:"green onion",q:"2"},{n:"peanuts",q:"2 tbsp"}],steps:["Cook noodles. Brown pork with preserved greens until crispy.","Mix sauce: sesame paste, soy, vinegar, chili oil, peppercorn, garlic.","Divide sauce into bowls. Add noodles, top with pork, green onion, peanuts."]},
{id:990,name:"Chicken Satay Rice Bowl",time:25,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/7102/7328266660_6442fd964a_c.jpg",ing:[{n:"chicken thighs",q:"600g, cubed"},{n:"peanut sauce",q:"120ml"},{n:"rice",q:"300g"},{n:"cucumber",q:"1"},{n:"carrot",q:"1"},{n:"red cabbage",q:"80g"},{n:"cilantro",q:"fresh"},{n:"lime",q:"1"},{n:"peanuts",q:"30g, crushed"},{n:"chili flakes",q:"optional"}],steps:["Marinate and grill chicken satay skewers.","Cook rice. Prepare vegetables.","Build bowls: rice, chicken, vegetables, peanut sauce, cilantro, crushed peanuts, lime."]},
{id:991,name:"Beef Wellington Individual",time:60,servings:4,diff:"Hard",tags:["high-protein"],img:"https://live.staticflickr.com/4460/36850345213_81711df25e_c.jpg",ing:[{n:"beef tenderloin steaks",q:"4, 200g each"},{n:"mushrooms",q:"300g, finely diced"},{n:"puff pastry",q:"2 sheets"},{n:"prosciutto",q:"8 slices"},{n:"Dijon mustard",q:"2 tbsp"},{n:"shallot",q:"2"},{n:"garlic",q:"2 cloves"},{n:"thyme",q:"fresh"},{n:"egg yolk",q:"1"},{n:"salt and pepper",q:"to taste"}],steps:["Sear steaks. Brush with Dijon. Make dry mushroom duxelles.","Wrap each steak in prosciutto and duxelles, then pastry. Egg wash.","Bake 220C 20-22 min for medium-rare. Rest 5 min before cutting open."]},
{id:992,name:"Chicken Soup with Matzo Balls",time:45,servings:6,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/51892757644_32c34ee64e_c.jpg",ing:[{n:"chicken",q:"1 whole"},{n:"carrot",q:"3"},{n:"celery",q:"3 stalks"},{n:"onion",q:"1"},{n:"dill",q:"large bunch"},{n:"parsley",q:"bunch"},{n:"matzo meal",q:"100g"},{n:"eggs",q:"3"},{n:"chicken fat or oil",q:"3 tbsp"},{n:"salt and pepper",q:"to taste"}],steps:["Simmer chicken with vegetables, herbs 30 min. Shred meat, strain broth.","Mix matzo meal, eggs, fat, salt, pepper. Chill 30 min. Form balls.","Simmer matzo balls in broth 25 min. Add back chicken, carrot, dill. Season."]},
{id:993,name:"Pork Belly Burnt Ends",time:180,servings:6,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/2808/8956012677_ef0f227c85_c.jpg",ing:[{n:"pork belly",q:"1.5kg, cubed"},{n:"brown sugar",q:"60g"},{n:"smoked paprika",q:"2 tbsp"},{n:"garlic powder",q:"1 tbsp"},{n:"onion powder",q:"1 tbsp"},{n:"cayenne",q:"1/2 tsp"},{n:"BBQ sauce",q:"200ml"},{n:"butter",q:"40g"},{n:"honey",q:"2 tbsp"},{n:"apple cider vinegar",q:"1 tbsp"}],steps:["Season pork belly cubes with dry rub. Smoke or bake at 120C 2 hours.","Transfer to foil pan. Add butter, honey, BBQ sauce, vinegar. Cover, cook 1 more hour.","Uncover, toss, cook 30 min until sticky and caramelized. Rest 10 min."]},
{id:994,name:"Pasta e Patate",time:30,servings:6,diff:"Easy",tags:["vegan","vegetarian","dairy-free","nut-free"],img:"https://live.staticflickr.com/65535/52525479567_7e2b9cded9_c.jpg",ing:[{n:"mixed pasta",q:"250g"},{n:"potatoes",q:"400g, cubed"},{n:"onion",q:"1"},{n:"celery",q:"1 stalk"},{n:"carrot",q:"1"},{n:"garlic",q:"3 cloves"},{n:"tomato paste",q:"2 tbsp"},{n:"parmesan rind",q:"1"},{n:"olive oil",q:"4 tbsp"},{n:"rosemary",q:"1 sprig"},{n:"chili flakes",q:"pinch"}],steps:["Sauté onion, carrot, celery 5 min. Add garlic, tomato paste, chili.","Add potatoes, parmesan rind, 1L water. Simmer 15 min.","Add mixed broken pasta. Cook until tender and soupy-thick. Drizzle olive oil to serve."]},
{id:995,name:"Coconut Panna Cotta",time:15,servings:4,diff:"Easy",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/65535/55123315742_e8690f868c_c.jpg",ing:[{n:"coconut cream",q:"400ml"},{n:"sugar",q:"50g"},{n:"vanilla",q:"1 tsp"},{n:"gelatin",q:"3 sheets"},{n:"mango",q:"1, pureed"},{n:"passion fruit",q:"2"},{n:"toasted coconut",q:"2 tbsp"}],steps:["Soak gelatin. Heat coconut cream with sugar and vanilla until just simmering.","Squeeze gelatin, stir until dissolved.","Pour into molds. Chill 4-6 hours. Unmold, serve with mango puree, passion fruit, toasted coconut."]},
{id:996,name:"Tostones with Garlic Mojo",time:15,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:U+"1720421920272-456e78a75e2e?w=600&h=400&fit=crop",ing:[{n:"green plantains",q:"3"},{n:"garlic",q:"6 cloves"},{n:"lime juice",q:"2 tbsp"},{n:"olive oil",q:"60ml"},{n:"salt",q:"to taste"},{n:"cilantro",q:"fresh"},{n:"vegetable oil",q:"for frying"}],steps:["Peel plantains, cut into 2cm rounds. Fry at 160C 3 min. Smash flat.","Fry again at 190C 2 min until golden and crispy.","Make mojo: whisk garlic, lime juice, oil, cilantro. Drizzle over tostones."]},
{id:997,name:"Chicken Milanese Salad",time:20,servings:4,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54023987201_2f20589ff5_c.jpg",ing:[{n:"chicken breast",q:"4, pounded thin"},{n:"breadcrumbs",q:"100g"},{n:"parmesan",q:"40g"},{n:"egg",q:"1"},{n:"flour",q:"40g"},{n:"arugula",q:"200g"},{n:"cherry tomatoes",q:"150g"},{n:"parmesan",q:"extra shavings"},{n:"lemon",q:"2"},{n:"olive oil",q:"4 tbsp"}],steps:["Dredge chicken in flour, egg, breadcrumb-parmesan mix. Fry 3-4 min per side.","Toss arugula and tomatoes with oil and lemon.","Serve chicken topped with salad, parmesan shavings, extra lemon."]},
{id:998,name:"Prawn Biryani",time:50,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/4700/38623920670_aec4ce66a0_c.jpg",ing:[{n:"large prawns",q:"400g"},{n:"basmati rice",q:"300g"},{n:"onion",q:"2, sliced"},{n:"yogurt",q:"60g"},{n:"biryani masala",q:"2 tbsp"},{n:"ginger-garlic paste",q:"1 tbsp"},{n:"saffron",q:"pinch in milk"},{n:"mint",q:"fresh"},{n:"ghee",q:"30g"},{n:"fried onions",q:"for garnish"}],steps:["Marinate prawns in yogurt, masala, ginger-garlic. Quick-fry with fried onions.","Par-boil rice. Layer rice over prawns. Add saffron milk, mint, ghee.","Seal, cook on low 20 min. Serve with raita."]},
{id:999,name:"Tres Leches Cupcakes",time:40,servings:12,diff:"Medium",tags:["vegetarian"],img:"https://live.staticflickr.com/5260/5451763217_8eb2c5847a_c.jpg",ing:[{n:"flour",q:"200g"},{n:"eggs",q:"5"},{n:"sugar",q:"150g"},{n:"vanilla",q:"1 tsp"},{n:"whole milk",q:"100ml"},{n:"condensed milk",q:"200g"},{n:"evaporated milk",q:"175ml"},{n:"heavy cream",q:"200ml"},{n:"cinnamon",q:"for dusting"},{n:"strawberries",q:"for topping"}],steps:["Make sponge batter. Bake in cupcake liners 175C 18 min.","Mix 3 milks. Poke holes in cupcakes, soak with milk mixture.","Top with whipped cream, cinnamon dust, strawberry slice."]},
{id:1000,name:"Ultimate Beef Burger",time:20,servings:4,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/3612/5798925301_e5c3b0dd1e_c.jpg",ing:[{n:"ground beef",q:"600g, 80/20"},{n:"brioche buns",q:"4"},{n:"cheddar",q:"4 slices"},{n:"bacon",q:"8 strips"},{n:"lettuce",q:"4 leaves"},{n:"tomato",q:"1, sliced"},{n:"red onion",q:"4 rings"},{n:"pickles",q:"sliced"},{n:"special sauce",q:"3 tbsp"},{n:"sesame seeds",q:"for bun"}],steps:["Form 4 loose patties. Season generously with salt and pepper only.","Smash on screaming hot griddle 3 min. Flip, add cheese 2 min. Cook bacon.","Toast buns. Assemble: sauce, lettuce, patty, bacon, tomato, onion, pickles. The perfect burger."]},
{id:1001,name:"Chicken Tikka Masala Ultimate",time:45,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:U+"1603496987351-f84a3ba5ec85?w=600&h=400&fit=crop",ing:[{n:"chicken thighs",q:"600g"},{n:"yogurt",q:"200g"},{n:"garam masala",q:"2 tsp"},{n:"turmeric",q:"1 tsp"},{n:"kashmiri chili",q:"2 tsp"},{n:"canned tomatoes",q:"400g"},{n:"heavy cream",q:"200ml"},{n:"butter",q:"40g"},{n:"onion",q:"1"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"1 inch"},{n:"fenugreek",q:"1 tsp"},{n:"rice",q:"for serving"},{n:"naan",q:"for serving"}],steps:["Marinate chicken in yogurt and spices 2+ hours. Char in hot pan or under broiler.","Make sauce: onion, garlic, ginger in butter. Add tomatoes, simmer 12 min. Blend. Add cream, fenugreek.","Add chicken. Simmer 10 min. Serve with basmati rice and warm naan."]},
{id:1002,name:"Shakshuka Ultimate",time:30,servings:4,diff:"Easy",tags:["vegetarian","gluten-free","nut-free"],img:U+"1759216282765-04bcbaf08738?w=600&h=400&fit=crop",ing:[{n:"eggs",q:"6"},{n:"San Marzano tomatoes",q:"800g"},{n:"onion",q:"1"},{n:"bell pepper",q:"2"},{n:"garlic",q:"4 cloves"},{n:"cumin",q:"1 tsp"},{n:"smoked paprika",q:"1 tsp"},{n:"cayenne",q:"1/4 tsp"},{n:"feta",q:"80g"},{n:"fresh dill",q:"for serving"},{n:"fresh parsley",q:"for serving"},{n:"olive oil",q:"3 tbsp"},{n:"sourdough",q:"for serving"}],steps:["Slowly cook onion and peppers 8 min until very soft. Add garlic, spices.","Crush tomatoes by hand, add to pan. Simmer 12 min until thick.","Make wells, crack eggs. Cover 5-8 min. Top with feta, herbs. Serve with toasted sourdough."]},
{id:1003,name:"Pasta Carbonara Classic",time:20,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/4834/44696564370_a743971911_c.jpg",ing:[{n:"spaghetti",q:"400g"},{n:"guanciale",q:"200g"},{n:"egg yolks",q:"4"},{n:"whole egg",q:"1"},{n:"pecorino romano",q:"100g"},{n:"black pepper",q:"2 tsp"}],steps:["Cook spaghetti. Reserve 200ml water. Render guanciale until crispy.","Whisk yolks, egg, pecorino, pepper.","Add hot pasta to guanciale off heat. Toss. Add egg mixture, toss vigorously with pasta water until creamy."]},
{id:1004,name:"Beef Bourguignon Classic",time:120,servings:6,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54531993320_a90be64613_c.jpg",ing:[{n:"beef chuck",q:"1kg"},{n:"red wine",q:"500ml"},{n:"bacon lardons",q:"150g"},{n:"pearl onions",q:"200g"},{n:"mushrooms",q:"250g"},{n:"carrot",q:"3"},{n:"garlic",q:"4 cloves"},{n:"tomato paste",q:"2 tbsp"},{n:"thyme",q:"3 sprigs"},{n:"bay leaves",q:"2"},{n:"flour",q:"2 tbsp"},{n:"butter",q:"30g"},{n:"mashed potatoes",q:"for serving"}],steps:["Brown beef. Cook bacon, vegetables. Add flour, paste. Deglaze with wine.","Add broth, herbs, beef. Braise at 160C 2+ hours.","Rich, deep, complex sauce. Serve over mashed potatoes with crusty bread."]},
{id:1005,name:"Pad Thai Classic",time:20,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://www.themealdb.com/images/media/meals/rg9ze01763479093.jpg/preview",ing:[{n:"rice noodles",q:"250g"},{n:"shrimp or chicken",q:"300g"},{n:"tamarind paste",q:"2 tbsp"},{n:"fish sauce",q:"2 tbsp"},{n:"palm sugar",q:"2 tbsp"},{n:"garlic",q:"3 cloves"},{n:"egg",q:"2"},{n:"bean sprouts",q:"100g"},{n:"green onion",q:"3"},{n:"peanuts",q:"40g"},{n:"lime",q:"1"},{n:"chili flakes",q:"optional"}],steps:["Soak noodles. Make sauce: tamarind, fish sauce, sugar. Stir-fry protein 2-3 min.","Push aside, scramble egg. Add noodles and sauce. Toss 2 min.","Add sprouts. Serve with peanuts, lime, green onion."]},
{id:1006,name:"Butter Chicken Classic",time:35,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54520877382_772ca7dcb5_c.jpg",ing:[{n:"chicken thighs",q:"600g"},{n:"butter",q:"50g"},{n:"canned tomatoes",q:"400g"},{n:"cream",q:"200ml"},{n:"onion",q:"1"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"1 inch"},{n:"garam masala",q:"2 tsp"},{n:"kashmiri chili",q:"1 tbsp"},{n:"fenugreek",q:"1 tsp"},{n:"rice",q:"for serving"},{n:"naan",q:"for serving"}],steps:["Sauté onion in butter. Add garlic, ginger, spices. Add tomatoes, simmer 10 min. Blend smooth.","Add cream, fenugreek. Add chicken.","Simmer 12-15 min. Serve with rice and naan."]},
{id:1007,name:"Chicken Shawarma Classic",time:30,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:U+"1604236240482-7aeaa59f1329?w=600&h=400&fit=crop",ing:[{n:"chicken thighs",q:"600g"},{n:"cumin",q:"2 tsp"},{n:"coriander",q:"1 tsp"},{n:"turmeric",q:"1 tsp"},{n:"paprika",q:"2 tsp"},{n:"cinnamon",q:"1/2 tsp"},{n:"garlic",q:"4 cloves"},{n:"lemon",q:"1"},{n:"olive oil",q:"3 tbsp"},{n:"pita",q:"4"},{n:"tahini",q:"for serving"},{n:"pickles",q:"for serving"},{n:"salad",q:"for serving"}],steps:["Marinate chicken in spices, garlic, lemon, oil 2+ hours.","Grill 5-6 min per side until charred. Slice.","Serve in pita with tahini, pickles, and fresh salad."]},
{id:1008,name:"Ramen Classic",time:180,servings:4,diff:"Hard",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/55099578869_c826251748_c.jpg",ing:[{n:"pork bones",q:"1.5kg"},{n:"pork belly",q:"300g"},{n:"ramen noodles",q:"400g"},{n:"soy sauce",q:"4 tbsp"},{n:"mirin",q:"2 tbsp"},{n:"ginger",q:"3 inch"},{n:"garlic",q:"6 cloves"},{n:"green onion",q:"4"},{n:"soft-boiled egg",q:"4, soy-marinated"},{n:"nori",q:"4 sheets"},{n:"sesame oil",q:"1 tsp"},{n:"chili oil",q:"optional"}],steps:["Boil bones hard 3-4 hours for milky tonkotsu broth. Braise pork belly separately.","Season broth. Prepare toppings. Cook noodles.","Assemble perfect bowls: noodles, broth, sliced pork belly, marinated egg, green onion, nori."]},
{id:1009,name:"Pho Classic",time:45,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54735884688_8dbf8f43ef_c.jpg",ing:[{n:"beef bones",q:"1.5kg"},{n:"beef brisket",q:"400g"},{n:"beef sirloin",q:"200g"},{n:"rice noodles",q:"400g"},{n:"star anise",q:"3"},{n:"cinnamon",q:"1 stick"},{n:"ginger",q:"4 inch, charred"},{n:"onion",q:"1, charred"},{n:"fish sauce",q:"4 tbsp"},{n:"rock sugar",q:"1 tbsp"},{n:"bean sprouts",q:"150g"},{n:"Thai basil",q:"bunch"},{n:"lime",q:"2"},{n:"hoisin and sriracha",q:"for serving"}],steps:["Simmer bones with spices 45+ min. Strain. Season.","Cook brisket in broth. Slice. Cook noodles.","Assemble: noodles, brisket, raw sirloin, boiling broth. Serve with full herb platter and condiments."]},
{id:1010,name:"Biryani Classic",time:50,servings:6,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/5505/14429613226_916d065c5c_c.jpg",ing:[{n:"chicken or lamb",q:"600g"},{n:"basmati rice",q:"400g"},{n:"onion",q:"3, sliced"},{n:"yogurt",q:"150g"},{n:"ginger-garlic paste",q:"3 tbsp"},{n:"biryani masala",q:"3 tbsp"},{n:"saffron",q:"large pinch in milk"},{n:"mint",q:"bunch"},{n:"cilantro",q:"bunch"},{n:"green chili",q:"3"},{n:"ghee",q:"50g"},{n:"fried onions",q:"for serving"},{n:"raita",q:"for serving"}],steps:["Marinate meat. Fry onions golden. Cook meat with spices.","Par-boil rice. Layer rice over meat with saffron milk, herbs, ghee.","Seal tight. Cook on very low heat 30 min. Do not open lid. Serve with raita and fried onions."]},
{id:1011,name:"Tacos al Pastor Classic",time:30,servings:6,diff:"Medium",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/54164870906_d1df897d6c_c.jpg",ing:[{n:"pork shoulder",q:"600g, thinly sliced"},{n:"achiote paste",q:"2 tbsp"},{n:"dried guajillo chilies",q:"3"},{n:"pineapple",q:"1/4, sliced"},{n:"onion",q:"1, diced"},{n:"cilantro",q:"large bunch"},{n:"lime",q:"3"},{n:"corn tortillas",q:"12"},{n:"salsa verde",q:"for serving"}],steps:["Blend rehydrated chilies with achiote, garlic, orange juice. Marinate pork overnight.","Stack pork on vertical spit (or sheet pan). Grill with pineapple until charred.","Serve in warm tortillas with grilled pineapple, onion, cilantro, salsa verde, lime."]},
{id:1012,name:"Sushi Platter",time:60,servings:4,diff:"Hard",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55148988538_6ec3f29d69_c.jpg",ing:[{n:"sushi rice",q:"400g"},{n:"sushi-grade salmon",q:"200g"},{n:"sushi-grade tuna",q:"200g"},{n:"shrimp",q:"8, cooked"},{n:"avocado",q:"2"},{n:"cucumber",q:"1"},{n:"nori sheets",q:"8"},{n:"soy sauce",q:"for serving"},{n:"wasabi",q:"for serving"},{n:"pickled ginger",q:"for serving"},{n:"sesame seeds",q:"for garnish"}],steps:["Cook and season sushi rice. Slice fish, avocado, cucumber.","Make nigiri: form rice, top with fish. Make rolls: nori, rice, fillings, roll with mat.","Arrange beautifully on platter. Serve with soy, wasabi, pickled ginger."]},
{id:1013,name:"Couscous Royale",time:60,servings:8,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/1424/4733783808_61de2be43a_c.jpg",ing:[{n:"couscous",q:"500g"},{n:"lamb shoulder",q:"400g"},{n:"merguez sausage",q:"4"},{n:"chicken thighs",q:"4"},{n:"chickpeas",q:"1 can"},{n:"carrot",q:"3"},{n:"turnip",q:"2"},{n:"zucchini",q:"2"},{n:"onion",q:"2"},{n:"canned tomatoes",q:"400g"},{n:"harissa",q:"2 tbsp"},{n:"cumin",q:"2 tsp"},{n:"cinnamon",q:"1/2 tsp"},{n:"ras el hanout",q:"1 tbsp"},{n:"cilantro",q:"fresh"}],steps:["Braise lamb with onion, spices, tomatoes 45 min. Add vegetables, chickpeas.","Steam couscous. Grill merguez and chicken.","Serve steaming couscous with stew ladled over, grilled meats alongside, harissa on the side."]},
{id:1014,name:"Fish and Chips Classic",time:30,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/53747706905_b7743395a0_c.jpg",ing:[{n:"cod fillets",q:"4 large"},{n:"potatoes",q:"1kg, cut into thick chips"},{n:"flour",q:"150g"},{n:"beer",q:"200ml, cold"},{n:"baking powder",q:"1 tsp"},{n:"egg",q:"1"},{n:"malt vinegar",q:"for serving"},{n:"tartare sauce",q:"for serving"},{n:"mushy peas",q:"for serving"},{n:"lemon",q:"2"},{n:"vegetable oil",q:"for frying"}],steps:["Double-fry chips: 130C 6 min, rest, 190C 3 min.","Make batter: flour, baking powder, beer, egg. Season fish, dip in batter.","Fry fish at 180C 6-8 min until deep golden. Serve with chips, mushy peas, tartare, lemon, malt vinegar."]},
{id:1015,name:"Peking Duck Classic",time:180,servings:4,diff:"Hard",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/55054079561_edab4d553a_c.jpg",ing:[{n:"whole duck",q:"2kg"},{n:"five spice",q:"1 tsp"},{n:"honey",q:"3 tbsp"},{n:"soy sauce",q:"2 tbsp"},{n:"rice vinegar",q:"1 tbsp"},{n:"hoisin sauce",q:"for serving"},{n:"cucumber",q:"julienned"},{n:"green onion",q:"julienned"},{n:"Chinese pancakes",q:"20"}],steps:["Dry duck overnight. Rub inside with five spice and salt.","Glaze with honey-soy-vinegar. Roast 180C 90 min until skin is deeply crispy, basting.","Carve: separate crispy skin from meat. Serve both in pancakes with hoisin, cucumber, green onion."]},
{id:1016,name:"Beef Wellington Classic",time:90,servings:6,diff:"Hard",tags:["high-protein"],img:"https://live.staticflickr.com/7426/27318379302_a041d3b9b0_c.jpg",ing:[{n:"beef tenderloin",q:"1kg, center-cut"},{n:"mushrooms",q:"500g, finely diced"},{n:"puff pastry",q:"1 large sheet"},{n:"prosciutto",q:"10 slices"},{n:"Dijon mustard",q:"3 tbsp"},{n:"shallot",q:"3"},{n:"garlic",q:"4 cloves"},{n:"thyme",q:"fresh"},{n:"egg yolk",q:"2"},{n:"truffle paste",q:"optional"}],steps:["Sear tenderloin. Brush with Dijon. Make completely dry duxelles.","Wrap in prosciutto and duxelles. Chill. Wrap in pastry. Egg wash. Score pattern.","Bake 220C 25-30 min for medium-rare. Rest 10 min. Slice to reveal perfect pink center."]},
{id:1017,name:"Lamb Biryani Classic",time:60,servings:6,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://www.themealdb.com/images/media/meals/xrttsx1487339558.jpg/preview",ing:[{n:"lamb shoulder",q:"600g, cubed"},{n:"basmati rice",q:"400g, soaked"},{n:"onion",q:"3, sliced"},{n:"yogurt",q:"150g"},{n:"ginger-garlic paste",q:"3 tbsp"},{n:"biryani masala",q:"3 tbsp"},{n:"saffron",q:"pinch in milk"},{n:"mint",q:"fresh"},{n:"cilantro",q:"fresh"},{n:"green chili",q:"3"},{n:"ghee",q:"60g"},{n:"fried onions",q:"for garnish"},{n:"raita",q:"for serving"}],steps:["Marinate lamb in yogurt, spices 2+ hours. Cook with fried onions until nearly done.","Par-boil rice. Layer rice and lamb. Add saffron milk, herbs, ghee.","Seal tightly. Cook on lowest heat 30 min. Do not open. Garnish with fried onions. Serve with raita."]},
{id:1018,name:"Dim Sum Platter",time:90,servings:6,diff:"Hard",tags:["dairy-free"],img:"https://live.staticflickr.com/5130/5205076449_63731f8755_c.jpg",ing:[{n:"har gow wrapper dough",q:"200g"},{n:"siu mai wrappers",q:"200g"},{n:"shrimp",q:"300g"},{n:"pork",q:"200g"},{n:"bamboo shoots",q:"50g"},{n:"ginger",q:"2 tbsp"},{n:"soy sauce",q:"for dipping"},{n:"chili oil",q:"for dipping"},{n:"char siu bao",q:"4"},{n:"spring rolls",q:"8"},{n:"sesame prawn toast",q:"8"}],steps:["Make har gow: shrimp filling in translucent wrappers. Make siu mai: pork-shrimp filling.","Make char siu bao, spring rolls, sesame toast.","Steam dumplings 8-10 min. Fry spring rolls and toast. Serve dim sum spread with dipping sauces."]},
{id:1019,name:"Bouillabaisse",time:45,servings:6,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55035994226_a0022b6f05_c.jpg",ing:[{n:"mixed fish",q:"600g (monkfish, sea bass, snapper)"},{n:"shrimp",q:"200g"},{n:"mussels",q:"300g"},{n:"fennel",q:"1 bulb"},{n:"onion",q:"1"},{n:"garlic",q:"6 cloves"},{n:"canned tomatoes",q:"400g"},{n:"saffron",q:"large pinch"},{n:"orange zest",q:"1 strip"},{n:"pastis",q:"2 tbsp"},{n:"fish stock",q:"750ml"},{n:"baguette",q:"for serving"},{n:"rouille",q:"for serving"}],steps:["Sauté fennel, onion, garlic. Add tomatoes, stock, saffron, orange zest, pastis. Simmer 15 min.","Add firm fish 5 min. Add mussels, shrimp 3 min.","Serve in wide bowls with broth. Toast baguette with rouille on top, float on soup."]},
{id:1020,name:"Mole Poblano Classic",time:90,servings:8,diff:"Hard",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/52720175829_d621c0611e_c.jpg",ing:[{n:"chicken pieces",q:"2kg"},{n:"dried mulato chilies",q:"4"},{n:"dried ancho chilies",q:"4"},{n:"dried pasilla chilies",q:"3"},{n:"sesame seeds",q:"3 tbsp"},{n:"pumpkin seeds",q:"3 tbsp"},{n:"almonds",q:"3 tbsp"},{n:"raisins",q:"2 tbsp"},{n:"plantain",q:"1, ripe"},{n:"chocolate",q:"50g"},{n:"cinnamon",q:"1 stick"},{n:"cloves",q:"3"},{n:"chicken broth",q:"750ml"},{n:"tortillas",q:"for serving"},{n:"rice",q:"for serving"}],steps:["Toast and rehydrate all chilies. Toast seeds, nuts. Fry plantain and raisins.","Blend everything with broth. Fry sauce 25 min, stirring constantly, until thick and complex.","Add chocolate. Braise chicken in mole 30 min. Serve with rice, tortillas, sesame seeds on top."]},
{id:1021,name:"Ossobuco Classic",time:150,servings:4,diff:"Hard",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/2814/11432453824_cac5e3d92a_c.jpg",ing:[{n:"veal shanks",q:"4, 3cm thick"},{n:"canned tomatoes",q:"400g"},{n:"white wine",q:"200ml"},{n:"beef broth",q:"300ml"},{n:"onion",q:"1"},{n:"carrot",q:"1"},{n:"celery",q:"2 stalks"},{n:"garlic",q:"6 cloves"},{n:"lemon zest",q:"1 lemon"},{n:"parsley",q:"large bunch"},{n:"flour",q:"for dredging"},{n:"butter",q:"40g"},{n:"risotto alla Milanese",q:"for serving"}],steps:["Season, flour, brown shanks. Sauté vegetables. Deglaze with wine. Add broth, tomatoes.","Cover, braise at 160C 2-2.5 hours until tender.","Make gremolata: parsley, lemon zest, raw garlic. Serve on saffron risotto. Top with gremolata."]},
{id:1022,name:"Coq au Vin Classic",time:90,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/51222274827_597974fd26_c.jpg",ing:[{n:"chicken pieces",q:"1.5kg"},{n:"red wine",q:"750ml"},{n:"bacon lardons",q:"150g"},{n:"button mushrooms",q:"250g"},{n:"pearl onions",q:"200g"},{n:"garlic",q:"4 cloves"},{n:"tomato paste",q:"2 tbsp"},{n:"chicken broth",q:"200ml"},{n:"thyme",q:"4 sprigs"},{n:"bay leaves",q:"2"},{n:"butter",q:"40g"},{n:"flour",q:"2 tbsp"},{n:"cognac",q:"2 tbsp"},{n:"mashed potatoes",q:"for serving"}],steps:["Marinate chicken in wine overnight. Brown chicken, flambe with cognac. Brown bacon, mushrooms, onions.","Add flour, paste. Deglaze with wine. Add broth, herbs. Return chicken.","Cover, simmer 75 min. Rich, deep, wine-dark sauce. Serve with buttery mashed potatoes."]},
{id:1023,name:"Paella Valenciana",time:50,servings:6,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54973665171_e2c65b1832_c.jpg",ing:[{n:"bomba rice",q:"300g"},{n:"chicken thighs",q:"4, cubed"},{n:"rabbit or pork",q:"200g"},{n:"green beans",q:"100g"},{n:"lima beans",q:"100g"},{n:"canned tomatoes",q:"100g"},{n:"saffron",q:"generous pinch"},{n:"chicken broth",q:"750ml"},{n:"rosemary",q:"1 sprig"},{n:"olive oil",q:"3 tbsp"},{n:"snails",q:"optional"},{n:"lemon",q:"1"}],steps:["Sauté chicken and meat. Add beans, tomatoes, saffron, broth, rosemary.","Add rice. Distribute evenly. Do not stir from this point.","Cook medium 15 min, then high 5 min for socarrat. Rest 5 min under cloth. Serve with lemon."]},
{id:1024,name:"Rogan Josh Classic",time:50,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/50958081291_c8f4c22930_c.jpg",ing:[{n:"lamb shoulder",q:"700g, cubed"},{n:"onion",q:"2"},{n:"garlic",q:"6 cloves"},{n:"ginger",q:"2 inch"},{n:"canned tomatoes",q:"400g"},{n:"yogurt",q:"100g"},{n:"kashmiri chili",q:"3 tbsp"},{n:"fennel seeds",q:"1 tsp"},{n:"garam masala",q:"1 tsp"},{n:"cardamom",q:"4 pods"},{n:"bay leaves",q:"2"},{n:"asafoetida",q:"pinch"},{n:"oil",q:"3 tbsp"},{n:"rice",q:"for serving"},{n:"naan",q:"for serving"}],steps:["Bloom spices in hot oil. Add onions, cook until deep golden 10 min.","Add garlic, ginger, chili paste. Add yogurt gradually. Add lamb, tomatoes.","Cover, simmer 45 min until lamb is meltingly tender. Serve with rice and naan."]},
{id:1025,name:"Massaman Curry Classic",time:90,servings:6,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/53762801670_c066102523_c.jpg",ing:[{n:"beef shin",q:"800g"},{n:"coconut milk",q:"800ml"},{n:"massaman paste",q:"4 tbsp"},{n:"potato",q:"3, cubed"},{n:"onion",q:"2, quartered"},{n:"peanuts",q:"100g, roasted"},{n:"tamarind paste",q:"3 tbsp"},{n:"fish sauce",q:"3 tbsp"},{n:"palm sugar",q:"3 tbsp"},{n:"cinnamon stick",q:"1"},{n:"star anise",q:"3"},{n:"cardamom",q:"4 pods"},{n:"bay leaves",q:"2"},{n:"rice",q:"for serving"}],steps:["Fry paste in coconut cream until oil separates. Add beef, sear.","Add remaining coconut milk, all spices, onion. Simmer 60 min.","Add potatoes 20 min. Add peanuts, tamarind, fish sauce, sugar. Serve over jasmine rice."]},
{id:1026,name:"Jerk Chicken Classic",time:45,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://www.themealdb.com/images/media/meals/tytyxu1515363282.jpg/preview",ing:[{n:"chicken thighs",q:"8, bone-in"},{n:"scotch bonnet",q:"3"},{n:"allspice berries",q:"2 tbsp"},{n:"thyme",q:"2 tbsp fresh"},{n:"garlic",q:"6 cloves"},{n:"ginger",q:"2 inch"},{n:"soy sauce",q:"3 tbsp"},{n:"lime juice",q:"3 tbsp"},{n:"brown sugar",q:"2 tbsp"},{n:"green onion",q:"6"},{n:"nutmeg",q:"1/4 tsp"},{n:"cinnamon",q:"1/2 tsp"},{n:"rice and peas",q:"for serving"}],steps:["Blend all jerk ingredients into smooth paste. Marinate chicken 12-24 hours.","Grill over pimento wood or charcoal 35-40 min, turning and basting.","Skin should be deeply charred, meat juicy. Serve with rice and peas, festival, extra lime."]},
{id:1027,name:"Rendang Classic",time:150,servings:6,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54915118212_80306673b1_c.jpg",ing:[{n:"beef shin",q:"1kg"},{n:"coconut milk",q:"1L"},{n:"lemongrass",q:"4 stalks"},{n:"galangal",q:"4 slices"},{n:"kaffir lime leaves",q:"6"},{n:"turmeric",q:"2 tsp"},{n:"onion",q:"4, blended"},{n:"garlic",q:"8 cloves"},{n:"ginger",q:"3 inch"},{n:"dried chilies",q:"15, soaked"},{n:"toasted coconut",q:"4 tbsp"},{n:"salt",q:"to taste"},{n:"rice",q:"for serving"}],steps:["Blend onion, garlic, ginger, chilies, turmeric. Fry 8 min until dark and fragrant.","Add coconut milk, lemongrass, galangal, lime leaves, beef. Simmer uncovered 2.5-3 hours.","Stir frequently as it dries. Meat should be dark, tender, coated in dry spice paste. Add toasted coconut."]},
{id:1028,name:"Tom Yum Goong Classic",time:25,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/4679/39362838022_5e9718d6ce_c.jpg",ing:[{n:"large prawns",q:"500g, shell-on"},{n:"lemongrass",q:"4 stalks"},{n:"galangal",q:"6 slices"},{n:"kaffir lime leaves",q:"6"},{n:"bird eye chili",q:"4, crushed"},{n:"mushrooms",q:"200g"},{n:"cherry tomatoes",q:"8"},{n:"fish sauce",q:"4 tbsp"},{n:"lime juice",q:"4 tbsp"},{n:"nam prik pao",q:"2 tbsp"},{n:"cilantro",q:"fresh"},{n:"chicken broth",q:"1L"}],steps:["Simmer broth with lemongrass, galangal, lime leaves 5 min.","Add mushrooms, tomatoes 2 min. Add prawns 3 min until pink.","Season with fish sauce, lime juice, nam prik pao. Top with cilantro and chili. Bright, sour, spicy."]},
{id:1029,name:"Bibimbap Classic",time:35,servings:2,diff:"Medium",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/7428/14126556565_c0ae2afb2e_c.jpg",ing:[{n:"short grain rice",q:"300g"},{n:"beef bulgogi",q:"200g"},{n:"spinach",q:"100g, seasoned"},{n:"bean sprouts",q:"100g, seasoned"},{n:"carrot",q:"1, julienned"},{n:"zucchini",q:"1, sliced"},{n:"shiitake mushrooms",q:"100g, seasoned"},{n:"fernbrake",q:"50g, optional"},{n:"egg",q:"2, fried"},{n:"gochujang",q:"3 tbsp"},{n:"sesame oil",q:"3 tbsp"},{n:"soy sauce",q:"for seasoning"},{n:"sesame seeds",q:"2 tbsp"}],steps:["Cook rice in dolsot (stone pot) or cast iron for crispy bottom.","Prepare each namul (vegetable) separately with sesame oil and seasonings.","Arrange beautifully: rice, vegetables in sections, beef, fried egg. Serve with gochujang. Mix at table."]},
{id:1030,name:"Chicken Shawarma Ultimate",time:35,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:U+"1755796049262-009fb63857b3?w=600&h=400&fit=crop",ing:[{n:"chicken thighs",q:"600g, boneless"},{n:"cumin",q:"2 tsp"},{n:"coriander",q:"1 tsp"},{n:"turmeric",q:"1 tsp"},{n:"paprika",q:"2 tsp"},{n:"cinnamon",q:"1/2 tsp"},{n:"cardamom",q:"1/4 tsp"},{n:"garlic",q:"6 cloves"},{n:"lemon",q:"1"},{n:"olive oil",q:"4 tbsp"},{n:"yogurt",q:"100g"},{n:"pita",q:"4"},{n:"tahini",q:"for serving"},{n:"toum (garlic sauce)",q:"for serving"},{n:"pickled turnip",q:"for serving"},{n:"fresh salad",q:"for serving"}],steps:["Marinate chicken in yogurt, all spices, garlic, lemon, oil overnight.","Stack on skewers or spread on sheet. Grill or broil until deeply charred.","Slice thin. Serve in warm pita with tahini, toum, pickled turnip, salad, hot sauce."]},

// MATCHING
function norm(s){return s.toLowerCase().trim().replace(/\s+/g,' ').replace(/ies$/,'y').replace(/es$/,'e').replace(/s$/,'')}
const SYN={chicken:'chicken breast,chicken thigh',beef:'ground beef,beef sirloin,sirloin steak',pasta:'spaghetti,linguine,penne,lo mein noodle,rice noodle,ramen noodle,jumbo pasta shell,lasagna sheet,egg noodle',noodle:'rice noodle,lo mein noodle,spaghetti,ramen noodle',cheese:'parmesan,mozzarella,cheddar cheese,feta cheese,gruyere cheese,ricotta',tomato:'canned tomato,cherry tomato,tomato paste',pepper:'bell pepper,red pepper flake,chili powder',onion:'red onion,green onion',cream:'heavy cream,sour cream',fish:'salmon fillet,white fish fillet,sushi-grade tuna',lamb:'ground lamb',lentil:'red lentil',bean:'black bean,cannellini bean,chickpea,kidney bean',pork:'ground pork,pork tenderloin,bacon'};
const SKIP=['salt','pepper','olive oil','vegetable oil','water','sugar','brown sugar'];
function im(u,r){const a=norm(u),b=norm(r);if(b.includes(a)||a.includes(b))return true;for(const[k,v]of Object.entries(SYN)){const t=[k,...v.split(',')];if(t.some(x=>norm(x).includes(a)||a.includes(norm(x)))&&t.some(x=>norm(x).includes(b)||b.includes(norm(x))))return true}return false}
function sc(rec,ui){if(!ui.length)return{s:.5,m:[],x:rec.ing.map(i=>i.n)};let m=[],u=new Set();for(const i of ui)for(let j=0;j<rec.ing.length;j++){if(!u.has(j)&&im(i.name,rec.ing[j].n)){m.push(rec.ing[j].n);u.add(j);break}}const c=rec.ing.filter(i=>!SKIP.includes(i.n.toLowerCase())),cm=m.filter(x=>!SKIP.includes(x.toLowerCase()));return{s:c.length?cm.length/c.length:0,m,x:rec.ing.filter((_,i)=>!u.has(i)).map(i=>i.n)}}

// SHUFFLE
function shuffleArray(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function startSwipe(){userIngs=[];document.querySelectorAll('.ing-row').forEach(r=>{const n=r.querySelector('.ing-name').value.trim();if(n)userIngs.push({name:n})});filters=new Set();document.querySelectorAll('.chip.active').forEach(c=>filters.add(c.dataset.f));maxTime=+document.getElementById('timeR').value;const all=R.filter(r=>{if(maxTime<120&&r.time>maxTime)return false;for(const f of filters)if(!r.tags.includes(f))return false;return true}).map(r=>{const s=sc(r,userIngs);return{...r,ms:s.s,mi:s.m,mx:s.x}});const tiers=[[],[],[]];all.forEach(r=>{const p=r.ms*100;if(p>=60)tiers[0].push(r);else if(p>=30)tiers[1].push(r);else tiers[2].push(r)});filtered=tiers.flatMap(t=>shuffleArray(t));curIdx=0;go('swipe');renderCards()}

function mkCard(rec,top){const c=document.createElement('div');c.className='card';c.style.zIndex=top?10:5;if(!top){c.style.transform='scale(.95) translateY(10px)';c.style.opacity='.45'}const mp=Math.round(rec.ms*100);let mc='ml',mt=mp+'% match';if(!userIngs.length){mc='mm';mt='Add ingredients to match'}else if(mp>=60)mc='mh';else if(mp>=30)mc='mm';const il=rec.ing.slice(0,5).map(i=>rec.mi?.includes(i.n)?'<span class="hl">'+i.n+'</span>':i.n).join(', ')+(rec.ing.length>5?'...':'');c.innerHTML=`<img class="card-img" src="${rec.img}" alt="${rec.name}" loading="eager"><div class="card-grad"></div><div class="stamp stamp-l">COOK!</div><div class="stamp stamp-r">SKIP</div><div class="card-info"><span class="card-match ${mc}">${mt}</span><div class="card-title">${rec.name}</div><div class="card-meta"><span class="mt"><svg viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm.5 5H11v6l5.2 3.2.8-1.3-4.5-2.7V7z"/></svg>${rec.time}m</span><span class="mt">${rec.servings} serv</span><span class="mt">${rec.diff}</span></div><div class="card-ing">${il}</div><div class="ctags">${rec.tags.map(t=>'<span>'+t+'</span>').join('')}</div></div>`;if(top){c.addEventListener('pointerdown',onDS);c.addEventListener('click',e=>{if(Math.abs(curX)<5)openDet(rec)})}return c}

// DETAIL with PORTION ADJUSTER
let detPortions=0;
function scaleQty(q, origServ, newServ){
  if(origServ===newServ) return q;
  const ratio=newServ/origServ;
  // Parse numeric values from qty string
  return q.replace(/(\d+\.?\d*)/g, (m)=>{
    const v=parseFloat(m)*ratio;
    return v%1===0?v.toString():v.toFixed(1).replace(/\.0$/,'');
  });
}
function openDet(rec,portions){
  const ov=document.getElementById('modOv'),co=document.getElementById('modC');
  const iF=favs.has(rec.id),iS=saved.find(s=>s.id===rec.id);
  const p=portions||rec.servings;
  detPortions=p;
  const ingHtml=rec.ing.map(i=>{
    const sq=scaleQty(i.q,rec.servings,p);
    const hl=rec.mi?.includes(i.n);
    return '<li>'+(hl?'<span class="hl">✓ ':'')+sq+' '+i.n+(hl?'</span>':'')+'</li>';
  }).join('');
  co.innerHTML=`<img class="modal-img" src="${rec.img}" alt="${rec.name}"><div class="modal-body"><h2>${rec.name}</h2><div class="mmeta"><span class="mt"><svg viewBox="0 0 24 24" width="14" height="14" fill="var(--muted)"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm.5 5H11v6l5.2 3.2.8-1.3-4.5-2.7V7z"/></svg> ${rec.time} min</span><span class="mt">${rec.diff}</span></div><div class="ctags" style="margin-bottom:10px">${rec.tags.map(t=>'<span>'+t+'</span>').join('')}</div><div class="modal-acts"><button class="fbtn ${iF?'on':''}" onclick="tFM(${rec.id},this)">★ ${iF?'Favorited':'Favorite'}</button><button class="sbtn" onclick="sMS(${rec.id},this)">${iS?'✓ Saved':'+ Save'}</button></div><div class="portion-adj"><span class="pa-label">Portions</span><div class="pa-controls"><button class="pa-btn" onclick="adjPortion(${rec.id},-1)">−</button><span class="pa-val" id="paVal">${p}</span><span class="pa-unit">serv</span><button class="pa-btn" onclick="adjPortion(${rec.id},1)">+</button></div></div>${rec.ms!==undefined&&userIngs.length?'<p style="font-size:12px;color:var(--green);margin-bottom:4px">✓ '+rec.mi.length+' ingredients matched</p>':''}<h3>Ingredients</h3><ul id="detIngList">${ingHtml}</ul><h3>Instructions</h3><ol>${rec.steps.map(s=>'<li>'+s+'</li>').join('')}</ol></div>`;
  ov.classList.add('open');
}
function adjPortion(id,delta){
  const rec=R.find(r=>r.id===id);if(!rec)return;
  detPortions=Math.max(1,Math.min(20,detPortions+delta));
  document.getElementById('paVal').textContent=detPortions;
  const list=document.getElementById('detIngList');
  list.innerHTML=rec.ing.map(i=>{
    const sq=scaleQty(i.q,rec.servings,detPortions);
    const hl=rec.mi?.includes(i.n);
    return '<li>'+(hl?'<span class="hl">✓ ':'')+sq+' '+i.n+(hl?'</span>':'')+'</li>';
  }).join('');
}

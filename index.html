{id:311,name:"Lobster Mac & Cheese",time:30,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/51324676766_ed21803b1c_c.jpg",ing:[{n:"lobster meat",q:"300g, chopped"},{n:"elbow macaroni",q:"350g"},{n:"gruyere",q:"150g, grated"},{n:"sharp cheddar",q:"100g, grated"},{n:"milk",q:"500ml"},{n:"butter",q:"40g"},{n:"flour",q:"30g"},{n:"Old Bay seasoning",q:"1 tsp"},{n:"panko",q:"40g"},{n:"chives",q:"fresh"}],steps:["Cook macaroni. Make roux: butter, flour, milk. Add cheeses and Old Bay.","Fold in lobster and macaroni.","Top with panko. Bake 190C 15-20 min until golden. Garnish with chives."]},
{id:312,name:"Cottage Pie",time:50,servings:6,diff:"Medium",tags:["high-protein","nut-free"],img:"https://live.staticflickr.com/65535/55041646658_9152bce746_c.jpg",ing:[{n:"ground beef",q:"500g"},{n:"potatoes",q:"800g"},{n:"onion",q:"1, diced"},{n:"carrot",q:"2, diced"},{n:"peas",q:"100g"},{n:"garlic",q:"3 cloves"},{n:"tomato paste",q:"2 tbsp"},{n:"Worcestershire sauce",q:"1 tbsp"},{n:"beef broth",q:"200ml"},{n:"butter",q:"50g"},{n:"milk",q:"100ml"}],steps:["Brown beef. Add onion, carrot, garlic 5 min. Add paste, Worcestershire, broth. Simmer 10 min. Add peas.","Mash potatoes with butter and milk. Season well.","Top meat with mash, fork texture on top. Bake 200C 20-25 min until golden."]},
{id:313,name:"Kheer",time:30,servings:6,diff:"Easy",tags:["vegetarian","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/54993741760_c6010d0cbb_c.jpg",ing:[{n:"basmati rice",q:"60g"},{n:"whole milk",q:"1L"},{n:"sugar",q:"100g"},{n:"cardamom",q:"4 pods, crushed"},{n:"saffron",q:"pinch"},{n:"almonds",q:"20g, slivered"},{n:"pistachios",q:"20g, chopped"},{n:"raisins",q:"2 tbsp"},{n:"rose water",q:"1 tsp"}],steps:["Wash rice. Simmer in milk on low heat 25-30 min, stirring often, until thick and creamy.","Add sugar, cardamom, saffron, raisins. Cook 5 more min.","Top with almonds, pistachios, rose water. Serve warm or chilled."]},
{id:314,name:"Philly Cheesesteak",time:15,servings:2,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55116598288_7f942f0bb8_c.jpg",ing:[{n:"ribeye steak",q:"400g, frozen 30 min then thinly sliced"},{n:"provolone or Cheez Whiz",q:"100g"},{n:"hoagie rolls",q:"2"},{n:"onion",q:"1, sliced"},{n:"bell pepper",q:"1, sliced"},{n:"mushrooms",q:"100g, sliced"},{n:"vegetable oil",q:"2 tbsp"},{n:"salt and pepper",q:"to taste"}],steps:["Sauté onion, pepper, mushrooms 5 min. Remove.","Spread thin sliced beef on hot griddle. Season, cook 2 min, chop and turn.","Pile meat and vegetables in rolls, drape cheese over. Let melt. Serve immediately."]},
{id:315,name:"Chili Con Carne",time:45,servings:8,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54866656438_23ab5e2053_c.jpg",ing:[{n:"ground beef",q:"600g"},{n:"kidney beans",q:"2 cans"},{n:"canned tomatoes",q:"800g"},{n:"onion",q:"2"},{n:"garlic",q:"6 cloves"},{n:"chili powder",q:"3 tbsp"},{n:"cumin",q:"2 tsp"},{n:"oregano",q:"1 tsp"},{n:"chipotle in adobo",q:"2 peppers"},{n:"beef broth",q:"200ml"},{n:"dark chocolate",q:"20g"},{n:"sour cream",q:"for serving"},{n:"cheddar",q:"for serving"}],steps:["Brown beef in batches. Sauté onion, garlic 5 min.","Add all spices, chipotles. Return beef, add tomatoes, beans, broth. Simmer 30 min.","Stir in chocolate last 5 min. Serve with sour cream, cheese, cornbread."]},
{id:316,name:"Katsuobushi Onigiri",time:15,servings:6,diff:"Easy",tags:["dairy-free"],img:"https://live.staticflickr.com/8829/18131705156_7f61f6dc23_c.jpg",ing:[{n:"sushi rice",q:"300g, cooked"},{n:"katsuobushi",q:"30g"},{n:"soy sauce",q:"2 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"nori sheets",q:"6"},{n:"salt",q:"for hands"},{n:"umeboshi",q:"optional filling"}],steps:["Mix katsuobushi with soy sauce and sesame oil for filling.","Wet hands with salted water. Form rice into triangles, pressing filling into center.","Wrap with nori strip. Serve at room temperature."]},
{id:317,name:"Stuffed Cabbage Rolls",time:60,servings:6,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55032986780_360fbdacb9_c.jpg",ing:[{n:"cabbage",q:"1 head"},{n:"ground beef and pork mix",q:"500g"},{n:"rice",q:"100g, cooked"},{n:"onion",q:"1, grated"},{n:"garlic",q:"3 cloves"},{n:"egg",q:"1"},{n:"canned tomatoes",q:"800g"},{n:"sauerkraut",q:"200g"},{n:"paprika",q:"1 tsp"},{n:"dill",q:"fresh"},{n:"sour cream",q:"for serving"}],steps:["Blanch cabbage, carefully separate leaves. Mix meat with rice, onion, garlic, egg, paprika.","Place filling on each leaf, roll tucking in sides. Place in pot on bed of sauerkraut.","Pour tomatoes over. Cover, simmer 60 min. Serve with sour cream and fresh dill."]},
{id:318,name:"Tres Leches Cake",time:45,servings:12,diff:"Medium",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54531831779_5cd33cf29e_c.jpg",ing:[{n:"flour",q:"200g"},{n:"eggs",q:"5"},{n:"sugar",q:"150g"},{n:"vanilla",q:"1 tsp"},{n:"whole milk",q:"200ml"},{n:"condensed milk",q:"400g"},{n:"evaporated milk",q:"350ml"},{n:"heavy cream",q:"300ml"},{n:"cinnamon",q:"for dusting"},{n:"strawberries",q:"for topping"}],steps:["Beat eggs with sugar and vanilla until tripled. Fold in flour. Bake 175C 25 min.","Poke holes all over cooled cake. Mix 3 milks. Pour over slowly. Refrigerate 4 hours.","Whip cream. Spread over cake. Dust with cinnamon. Top with strawberries."]},
{id:319,name:"Chicken Fried Steak",time:25,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55101536543_b6e1a7db0d_c.jpg",ing:[{n:"cube steak",q:"4 pieces"},{n:"flour",q:"200g"},{n:"eggs",q:"2, beaten"},{n:"buttermilk",q:"100ml"},{n:"garlic powder",q:"1 tsp"},{n:"paprika",q:"1 tsp"},{n:"cayenne",q:"1/4 tsp"},{n:"vegetable oil",q:"for frying"},{n:"milk",q:"400ml"},{n:"sage",q:"1/2 tsp"},{n:"black pepper",q:"1 tsp"},{n:"mashed potatoes",q:"for serving"}],steps:["Season flour with garlic powder, paprika, cayenne, salt, pepper. Tenderize steaks.","Dip in buttermilk-egg, then flour, back in egg, flour again. Fry 4 min per side until golden.","Make gravy: 3 tbsp pan drippings, 2 tbsp flour, milk, sage, pepper. Serve steak over mash with gravy."]},
{id:320,name:"Elote",time:15,servings:4,diff:"Easy",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/65535/55091528280_0cff9aed60_c.jpg",ing:[{n:"corn on the cob",q:"4"},{n:"mayonnaise",q:"60ml"},{n:"sour cream",q:"2 tbsp"},{n:"cotija cheese",q:"60g, crumbled"},{n:"chili powder",q:"1 tsp"},{n:"lime",q:"2"},{n:"cilantro",q:"fresh"},{n:"cayenne",q:"pinch"}],steps:["Grill corn 10-12 min, turning often, until charred.","Mix mayo and sour cream. Brush over hot corn.","Sprinkle with cotija cheese, chili powder, cayenne. Squeeze lime, top with cilantro."]},
{id:321,name:"Beef Bourguignon Pie",time:90,servings:6,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/4777/39828636675_94d8c95569_c.jpg",ing:[{n:"beef chuck",q:"600g, cubed"},{n:"red wine",q:"300ml"},{n:"bacon lardons",q:"100g"},{n:"mushrooms",q:"200g"},{n:"pearl onions",q:"150g"},{n:"carrot",q:"2"},{n:"garlic",q:"4 cloves"},{n:"tomato paste",q:"2 tbsp"},{n:"beef broth",q:"200ml"},{n:"thyme",q:"3 sprigs"},{n:"puff pastry",q:"1 sheet"},{n:"egg",q:"1, for wash"}],steps:["Make bourguignon: brown beef, cook bacon, vegetables. Deglaze with wine. Add broth, herbs. Braise 1.5 hours.","Pour filling into pie dish. Cool slightly.","Top with puff pastry, crimp edges, egg wash. Bake 200C 25-30 min until golden and puffed."]},
{id:322,name:"Tofu Scramble",time:15,servings:2,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/54999514191_7cfbc015e4_c.jpg",ing:[{n:"extra-firm tofu",q:"400g"},{n:"nutritional yeast",q:"2 tbsp"},{n:"turmeric",q:"1/2 tsp"},{n:"cumin",q:"1/2 tsp"},{n:"garlic powder",q:"1/2 tsp"},{n:"spinach",q:"100g"},{n:"bell pepper",q:"1, diced"},{n:"onion",q:"1/2, diced"},{n:"olive oil",q:"2 tbsp"},{n:"toast",q:"for serving"},{n:"avocado",q:"1/2"},{n:"hot sauce",q:"for serving"}],steps:["Crumble tofu with hands. Mix with nutritional yeast, turmeric, cumin, garlic powder.","Sauté onion and pepper 3 min. Add tofu mixture, cook 5 min.","Add spinach, cook until wilted. Serve on toast with avocado and hot sauce."]},
{id:323,name:"Gambas Pil Pil",time:10,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/4002/4624207648_ca6a2451c9_c.jpg",ing:[{n:"large prawns",q:"400g, shell-on"},{n:"garlic",q:"6 cloves, sliced"},{n:"dried guindilla chili",q:"2"},{n:"olive oil",q:"100ml"},{n:"smoked paprika",q:"1/2 tsp"},{n:"parsley",q:"fresh"},{n:"crusty bread",q:"for serving"}],steps:["Heat olive oil in a clay cazuela. Add garlic and chili, cook 1 min.","Add prawns, cook 2-3 min per side until pink. Add paprika.","Garnish with parsley. Serve sizzling hot with bread to soak up the oil."]},
{id:324,name:"Mochi Ice Cream",time:40,servings:8,diff:"Medium",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/65535/54440152081_98ef896784_c.jpg",ing:[{n:"glutinous rice flour",q:"100g"},{n:"sugar",q:"40g"},{n:"water",q:"150ml"},{n:"cornstarch",q:"for dusting"},{n:"ice cream",q:"8 small scoops, frozen hard"}],steps:["Mix flour, sugar, water. Microwave 1 min, stir. Repeat twice until translucent and stretchy.","Roll out mochi on cornstarch-dusted surface. Cut into circles.","Working quickly, wrap each mochi circle around a scoop of ice cream. Pinch closed. Freeze 1 hour."]},
{id:325,name:"Chicken Tortilla Soup",time:30,servings:6,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55100574948_2b75abbc49_c.jpg",ing:[{n:"chicken breast",q:"400g"},{n:"canned tomatoes",q:"400g"},{n:"chicken broth",q:"1L"},{n:"onion",q:"1"},{n:"garlic",q:"4 cloves"},{n:"chipotle in adobo",q:"2"},{n:"cumin",q:"1 tsp"},{n:"corn tortillas",q:"4, cut into strips"},{n:"avocado",q:"1"},{n:"lime",q:"2"},{n:"cilantro",q:"fresh"},{n:"sour cream",q:"for serving"},{n:"cheddar",q:"for serving"}],steps:["Simmer chicken in broth 15 min. Shred. Blend tomatoes, onion, garlic, chipotle.","Fry tomato mixture 5 min. Add broth, chicken, cumin. Simmer 10 min. Fry tortilla strips.","Serve with crispy tortilla strips, avocado, lime, cilantro, sour cream, cheese."]},
{id:326,name:"Omurice",time:15,servings:2,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55053019461_5bbe0ab27f_c.jpg",ing:[{n:"cooked rice",q:"300g"},{n:"chicken thigh",q:"150g, diced"},{n:"onion",q:"1/2, diced"},{n:"ketchup",q:"4 tbsp"},{n:"eggs",q:"4"},{n:"butter",q:"30g"},{n:"salt and pepper",q:"to taste"},{n:"green peas",q:"50g"},{n:"parsley",q:"for garnish"}],steps:["Cook chicken and onion 3 min. Add rice, peas, ketchup. Stir-fry 2 min. Divide onto plates.","Beat 2 eggs each. Cook thin omelette in butter.","Drape omelette over each rice mound. Drizzle more ketchup on top. Garnish with parsley."]},
{id:327,name:"Black Pepper Crab",time:25,servings:2,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54529331344_c2755ac055_c.jpg",ing:[{n:"mud crab or blue crab",q:"2 whole, cleaned and quartered"},{n:"black pepper",q:"3 tbsp, coarsely cracked"},{n:"garlic",q:"6 cloves"},{n:"ginger",q:"2 inch"},{n:"butter",q:"60g"},{n:"oyster sauce",q:"2 tbsp"},{n:"soy sauce",q:"1 tbsp"},{n:"sugar",q:"1 tsp"},{n:"curry leaves",q:"8"},{n:"egg",q:"1"},{n:"mantou buns",q:"for serving"}],steps:["Stir-fry crab in oil 3 min. Add garlic, ginger, curry leaves.","Add butter, black pepper, oyster sauce, soy, sugar. Toss well 3-4 min.","Drizzle beaten egg over. Stir until egg coats crab. Serve with mantou buns."]},
{id:328,name:"Lemon Posset",time:15,servings:4,diff:"Easy",tags:["gluten-free"],img:"https://live.staticflickr.com/65535/53008768862_b785502fd6_c.jpg",ing:[{n:"heavy cream",q:"500ml"},{n:"sugar",q:"120g"},{n:"lemon juice",q:"80ml"},{n:"lemon zest",q:"2 lemons"},{n:"shortbread cookies",q:"for serving"},{n:"fresh berries",q:"for serving"}],steps:["Heat cream and sugar until just boiling, stirring to dissolve sugar.","Remove from heat. Stir in lemon juice and zest. It will thicken naturally.","Pour into glasses. Chill 3-4 hours until set. Serve with shortbread and berries."]},
{id:329,name:"Korean Japchae Bowl",time:25,servings:3,diff:"Easy",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/53984534566_9de2a9253c_c.jpg",ing:[{n:"sweet potato noodles",q:"250g"},{n:"beef sirloin",q:"200g, sliced"},{n:"spinach",q:"100g"},{n:"carrot",q:"1"},{n:"bell pepper",q:"1"},{n:"shiitake mushrooms",q:"100g"},{n:"soy sauce",q:"4 tbsp"},{n:"sesame oil",q:"2 tbsp"},{n:"sugar",q:"1 tbsp"},{n:"garlic",q:"3 cloves"},{n:"egg",q:"2"},{n:"sesame seeds",q:"1 tbsp"}],steps:["Cook noodles, drain, toss with sesame oil. Cook each vegetable and beef separately.","Make egg crepe, slice thin.","Combine everything with soy sauce, sesame oil, sugar. Garnish with sesame seeds and egg strips."]},
{id:330,name:"Focaccia",time:45,servings:8,diff:"Easy",tags:["vegan","vegetarian","dairy-free"],img:"https://live.staticflickr.com/65535/55109260447_0d6d68ddc2_c.jpg",ing:[{n:"bread flour",q:"400g"},{n:"yeast",q:"7g"},{n:"warm water",q:"300ml"},{n:"olive oil",q:"80ml"},{n:"salt",q:"2 tsp"},{n:"rosemary",q:"fresh"},{n:"cherry tomatoes",q:"10, halved"},{n:"olives",q:"50g"},{n:"flaky sea salt",q:"for topping"}],steps:["Mix flour, yeast, water, half the oil, salt. Knead 8 min. Rise 1 hour.","Press into oiled baking sheet. Dimple with fingers. Drizzle remaining oil.","Top with rosemary, tomatoes, olives, sea salt. Rise 30 min. Bake 220C 18-22 min until golden."]},
{id:331,name:"Cajun Shrimp Boil",time:30,servings:6,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/50928219292_79b36f10ff_c.jpg",ing:[{n:"large shrimp",q:"1kg, shell-on"},{n:"andouille sausage",q:"300g, sliced"},{n:"corn",q:"4 ears, halved"},{n:"baby potatoes",q:"500g"},{n:"Old Bay seasoning",q:"4 tbsp"},{n:"garlic",q:"1 head"},{n:"lemon",q:"3"},{n:"butter",q:"100g, melted"},{n:"parsley",q:"fresh"}],steps:["Boil potatoes and corn in seasoned water 10 min. Add sausage 5 min. Add shrimp 3 min.","Drain. Dump onto newspaper-lined table.","Drizzle melted butter, extra Old Bay, lemon juice. Garnish with parsley. Eat with hands."]},
{id:332,name:"Pierogi",time:60,servings:24,diff:"Medium",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/55127911609_36ed82d790_c.jpg",ing:[{n:"flour",q:"350g"},{n:"egg",q:"1"},{n:"sour cream",q:"100g"},{n:"butter",q:"30g"},{n:"potato",q:"500g, boiled"},{n:"cheddar cheese",q:"100g, grated"},{n:"onion",q:"2, diced"},{n:"salt and pepper",q:"to taste"},{n:"sour cream",q:"for serving"},{n:"chives",q:"for serving"}],steps:["Make dough: flour, egg, sour cream, butter, salt. Knead, rest 30 min.","Make filling: mash potato with cheese and sautéed onion.","Roll dough thin, cut circles. Fill, seal edges. Boil 3-4 min. Pan-fry in butter until golden. Serve with sour cream."]},
{id:333,name:"Thai Mango Salad",time:15,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free"],img:"https://live.staticflickr.com/65535/54612723133_f558768597_c.jpg",ing:[{n:"green mango",q:"2, julienned"},{n:"carrot",q:"1, julienned"},{n:"red onion",q:"1/2, sliced"},{n:"cherry tomatoes",q:"100g, halved"},{n:"peanuts",q:"40g, crushed"},{n:"cilantro",q:"fresh"},{n:"mint",q:"fresh"},{n:"Thai chili",q:"2, sliced"},{n:"fish sauce or soy sauce",q:"2 tbsp"},{n:"lime juice",q:"3 tbsp"},{n:"palm sugar",q:"1 tbsp"}],steps:["Julienne green mango and carrot. Slice onion and halve tomatoes.","Whisk fish sauce, lime juice, sugar until dissolved.","Toss everything together. Top with crushed peanuts, herbs, and sliced chili."]},
{id:334,name:"French Onion Soup",time:45,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55112821012_6f65ee87fd_c.jpg",ing:[{n:"onion",q:"5 large, thinly sliced"},{n:"butter",q:"40g"},{n:"olive oil",q:"1 tbsp"},{n:"white wine",q:"100ml"},{n:"beef broth",q:"1L"},{n:"thyme",q:"3 sprigs"},{n:"bay leaf",q:"1"},{n:"baguette",q:"8 slices, toasted"},{n:"gruyere",q:"200g, grated"},{n:"salt and pepper",q:"to taste"}],steps:["Caramelize onions in butter and oil over medium-low 30 min, stirring occasionally.","Deglaze with wine. Add broth, thyme, bay leaf. Simmer 15 min.","Ladle into oven-safe bowls. Float baguette slices, pile with gruyere. Broil 3-5 min until bubbly."]},
{id:335,name:"Char Kway Teow",time:15,servings:2,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/54581651736_367d997937_c.jpg",ing:[{n:"flat rice noodles",q:"300g"},{n:"shrimp",q:"150g"},{n:"Chinese sausage",q:"1, sliced"},{n:"egg",q:"2"},{n:"bean sprouts",q:"100g"},{n:"chives",q:"50g, cut"},{n:"dark soy sauce",q:"2 tbsp"},{n:"light soy sauce",q:"1 tbsp"},{n:"fish sauce",q:"1 tbsp"},{n:"chili paste",q:"1 tbsp"},{n:"lard or oil",q:"3 tbsp"}],steps:["Stir-fry shrimp and sausage 2 min in very hot wok. Push aside, scramble egg.","Add noodles, all sauces. Toss over high heat 2 min.","Add sprouts and chives, toss 30 sec. Should have wok hei (smoky char). Serve immediately."]},
{id:336,name:"Baba Ghanoush with Lamb",time:25,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:U+"1631515243349-e0cb75fb8d3a?w=600&h=400&fit=crop",ing:[{n:"eggplant",q:"2 large"},{n:"ground lamb",q:"300g"},{n:"pine nuts",q:"30g, toasted"},{n:"tahini",q:"2 tbsp"},{n:"garlic",q:"2 cloves"},{n:"lemon juice",q:"2 tbsp"},{n:"cumin",q:"1 tsp"},{n:"paprika",q:"1/2 tsp"},{n:"pomegranate seeds",q:"for garnish"},{n:"parsley",q:"fresh"},{n:"olive oil",q:"3 tbsp"},{n:"pita",q:"for serving"}],steps:["Char eggplants over flame until blackened. Scoop flesh, mash with tahini, garlic, lemon.","Brown lamb with cumin and paprika until crispy.","Spread baba ghanoush on platter. Top with spiced lamb, pine nuts, pomegranate, parsley, oil. Serve with pita."]},
{id:337,name:"Waffles",time:20,servings:4,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/55150591491_66aa6d6a51_c.jpg",ing:[{n:"flour",q:"200g"},{n:"sugar",q:"2 tbsp"},{n:"baking powder",q:"2 tsp"},{n:"salt",q:"1/2 tsp"},{n:"eggs",q:"2, separated"},{n:"milk",q:"250ml"},{n:"butter",q:"60g, melted"},{n:"vanilla extract",q:"1 tsp"},{n:"maple syrup",q:"for serving"},{n:"fresh berries",q:"for serving"},{n:"whipped cream",q:"for serving"}],steps:["Mix dry ingredients. Whisk yolks with milk, butter, vanilla. Combine. Whip whites, fold in.","Pour into hot waffle iron. Cook until golden and crispy.","Serve with maple syrup, fresh berries, and whipped cream."]},
{id:338,name:"Lobster Roll",time:15,servings:2,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55113688176_9680d3402b_c.jpg",ing:[{n:"lobster meat",q:"300g, cooked"},{n:"mayonnaise",q:"3 tbsp"},{n:"lemon juice",q:"1 tbsp"},{n:"celery",q:"1 stalk, finely diced"},{n:"chives",q:"2 tbsp, chopped"},{n:"hot dog buns",q:"2, split-top, toasted"},{n:"butter",q:"20g"},{n:"paprika",q:"pinch"},{n:"lettuce",q:"leaves"}],steps:["Chop lobster into chunks. Toss gently with mayo, lemon juice, celery, chives, salt, pepper.","Toast buns in butter until golden on both sides.","Line with lettuce, pile lobster salad generously. Dust with paprika."]},
{id:339,name:"Jackfruit Tacos",time:20,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/54492168100_cd1771d9d1_c.jpg",ing:[{n:"young jackfruit",q:"2 cans, drained and shredded"},{n:"BBQ sauce or taco seasoning",q:"3 tbsp"},{n:"onion",q:"1, diced"},{n:"garlic",q:"2 cloves"},{n:"corn tortillas",q:"8"},{n:"red cabbage",q:"150g, shredded"},{n:"avocado",q:"1"},{n:"lime",q:"2"},{n:"cilantro",q:"fresh"},{n:"pickled onion",q:"for serving"}],steps:["Shred jackfruit with forks. Sauté with onion, garlic 5 min.","Add BBQ sauce or taco seasoning with splash of water. Cook 10 min until tender.","Serve in warm tortillas with slaw, avocado, pickled onion, cilantro, lime."]},
{id:340,name:"Arroz con Pollo",time:40,servings:6,diff:"Easy",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/54522104510_eb3b66c6f1_c.jpg",ing:[{n:"chicken thighs",q:"6, bone-in"},{n:"rice",q:"300g"},{n:"onion",q:"1, diced"},{n:"garlic",q:"4 cloves"},{n:"bell pepper",q:"2, diced"},{n:"canned tomatoes",q:"200g"},{n:"chicken broth",q:"500ml"},{n:"cumin",q:"1 tsp"},{n:"saffron or annatto",q:"1 tsp"},{n:"peas",q:"100g"},{n:"olives",q:"50g"},{n:"cilantro",q:"fresh"},{n:"lime",q:"1"}],steps:["Brown chicken, remove. Sauté onion, garlic, peppers 5 min.","Add rice, spices, tomatoes, broth. Nestle chicken back in. Cover, cook 25 min.","Add peas and olives last 5 min. Garnish with cilantro and lime."]},
{id:341,name:"Beef Rendang Curry",time:120,servings:6,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/53249122982_e89e53a291_c.jpg",ing:[{n:"beef chuck",q:"800g, cubed"},{n:"coconut milk",q:"600ml"},{n:"lemongrass",q:"3 stalks"},{n:"galangal",q:"3 slices"},{n:"kaffir lime leaves",q:"5"},{n:"onion",q:"3, blended"},{n:"garlic",q:"6 cloves"},{n:"ginger",q:"2 inch"},{n:"dried chilies",q:"10"},{n:"toasted coconut",q:"3 tbsp"},{n:"turmeric",q:"1 tsp"},{n:"rice",q:"for serving"}],steps:["Blend onion, garlic, ginger, soaked chilies into paste. Fry 5 min.","Add coconut milk, lemongrass, galangal, lime leaves, turmeric, beef.","Simmer uncovered 2 hours until sauce is dry and meat is dark, tender, and caramelized. Stir in toasted coconut."]},
{id:342,name:"Vanilla Bean Cheesecake",time:75,servings:12,diff:"Medium",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54611628657_dbe707487b_c.jpg",ing:[{n:"cream cheese",q:"600g, softened"},{n:"sugar",q:"150g"},{n:"eggs",q:"4"},{n:"vanilla bean",q:"2, scraped"},{n:"sour cream",q:"200g"},{n:"flour",q:"2 tbsp"},{n:"graham cracker crumbs",q:"200g"},{n:"butter",q:"80g, melted"},{n:"salt",q:"pinch"}],steps:["Mix crumbs and butter. Press into springform pan. Bake 175C 10 min.","Beat cream cheese, sugar, vanilla until smooth. Add eggs one at a time. Fold in sour cream and flour.","Pour over crust. Bake in water bath 160C 60-70 min. Turn off oven, crack door, cool 1 hour. Chill 4 hours."]},
{id:343,name:"Chicken Fricassee",time:40,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:U+"1655463485418-b9da044bddee?w=600&h=400&fit=crop",ing:[{n:"chicken pieces",q:"1.5kg"},{n:"mushrooms",q:"200g"},{n:"pearl onions",q:"150g"},{n:"carrot",q:"2"},{n:"celery",q:"2 stalks"},{n:"white wine",q:"150ml"},{n:"chicken broth",q:"300ml"},{n:"heavy cream",q:"100ml"},{n:"butter",q:"30g"},{n:"flour",q:"2 tbsp"},{n:"thyme",q:"3 sprigs"},{n:"bay leaf",q:"1"},{n:"lemon juice",q:"1 tbsp"},{n:"egg yolks",q:"2"}],steps:["Brown chicken. Remove. Sauté vegetables 5 min. Add flour, wine, broth, herbs. Return chicken.","Cover, simmer 25 min.","Mix yolks with cream. Temper with hot liquid, stir into stew off heat. Add lemon juice. Serve over rice."]},
{id:344,name:"Bao Buns with Pork Belly",time:60,servings:8,diff:"Medium",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/51401659662_73d0866032_c.jpg",ing:[{n:"pork belly",q:"500g"},{n:"bao buns",q:"8, steamed"},{n:"soy sauce",q:"4 tbsp"},{n:"hoisin sauce",q:"3 tbsp"},{n:"five spice",q:"1 tsp"},{n:"honey",q:"2 tbsp"},{n:"ginger",q:"2 inch"},{n:"garlic",q:"4 cloves"},{n:"cucumber",q:"1, sliced"},{n:"green onion",q:"3"},{n:"sriracha",q:"for serving"},{n:"pickled daikon",q:"for serving"}],steps:["Braise pork belly in soy, five spice, ginger, garlic, honey, and water 45-50 min until tender.","Slice braised pork belly. Steam bao buns 8 min.","Fill bao with pork belly, hoisin, cucumber, green onion, pickled daikon, sriracha."]},
{id:345,name:"Watermelon Poke Bowl",time:15,servings:2,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free"],img:"https://live.staticflickr.com/65535/48695137708_88b73c35f3_c.jpg",ing:[{n:"watermelon",q:"400g, cubed"},{n:"soy sauce",q:"3 tbsp"},{n:"sesame oil",q:"1 tbsp"},{n:"rice vinegar",q:"1 tbsp"},{n:"sushi rice",q:"250g"},{n:"avocado",q:"1"},{n:"cucumber",q:"1"},{n:"edamame",q:"80g"},{n:"seaweed",q:"shredded"},{n:"sesame seeds",q:"1 tbsp"},{n:"green onion",q:"2"}],steps:["Marinate watermelon cubes in soy sauce, sesame oil, rice vinegar 15 min.","Prepare rice, vegetables.","Assemble bowls: rice, marinated watermelon, avocado, cucumber, edamame, seaweed, sesame seeds."]},
{id:346,name:"Shakshouka with Lamb",time:30,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/8597/16405312927_ed485febdb_c.jpg",ing:[{n:"ground lamb",q:"300g"},{n:"canned tomatoes",q:"800g"},{n:"eggs",q:"6"},{n:"onion",q:"1, diced"},{n:"bell pepper",q:"2"},{n:"garlic",q:"4 cloves"},{n:"cumin",q:"1 tsp"},{n:"ras el hanout",q:"1 tsp"},{n:"feta",q:"60g"},{n:"cilantro",q:"fresh"},{n:"olive oil",q:"2 tbsp"},{n:"flatbread",q:"for serving"}],steps:["Brown lamb, drain excess fat. Add onion, pepper, garlic 5 min. Add spices.","Add tomatoes, simmer 10 min.","Make wells, crack eggs. Cover 5-8 min. Top with feta, cilantro. Serve with flatbread."]},
{id:347,name:"Butternut Squash Ravioli",time:45,servings:4,diff:"Medium",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/46980910005_46c5362795_c.jpg",ing:[{n:"butternut squash",q:"500g, roasted"},{n:"ricotta",q:"100g"},{n:"sage",q:"12 leaves"},{n:"parmesan",q:"50g, grated"},{n:"nutmeg",q:"pinch"},{n:"pasta dough",q:"300g or wonton wrappers"},{n:"butter",q:"80g"},{n:"pine nuts",q:"30g"}],steps:["Mash roasted squash with ricotta, half the parmesan, nutmeg, salt.","Fill pasta or wonton wrappers. Seal edges. Cook in boiling water until they float.","Brown butter with sage and pine nuts. Toss ravioli in brown butter sage sauce. Top with parmesan."]},
{id:348,name:"Chicken Lazone",time:20,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/2833/12229659296_f9a0c6c59c_c.jpg",ing:[{n:"chicken breast",q:"4"},{n:"butter",q:"60g"},{n:"heavy cream",q:"200ml"},{n:"garlic powder",q:"1 tsp"},{n:"onion powder",q:"1 tsp"},{n:"chili powder",q:"1/2 tsp"},{n:"paprika",q:"1 tsp"},{n:"salt",q:"1 tsp"},{n:"pasta or rice",q:"for serving"}],steps:["Mix all spices. Season chicken generously on both sides.","Melt butter in skillet. Cook chicken 5-6 min per side. Remove.","Add cream to pan, scrape up bits. Simmer 3 min until thickened. Return chicken. Serve over pasta."]},
{id:349,name:"Coconut Macaroons",time:25,servings:18,diff:"Easy",tags:["gluten-free"],img:"https://live.staticflickr.com/65535/55139591248_d656830cf7_c.jpg",ing:[{n:"shredded coconut",q:"300g"},{n:"sweetened condensed milk",q:"200g"},{n:"egg whites",q:"2"},{n:"vanilla extract",q:"1 tsp"},{n:"salt",q:"pinch"},{n:"dark chocolate",q:"100g, melted, for dipping"}],steps:["Mix coconut, condensed milk, vanilla, salt. Whip whites to stiff peaks, fold in.","Scoop mounds onto lined baking sheet. Bake 175C 18-20 min until golden.","Cool. Dip bottoms in melted chocolate. Set on parchment until chocolate hardens."]},
{id:350,name:"Naan Pizza",time:15,servings:2,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/53339957029_17c8f447f2_c.jpg",ing:[{n:"naan bread",q:"2 large"},{n:"pizza sauce",q:"100ml"},{n:"mozzarella",q:"150g, shredded"},{n:"pepperoni or vegetables",q:"toppings of choice"},{n:"olive oil",q:"for brushing"},{n:"Italian seasoning",q:"1 tsp"},{n:"fresh basil",q:"for serving"},{n:"red pepper flakes",q:"optional"}],steps:["Place naan on baking sheet. Spread sauce. Add cheese and toppings.","Bake 220C 8-10 min until cheese is bubbly and edges crispy.","Top with fresh basil and red pepper flakes if desired."]},
{id:351,name:"Peruvian Lomo Saltado",time:25,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/50380823506_22db3b6c2f_c.jpg",ing:[{n:"beef sirloin",q:"500g, sliced into strips"},{n:"onion",q:"1, cut into wedges"},{n:"tomato",q:"2, cut into wedges"},{n:"soy sauce",q:"3 tbsp"},{n:"red wine vinegar",q:"2 tbsp"},{n:"aji amarillo paste",q:"1 tbsp"},{n:"garlic",q:"3 cloves"},{n:"cumin",q:"1/2 tsp"},{n:"French fries",q:"300g, cooked"},{n:"cilantro",q:"fresh"},{n:"rice",q:"for serving"}],steps:["Sear beef strips in smoking hot wok 1 min. Remove.","Stir-fry onion and tomato 2 min. Add garlic, aji amarillo, cumin.","Return beef. Add soy sauce, vinegar. Toss with fries. Serve immediately with rice and cilantro."]},
{id:352,name:"Spring Pea Risotto",time:30,servings:4,diff:"Medium",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/3904/14637077024_6d1dc0183e_c.jpg",ing:[{n:"arborio rice",q:"300g"},{n:"peas",q:"300g, fresh or frozen"},{n:"onion",q:"1, finely diced"},{n:"garlic",q:"2 cloves"},{n:"white wine",q:"150ml"},{n:"vegetable broth",q:"1L"},{n:"parmesan",q:"60g"},{n:"mint",q:"fresh"},{n:"butter",q:"30g"},{n:"lemon zest",q:"1 lemon"}],steps:["Blend half the peas with a splash of broth for pea puree.","Cook onion, garlic. Toast rice, add wine. Add broth gradually, stirring 18 min.","Stir in pea puree, remaining peas, butter, parmesan, mint, lemon zest. Rest 2 min."]},
{id:353,name:"Cuban Sandwich",time:15,servings:2,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55136849306_7eba036f91_c.jpg",ing:[{n:"Cuban bread or ciabatta",q:"2"},{n:"roast pork",q:"150g, sliced"},{n:"ham",q:"100g, sliced"},{n:"Swiss cheese",q:"100g, sliced"},{n:"pickles",q:"sliced"},{n:"yellow mustard",q:"2 tbsp"},{n:"butter",q:"for pressing"}],steps:["Slice bread. Spread mustard. Layer ham, roast pork, Swiss cheese, pickles.","Butter outside of bread. Press in hot panini press or weighted skillet 4-5 min per side.","Bread should be golden and crispy, cheese melted. Cut diagonally."]},
{id:354,name:"Shakshuka with Feta & Herbs",time:25,servings:3,diff:"Easy",tags:["vegetarian","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/54517249192_ea9b11fe46_c.jpg",ing:[{n:"eggs",q:"6"},{n:"canned tomatoes",q:"800g"},{n:"onion",q:"1"},{n:"garlic",q:"3 cloves"},{n:"cumin",q:"1 tsp"},{n:"smoked paprika",q:"1 tsp"},{n:"feta",q:"80g, crumbled"},{n:"fresh dill",q:"for serving"},{n:"fresh parsley",q:"for serving"},{n:"olive oil",q:"2 tbsp"},{n:"sourdough",q:"for serving"}],steps:["Sauté onion and garlic 5 min. Add spices, tomatoes. Simmer 10 min.","Make wells, crack eggs. Cover 5-8 min.","Crumble feta generously. Top with dill and parsley. Serve with sourdough."]},
{id:355,name:"Massaman Lamb Curry",time:45,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/1520/23586409563_8d48e02dc4_c.jpg",ing:[{n:"lamb shoulder",q:"600g, cubed"},{n:"coconut milk",q:"600ml"},{n:"massaman paste",q:"3 tbsp"},{n:"potato",q:"2, cubed"},{n:"onion",q:"1, quartered"},{n:"peanuts",q:"50g"},{n:"tamarind paste",q:"2 tbsp"},{n:"fish sauce",q:"2 tbsp"},{n:"palm sugar",q:"2 tbsp"},{n:"cinnamon stick",q:"1"},{n:"star anise",q:"2"},{n:"rice",q:"for serving"}],steps:["Fry massaman paste in coconut cream 2 min. Add lamb, sear 3 min.","Add remaining coconut milk, potato, onion, spices. Simmer 35-40 min.","Add peanuts, tamarind, fish sauce, sugar. Cook 5 min. Serve over jasmine rice."]},
{id:356,name:"Pistachio Crusted Salmon",time:20,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54305451838_1523e47e5b_c.jpg",ing:[{n:"salmon fillets",q:"4"},{n:"pistachios",q:"80g, finely chopped"},{n:"Dijon mustard",q:"2 tbsp"},{n:"honey",q:"1 tbsp"},{n:"lemon zest",q:"1 lemon"},{n:"panko",q:"2 tbsp"},{n:"olive oil",q:"1 tbsp"},{n:"asparagus",q:"200g"},{n:"salt and pepper",q:"to taste"}],steps:["Mix crushed pistachios with panko, lemon zest. Spread mustard-honey on salmon, press pistachio crust on top.","Place on sheet pan with asparagus. Drizzle oil.","Bake 200C 12-15 min until crust is golden and salmon is flaky."]},
{id:357,name:"Misir Wot",time:30,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/1597/23873429789_080cbf21d5_c.jpg",ing:[{n:"red lentils",q:"300g"},{n:"onion",q:"2, finely diced"},{n:"berbere spice",q:"3 tbsp"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"1 inch"},{n:"tomato paste",q:"2 tbsp"},{n:"vegetable oil",q:"3 tbsp"},{n:"salt",q:"to taste"},{n:"injera",q:"for serving"}],steps:["Cook onions dry over medium heat 10 min. Add oil, cook 5 min more until deep brown.","Add berbere, garlic, ginger, tomato paste. Cook 3 min.","Add lentils and 600ml water. Simmer 20-25 min until thick. Serve with injera."]},
{id:358,name:"Crispy Skin Barramundi",time:20,servings:2,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:U+"1517415815224-8d6555d3a998?w=600&h=400&fit=crop",ing:[{n:"barramundi fillets",q:"2, skin-on"},{n:"olive oil",q:"2 tbsp"},{n:"lemon",q:"1"},{n:"capers",q:"1 tbsp"},{n:"cherry tomatoes",q:"150g, halved"},{n:"basil",q:"fresh"},{n:"garlic",q:"2 cloves"},{n:"white wine",q:"60ml"},{n:"butter",q:"20g"}],steps:["Score skin. Season fish. Sear skin-down in hot oiled pan 4 min. Flip, cook 2 min. Remove.","Add garlic, tomatoes, capers to pan. Add wine, simmer 2 min.","Add butter, lemon juice. Spoon sauce over fish. Top with basil."]},
{id:359,name:"Potato Gratin Dauphinois",time:60,servings:6,diff:"Medium",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/951/41205825855_8aae9ec65b_c.jpg",ing:[{n:"potatoes",q:"1kg, thinly sliced"},{n:"heavy cream",q:"400ml"},{n:"milk",q:"200ml"},{n:"garlic",q:"3 cloves, minced"},{n:"gruyere",q:"100g, grated"},{n:"nutmeg",q:"1/4 tsp"},{n:"butter",q:"for greasing"},{n:"thyme",q:"fresh"}],steps:["Rub baking dish with garlic and butter. Layer potatoes, seasoning each layer.","Heat cream, milk, remaining garlic, nutmeg. Pour over potatoes.","Top with gruyere. Bake covered 180C 40 min, uncover 20 min until golden and bubbling."]},
{id:360,name:"Tandoori Chicken",time:40,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://www.themealdb.com/images/media/meals/qptpvt1487339892.jpg/preview",ing:[{n:"chicken legs",q:"8"},{n:"yogurt",q:"200g"},{n:"ginger-garlic paste",q:"3 tbsp"},{n:"tandoori masala",q:"3 tbsp"},{n:"kashmiri chili",q:"2 tbsp"},{n:"lemon",q:"2"},{n:"salt",q:"1 tsp"},{n:"oil",q:"2 tbsp"},{n:"mint chutney",q:"for serving"},{n:"naan",q:"for serving"},{n:"onion rings",q:"for serving"}],steps:["Score chicken deeply. Mix yogurt with all spices, lemon juice. Coat chicken. Marinate 4 hours minimum.","Grill or bake at 220C 30-35 min until charred edges and cooked through.","Serve with mint chutney, naan, sliced onion with lemon."]},
{id:361,name:"Pesto Gnocchi",time:15,servings:4,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/55129632280_b9a65838d9_c.jpg",ing:[{n:"potato gnocchi",q:"500g"},{n:"basil pesto",q:"120g"},{n:"cherry tomatoes",q:"200g, halved"},{n:"fresh mozzarella",q:"150g, torn"},{n:"pine nuts",q:"30g, toasted"},{n:"olive oil",q:"1 tbsp"},{n:"parmesan",q:"30g, grated"}],steps:["Cook gnocchi until they float. Reserve pasta water.","Toss gnocchi with pesto and a splash of pasta water.","Add tomatoes, torn mozzarella, pine nuts. Drizzle olive oil, sprinkle parmesan."]},
{id:362,name:"Chicken Drumstick Adobo",time:35,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:U+"1672856399624-61b47d70d339?w=600&h=400&fit=crop",ing:[{n:"chicken drumsticks",q:"8"},{n:"soy sauce",q:"60ml"},{n:"white vinegar",q:"60ml"},{n:"garlic",q:"8 cloves, crushed"},{n:"bay leaves",q:"3"},{n:"peppercorns",q:"1 tsp"},{n:"brown sugar",q:"1 tbsp"},{n:"oil",q:"2 tbsp"},{n:"rice",q:"for serving"}],steps:["Brown drumsticks in oil. Add garlic, soy sauce, vinegar, bay leaves, peppercorns, sugar.","Cover, simmer 25 min, turning halfway.","Uncover, reduce sauce until thick and glossy. Serve over rice."]},
{id:363,name:"Tiramisu Cups",time:20,servings:4,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54504589757_40de3f4154_c.jpg",ing:[{n:"mascarpone",q:"250g"},{n:"heavy cream",q:"150ml"},{n:"sugar",q:"50g"},{n:"strong espresso",q:"150ml, cooled"},{n:"ladyfinger biscuits",q:"12"},{n:"cocoa powder",q:"for dusting"},{n:"Kahlua",q:"1 tbsp, optional"}],steps:["Whip cream with sugar to soft peaks. Fold in mascarpone until smooth.","Dip ladyfingers quickly in espresso (and Kahlua). Layer in glasses with mascarpone cream.","Top with final cream layer. Dust with cocoa. Chill 2 hours minimum."]},
{id:364,name:"Mole Chicken",time:60,servings:6,diff:"Hard",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54932595597_2a6b7fe459_c.jpg",ing:[{n:"chicken pieces",q:"1.5kg"},{n:"dried ancho chilies",q:"4"},{n:"dried guajillo chilies",q:"4"},{n:"onion",q:"1"},{n:"garlic",q:"4 cloves"},{n:"canned tomatoes",q:"200g"},{n:"sesame seeds",q:"2 tbsp"},{n:"pumpkin seeds",q:"2 tbsp"},{n:"cinnamon stick",q:"1"},{n:"dark chocolate",q:"30g"},{n:"chicken broth",q:"500ml"},{n:"tortillas",q:"for serving"},{n:"rice",q:"for serving"}],steps:["Toast and rehydrate chilies. Toast sesame and pumpkin seeds.","Blend chilies, onion, garlic, tomatoes, seeds, cinnamon with broth. Fry sauce 15 min.","Add chocolate, stir until melted. Simmer chicken in mole 30 min. Serve with rice and tortillas."]},
{id:365,name:"Grilled Lamb Chops with Rosemary",time:15,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54612816180_f575ebac40_c.jpg",ing:[{n:"lamb chops",q:"8, frenched"},{n:"garlic",q:"4 cloves, minced"},{n:"rosemary",q:"2 tbsp, fresh chopped"},{n:"olive oil",q:"3 tbsp"},{n:"lemon",q:"1"},{n:"salt and pepper",q:"to taste"},{n:"roasted potatoes",q:"for serving"},{n:"green salad",q:"for serving"}],steps:["Mix garlic, rosemary, olive oil, lemon juice. Rub into lamb chops. Season generously.","Grill over high heat 3-4 min per side for medium-rare. Rest 5 min.","Serve with roasted potatoes and a green salad."]},
{id:366,name:"Chickpea Shakshuka",time:25,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:U+"1706248248539-92e876ce6aea?w=600&h=400&fit=crop",ing:[{n:"chickpeas",q:"1 can, drained"},{n:"canned tomatoes",q:"800g"},{n:"onion",q:"1, diced"},{n:"garlic",q:"3 cloves"},{n:"cumin",q:"1 tsp"},{n:"smoked paprika",q:"1 tsp"},{n:"harissa",q:"1 tbsp"},{n:"spinach",q:"100g"},{n:"cilantro",q:"fresh"},{n:"olive oil",q:"2 tbsp"},{n:"flatbread",q:"for serving"}],steps:["Sauté onion and garlic 5 min. Add spices and harissa 1 min.","Add tomatoes and chickpeas. Simmer 10 min. Add spinach until wilted.","Garnish with cilantro and olive oil. Serve with warm flatbread."]},
{id:367,name:"Branzino al Cartoccio",time:25,servings:2,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:U+"1512838243191-e81e8f66f1fd?w=600&h=400&fit=crop",ing:[{n:"whole branzino",q:"2, cleaned"},{n:"cherry tomatoes",q:"100g"},{n:"olives",q:"40g"},{n:"capers",q:"1 tbsp"},{n:"lemon",q:"1, sliced"},{n:"garlic",q:"2 cloves"},{n:"white wine",q:"60ml"},{n:"olive oil",q:"3 tbsp"},{n:"oregano",q:"fresh"},{n:"parsley",q:"fresh"}],steps:["Lay fish on parchment paper. Stuff cavities with lemon, garlic, herbs.","Surround with tomatoes, olives, capers. Drizzle wine and oil. Seal parchment tightly.","Bake 200C 18-20 min. Open parchment at table for dramatic presentation."]},
{id:368,name:"Pad Prik King",time:15,servings:3,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/6020/5907158062_a8c4c9d359_c.jpg",ing:[{n:"chicken or pork",q:"400g, sliced"},{n:"green beans",q:"200g, cut into 3cm"},{n:"red curry paste",q:"3 tbsp"},{n:"kaffir lime leaves",q:"5, shredded"},{n:"fish sauce",q:"2 tbsp"},{n:"palm sugar",q:"1 tbsp"},{n:"vegetable oil",q:"2 tbsp"},{n:"Thai basil",q:"handful"},{n:"rice",q:"for serving"}],steps:["Stir-fry curry paste in oil 1 min until fragrant.","Add meat, stir-fry 3 min. Add green beans 2 min.","Season with fish sauce, sugar, lime leaves. Toss in basil. Serve with rice. This is a dry curry - no coconut milk."]},
{id:369,name:"Pavlova",time:90,servings:8,diff:"Medium",tags:["gluten-free"],img:"https://live.staticflickr.com/65535/55154343914_af523cce88_c.jpg",ing:[{n:"egg whites",q:"4"},{n:"caster sugar",q:"250g"},{n:"white vinegar",q:"1 tsp"},{n:"cornstarch",q:"2 tsp"},{n:"vanilla",q:"1 tsp"},{n:"heavy cream",q:"300ml"},{n:"mixed berries",q:"300g"},{n:"passion fruit",q:"2"},{n:"mint",q:"for garnish"}],steps:["Beat whites to stiff peaks. Gradually add sugar. Fold in vinegar, cornstarch, vanilla.","Shape into nest on lined baking sheet. Bake 120C 90 min. Turn off oven, cool inside.","Top with whipped cream, berries, passion fruit pulp, mint."]},
{id:370,name:"Chicken Larb Lettuce Cups",time:15,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/927/42455228525_eca676b1ce_c.jpg",ing:[{n:"ground chicken",q:"500g"},{n:"fish sauce",q:"3 tbsp"},{n:"lime juice",q:"3 tbsp"},{n:"toasted rice powder",q:"2 tbsp"},{n:"shallots",q:"3, sliced"},{n:"mint",q:"large bunch"},{n:"cilantro",q:"bunch"},{n:"Thai chili",q:"3, sliced"},{n:"green onion",q:"3"},{n:"butter lettuce",q:"1 head"},{n:"sticky rice",q:"for serving"}],steps:["Toast raw rice in dry pan until golden, grind to powder.","Brown chicken without oil. Off heat, dress with fish sauce, lime, rice powder.","Toss with herbs, shallots, chili. Serve in lettuce cups with sticky rice."]},
{id:371,name:"Banoffee Pie",time:30,servings:8,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54531889778_8e5cca5359_c.jpg",ing:[{n:"digestive biscuits",q:"250g, crushed"},{n:"butter",q:"120g, melted"},{n:"dulce de leche",q:"400g"},{n:"bananas",q:"3, sliced"},{n:"heavy cream",q:"300ml"},{n:"dark chocolate",q:"20g, grated"},{n:"vanilla",q:"1 tsp"}],steps:["Mix crushed biscuits with melted butter. Press into pie dish. Chill 30 min.","Spread dulce de leche over base. Layer banana slices on top.","Whip cream with vanilla. Pile over bananas. Grate chocolate on top. Chill 1 hour."]},
{id:372,name:"Udon Stir-Fry",time:15,servings:3,diff:"Easy",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/52433861364_7dd8f1097f_c.jpg",ing:[{n:"udon noodles",q:"400g"},{n:"chicken or tofu",q:"300g"},{n:"cabbage",q:"150g, shredded"},{n:"carrot",q:"1, julienned"},{n:"garlic",q:"3 cloves"},{n:"soy sauce",q:"3 tbsp"},{n:"mirin",q:"2 tbsp"},{n:"oyster sauce",q:"1 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"green onion",q:"3"},{n:"sesame seeds",q:"1 tbsp"}],steps:["Cook udon per package. Stir-fry protein 3 min. Add garlic, cabbage, carrot 2 min.","Add noodles, soy sauce, mirin, oyster sauce. Toss over high heat 2 min.","Finish with sesame oil, green onion, sesame seeds."]},
{id:373,name:"Greek Pastitsio",time:60,servings:8,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55121297010_e552d85d95_c.jpg",ing:[{n:"penne",q:"400g"},{n:"ground beef or lamb",q:"500g"},{n:"onion",q:"1"},{n:"garlic",q:"3 cloves"},{n:"canned tomatoes",q:"400g"},{n:"cinnamon",q:"1/2 tsp"},{n:"oregano",q:"1 tsp"},{n:"butter",q:"50g"},{n:"flour",q:"50g"},{n:"milk",q:"600ml"},{n:"egg yolks",q:"3"},{n:"nutmeg",q:"pinch"},{n:"parmesan",q:"60g"}],steps:["Brown meat with onion, garlic, cinnamon, oregano. Add tomatoes, simmer 15 min.","Make bechamel: butter, flour, milk, yolks, nutmeg, parmesan.","Layer: pasta, meat sauce, pasta, bechamel. Bake 180C 40 min until golden."]},
{id:374,name:"Mango Sticky Rice with Coconut",time:25,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/54302296420_775aeded92_c.jpg",ing:[{n:"glutinous rice",q:"200g, soaked"},{n:"ripe mango",q:"2, sliced"},{n:"coconut milk",q:"300ml"},{n:"sugar",q:"60g"},{n:"salt",q:"1/4 tsp"},{n:"pandan extract",q:"optional"},{n:"toasted mung beans",q:"2 tbsp"},{n:"sesame seeds",q:"1 tbsp"}],steps:["Steam soaked rice 20-25 min. Heat coconut milk with sugar and salt.","Pour 2/3 of coconut sauce over rice. Let absorb 15 min.","Serve rice with sliced mango. Pour remaining coconut sauce over. Top with sesame seeds."]},
{id:375,name:"Hunan Spicy Chicken",time:20,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/3907/14482222548_d71a49e3cf_c.jpg",ing:[{n:"chicken thighs",q:"500g, cubed"},{n:"dried red chilies",q:"15"},{n:"Sichuan peppercorns",q:"1 tbsp"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"1 inch"},{n:"soy sauce",q:"2 tbsp"},{n:"Shaoxing wine",q:"1 tbsp"},{n:"sugar",q:"1 tsp"},{n:"cornstarch",q:"1 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"green onion",q:"3"},{n:"peanuts",q:"40g"}],steps:["Coat chicken in cornstarch, fry until crispy.","Stir-fry dried chilies and Sichuan peppercorns until fragrant. Add garlic, ginger.","Return chicken with soy sauce, wine, sugar, peanuts. Toss. Finish with sesame oil and green onion."]},
{id:376,name:"Nicoise Pan Bagnat",time:15,servings:2,diff:"Easy",tags:["dairy-free","high-protein"],img:U+"1725030660031-585ea459d55f?w=600&h=400&fit=crop",ing:[{n:"crusty roll",q:"2"},{n:"canned tuna",q:"200g"},{n:"hard-boiled egg",q:"2, sliced"},{n:"tomato",q:"1, sliced"},{n:"green beans",q:"50g, blanched"},{n:"Nicoise olives",q:"30g"},{n:"red onion",q:"1/4, sliced"},{n:"anchovy",q:"2 fillets"},{n:"olive oil",q:"2 tbsp"},{n:"red wine vinegar",q:"1 tbsp"},{n:"basil",q:"fresh"}],steps:["Split rolls. Drizzle inside with olive oil and vinegar.","Layer all ingredients: tuna, egg, tomato, beans, olives, onion, anchovy, basil.","Press sandwich, wrap tightly. Let sit 15 min for flavors to meld. Cut in half."]},
{id:377,name:"Popcorn Chicken",time:20,servings:4,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54873479639_6f8df74d8b_c.jpg",ing:[{n:"chicken breast",q:"500g, cubed"},{n:"buttermilk",q:"200ml"},{n:"flour",q:"100g"},{n:"cornstarch",q:"50g"},{n:"garlic powder",q:"1 tsp"},{n:"paprika",q:"1 tsp"},{n:"cayenne",q:"1/4 tsp"},{n:"salt",q:"1 tsp"},{n:"vegetable oil",q:"for frying"},{n:"honey mustard",q:"for dipping"},{n:"ranch",q:"for dipping"}],steps:["Marinate chicken cubes in buttermilk 30 min. Mix flour, cornstarch, spices.","Coat chicken in seasoned flour, shaking off excess.","Fry at 180C 4-5 min until golden and crispy. Serve with dipping sauces."]},
{id:378,name:"Thai Massaman Beef Stew",time:90,servings:6,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/3723/33353092566_e69388be11_c.jpg",ing:[{n:"beef shin",q:"800g, cubed"},{n:"coconut milk",q:"600ml"},{n:"massaman paste",q:"4 tbsp"},{n:"potato",q:"3, cubed"},{n:"onion",q:"2, quartered"},{n:"peanuts",q:"80g"},{n:"tamarind paste",q:"3 tbsp"},{n:"fish sauce",q:"3 tbsp"},{n:"palm sugar",q:"3 tbsp"},{n:"cinnamon stick",q:"1"},{n:"star anise",q:"2"},{n:"cardamom",q:"3 pods"},{n:"rice",q:"for serving"}],steps:["Fry paste in coconut cream 3 min. Brown beef.","Add coconut milk, onion, spices. Simmer 1 hour. Add potatoes 20 min.","Stir in peanuts, tamarind, fish sauce, sugar. Serve over jasmine rice."]},
{id:379,name:"Brioche French Toast",time:15,servings:2,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54360520456_bc5220be3d_c.jpg",ing:[{n:"brioche bread",q:"4 thick slices"},{n:"eggs",q:"3"},{n:"milk",q:"80ml"},{n:"vanilla extract",q:"1 tsp"},{n:"cinnamon",q:"1/2 tsp"},{n:"butter",q:"30g"},{n:"maple syrup",q:"for serving"},{n:"fresh berries",q:"for serving"},{n:"powdered sugar",q:"for dusting"},{n:"whipped cream",q:"optional"}],steps:["Whisk eggs, milk, vanilla, cinnamon.","Soak brioche slices 30 sec per side. Cook in butter on medium 3 min per side until golden.","Serve with maple syrup, berries, powdered sugar, and whipped cream if desired."]},
{id:380,name:"Lamb Keema",time:25,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/52525480132_5274dc91e3_c.jpg",ing:[{n:"ground lamb",q:"500g"},{n:"onion",q:"1, diced"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"1 inch"},{n:"canned tomatoes",q:"200g"},{n:"peas",q:"100g"},{n:"cumin",q:"1 tsp"},{n:"coriander",q:"1 tsp"},{n:"turmeric",q:"1/2 tsp"},{n:"garam masala",q:"2 tsp"},{n:"green chili",q:"2"},{n:"cilantro",q:"fresh"},{n:"naan",q:"for serving"}],steps:["Sauté onion 5 min. Add garlic, ginger, all spices 2 min.","Add lamb, cook until browned. Add tomatoes. Simmer 15 min.","Add peas, cook 5 min. Top with cilantro. Serve with naan."]},
{id:381,name:"Croissant Breakfast Sandwich",time:10,servings:2,diff:"Easy",tags:["high-protein"],img:U+"1719464458339-2b4794c74df3?w=600&h=400&fit=crop",ing:[{n:"croissants",q:"2, split"},{n:"eggs",q:"2, fried"},{n:"bacon or ham",q:"4 slices"},{n:"cheddar cheese",q:"2 slices"},{n:"butter",q:"for cooking"},{n:"Dijon mustard",q:"optional"},{n:"arugula",q:"optional"}],steps:["Toast croissant halves. Cook bacon and fry eggs.","Layer bottom half: cheese, bacon, fried egg.","Add arugula and Dijon if desired. Close with croissant top."]},
{id:382,name:"Crab Cakes",time:25,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55111567758_9b3b22c9a9_c.jpg",ing:[{n:"lump crab meat",q:"400g"},{n:"mayonnaise",q:"3 tbsp"},{n:"Dijon mustard",q:"1 tsp"},{n:"egg",q:"1"},{n:"panko breadcrumbs",q:"40g"},{n:"Old Bay seasoning",q:"1 tsp"},{n:"Worcestershire sauce",q:"1 tsp"},{n:"lemon",q:"1"},{n:"parsley",q:"fresh"},{n:"butter",q:"30g"},{n:"remoulade",q:"for serving"}],steps:["Gently fold crab with mayo, mustard, egg, breadcrumbs, Old Bay, Worcestershire, parsley. Do not overmix.","Form into 4 patties. Chill 30 min.","Pan-fry in butter 3-4 min per side until golden. Serve with remoulade and lemon."]},
{id:383,name:"Red Lentil Soup",time:25,servings:6,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/55100370541_09325e6787_c.jpg",ing:[{n:"red lentils",q:"300g"},{n:"onion",q:"1"},{n:"carrot",q:"2"},{n:"garlic",q:"3 cloves"},{n:"cumin",q:"2 tsp"},{n:"turmeric",q:"1 tsp"},{n:"vegetable broth",q:"1L"},{n:"lemon",q:"1"},{n:"olive oil",q:"3 tbsp"},{n:"cilantro",q:"fresh"},{n:"chili flakes",q:"for serving"}],steps:["Sauté onion and carrot 5 min. Add garlic, cumin, turmeric 1 min.","Add lentils and broth. Simmer 18-20 min until lentils dissolve.","Blend smooth. Finish with lemon juice. Serve with cilantro, chili flakes, olive oil drizzle."]},
{id:384,name:"Grilled Chicken Thighs",time:20,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/55095372908_5850130e79_c.jpg",ing:[{n:"chicken thighs",q:"8, bone-in"},{n:"olive oil",q:"3 tbsp"},{n:"garlic",q:"4 cloves, minced"},{n:"lemon",q:"1"},{n:"oregano",q:"1 tbsp"},{n:"paprika",q:"1 tsp"},{n:"salt and pepper",q:"to taste"},{n:"grilled lemon halves",q:"for serving"}],steps:["Mix olive oil, garlic, lemon juice, oregano, paprika, salt, pepper. Coat chicken.","Grill skin-side down 6-7 min until crispy. Flip, cook 6 more min.","Serve with grilled lemon halves."]},
{id:385,name:"Tom Yum Fried Rice",time:15,servings:2,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/50999435236_0f9569396e_c.jpg",ing:[{n:"cooked jasmine rice",q:"400g"},{n:"shrimp",q:"200g"},{n:"tom yum paste",q:"2 tbsp"},{n:"egg",q:"2"},{n:"mushrooms",q:"100g, sliced"},{n:"green onion",q:"3"},{n:"lime",q:"1"},{n:"fish sauce",q:"1 tbsp"},{n:"sugar",q:"1 tsp"},{n:"cilantro",q:"fresh"},{n:"Thai chili",q:"optional"}],steps:["Stir-fry shrimp 2 min, remove. Scramble eggs, set aside.","Add tom yum paste to wok, fry 30 sec. Add mushrooms, rice. Toss with fish sauce, sugar.","Return shrimp and egg. Squeeze lime. Top with green onion and cilantro."]},
{id:386,name:"Beef Bourguignon",time:120,servings:6,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55084398741_cd71760c37_c.jpg",ing:[{n:"beef chuck",q:"1kg, cubed"},{n:"red wine",q:"500ml"},{n:"bacon lardons",q:"150g"},{n:"pearl onions",q:"200g"},{n:"mushrooms",q:"250g"},{n:"carrot",q:"3"},{n:"garlic",q:"4 cloves"},{n:"tomato paste",q:"2 tbsp"},{n:"beef broth",q:"250ml"},{n:"thyme",q:"3 sprigs"},{n:"bay leaves",q:"2"},{n:"flour",q:"2 tbsp"},{n:"butter",q:"30g"},{n:"mashed potatoes",q:"for serving"}],steps:["Brown beef in batches. Cook bacon, onions, mushrooms. Add garlic, paste, flour.","Deglaze with wine. Add broth, herbs, beef. Cover, braise at 160C 2 hours.","Add mushrooms last 30 min. Rich, thick sauce. Serve with mashed potatoes."]},
{id:387,name:"Fettuccine with Truffle Cream",time:15,servings:4,diff:"Easy",tags:["vegetarian"],img:U+"1708782340357-b7b38d653979?w=600&h=400&fit=crop",ing:[{n:"fettuccine",q:"400g"},{n:"heavy cream",q:"200ml"},{n:"truffle oil",q:"2 tbsp"},{n:"parmesan",q:"80g, grated"},{n:"butter",q:"30g"},{n:"garlic",q:"2 cloves"},{n:"mushrooms",q:"150g, sliced"},{n:"black pepper",q:"1 tsp"},{n:"parsley",q:"fresh"}],steps:["Cook fettuccine. Sauté mushrooms and garlic in butter 5 min.","Add cream, simmer 2 min. Toss with pasta, parmesan, pepper.","Drizzle truffle oil just before serving. Garnish with parsley."]},
{id:388,name:"Chicken Wings",time:30,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55153986688_5e785532bd_c.jpg",ing:[{n:"chicken wings",q:"1kg"},{n:"baking powder",q:"2 tsp"},{n:"salt",q:"1 tsp"},{n:"garlic powder",q:"1 tsp"},{n:"butter",q:"60g"},{n:"hot sauce",q:"120ml"},{n:"honey",q:"2 tbsp"},{n:"celery sticks",q:"for serving"},{n:"blue cheese dressing",q:"for serving"}],steps:["Toss wings with baking powder, salt, garlic powder.","Bake on rack at 220C 40-45 min, flipping halfway, until very crispy.","Toss with butter-hot sauce-honey mixture. Serve with celery and blue cheese dressing."]},
{id:389,name:"Tofu Tikka Masala",time:30,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free"],img:"https://live.staticflickr.com/2459/3978392219_386b3e0fcb_c.jpg",ing:[{n:"firm tofu",q:"400g, cubed"},{n:"coconut cream",q:"200ml"},{n:"canned tomatoes",q:"400g"},{n:"onion",q:"1"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"1 inch"},{n:"garam masala",q:"2 tsp"},{n:"turmeric",q:"1 tsp"},{n:"chili powder",q:"1 tsp"},{n:"coconut oil",q:"2 tbsp"},{n:"cashews",q:"30g, soaked and blended"},{n:"cilantro",q:"fresh"},{n:"rice",q:"for serving"}],steps:["Press and cube tofu. Pan-fry until golden. Set aside.","Sauté onion, garlic, ginger. Add spices, tomatoes. Simmer 10 min. Add coconut cream and blended cashews.","Add tofu. Simmer 5 min. Serve over rice with cilantro."]},
{id:390,name:"Chicken Thigh Traybake",time:35,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:U+"1588767768106-1b20e51d9d68?w=600&h=400&fit=crop",ing:[{n:"chicken thighs",q:"8, bone-in"},{n:"cherry tomatoes",q:"200g"},{n:"olives",q:"60g"},{n:"red onion",q:"2, quartered"},{n:"garlic",q:"8 cloves, whole"},{n:"lemon",q:"1, quartered"},{n:"oregano",q:"1 tbsp"},{n:"olive oil",q:"3 tbsp"},{n:"baby potatoes",q:"400g, halved"}],steps:["Toss potatoes, tomatoes, olives, onion, garlic, lemon with oil and oregano on a large tray.","Nestle chicken thighs on top, skin-side up. Season everything generously.","Roast 220C 35-40 min until chicken skin is crispy and potatoes are tender."]},
{id:391,name:"Churros",time:30,servings:12,diff:"Medium",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/55151291648_24a77eb411_c.jpg",ing:[{n:"water",q:"250ml"},{n:"butter",q:"60g"},{n:"sugar",q:"2 tbsp plus extra"},{n:"salt",q:"1/4 tsp"},{n:"flour",q:"150g"},{n:"eggs",q:"2"},{n:"vegetable oil",q:"for frying"},{n:"cinnamon",q:"1 tsp"},{n:"chocolate sauce",q:"for dipping"}],steps:["Heat water, butter, sugar, salt. Add flour, stir vigorously until ball forms. Cool slightly, beat in eggs.","Pipe through star-tipped bag into 180C oil. Fry 3-4 min until golden. Drain.","Roll in cinnamon sugar. Serve with warm chocolate dipping sauce."]},
{id:392,name:"Mediterranean Baked Fish",time:25,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/54764855459_df949c715d_c.jpg",ing:[{n:"white fish fillets",q:"4"},{n:"cherry tomatoes",q:"200g"},{n:"olives",q:"60g"},{n:"capers",q:"2 tbsp"},{n:"garlic",q:"3 cloves"},{n:"white wine",q:"60ml"},{n:"olive oil",q:"3 tbsp"},{n:"oregano",q:"1 tsp"},{n:"lemon",q:"1"},{n:"parsley",q:"fresh"}],steps:["Place fish in baking dish. Surround with tomatoes, olives, capers, garlic.","Drizzle with wine, olive oil. Season with oregano, salt, pepper.","Bake 200C 15-18 min until fish is flaky. Squeeze lemon, garnish with parsley."]},
{id:393,name:"Mushroom Tacos",time:15,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","nut-free"],img:"https://live.staticflickr.com/65535/52414576260_8d6b09c7b2_c.jpg",ing:[{n:"mixed mushrooms",q:"500g, sliced"},{n:"corn tortillas",q:"8"},{n:"chipotle powder",q:"1 tsp"},{n:"cumin",q:"1 tsp"},{n:"lime",q:"2"},{n:"avocado",q:"1"},{n:"red onion",q:"1/2, diced"},{n:"cilantro",q:"fresh"},{n:"pickled jalapeno",q:"for serving"},{n:"olive oil",q:"2 tbsp"}],steps:["Sauté mushrooms over high heat until golden and crispy edges form, 6-8 min. Add chipotle, cumin.","Warm tortillas.","Fill with mushrooms, avocado, onion, cilantro, pickled jalapeno, lime."]},
{id:394,name:"Miso Butter Corn",time:10,servings:4,diff:"Easy",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/8650/16642746371_d9f0941eb4_c.jpg",ing:[{n:"corn on the cob",q:"4"},{n:"butter",q:"40g, softened"},{n:"white miso paste",q:"2 tbsp"},{n:"lime",q:"1"},{n:"shichimi togarashi",q:"for serving"},{n:"green onion",q:"2, sliced"},{n:"nori flakes",q:"optional"}],steps:["Mix softened butter with miso paste.","Grill corn 8-10 min, turning often, until lightly charred.","Brush hot corn with miso butter. Squeeze lime. Sprinkle shichimi, green onion, nori flakes."]},
{id:395,name:"Lamb Ragu Pappardelle",time:90,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/2877/10129107603_e81d3dd69c_c.jpg",ing:[{n:"lamb shoulder",q:"600g"},{n:"pappardelle",q:"400g"},{n:"canned tomatoes",q:"800g"},{n:"onion",q:"1"},{n:"carrot",q:"1"},{n:"celery",q:"1"},{n:"garlic",q:"4 cloves"},{n:"red wine",q:"200ml"},{n:"rosemary",q:"2 sprigs"},{n:"bay leaf",q:"1"},{n:"parmesan",q:"50g"},{n:"olive oil",q:"3 tbsp"}],steps:["Brown lamb on all sides. Remove. Sauté vegetables 5 min. Deglaze with wine.","Add tomatoes, herbs, lamb. Cover, braise 160C 2 hours until falling apart.","Shred lamb into sauce. Toss with pappardelle and parmesan."]},
{id:396,name:"Chicken Cordon Bleu",time:30,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54950416203_0d590f3bd8_c.jpg",ing:[{n:"chicken breast",q:"4, butterflied"},{n:"ham",q:"4 slices"},{n:"gruyere cheese",q:"100g, sliced"},{n:"flour",q:"50g"},{n:"eggs",q:"2, beaten"},{n:"breadcrumbs",q:"100g"},{n:"butter",q:"30g"},{n:"olive oil",q:"2 tbsp"},{n:"lemon",q:"1"},{n:"Dijon mustard",q:"for serving"}],steps:["Place ham and cheese on each breast. Roll tightly, secure with toothpicks.","Dredge in flour, egg, breadcrumbs.","Sear in butter and oil 3 min per side. Bake 180C 18-20 min until cooked through. Serve with lemon and Dijon."]},
{id:397,name:"Shakshuka with Chorizo",time:25,servings:4,diff:"Medium",tags:["gluten-free","nut-free"],img:"https://live.staticflickr.com/7307/28004516820_ca0d3acb69_c.jpg",ing:[{n:"chorizo",q:"200g, sliced"},{n:"canned tomatoes",q:"800g"},{n:"eggs",q:"6"},{n:"onion",q:"1, diced"},{n:"bell pepper",q:"2, diced"},{n:"garlic",q:"4 cloves"},{n:"smoked paprika",q:"1 tsp"},{n:"cumin",q:"1 tsp"},{n:"feta",q:"50g"},{n:"parsley",q:"fresh"},{n:"olive oil",q:"1 tbsp"},{n:"crusty bread",q:"for serving"}],steps:["Cook chorizo until oils release. Add onion, pepper, garlic 5 min. Add spices.","Add tomatoes. Simmer 10 min.","Make wells, crack eggs. Cover 5-8 min. Top with feta and parsley. Serve with bread."]},
{id:398,name:"Chicken Gyoza",time:30,servings:24,diff:"Medium",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/54922923168_22ecde5c13_c.jpg",ing:[{n:"ground chicken",q:"300g"},{n:"cabbage",q:"150g, finely chopped"},{n:"ginger",q:"1 tbsp, grated"},{n:"garlic",q:"2 cloves"},{n:"soy sauce",q:"2 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"green onion",q:"3"},{n:"gyoza wrappers",q:"24"},{n:"rice vinegar",q:"2 tbsp"},{n:"chili oil",q:"for dipping"},{n:"vegetable oil",q:"2 tbsp"}],steps:["Mix chicken, cabbage, ginger, garlic, soy sauce, sesame oil, green onion.","Place filling in wrappers, fold and pleat edges.","Pan-fry 2 min. Add 60ml water, cover, steam 5 min. Serve with soy-vinegar-chili dip."]},
{id:399,name:"Sticky Toffee Pudding",time:45,servings:8,diff:"Medium",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54591852864_0ca9f8dd00_c.jpg",ing:[{n:"dates",q:"200g, pitted"},{n:"boiling water",q:"200ml"},{n:"baking soda",q:"1 tsp"},{n:"butter",q:"60g, softened"},{n:"brown sugar",q:"150g"},{n:"eggs",q:"2"},{n:"vanilla",q:"1 tsp"},{n:"flour",q:"175g"},{n:"heavy cream",q:"200ml"},{n:"dark brown sugar",q:"100g for sauce"},{n:"butter for sauce",q:"60g"}],steps:["Soak dates in boiling water with baking soda 15 min. Mash.","Cream butter and sugar. Add eggs, vanilla, flour, then date mixture. Pour into greased pan.","Bake 180C 30-35 min. Make toffee sauce: melt butter, brown sugar, cream. Pour over warm pudding. Serve with ice cream."]},
{id:400,name:"Lemon Chicken Orzo Soup",time:30,servings:6,diff:"Easy",tags:["high-protein","nut-free"],img:"https://live.staticflickr.com/65535/54548466566_aa46f60a50_c.jpg",ing:[{n:"chicken breast",q:"400g"},{n:"orzo pasta",q:"150g"},{n:"chicken broth",q:"1.5L"},{n:"lemon",q:"2, juiced"},{n:"egg",q:"2"},{n:"onion",q:"1"},{n:"carrot",q:"2"},{n:"celery",q:"2 stalks"},{n:"garlic",q:"3 cloves"},{n:"dill",q:"fresh"},{n:"olive oil",q:"2 tbsp"}],steps:["Simmer chicken in broth 15 min. Shred. Sauté onion, carrot, celery 5 min.","Add broth, chicken. Add orzo, cook 10 min.","Whisk eggs with lemon juice. Temper with hot broth, stir into soup off heat. Garnish with dill."]},
{id:401,name:"Crispy Duck Pancakes",time:30,servings:4,diff:"Medium",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/4537/37975945754_bc729a29c2_c.jpg",ing:[{n:"duck legs",q:"4"},{n:"five spice",q:"1 tsp"},{n:"salt",q:"1 tsp"},{n:"hoisin sauce",q:"for serving"},{n:"cucumber",q:"1, julienned"},{n:"green onion",q:"6"},{n:"Chinese pancakes",q:"12"}],steps:["Rub duck with five spice and salt. Roast at 180C 90 min until skin crispy and meat falls off bone.","Shred meat, crisp skin under broiler.","Serve in warm pancakes with hoisin, cucumber, and green onion."]},
{id:402,name:"Spaghetti Carbonara",time:20,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55135718288_fc3f6c64aa_c.jpg",ing:[{n:"spaghetti",q:"400g"},{n:"guanciale",q:"200g, cubed"},{n:"egg yolks",q:"4"},{n:"whole egg",q:"1"},{n:"pecorino romano",q:"100g, finely grated"},{n:"black pepper",q:"2 tsp, freshly cracked"}],steps:["Cook spaghetti in well-salted water. Reserve 200ml pasta water.","Cook guanciale until fat renders and meat is crispy. Remove from heat.","Whisk yolks, egg, pecorino, pepper. Add hot pasta to guanciale, toss, then add egg mixture off heat. Toss vigorously with pasta water until creamy."]},
{id:403,name:"Honey Walnut Shrimp",time:20,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54041463459_911f26c8ca_c.jpg",ing:[{n:"large shrimp",q:"500g, peeled"},{n:"walnuts",q:"100g"},{n:"mayonnaise",q:"60ml"},{n:"condensed milk",q:"2 tbsp"},{n:"lemon juice",q:"1 tbsp"},{n:"honey",q:"2 tbsp"},{n:"cornstarch",q:"60g"},{n:"egg white",q:"1"},{n:"lettuce",q:"for serving"}],steps:["Candy walnuts: simmer in sugar water 5 min, deep fry until golden.","Coat shrimp in cornstarch and egg white. Deep fry until crispy.","Toss shrimp with mayo-condensed milk-honey-lemon sauce. Top with candied walnuts. Serve on lettuce."]},
{id:404,name:"Beetroot Risotto",time:35,servings:4,diff:"Medium",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/65535/51761503849_319b9e714c_c.jpg",ing:[{n:"arborio rice",q:"300g"},{n:"beetroot",q:"3, roasted and pureed"},{n:"onion",q:"1"},{n:"garlic",q:"2 cloves"},{n:"white wine",q:"150ml"},{n:"vegetable broth",q:"1L"},{n:"goat cheese",q:"80g"},{n:"butter",q:"30g"},{n:"thyme",q:"fresh"},{n:"walnuts",q:"30g, toasted"}],steps:["Sauté onion, garlic 3 min. Toast rice 1 min. Add wine.","Add broth gradually, stirring 18 min. Stir in beetroot puree.","Fold in butter and goat cheese. Top with toasted walnuts and thyme."]},
{id:405,name:"Vietnamese Caramel Pork",time:30,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/8119/8712224509_732e047ce7_c.jpg",ing:[{n:"pork belly",q:"500g, cubed"},{n:"coconut water",q:"200ml"},{n:"fish sauce",q:"3 tbsp"},{n:"sugar",q:"4 tbsp"},{n:"garlic",q:"4 cloves"},{n:"shallots",q:"3"},{n:"black pepper",q:"1 tsp"},{n:"green onion",q:"3"},{n:"Thai chili",q:"2"},{n:"hard-boiled eggs",q:"4"},{n:"rice",q:"for serving"}],steps:["Make caramel: melt sugar until dark amber. Carefully add coconut water.","Add pork, garlic, shallots, fish sauce, pepper, chili. Simmer covered 25-30 min.","Add halved eggs last 5 min. Sauce should be thick and glossy. Serve over rice with green onion."]},
{id:406,name:"Shakshuka Pasta",time:20,servings:4,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/8209/8187302601_499740321c_c.jpg",ing:[{n:"rigatoni",q:"400g"},{n:"canned tomatoes",q:"800g"},{n:"garlic",q:"4 cloves"},{n:"cumin",q:"1 tsp"},{n:"smoked paprika",q:"1 tsp"},{n:"feta",q:"100g, crumbled"},{n:"eggs",q:"4"},{n:"olive oil",q:"3 tbsp"},{n:"fresh basil",q:"for serving"},{n:"red pepper flakes",q:"1/2 tsp"}],steps:["Cook rigatoni. Make sauce: sauté garlic, add spices, tomatoes. Simmer 10 min.","Add pasta to sauce. Make 4 wells, crack eggs in. Cover, cook 5 min until eggs set.","Top with crumbled feta and basil."]},
{id:407,name:"Char Siu Bao",time:60,servings:12,diff:"Medium",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/47986922666_54316ba264_c.jpg",ing:[{n:"BBQ pork (char siu)",q:"300g, diced"},{n:"hoisin sauce",q:"2 tbsp"},{n:"oyster sauce",q:"1 tbsp"},{n:"sugar",q:"1 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"flour",q:"300g"},{n:"yeast",q:"5g"},{n:"sugar for dough",q:"40g"},{n:"milk",q:"150ml"},{n:"baking powder",q:"1 tsp"},{n:"vegetable oil",q:"1 tbsp"}],steps:["Make dough: mix flour, yeast, sugar, milk, oil, baking powder. Knead, rest 1 hour.","Make filling: mix diced char siu with hoisin, oyster sauce, sugar, sesame oil. Thicken with cornstarch slurry.","Divide dough, flatten, fill, pinch closed. Steam 12-15 min until fluffy and smooth."]},
{id:408,name:"Grilled Swordfish",time:20,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/54529330634_55c81f42b5_c.jpg",ing:[{n:"swordfish steaks",q:"4"},{n:"olive oil",q:"3 tbsp"},{n:"lemon",q:"2"},{n:"garlic",q:"3 cloves"},{n:"capers",q:"2 tbsp"},{n:"cherry tomatoes",q:"200g"},{n:"basil",q:"fresh"},{n:"oregano",q:"1 tsp"},{n:"salt and pepper",q:"to taste"}],steps:["Marinate swordfish in oil, lemon, garlic, oregano 15 min.","Grill 4-5 min per side until opaque and firm.","Make salsa: dice tomatoes, mix with capers, basil, olive oil, lemon. Spoon over fish."]},
{id:409,name:"Chicken Madras",time:35,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/53671289118_8e92e1d8cd_c.jpg",ing:[{n:"chicken thighs",q:"600g, cubed"},{n:"onion",q:"2, diced"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"2 inch"},{n:"madras curry powder",q:"3 tbsp"},{n:"canned tomatoes",q:"400g"},{n:"coconut milk",q:"200ml"},{n:"tamarind paste",q:"1 tbsp"},{n:"mustard seeds",q:"1 tsp"},{n:"curry leaves",q:"8"},{n:"oil",q:"3 tbsp"},{n:"rice",q:"for serving"}],steps:["Fry mustard seeds and curry leaves 30 sec. Add onions 5 min, garlic, ginger, spices.","Add chicken, cook 3 min. Add tomatoes, coconut milk, tamarind.","Cover, simmer 20-25 min. Serve with basmati rice."]},
{id:410,name:"Bruschetta",time:10,servings:6,diff:"Easy",tags:["vegan","vegetarian","dairy-free","nut-free"],img:"https://live.staticflickr.com/65535/55102506905_b5ebd4b87e_c.jpg",ing:[{n:"baguette or ciabatta",q:"1, sliced"},{n:"ripe tomatoes",q:"4, diced"},{n:"garlic",q:"3 cloves"},{n:"fresh basil",q:"bunch, torn"},{n:"extra virgin olive oil",q:"4 tbsp"},{n:"balsamic vinegar",q:"1 tbsp"},{n:"salt and pepper",q:"to taste"}],steps:["Toast bread slices until golden. Rub with cut garlic clove.","Mix diced tomatoes with minced garlic, basil, olive oil, vinegar, salt, pepper.","Spoon tomato mixture onto toasted bread. Drizzle with extra olive oil. Serve immediately."]},
{id:411,name:"Szechuan Dan Dan Noodles",time:20,servings:2,diff:"Easy",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/49361544917_34b8487dd7_c.jpg",ing:[{n:"Chinese wheat noodles",q:"250g"},{n:"ground pork",q:"200g"},{n:"preserved mustard greens",q:"2 tbsp"},{n:"chili oil",q:"3 tbsp"},{n:"sesame paste",q:"2 tbsp"},{n:"soy sauce",q:"2 tbsp"},{n:"black vinegar",q:"1 tbsp"},{n:"Sichuan peppercorn",q:"1 tsp, ground"},{n:"garlic",q:"2 cloves"},{n:"green onion",q:"2"},{n:"peanuts",q:"2 tbsp, crushed"}],steps:["Cook noodles. Brown pork with preserved greens until crispy.","Mix sauce: sesame paste, soy sauce, vinegar, chili oil, Sichuan pepper, garlic, noodle water.","Divide sauce into bowls. Add noodles, top with crispy pork, green onion, crushed peanuts."]},
{id:412,name:"Lamb Shanks Braised",time:180,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54611629697_dc9f4451ef_c.jpg",ing:[{n:"lamb shanks",q:"4"},{n:"red wine",q:"300ml"},{n:"beef broth",q:"300ml"},{n:"onion",q:"1"},{n:"carrot",q:"2"},{n:"celery",q:"2 stalks"},{n:"garlic",q:"6 cloves"},{n:"tomato paste",q:"2 tbsp"},{n:"rosemary",q:"3 sprigs"},{n:"bay leaves",q:"2"},{n:"flour",q:"for dredging"},{n:"olive oil",q:"3 tbsp"},{n:"polenta",q:"for serving"}],steps:["Season and flour shanks. Brown in oil. Remove.","Sauté vegetables 5 min. Add paste, deglaze with wine. Add broth, herbs.","Return shanks. Cover, braise at 160C 3 hours until meat falls off bone. Serve over creamy polenta."]},
{id:413,name:"Bibimbap Bowl",time:30,servings:2,diff:"Medium",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/54125949097_15d31aa5c5_c.jpg",ing:[{n:"rice",q:"300g"},{n:"beef sirloin",q:"200g, sliced"},{n:"spinach",q:"100g"},{n:"bean sprouts",q:"100g"},{n:"carrot",q:"1"},{n:"zucchini",q:"1"},{n:"shiitake mushrooms",q:"100g"},{n:"egg",q:"2"},{n:"gochujang",q:"3 tbsp"},{n:"sesame oil",q:"2 tbsp"},{n:"soy sauce",q:"2 tbsp"},{n:"sesame seeds",q:"1 tbsp"},{n:"garlic",q:"3 cloves"}],steps:["Cook rice. Marinate beef in soy sauce, garlic, sesame oil. Sauté each vegetable separately.","Fry rice in stone bowl or skillet until bottom is crispy. Arrange toppings, meat, fried egg on top.","Serve with gochujang. Mix everything together before eating for crispy rice contrast."]},
{id:414,name:"Pork Tonkatsu",time:20,servings:2,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54314357548_88876dfdba_c.jpg",ing:[{n:"pork loin",q:"2, 2cm thick"},{n:"flour",q:"50g"},{n:"eggs",q:"2, beaten"},{n:"panko breadcrumbs",q:"150g"},{n:"vegetable oil",q:"for frying"},{n:"tonkatsu sauce",q:"for serving"},{n:"cabbage",q:"200g, finely shredded"},{n:"rice",q:"for serving"},{n:"lemon",q:"1"},{n:"Japanese mustard",q:"optional"}],steps:["Pound pork slightly. Season. Dredge in flour, egg, panko.","Deep fry at 170C 5-6 min until deep golden and cooked through. Rest 3 min on wire rack.","Slice into strips. Serve with shredded cabbage, rice, tonkatsu sauce, lemon, mustard."]},
{id:415,name:"Coconut Fish Curry",time:25,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54625180332_55cb227666_c.jpg",ing:[{n:"white fish fillets",q:"500g, cubed"},{n:"coconut milk",q:"400ml"},{n:"onion",q:"1"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"turmeric",q:"1 tsp"},{n:"cumin",q:"1 tsp"},{n:"coriander",q:"1 tsp"},{n:"mustard seeds",q:"1 tsp"},{n:"curry leaves",q:"8"},{n:"tomato",q:"2, diced"},{n:"cilantro",q:"fresh"},{n:"rice",q:"for serving"}],steps:["Fry mustard seeds and curry leaves. Add onion 5 min, garlic, ginger, spices.","Add tomatoes, coconut milk. Simmer 8 min.","Gently add fish. Simmer 5-7 min until fish is cooked. Garnish with cilantro. Serve with rice."]},
{id:416,name:"Oatmeal with Berries",time:10,servings:1,diff:"Easy",tags:["vegetarian","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/54814869171_6213e48ba1_c.jpg",ing:[{n:"rolled oats",q:"60g"},{n:"milk or water",q:"200ml"},{n:"banana",q:"1/2, sliced"},{n:"mixed berries",q:"80g"},{n:"honey or maple syrup",q:"1 tbsp"},{n:"cinnamon",q:"1/2 tsp"},{n:"chia seeds",q:"1 tsp"},{n:"nut butter",q:"1 tbsp"},{n:"salt",q:"pinch"}],steps:["Cook oats with milk and salt 5 min, stirring occasionally. Or soak overnight.","Top with sliced banana, mixed berries, nut butter.","Drizzle honey, sprinkle cinnamon and chia seeds."]},
{id:417,name:"Szechuan Twice-Cooked Pork",time:20,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:U+"1725445295556-e65c10c91403?w=600&h=400&fit=crop",ing:[{n:"pork belly",q:"400g, in one piece"},{n:"leek",q:"2, sliced diagonally"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"1 inch"},{n:"doubanjiang",q:"2 tbsp"},{n:"sweet bean paste",q:"1 tbsp"},{n:"soy sauce",q:"1 tbsp"},{n:"Shaoxing wine",q:"1 tbsp"},{n:"sugar",q:"1 tsp"},{n:"fermented black beans",q:"1 tbsp"},{n:"green onion",q:"2"}],steps:["Simmer whole pork belly 20 min. Cool. Slice very thin.","Stir-fry pork slices until fat renders and edges curl. Add doubanjiang, black beans, garlic, ginger.","Add leek, bean paste, soy sauce, wine, sugar. Toss. Garnish with green onion."]},
{id:418,name:"Capellini Pomodoro",time:15,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","nut-free"],img:"https://live.staticflickr.com/5616/32151162845_98f5cfd215_c.jpg",ing:[{n:"capellini",q:"400g"},{n:"ripe tomatoes",q:"6, scored and blanched"},{n:"garlic",q:"4 cloves, sliced"},{n:"basil",q:"large bunch"},{n:"olive oil",q:"60ml"},{n:"red pepper flakes",q:"pinch"},{n:"salt",q:"to taste"}],steps:["Blanch and peel tomatoes. Crush by hand. Cook garlic in oil until golden.","Add crushed tomatoes, pepper flakes, salt. Simmer 8 min.","Cook capellini al dente. Toss with sauce and torn basil. Drizzle raw olive oil to finish."]},
{id:419,name:"Lamb Kleftiko",time:180,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/54574963802_b70ed17766_c.jpg",ing:[{n:"lamb shoulder",q:"1kg, bone-in"},{n:"potatoes",q:"600g, quartered"},{n:"onion",q:"2, quartered"},{n:"garlic",q:"8 cloves"},{n:"lemon",q:"2"},{n:"oregano",q:"2 tbsp"},{n:"bay leaves",q:"3"},{n:"olive oil",q:"4 tbsp"},{n:"white wine",q:"100ml"}],steps:["Combine lamb, potatoes, onion, garlic, lemon, oregano, bay, oil, wine in a deep dish.","Seal tightly with foil (or use parchment). Place in oven.","Bake at 160C for 3-4 hours. Lamb should be falling-off-bone tender. The foil traps all steam."]},
{id:420,name:"Mushroom & Gruyere Tartine",time:15,servings:2,diff:"Easy",tags:["vegetarian"],img:U+"1633859225849-1959a3469daf?w=600&h=400&fit=crop",ing:[{n:"sourdough bread",q:"2 thick slices"},{n:"mixed mushrooms",q:"300g, sliced"},{n:"gruyere cheese",q:"80g, grated"},{n:"garlic",q:"2 cloves"},{n:"thyme",q:"fresh"},{n:"butter",q:"20g"},{n:"olive oil",q:"1 tbsp"},{n:"truffle oil",q:"optional drizzle"},{n:"arugula",q:"handful"},{n:"lemon",q:"1/2"}],steps:["Toast sourdough. Sauté mushrooms in butter and oil with garlic and thyme 6-8 min until golden.","Pile mushrooms on toast. Top with gruyere.","Broil 2 min until cheese melts. Top with arugula dressed in lemon juice. Drizzle truffle oil."]},
{id:421,name:"Chicken Pho",time:35,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55095529749_67146766ac_c.jpg",ing:[{n:"chicken",q:"1 whole or 4 thighs"},{n:"star anise",q:"2"},{n:"cinnamon stick",q:"1"},{n:"ginger",q:"3 inch, charred"},{n:"onion",q:"1, charred"},{n:"fish sauce",q:"3 tbsp"},{n:"sugar",q:"1 tsp"},{n:"rice noodles",q:"400g"},{n:"bean sprouts",q:"100g"},{n:"Thai basil",q:"fresh"},{n:"cilantro",q:"fresh"},{n:"lime",q:"2"},{n:"hoisin sauce",q:"for serving"},{n:"sriracha",q:"for serving"}],steps:["Simmer chicken with charred ginger, onion, star anise, cinnamon in 2L water 25-30 min. Skim.","Remove chicken, shred meat. Strain broth. Season with fish sauce, sugar.","Cook noodles. Serve in bowls with broth, chicken, bean sprouts, herbs, lime, hoisin, sriracha."]},
{id:422,name:"Chocolate Brownies",time:35,servings:12,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/55154478860_9fb1ecb825_c.jpg",ing:[{n:"dark chocolate",q:"200g"},{n:"butter",q:"150g"},{n:"sugar",q:"200g"},{n:"eggs",q:"3"},{n:"vanilla extract",q:"1 tsp"},{n:"flour",q:"80g"},{n:"cocoa powder",q:"30g"},{n:"salt",q:"1/2 tsp"},{n:"walnuts",q:"60g, optional"}],steps:["Melt chocolate and butter together. Cool slightly.","Whisk in sugar, eggs, vanilla. Fold in flour, cocoa, salt. Add walnuts if using.","Pour into lined pan. Bake 180C 22-25 min until top is set but center is fudgy. Cool completely before cutting."]},
{id:423,name:"Chicken Doner Kebab",time:30,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/51312132605_9fbe8a7e04_c.jpg",ing:[{n:"chicken thighs",q:"600g, boneless"},{n:"yogurt",q:"100g"},{n:"garlic",q:"4 cloves"},{n:"cumin",q:"2 tsp"},{n:"paprika",q:"2 tsp"},{n:"oregano",q:"1 tsp"},{n:"olive oil",q:"3 tbsp"},{n:"pita bread",q:"4"},{n:"lettuce",q:"shredded"},{n:"tomato",q:"2, diced"},{n:"red onion",q:"1/2, sliced"},{n:"garlic sauce",q:"for serving"},{n:"hot sauce",q:"for serving"}],steps:["Marinate chicken in yogurt, garlic, spices, oil 2+ hours. Stack on vertical spit or stack on skewer.","Grill or broil 6-7 min per side until charred. Slice thin.","Serve in warm pita with lettuce, tomato, onion, garlic sauce, hot sauce."]},
{id:424,name:"Pumpkin Ravioli",time:40,servings:4,diff:"Medium",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54424651904_c64964dacb_c.jpg",ing:[{n:"pumpkin",q:"400g, roasted and mashed"},{n:"ricotta",q:"60g"},{n:"parmesan",q:"40g"},{n:"sage",q:"15 leaves"},{n:"nutmeg",q:"pinch"},{n:"pasta dough or wonton wrappers",q:"24"},{n:"butter",q:"80g"},{n:"amaretti cookies",q:"4, crushed"},{n:"brown sugar",q:"1 tsp"}],steps:["Mix pumpkin with ricotta, parmesan, nutmeg, brown sugar. Fill wrappers, seal.","Cook ravioli until they float.","Brown butter with sage leaves until crispy. Toss ravioli in brown butter. Top with crushed amaretti and parmesan."]},

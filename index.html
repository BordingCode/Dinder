{id:198,name:"Thai Larb",time:15,servings:3,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55020902331_8a53db75f7_c.jpg",ing:[{n:"ground chicken or pork",q:"400g"},{n:"fish sauce",q:"3 tbsp"},{n:"lime juice",q:"3 tbsp"},{n:"toasted rice powder",q:"2 tbsp"},{n:"red shallots",q:"3, sliced"},{n:"mint",q:"large bunch"},{n:"cilantro",q:"bunch"},{n:"Thai chili",q:"3, sliced"},{n:"green onion",q:"3"},{n:"lettuce cups",q:"for serving"},{n:"sticky rice",q:"for serving"}],steps:["Toast rice in dry pan, grind to powder. Crumble and cook meat in pan, no oil needed.","Remove from heat. Dress with fish sauce, lime juice, toasted rice powder.","Toss with shallots, mint, cilantro, chili, green onion. Serve in lettuce cups with sticky rice."]},
{id:199,name:"Mushroom & Spinach Quesadilla",time:15,servings:2,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/1390/736739239_1d0fdab7a0_c.jpg",ing:[{n:"flour tortillas",q:"2 large"},{n:"mushrooms",q:"200g, sliced"},{n:"spinach",q:"100g"},{n:"mozzarella",q:"100g, shredded"},{n:"garlic",q:"2 cloves"},{n:"cumin",q:"1/2 tsp"},{n:"olive oil",q:"1 tbsp"},{n:"salsa",q:"for serving"},{n:"sour cream",q:"for serving"}],steps:["Sauté mushrooms and garlic until golden. Add spinach until wilted. Season with cumin.","Lay tortilla, add cheese, mushroom-spinach mixture, more cheese. Fold.","Cook in dry pan 2-3 min per side until golden. Serve with salsa and sour cream."]},
{id:200,name:"Tofu Banh Mi",time:20,servings:2,diff:"Easy",tags:["vegan","vegetarian","dairy-free"],img:"https://live.staticflickr.com/8213/8282541214_8cfb862674_c.jpg",ing:[{n:"firm tofu",q:"300g, sliced"},{n:"baguette",q:"2, split"},{n:"soy sauce",q:"2 tbsp"},{n:"sriracha",q:"1 tbsp"},{n:"maple syrup",q:"1 tbsp"},{n:"rice vinegar",q:"1 tbsp"},{n:"daikon",q:"50g, pickled"},{n:"carrot",q:"1, pickled"},{n:"cucumber",q:"1/2, sliced"},{n:"cilantro",q:"fresh"},{n:"jalapeno",q:"1, sliced"},{n:"vegan mayo",q:"2 tbsp"}],steps:["Marinate tofu in soy sauce, sriracha, maple syrup, vinegar 15 min. Pan-fry until crispy.","Toast baguettes. Spread with mayo.","Layer crispy tofu, pickled vegetables, cucumber, cilantro, jalapeno."]},
{id:201,name:"Chicken Vindaloo",time:40,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54033096857_8380abf07f_c.jpg",ing:[{n:"chicken thighs",q:"600g, cubed"},{n:"onion",q:"2, diced"},{n:"garlic",q:"6 cloves"},{n:"ginger",q:"2 inch"},{n:"kashmiri chili",q:"3 tbsp"},{n:"cumin",q:"1 tsp"},{n:"cinnamon",q:"1/2 tsp"},{n:"cloves",q:"3"},{n:"white vinegar",q:"3 tbsp"},{n:"canned tomatoes",q:"200g"},{n:"mustard seeds",q:"1 tsp"},{n:"oil",q:"3 tbsp"},{n:"rice",q:"for serving"}],steps:["Blend garlic, ginger, spices, vinegar into paste. Marinate chicken 1 hour.","Fry mustard seeds, add onions until dark golden. Add paste, cook 5 min.","Add chicken, tomatoes. Cover, simmer 25-30 min. Serve with rice."]},
{id:202,name:"Margherita Pizza",time:30,servings:2,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/55133962107_233ed97158_c.jpg",ing:[{n:"pizza dough",q:"300g"},{n:"San Marzano tomatoes",q:"200g, crushed"},{n:"fresh mozzarella",q:"200g, torn"},{n:"fresh basil",q:"bunch"},{n:"olive oil",q:"2 tbsp"},{n:"garlic",q:"1 clove"},{n:"salt",q:"to taste"}],steps:["Stretch dough on floured surface into thin circle. Place on preheated pizza stone or sheet.","Spread crushed tomatoes with garlic. Distribute torn mozzarella.","Bake at maximum oven heat (250C+) 8-12 min until crust is charred. Top with basil and olive oil."]},
{id:203,name:"Jamaican Oxtail Stew",time:180,servings:6,diff:"Hard",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/7009/6837273243_7941bc6d1e_c.jpg",ing:[{n:"oxtails",q:"1.5kg"},{n:"butter beans",q:"1 can"},{n:"onion",q:"1, diced"},{n:"garlic",q:"4 cloves"},{n:"thyme",q:"3 sprigs"},{n:"allspice",q:"1 tsp"},{n:"scotch bonnet",q:"1, whole"},{n:"soy sauce",q:"3 tbsp"},{n:"browning sauce",q:"1 tbsp"},{n:"tomato paste",q:"2 tbsp"},{n:"beef broth",q:"500ml"},{n:"carrot",q:"2"},{n:"rice and peas",q:"for serving"}],steps:["Season oxtails with allspice, soy sauce, garlic, thyme. Brown in batches.","Add onion, carrot, tomato paste, browning sauce, broth, scotch bonnet. Cover, simmer 2.5-3 hours.","Add butter beans last 30 min. Sauce should be thick and rich. Serve with rice and peas."]},
{id:204,name:"Caprese Salad",time:10,servings:4,diff:"Easy",tags:["vegetarian","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/54850878395_edffc971c4_c.jpg",ing:[{n:"fresh mozzarella",q:"300g, sliced"},{n:"ripe tomatoes",q:"4 large, sliced"},{n:"fresh basil",q:"large bunch"},{n:"extra virgin olive oil",q:"3 tbsp"},{n:"balsamic glaze",q:"2 tbsp"},{n:"salt flakes",q:"to taste"},{n:"black pepper",q:"to taste"}],steps:["Arrange alternating slices of tomato and mozzarella on a platter.","Tuck basil leaves between slices.","Drizzle with olive oil and balsamic glaze. Season with salt flakes and pepper."]},
{id:205,name:"Okonomiyaki",time:25,servings:2,diff:"Medium",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/55128842284_4a53b08217_c.jpg",ing:[{n:"cabbage",q:"300g, shredded"},{n:"flour",q:"100g"},{n:"eggs",q:"2"},{n:"dashi broth",q:"100ml"},{n:"pork belly",q:"100g, thinly sliced"},{n:"green onion",q:"3"},{n:"tenkasu",q:"2 tbsp"},{n:"okonomiyaki sauce",q:"for topping"},{n:"Japanese mayo",q:"for topping"},{n:"bonito flakes",q:"for topping"},{n:"aonori",q:"for topping"},{n:"pickled ginger",q:"for serving"}],steps:["Mix flour, eggs, dashi into batter. Fold in cabbage, green onion, tenkasu.","Cook pancake in oiled pan 4 min. Lay pork slices on top. Flip, cook 4-5 min.","Top with sauce, mayo in zigzag, bonito flakes, aonori. Slice and serve."]},
{id:206,name:"Pasta al Limone",time:15,servings:4,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/4447/36988985730_848637ccff_c.jpg",ing:[{n:"spaghetti",q:"400g"},{n:"lemon",q:"3, zested and juiced"},{n:"parmesan",q:"80g, grated"},{n:"heavy cream",q:"100ml"},{n:"butter",q:"40g"},{n:"black pepper",q:"1 tsp"},{n:"basil",q:"fresh"}],steps:["Cook spaghetti al dente. Reserve 200ml pasta water.","Melt butter, add lemon juice and cream. Simmer 1 min.","Add pasta, parmesan, lemon zest, pasta water. Toss vigorously until creamy. Top with basil and pepper."]},
{id:207,name:"Samosa",time:40,servings:12,diff:"Medium",tags:["vegan","vegetarian","dairy-free"],img:"https://live.staticflickr.com/65535/55125296754_3668fc8441_c.jpg",ing:[{n:"potatoes",q:"400g, boiled and cubed"},{n:"peas",q:"100g"},{n:"onion",q:"1, diced"},{n:"ginger",q:"1 inch"},{n:"cumin seeds",q:"1 tsp"},{n:"coriander",q:"1 tsp"},{n:"garam masala",q:"1 tsp"},{n:"green chili",q:"2"},{n:"flour",q:"200g"},{n:"oil",q:"for frying"},{n:"cilantro",q:"fresh"},{n:"tamarind chutney",q:"for serving"}],steps:["Make dough: flour, oil, water. Knead, rest 30 min. Sauté onion, add spices, potatoes, peas. Cool.","Roll dough into circles, cut in half. Form cones, fill with potato mixture, seal.","Deep fry at 170C until golden, 4-5 min. Serve with tamarind and mint chutney."]},
{id:208,name:"Steak Frites",time:25,servings:2,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55125027937_fd02c27c58_c.jpg",ing:[{n:"ribeye steak",q:"2, 3cm thick"},{n:"potatoes",q:"600g, cut into frites"},{n:"garlic butter",q:"40g"},{n:"thyme",q:"fresh"},{n:"salt and pepper",q:"to taste"},{n:"vegetable oil",q:"for frying"},{n:"Dijon mustard",q:"for serving"},{n:"parsley",q:"fresh"}],steps:["Double-fry frites: 130C 6 min, then 190C 3 min until crispy and golden.","Season steaks. Sear in hot pan 4 min per side. Add garlic butter, thyme. Baste. Rest 5 min.","Slice steak, serve alongside crispy frites with Dijon mustard and parsley."]},
{id:209,name:"Chicken Tinga",time:25,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/51511826768_ccc4c11b62_c.jpg",ing:[{n:"chicken thighs",q:"600g, boneless"},{n:"canned tomatoes",q:"400g"},{n:"chipotle in adobo",q:"3 peppers"},{n:"onion",q:"1"},{n:"garlic",q:"3 cloves"},{n:"oregano",q:"1 tsp"},{n:"cumin",q:"1/2 tsp"},{n:"chicken broth",q:"200ml"},{n:"tostadas",q:"8"},{n:"refried beans",q:"for serving"},{n:"avocado",q:"1"},{n:"queso fresco",q:"50g"},{n:"lettuce",q:"shredded"}],steps:["Poach chicken in broth 15 min. Shred with forks.","Blend tomatoes, chipotles, onion, garlic. Fry in oil 5 min. Add chicken, oregano, cumin.","Simmer 10 min. Serve on tostadas with beans, lettuce, avocado, queso fresco."]},
{id:210,name:"Chocolate Mousse",time:20,servings:4,diff:"Easy",tags:["gluten-free"],img:"https://live.staticflickr.com/65535/55154343989_73d08b319b_c.jpg",ing:[{n:"dark chocolate",q:"200g"},{n:"heavy cream",q:"250ml"},{n:"eggs",q:"3, separated"},{n:"sugar",q:"30g"},{n:"vanilla extract",q:"1 tsp"},{n:"salt",q:"pinch"},{n:"whipped cream",q:"for serving"}],steps:["Melt chocolate. Cool slightly. Whisk in egg yolks and vanilla.","Whip cream to soft peaks. Whip whites with sugar to stiff peaks.","Fold cream into chocolate, then fold in whites gently. Spoon into glasses. Chill 2-4 hours."]},
{id:211,name:"Tofu Katsu Curry",time:30,servings:4,diff:"Medium",tags:["vegan","vegetarian","dairy-free"],img:"https://live.staticflickr.com/5052/5547540181_caea98a52c_c.jpg",ing:[{n:"firm tofu",q:"400g, sliced thick"},{n:"panko breadcrumbs",q:"150g"},{n:"flour",q:"50g"},{n:"soy milk",q:"100ml"},{n:"Japanese curry roux",q:"1 block"},{n:"onion",q:"1, sliced"},{n:"carrot",q:"1, diced"},{n:"potato",q:"1, cubed"},{n:"rice",q:"for serving"},{n:"vegetable oil",q:"for frying"}],steps:["Make curry: cook vegetables in 500ml water 15 min. Add curry roux, stir until thick.","Press tofu. Coat in flour, soy milk, panko. Deep fry at 180C 4-5 min until golden.","Slice katsu. Serve over rice with curry sauce."]},
{id:212,name:"Creme Brulee",time:30,servings:4,diff:"Medium",tags:["gluten-free"],img:"https://live.staticflickr.com/65535/54950123187_b7dc199490_c.jpg",ing:[{n:"heavy cream",q:"500ml"},{n:"egg yolks",q:"6"},{n:"sugar",q:"80g plus extra for topping"},{n:"vanilla bean",q:"1, split"},{n:"salt",q:"pinch"}],steps:["Heat cream with vanilla bean until just simmering. Remove vanilla.","Whisk yolks with sugar. Slowly pour cream into yolks, whisking constantly. Strain.","Divide into ramekins. Bake in water bath at 150C 40-45 min until just set. Chill 4 hours. Torch sugar before serving."]},
{id:213,name:"Chicken Caesar Wrap",time:10,servings:2,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/53459000477_671184eeb6_c.jpg",ing:[{n:"grilled chicken",q:"250g, sliced"},{n:"large flour tortillas",q:"2"},{n:"romaine lettuce",q:"4 leaves, chopped"},{n:"parmesan",q:"30g, shaved"},{n:"Caesar dressing",q:"3 tbsp"},{n:"croutons",q:"handful, crushed"},{n:"lemon juice",q:"1 tbsp"},{n:"black pepper",q:"to taste"}],steps:["Toss lettuce with Caesar dressing, lemon juice, and parmesan.","Lay tortillas flat. Pile dressed lettuce, sliced chicken, croutons.","Roll tightly into wraps. Cut in half diagonally. Serve immediately."]},
{id:214,name:"Takoyaki",time:25,servings:12,diff:"Medium",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/55147035339_758b128214_c.jpg",ing:[{n:"octopus",q:"200g, cooked and diced"},{n:"takoyaki flour",q:"200g"},{n:"dashi broth",q:"400ml"},{n:"eggs",q:"2"},{n:"green onion",q:"3, chopped"},{n:"pickled ginger",q:"2 tbsp, minced"},{n:"tenkasu",q:"2 tbsp"},{n:"takoyaki sauce",q:"for topping"},{n:"Japanese mayo",q:"for topping"},{n:"bonito flakes",q:"for topping"},{n:"aonori",q:"for topping"}],steps:["Mix flour, dashi, eggs into thin batter.","Grease takoyaki pan, fill with batter. Add octopus, ginger, green onion, tenkasu. Turn balls as they cook.","Cook 4-5 min, turning frequently, until crispy outside. Top with sauce, mayo, bonito, aonori."]},
{id:215,name:"Thai Red Curry Vegetables",time:20,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free"],img:"https://live.staticflickr.com/65535/49692016398_ebf34729ff_c.jpg",ing:[{n:"coconut milk",q:"400ml"},{n:"red curry paste",q:"3 tbsp"},{n:"sweet potato",q:"1, cubed"},{n:"bell pepper",q:"1"},{n:"zucchini",q:"1"},{n:"green beans",q:"100g"},{n:"bamboo shoots",q:"100g"},{n:"fish sauce or soy sauce",q:"2 tbsp"},{n:"brown sugar",q:"1 tsp"},{n:"Thai basil",q:"handful"},{n:"lime",q:"1"},{n:"rice",q:"for serving"}],steps:["Fry curry paste in coconut cream 2 min. Add sweet potato, cook 5 min.","Add remaining coconut milk, bell pepper, zucchini, green beans, bamboo shoots. Simmer 10 min.","Season with fish sauce (or soy), sugar, lime. Add basil. Serve over rice."]},
{id:216,name:"Italian Wedding Soup",time:35,servings:6,diff:"Easy",tags:["high-protein","nut-free"],img:"https://live.staticflickr.com/65535/52035255659_9025ca7a36_c.jpg",ing:[{n:"ground pork",q:"300g"},{n:"parmesan",q:"40g, grated"},{n:"egg",q:"1"},{n:"breadcrumbs",q:"30g"},{n:"garlic",q:"3 cloves"},{n:"chicken broth",q:"1.5L"},{n:"orzo",q:"100g"},{n:"escarole or spinach",q:"200g"},{n:"onion",q:"1, diced"},{n:"carrot",q:"1, diced"},{n:"celery",q:"1 stalk"},{n:"olive oil",q:"2 tbsp"}],steps:["Mix pork, parmesan, egg, breadcrumbs, 1 minced garlic clove. Form tiny meatballs.","Sauté onion, carrot, celery 5 min. Add broth, bring to boil. Drop in meatballs.","Add orzo, cook 10 min. Add greens, cook 3 min. Season. Drizzle with olive oil and parmesan."]},
{id:217,name:"Breakfast Tacos",time:15,servings:4,diff:"Easy",tags:["gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/55129090769_e08236e489_c.jpg",ing:[{n:"eggs",q:"6, scrambled"},{n:"bacon",q:"6 strips"},{n:"corn tortillas",q:"8"},{n:"cheddar cheese",q:"100g, shredded"},{n:"avocado",q:"1"},{n:"salsa",q:"for serving"},{n:"black beans",q:"1 can, warmed"},{n:"cilantro",q:"fresh"},{n:"lime",q:"1"},{n:"hot sauce",q:"for serving"}],steps:["Cook bacon crispy. Scramble eggs softly with salt and pepper.","Warm tortillas. Fill with scrambled eggs, crumbled bacon, cheese, beans.","Top with avocado, salsa, cilantro, lime, hot sauce."]},
{id:218,name:"Tom Yum Soup",time:20,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54665470145_f99ff28a83_c.jpg",ing:[{n:"shrimp",q:"400g, peeled"},{n:"mushrooms",q:"150g"},{n:"lemongrass",q:"3 stalks, bruised"},{n:"galangal",q:"5 slices"},{n:"kaffir lime leaves",q:"5"},{n:"fish sauce",q:"3 tbsp"},{n:"lime juice",q:"3 tbsp"},{n:"Thai chili paste",q:"2 tbsp"},{n:"cherry tomatoes",q:"6"},{n:"cilantro",q:"fresh"},{n:"Thai chili",q:"2, crushed"},{n:"chicken broth",q:"750ml"}],steps:["Bring broth with lemongrass, galangal, lime leaves to simmer 5 min.","Add mushrooms and tomatoes 3 min. Add shrimp 2-3 min until pink.","Season with fish sauce, lime juice, chili paste. Garnish with cilantro and chili."]},
{id:219,name:"Shakshuka with Merguez",time:30,servings:4,diff:"Medium",tags:["gluten-free","nut-free"],img:U+"1600713529234-2ead3b91c6eb?w=600&h=400&fit=crop",ing:[{n:"merguez sausages",q:"4"},{n:"canned tomatoes",q:"800g"},{n:"bell pepper",q:"2, diced"},{n:"onion",q:"1, diced"},{n:"garlic",q:"4 cloves"},{n:"cumin",q:"1 tsp"},{n:"harissa",q:"1 tbsp"},{n:"eggs",q:"6"},{n:"feta",q:"50g"},{n:"cilantro",q:"fresh"},{n:"olive oil",q:"2 tbsp"},{n:"crusty bread",q:"for serving"}],steps:["Brown merguez, slice. Sauté onion, pepper, garlic 5 min. Add cumin, harissa.","Add tomatoes, return sausage. Simmer 10 min.","Make wells, crack eggs. Cover 5-8 min. Top with feta and cilantro. Serve with bread."]},
{id:220,name:"Grilled Halloumi Salad",time:15,servings:2,diff:"Easy",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/65535/54612816180_f575ebac40_c.jpg",ing:[{n:"halloumi",q:"250g, sliced"},{n:"watermelon",q:"300g, cubed"},{n:"cucumber",q:"1, diced"},{n:"mint",q:"fresh"},{n:"red onion",q:"1/4, sliced"},{n:"olive oil",q:"3 tbsp"},{n:"lime",q:"1"},{n:"pomegranate seeds",q:"2 tbsp"},{n:"black pepper",q:"to taste"}],steps:["Grill halloumi slices 2 min per side until golden grill marks appear.","Combine watermelon, cucumber, red onion, mint in a bowl.","Top with grilled halloumi, pomegranate seeds. Dress with olive oil and lime juice."]},
{id:221,name:"Gyudon",time:20,servings:2,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/55064326992_a0102b91d9_c.jpg",ing:[{n:"beef sirloin",q:"300g, very thinly sliced"},{n:"onion",q:"1, thinly sliced"},{n:"dashi broth",q:"200ml"},{n:"soy sauce",q:"3 tbsp"},{n:"mirin",q:"2 tbsp"},{n:"sugar",q:"1 tbsp"},{n:"ginger",q:"1 tsp, grated"},{n:"egg",q:"2"},{n:"rice",q:"for serving"},{n:"green onion",q:"2"},{n:"pickled ginger",q:"for serving"}],steps:["Simmer onion in dashi, soy sauce, mirin, sugar 5 min until soft.","Add sliced beef, cook 3-4 min. Drizzle beaten egg over, cover 1 min until just set.","Slide over hot rice bowls. Top with green onion and pickled ginger."]},
{id:222,name:"Chicken Alfredo",time:20,servings:4,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55139651249_afab1a5461_c.jpg",ing:[{n:"fettuccine",q:"400g"},{n:"chicken breast",q:"2, sliced"},{n:"heavy cream",q:"300ml"},{n:"parmesan",q:"100g, grated"},{n:"garlic",q:"4 cloves"},{n:"butter",q:"40g"},{n:"olive oil",q:"1 tbsp"},{n:"nutmeg",q:"pinch"},{n:"parsley",q:"fresh"},{n:"black pepper",q:"to taste"}],steps:["Cook fettuccine al dente. Reserve pasta water.","Sear chicken in olive oil 5-6 min. Remove. Melt butter, add garlic. Pour in cream, simmer 3 min.","Add parmesan, nutmeg. Toss with pasta, chicken, and pasta water. Top with parsley and pepper."]},
{id:223,name:"Dhal Makhani",time:45,servings:6,diff:"Easy",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/2873/11666199865_2813718f5a_c.jpg",ing:[{n:"black lentils",q:"200g, soaked overnight"},{n:"kidney beans",q:"100g, soaked overnight"},{n:"onion",q:"1, diced"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"2 inch"},{n:"canned tomatoes",q:"400g"},{n:"butter",q:"40g"},{n:"heavy cream",q:"100ml"},{n:"garam masala",q:"2 tsp"},{n:"cumin",q:"1 tsp"},{n:"chili powder",q:"1 tsp"},{n:"kasuri methi",q:"1 tsp"},{n:"rice",q:"for serving"}],steps:["Pressure cook lentils and kidney beans with water 30 min until very soft.","Sauté onion in butter 5 min. Add garlic, ginger, spices. Add tomatoes, simmer 10 min.","Add lentils, cream, kasuri methi. Simmer 10 min, mashing slightly. Serve with rice and naan."]},
{id:224,name:"Beef and Guinness Stew",time:120,servings:6,diff:"Medium",tags:["high-protein","nut-free"],img:"https://live.staticflickr.com/840/43186605961_28b512d2b5_c.jpg",ing:[{n:"beef chuck",q:"800g, cubed"},{n:"Guinness stout",q:"400ml"},{n:"onion",q:"2, chopped"},{n:"carrot",q:"3, chunked"},{n:"potato",q:"3, cubed"},{n:"garlic",q:"4 cloves"},{n:"tomato paste",q:"2 tbsp"},{n:"beef broth",q:"300ml"},{n:"thyme",q:"3 sprigs"},{n:"bay leaf",q:"1"},{n:"flour",q:"2 tbsp"},{n:"butter",q:"30g"},{n:"parsley",q:"fresh"},{n:"soda bread",q:"for serving"}],steps:["Brown beef in batches. Remove. Sauté onion, carrot, garlic in butter 5 min. Add flour, paste.","Deglaze with Guinness. Add broth, thyme, bay leaf, beef. Cover, cook at 160C 2 hours.","Add potatoes last 30 min. Stew should be thick and rich. Garnish with parsley. Serve with soda bread."]},
{id:225,name:"Scallop Risotto",time:30,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54354815320_be75631ec1_c.jpg",ing:[{n:"large scallops",q:"12"},{n:"arborio rice",q:"300g"},{n:"white wine",q:"150ml"},{n:"fish stock",q:"800ml, warm"},{n:"shallot",q:"2, finely diced"},{n:"garlic",q:"2 cloves"},{n:"lemon",q:"1"},{n:"butter",q:"40g"},{n:"parmesan",q:"50g"},{n:"chives",q:"fresh"},{n:"olive oil",q:"1 tbsp"}],steps:["Sauté shallot and garlic 3 min. Toast rice 1 min. Add wine.","Add stock one ladle at a time, stirring 18-20 min. Stir in butter, parmesan, lemon zest.","Sear scallops in hot pan with oil 2 min per side. Place on risotto. Garnish with chives and lemon juice."]},
{id:226,name:"Singapore Noodles",time:20,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/55150881789_a9e85d3eb2_c.jpg",ing:[{n:"rice vermicelli",q:"200g"},{n:"shrimp",q:"150g"},{n:"Chinese BBQ pork",q:"100g, sliced"},{n:"egg",q:"2"},{n:"curry powder",q:"2 tbsp"},{n:"onion",q:"1, sliced"},{n:"bell pepper",q:"1, sliced"},{n:"bean sprouts",q:"100g"},{n:"garlic",q:"3 cloves"},{n:"soy sauce",q:"2 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"green onion",q:"3"}],steps:["Soak vermicelli in hot water 3 min. Drain. Scramble eggs, set aside.","Stir-fry shrimp, pork, garlic 2 min. Add onion, pepper 2 min.","Add noodles, curry powder, soy sauce. Toss over high heat. Add sprouts, egg, sesame oil, green onion."]},
{id:227,name:"Pulled Pork Sliders",time:120,servings:8,diff:"Easy",tags:["dairy-free","nut-free"],img:"https://live.staticflickr.com/65535/53990234823_cd32a8b30d_c.jpg",ing:[{n:"pork shoulder",q:"1.5kg"},{n:"brown sugar",q:"3 tbsp"},{n:"smoked paprika",q:"2 tbsp"},{n:"garlic powder",q:"1 tbsp"},{n:"onion powder",q:"1 tbsp"},{n:"cumin",q:"1 tsp"},{n:"BBQ sauce",q:"200ml"},{n:"apple cider vinegar",q:"2 tbsp"},{n:"slider buns",q:"12"},{n:"coleslaw",q:"for serving"}],steps:["Mix dry rub ingredients, coat pork generously. Wrap in foil.","Slow roast at 130C for 4-5 hours until internal temp reaches 95C and meat pulls apart easily.","Shred with forks, toss with BBQ sauce and vinegar. Pile onto slider buns with coleslaw."]},
{id:228,name:"Pasta Primavera",time:20,servings:4,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54973921519_5935f2a84f_c.jpg",ing:[{n:"penne",q:"400g"},{n:"zucchini",q:"1, diced"},{n:"bell pepper",q:"1, diced"},{n:"cherry tomatoes",q:"150g"},{n:"asparagus",q:"100g, cut"},{n:"peas",q:"80g"},{n:"garlic",q:"3 cloves"},{n:"olive oil",q:"3 tbsp"},{n:"parmesan",q:"50g"},{n:"lemon",q:"1"},{n:"basil",q:"fresh"}],steps:["Cook penne. Sauté garlic and all vegetables in olive oil 5-6 min until tender-crisp.","Toss pasta with vegetables, lemon juice, olive oil, and pasta water.","Top with parmesan and torn basil."]},
{id:229,name:"Beef Empanadas",time:40,servings:12,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54612814850_e96fee6f8c_c.jpg",ing:[{n:"ground beef",q:"400g"},{n:"onion",q:"1, diced"},{n:"hard-boiled egg",q:"2, chopped"},{n:"green olives",q:"50g, chopped"},{n:"cumin",q:"1 tsp"},{n:"paprika",q:"1 tsp"},{n:"garlic",q:"3 cloves"},{n:"empanada dough",q:"12 discs"},{n:"egg",q:"1, for wash"},{n:"chimichurri",q:"for serving"}],steps:["Brown beef with onion, garlic, spices. Cool. Mix in chopped eggs and olives.","Place filling on dough discs. Fold, crimp edges with fork.","Egg wash. Bake 200C 18-20 min until golden. Or deep fry 3-4 min. Serve with chimichurri."]},
{id:230,name:"Coconut Chia Pudding",time:10,servings:2,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/52747858852_fa63ff0b29_c.jpg",ing:[{n:"chia seeds",q:"60g"},{n:"coconut milk",q:"300ml"},{n:"maple syrup",q:"2 tbsp"},{n:"vanilla extract",q:"1 tsp"},{n:"mango",q:"1, diced"},{n:"passion fruit",q:"2"},{n:"toasted coconut flakes",q:"2 tbsp"},{n:"granola",q:"for topping"}],steps:["Mix chia seeds with coconut milk, maple syrup, vanilla. Stir well.","Refrigerate 4 hours or overnight until thick and pudding-like.","Top with diced mango, passion fruit pulp, toasted coconut, granola."]},
{id:231,name:"Miso Ramen",time:30,servings:4,diff:"Medium",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/55137821708_3874e16493_c.jpg",ing:[{n:"ramen noodles",q:"400g"},{n:"white miso paste",q:"4 tbsp"},{n:"chicken broth",q:"1L"},{n:"ground pork",q:"200g"},{n:"corn",q:"1 ear"},{n:"bean sprouts",q:"100g"},{n:"soft-boiled egg",q:"4"},{n:"green onion",q:"4"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"sesame oil",q:"1 tsp"},{n:"butter",q:"20g"},{n:"chili oil",q:"optional"}],steps:["Stir-fry pork with garlic, ginger until crispy. Char corn.","Heat broth, whisk in miso paste. Add butter. Do not boil.","Cook ramen. Assemble bowls: noodles, miso broth, pork, corn, egg, bean sprouts, green onion, chili oil."]},
{id:232,name:"Vietnamese Spring Rolls",time:25,servings:12,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55139593963_47d41d0733_c.jpg",ing:[{n:"rice paper wrappers",q:"12"},{n:"vermicelli noodles",q:"100g, cooked"},{n:"shrimp",q:"12, cooked and halved"},{n:"lettuce",q:"leaves"},{n:"cucumber",q:"1, julienned"},{n:"carrot",q:"1, julienned"},{n:"mint",q:"fresh"},{n:"Thai basil",q:"fresh"},{n:"peanut dipping sauce",q:"for serving"}],steps:["Prepare all fillings. Cook noodles and shrimp. Julienne vegetables.","Dip rice paper in warm water until pliable. Lay out fillings in center: lettuce, noodles, herbs, vegetables, shrimp.","Roll tightly, tucking in sides. Serve with peanut dipping sauce."]},
{id:233,name:"Beef Short Ribs",time:180,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55059590239_a279a85f44_c.jpg",ing:[{n:"beef short ribs",q:"1.5kg"},{n:"red wine",q:"300ml"},{n:"beef broth",q:"300ml"},{n:"onion",q:"1, quartered"},{n:"carrot",q:"2, chunked"},{n:"celery",q:"2 stalks"},{n:"garlic",q:"6 cloves"},{n:"tomato paste",q:"2 tbsp"},{n:"thyme",q:"4 sprigs"},{n:"bay leaves",q:"2"},{n:"flour",q:"for dredging"},{n:"olive oil",q:"3 tbsp"}],steps:["Season and flour ribs. Brown in oil 3 min per side. Remove.","Sauté vegetables 5 min. Add tomato paste, deglaze with wine. Add broth, herbs.","Return ribs. Cover, braise at 160C for 3 hours until meat falls off bone. Reduce sauce. Serve over polenta."]},
{id:234,name:"Green Shakshuka",time:25,servings:3,diff:"Easy",tags:["vegetarian","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/33987652408_f30a231c70_c.jpg",ing:[{n:"eggs",q:"6"},{n:"spinach",q:"200g"},{n:"kale",q:"100g, chopped"},{n:"leek",q:"1, sliced"},{n:"garlic",q:"3 cloves"},{n:"green chili",q:"1"},{n:"feta",q:"60g"},{n:"dill",q:"fresh"},{n:"cumin",q:"1 tsp"},{n:"vegetable broth",q:"100ml"},{n:"olive oil",q:"2 tbsp"},{n:"sourdough",q:"for serving"}],steps:["Sauté leek and garlic 3 min. Add spinach, kale, chili, cumin, broth. Cook 5 min until wilted.","Make wells, crack eggs. Cover, cook 5-8 min.","Top with feta and dill. Serve with toasted sourdough."]},
{id:235,name:"Chole Bhature",time:40,servings:4,diff:"Medium",tags:["vegetarian"],img:"https://live.staticflickr.com/31337/53437149308_66b3742744_c.jpg",ing:[{n:"chickpeas",q:"2 cans, drained"},{n:"onion",q:"2, diced"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"2 inch"},{n:"canned tomatoes",q:"400g"},{n:"chole masala",q:"3 tbsp"},{n:"amchur powder",q:"1 tsp"},{n:"flour",q:"200g"},{n:"yogurt",q:"50g"},{n:"baking powder",q:"1/2 tsp"},{n:"oil",q:"for frying"},{n:"pickled onion",q:"for serving"}],steps:["Sauté onions golden. Add garlic, ginger, chole masala. Add tomatoes, chickpeas. Simmer 20 min.","Knead dough: flour, yogurt, oil, baking powder, water. Rest 30 min. Roll into circles.","Deep fry bhature until puffed and golden. Serve with chole and pickled onion."]},
{id:236,name:"Pork Ragu Pasta",time:90,servings:6,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/875/27312882748_744384b224_c.jpg",ing:[{n:"pork shoulder",q:"600g"},{n:"rigatoni",q:"400g"},{n:"canned tomatoes",q:"800g"},{n:"onion",q:"1, diced"},{n:"garlic",q:"4 cloves"},{n:"red wine",q:"200ml"},{n:"tomato paste",q:"2 tbsp"},{n:"rosemary",q:"2 sprigs"},{n:"bay leaf",q:"1"},{n:"parmesan",q:"50g"},{n:"olive oil",q:"3 tbsp"}],steps:["Brown pork on all sides. Remove. Sauté onion, garlic 5 min. Add paste.","Deglaze with wine. Add tomatoes, rosemary, bay leaf, pork. Cover, braise 160C 2-2.5 hours.","Shred pork into sauce. Toss with rigatoni and parmesan."]},
{id:237,name:"Korean Fried Chicken",time:40,servings:4,diff:"Medium",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/55083288007_3d348f4b09_c.jpg",ing:[{n:"chicken wings",q:"1kg"},{n:"cornstarch",q:"80g"},{n:"flour",q:"40g"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"1 inch"},{n:"gochujang",q:"3 tbsp"},{n:"honey",q:"3 tbsp"},{n:"soy sauce",q:"2 tbsp"},{n:"rice vinegar",q:"1 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"sesame seeds",q:"2 tbsp"},{n:"green onion",q:"3"},{n:"vegetable oil",q:"for frying"}],steps:["Coat wings in cornstarch and flour. Double fry: 160C 8 min, rest, then 190C 3-4 min until super crispy.","Make sauce: simmer gochujang, honey, soy sauce, vinegar, garlic, ginger, sesame oil.","Toss crispy wings in sauce. Top with sesame seeds and green onion."]},
{id:238,name:"Quiche Lorraine",time:45,servings:6,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55127205504_df385831b8_c.jpg",ing:[{n:"shortcrust pastry",q:"1 sheet"},{n:"bacon lardons",q:"150g"},{n:"gruyere cheese",q:"100g, grated"},{n:"eggs",q:"4"},{n:"heavy cream",q:"200ml"},{n:"milk",q:"100ml"},{n:"onion",q:"1, thinly sliced"},{n:"nutmeg",q:"pinch"},{n:"thyme",q:"fresh"},{n:"salt and pepper",q:"to taste"}],steps:["Blind bake pastry shell at 190C 12 min with pie weights. Remove weights, bake 5 min more.","Cook bacon and onion. Scatter in pastry with cheese.","Whisk eggs, cream, milk, nutmeg, thyme. Pour in. Bake 180C 30-35 min until just set and golden."]},
{id:239,name:"Butter Garlic Naan",time:25,servings:6,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/4194/34768901384_338bd847d2_c.jpg",ing:[{n:"flour",q:"300g"},{n:"yogurt",q:"100g"},{n:"baking powder",q:"1 tsp"},{n:"baking soda",q:"1/2 tsp"},{n:"sugar",q:"1 tsp"},{n:"salt",q:"1 tsp"},{n:"milk",q:"60ml"},{n:"garlic",q:"4 cloves, minced"},{n:"butter",q:"60g, melted"},{n:"cilantro",q:"fresh, chopped"}],steps:["Mix flour, yogurt, baking powder, soda, sugar, salt, milk. Knead 5 min. Rest 2 hours.","Divide into 6 balls. Roll into teardrop shapes.","Cook on very hot skillet or under broiler 2-3 min per side. Brush with garlic butter and cilantro."]},
{id:240,name:"Peking Duck Pancakes",time:120,servings:4,diff:"Hard",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/52516025536_e1c7aa12ab_c.jpg",ing:[{n:"duck",q:"1 whole, 2kg"},{n:"five spice",q:"1 tsp"},{n:"honey",q:"3 tbsp"},{n:"soy sauce",q:"2 tbsp"},{n:"rice vinegar",q:"1 tbsp"},{n:"hoisin sauce",q:"for serving"},{n:"cucumber",q:"1, julienned"},{n:"green onion",q:"6"},{n:"Chinese pancakes",q:"12"}],steps:["Air dry duck overnight or use hair dryer. Rub inside with five spice, salt.","Mix honey, soy sauce, vinegar. Brush duck. Roast at 180C 90 min until skin is crispy, basting.","Shred meat, serve skin and meat in warm pancakes with hoisin, cucumber, green onion."]},
{id:241,name:"Pumpkin Soup",time:30,servings:6,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/55080287115_d963052f31_c.jpg",ing:[{n:"pumpkin or butternut squash",q:"1kg, cubed"},{n:"onion",q:"1, diced"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"vegetable broth",q:"750ml"},{n:"coconut cream",q:"100ml"},{n:"cumin",q:"1 tsp"},{n:"nutmeg",q:"1/4 tsp"},{n:"olive oil",q:"2 tbsp"},{n:"pumpkin seeds",q:"for garnish"}],steps:["Roast pumpkin with oil, garlic 220C 20 min. Or sauté onion, ginger, add pumpkin and broth.","Simmer 15 min until very tender.","Blend until smooth. Stir in coconut cream, cumin, nutmeg. Serve with pumpkin seeds and oil drizzle."]},
{id:242,name:"Sushi Bowl",time:20,servings:2,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54393740150_0c049e94ec_c.jpg",ing:[{n:"sushi rice",q:"250g"},{n:"sushi-grade salmon",q:"200g, cubed"},{n:"avocado",q:"1, sliced"},{n:"cucumber",q:"1, diced"},{n:"edamame",q:"80g"},{n:"mango",q:"1/2, diced"},{n:"nori",q:"1 sheet, shredded"},{n:"soy sauce",q:"2 tbsp"},{n:"rice vinegar",q:"for rice"},{n:"wasabi",q:"to taste"},{n:"pickled ginger",q:"for serving"},{n:"sesame seeds",q:"1 tbsp"}],steps:["Cook rice, season with vinegar and sugar. Let cool slightly.","Arrange rice in bowls. Top with cubed salmon, avocado, cucumber, edamame, mango.","Garnish with nori, sesame seeds. Serve with soy sauce, wasabi, pickled ginger."]},
{id:243,name:"Lamb Shawarma",time:35,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/52902582106_2823fc12a2_c.jpg",ing:[{n:"lamb leg",q:"600g, thinly sliced"},{n:"cumin",q:"2 tsp"},{n:"coriander",q:"1 tsp"},{n:"turmeric",q:"1 tsp"},{n:"paprika",q:"2 tsp"},{n:"cinnamon",q:"1/2 tsp"},{n:"garlic",q:"4 cloves"},{n:"lemon",q:"1"},{n:"olive oil",q:"3 tbsp"},{n:"pita bread",q:"4"},{n:"tahini",q:"for serving"},{n:"tomato",q:"2, diced"},{n:"pickled turnip",q:"for serving"}],steps:["Mix spices, garlic, lemon, oil. Marinate lamb 2 hours minimum.","Stack slices on skewer or spread on sheet pan. Grill or roast at 220C 15-20 min.","Slice thin. Serve in warm pita with tahini, tomatoes, pickles."]},
{id:244,name:"Minestrone alla Genovese",time:35,servings:6,diff:"Easy",tags:["vegetarian","dairy-free","nut-free"],img:"https://live.staticflickr.com/65535/52557268466_1cbaa20b84_c.jpg",ing:[{n:"borlotti beans",q:"1 can"},{n:"potato",q:"2, cubed"},{n:"green beans",q:"100g"},{n:"zucchini",q:"1"},{n:"onion",q:"1"},{n:"carrot",q:"1"},{n:"celery",q:"1 stalk"},{n:"garlic",q:"3 cloves"},{n:"basil pesto",q:"3 tbsp"},{n:"small pasta",q:"100g"},{n:"vegetable broth",q:"1L"},{n:"olive oil",q:"3 tbsp"}],steps:["Sauté onion, carrot, celery 5 min. Add garlic.","Add broth, potatoes, green beans, zucchini, beans. Simmer 15 min. Add pasta.","Cook until pasta is tender. Stir in pesto. Serve with olive oil and parmesan."]},
{id:245,name:"Chicken Katsu Don",time:25,servings:2,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/7893/33100769768_6ea38d5780_c.jpg",ing:[{n:"chicken breast",q:"2, pounded thin"},{n:"panko breadcrumbs",q:"100g"},{n:"egg",q:"3 total"},{n:"flour",q:"40g"},{n:"onion",q:"1, sliced"},{n:"dashi broth",q:"200ml"},{n:"soy sauce",q:"3 tbsp"},{n:"mirin",q:"2 tbsp"},{n:"sugar",q:"1 tsp"},{n:"rice",q:"for serving"},{n:"green onion",q:"2"}],steps:["Bread chicken in flour, egg, panko. Deep fry 5-6 min. Slice.","Simmer onion in dashi, soy, mirin, sugar 5 min. Lay katsu slices over.","Pour beaten eggs over. Cover 2 min. Slide onto rice bowls. Top with green onion."]},
{id:246,name:"Poke Nachos",time:15,servings:4,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/54520395698_d9be0d2eaa_c.jpg",ing:[{n:"sushi-grade tuna",q:"300g, cubed"},{n:"wonton wrappers",q:"24, fried or baked"},{n:"soy sauce",q:"3 tbsp"},{n:"sesame oil",q:"1 tbsp"},{n:"avocado",q:"1, diced"},{n:"mango",q:"1/2, diced"},{n:"green onion",q:"3"},{n:"sriracha mayo",q:"3 tbsp"},{n:"sesame seeds",q:"1 tbsp"},{n:"seaweed salad",q:"50g"},{n:"pickled jalapeno",q:"for serving"}],steps:["Fry or bake wonton chips until crispy. Marinate tuna in soy sauce and sesame oil.","Arrange chips on platter. Top with marinated tuna, avocado, mango.","Drizzle sriracha mayo. Garnish with green onion, sesame seeds, seaweed salad."]},
{id:247,name:"Efo Riro",time:30,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:U+"1604329760661-e71dc83f8f26?w=600&h=400&fit=crop",ing:[{n:"spinach or amaranth greens",q:"500g"},{n:"red bell pepper",q:"3"},{n:"scotch bonnet",q:"1"},{n:"onion",q:"2"},{n:"palm oil",q:"60ml"},{n:"locust beans",q:"2 tbsp"},{n:"ground crayfish",q:"2 tbsp"},{n:"assorted meat",q:"300g, cooked"},{n:"stockfish or dried fish",q:"100g"},{n:"seasoning cubes",q:"2"}],steps:["Blend peppers and scotch bonnet. Fry in palm oil 15-20 min until oil floats.","Add locust beans, crayfish, seasoning, cooked meats. Simmer 10 min.","Add chopped spinach, cook 5 min. Do not overcook. Serve with pounded yam or rice."]},
{id:248,name:"Goulash",time:60,servings:6,diff:"Medium",tags:["gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/55155064628_16183d42da_c.jpg",ing:[{n:"beef chuck",q:"800g, cubed"},{n:"onion",q:"3, sliced"},{n:"garlic",q:"4 cloves"},{n:"Hungarian paprika",q:"3 tbsp"},{n:"caraway seeds",q:"1 tsp"},{n:"canned tomatoes",q:"400g"},{n:"beef broth",q:"500ml"},{n:"bell pepper",q:"2, diced"},{n:"potato",q:"2, cubed"},{n:"sour cream",q:"for serving"},{n:"egg noodles",q:"for serving"},{n:"olive oil",q:"3 tbsp"}],steps:["Sauté onions 10 min until soft. Add garlic, paprika, caraway 1 min.","Add beef, tomatoes, broth, peppers. Cover, simmer 60-90 min until beef is tender.","Add potatoes last 20 min. Serve over egg noodles with sour cream."]},
{id:249,name:"Shrimp Tempura",time:20,servings:4,diff:"Medium",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/55145489584_767b03d38a_c.jpg",ing:[{n:"large shrimp",q:"16, peeled, tails on"},{n:"flour",q:"100g"},{n:"cornstarch",q:"50g"},{n:"egg",q:"1"},{n:"ice water",q:"200ml"},{n:"vegetable oil",q:"for frying"},{n:"tentsuyu dipping sauce",q:"for serving"},{n:"grated daikon",q:"for serving"},{n:"grated ginger",q:"for serving"}],steps:["Make batter: mix flour, cornstarch, egg, ice water LOOSELY. Lumps are essential. Keep very cold.","Dust shrimp with flour, dip in batter. Fry at 180C 2-3 min until light and crispy.","Drain on wire rack. Serve immediately with tentsuyu, grated daikon, and ginger."]},
{id:250,name:"Cauliflower Tacos",time:20,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/55111567503_83498e7236_c.jpg",ing:[{n:"cauliflower",q:"1 head, florets"},{n:"chipotle powder",q:"1 tsp"},{n:"cumin",q:"1 tsp"},{n:"lime",q:"2"},{n:"corn tortillas",q:"8"},{n:"red cabbage",q:"150g, shredded"},{n:"avocado",q:"1"},{n:"cilantro",q:"fresh"},{n:"pickled onion",q:"for serving"},{n:"chipotle crema",q:"80ml"}],steps:["Toss cauliflower with chipotle, cumin, oil, salt. Roast 220C 20 min until charred.","Make slaw with cabbage, lime juice, salt.","Fill tortillas with roasted cauliflower, slaw, avocado, pickled onion, crema, cilantro."]},
{id:251,name:"Croissant French Toast",time:15,servings:2,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/48102208772_4051a81acb_c.jpg",ing:[{n:"croissants",q:"4, day-old, halved"},{n:"eggs",q:"3"},{n:"milk",q:"100ml"},{n:"vanilla extract",q:"1 tsp"},{n:"cinnamon",q:"1/2 tsp"},{n:"butter",q:"30g"},{n:"maple syrup",q:"for serving"},{n:"fresh berries",q:"for serving"},{n:"powdered sugar",q:"for dusting"}],steps:["Whisk eggs, milk, vanilla, cinnamon.","Dip croissant halves in mixture. Cook in butter 2-3 min per side until golden.","Serve with maple syrup, fresh berries, and dusted powdered sugar."]},
{id:252,name:"Chicken Laksa",time:30,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54199485995_f802bf4560_c.jpg",ing:[{n:"chicken thighs",q:"400g, sliced"},{n:"laksa paste",q:"4 tbsp"},{n:"coconut milk",q:"400ml"},{n:"chicken broth",q:"400ml"},{n:"rice noodles",q:"300g"},{n:"tofu puffs",q:"100g"},{n:"bean sprouts",q:"100g"},{n:"hard-boiled egg",q:"2"},{n:"laksa leaves or cilantro",q:"fresh"},{n:"lime",q:"1"},{n:"fish sauce",q:"2 tbsp"},{n:"sambal",q:"for serving"}],steps:["Fry laksa paste 2 min. Add coconut milk and broth, simmer.","Add chicken, cook 10 min. Season with fish sauce.","Cook noodles. Assemble: noodles, broth, tofu puffs, sprouts, egg, herbs, lime. Add sambal."]},
{id:253,name:"Açaí Bowl",time:10,servings:2,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/52367054756_f04e9ef7da_c.jpg",ing:[{n:"frozen açaí packets",q:"2"},{n:"frozen banana",q:"1"},{n:"frozen berries",q:"100g"},{n:"almond milk",q:"100ml"},{n:"honey or agave",q:"1 tbsp"},{n:"granola",q:"for topping"},{n:"banana",q:"1, sliced"},{n:"coconut flakes",q:"2 tbsp"},{n:"chia seeds",q:"1 tbsp"},{n:"strawberries",q:"for topping"}],steps:["Blend frozen açaí, banana, berries, almond milk, honey until thick and smooth.","Pour into bowls.","Top with granola, sliced banana, strawberries, coconut flakes, chia seeds."]},
{id:254,name:"Lamb Biryani",time:60,servings:6,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55013831189_66feca6a90_c.jpg",ing:[{n:"lamb shoulder",q:"600g, cubed"},{n:"basmati rice",q:"400g, soaked"},{n:"onion",q:"3, thinly sliced"},{n:"yogurt",q:"100g"},{n:"ginger-garlic paste",q:"3 tbsp"},{n:"biryani masala",q:"2 tbsp"},{n:"saffron",q:"large pinch, in milk"},{n:"mint",q:"fresh"},{n:"cilantro",q:"fresh"},{n:"green chili",q:"3"},{n:"ghee",q:"60g"},{n:"fried onions",q:"for garnish"}],steps:["Marinate lamb in yogurt, ginger-garlic paste, biryani masala 1 hour.","Cook lamb with spices until nearly done. Par-boil rice. Layer rice and lamb in pot.","Drizzle saffron milk, herbs, ghee. Cover tightly. Cook on very low heat 30 min. Do not open. Serve with raita."]},
{id:255,name:"Pizza Bianca",time:25,servings:4,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54930402172_284d8d0e6e_c.jpg",ing:[{n:"pizza dough",q:"400g"},{n:"ricotta",q:"200g"},{n:"mozzarella",q:"150g, torn"},{n:"garlic",q:"3 cloves, thinly sliced"},{n:"rosemary",q:"fresh"},{n:"olive oil",q:"4 tbsp"},{n:"lemon zest",q:"1 lemon"},{n:"arugula",q:"50g"},{n:"sea salt",q:"flaky"}],steps:["Stretch dough thin. Brush with olive oil, scatter garlic and rosemary.","Bake at max oven heat (250C+) 8-10 min until golden and puffed.","Top with dollops of ricotta, torn mozzarella, lemon zest, arugula, flaky salt, olive oil."]},
{id:256,name:"Grilled Octopus",time:35,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55068881440_ae5e63fd4a_c.jpg",ing:[{n:"octopus",q:"1kg, cleaned"},{n:"olive oil",q:"60ml"},{n:"lemon",q:"2"},{n:"garlic",q:"4 cloves"},{n:"smoked paprika",q:"1 tsp"},{n:"parsley",q:"fresh"},{n:"potatoes",q:"300g, boiled and sliced"},{n:"red onion",q:"1/2, sliced"},{n:"capers",q:"1 tbsp"}],steps:["Simmer octopus in water with cork or wine 45 min until tender (can use pressure cooker 15 min).","Cut into pieces. Toss with olive oil, garlic, paprika, lemon. Grill 3-4 min per side until charred.","Serve over sliced potatoes with onion, capers, parsley, extra lemon and oil."]},
{id:257,name:"Vegetable Biryani",time:45,servings:6,diff:"Medium",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/65535/54075935165_b9d4fda492_c.jpg",ing:[{n:"basmati rice",q:"400g, soaked"},{n:"mixed vegetables",q:"400g (potato, carrot, beans, peas)"},{n:"onion",q:"2, sliced"},{n:"yogurt",q:"100g"},{n:"ginger-garlic paste",q:"2 tbsp"},{n:"biryani masala",q:"2 tbsp"},{n:"saffron",q:"pinch, in milk"},{n:"mint",q:"fresh"},{n:"cilantro",q:"fresh"},{n:"ghee",q:"40g"},{n:"fried onions",q:"for garnish"},{n:"raita",q:"for serving"}],steps:["Fry onions golden. Add ginger-garlic paste, spices, vegetables. Cook 5 min. Add yogurt.","Par-boil rice. Layer rice and vegetables. Drizzle saffron milk, herbs, ghee.","Cover tightly. Cook on very low heat 25 min. Do not open. Serve with raita and fried onions."]},
{id:258,name:"BLT Sandwich",time:10,servings:2,diff:"Easy",tags:["high-protein","nut-free"],img:"https://live.staticflickr.com/65535/55109661629_f4b65a1a0c_c.jpg",ing:[{n:"thick-cut bacon",q:"8 strips"},{n:"tomato",q:"2 large, sliced"},{n:"romaine lettuce",q:"4 leaves"},{n:"sourdough bread",q:"4 slices, toasted"},{n:"mayonnaise",q:"2 tbsp"},{n:"black pepper",q:"to taste"}],steps:["Cook bacon until crispy. Toast sourdough.","Spread mayo on all slices.","Layer lettuce, tomato, bacon. Season with pepper. Close sandwich. Cut diagonally."]},
{id:259,name:"Bunny Chow",time:40,servings:4,diff:"Medium",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/47617155712_39b79da612_c.jpg",ing:[{n:"lamb or chicken",q:"500g, cubed"},{n:"onion",q:"2, diced"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"2 inch"},{n:"curry powder",q:"3 tbsp"},{n:"canned tomatoes",q:"400g"},{n:"potato",q:"2, cubed"},{n:"green chili",q:"2"},{n:"curry leaves",q:"8"},{n:"bread loaf",q:"1, unsliced"},{n:"cilantro",q:"fresh"}],steps:["Brown meat. Sauté onion, garlic, ginger, curry leaves 5 min. Add curry powder, tomatoes.","Return meat, add potato and 200ml water. Simmer covered 30 min until tender.","Hollow out bread loaf portions. Fill with curry. Serve with the bread lid on top."]},
{id:260,name:"Pasta alla Norma",time:25,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free"],img:"https://live.staticflickr.com/65535/54576821885_f425a03f04_c.jpg",ing:[{n:"rigatoni",q:"400g"},{n:"eggplant",q:"2, cubed"},{n:"canned tomatoes",q:"400g"},{n:"garlic",q:"4 cloves"},{n:"basil",q:"large bunch"},{n:"ricotta salata or parmesan",q:"60g, grated"},{n:"olive oil",q:"80ml"},{n:"red pepper flakes",q:"1/2 tsp"}],steps:["Fry eggplant cubes in olive oil until golden. Drain on paper towels.","Make sauce: sauté garlic and pepper flakes, add tomatoes, simmer 10 min. Add basil.","Cook rigatoni. Toss with sauce and eggplant. Top with grated ricotta salata."]},
{id:261,name:"Chicken Fried Rice",time:15,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/55128059486_8e75922059_c.jpg",ing:[{n:"cooked jasmine rice",q:"400g, day-old"},{n:"chicken breast",q:"200g, diced"},{n:"egg",q:"2"},{n:"garlic",q:"3 cloves"},{n:"green onion",q:"3"},{n:"peas",q:"80g"},{n:"carrot",q:"1, diced"},{n:"soy sauce",q:"3 tbsp"},{n:"oyster sauce",q:"1 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"white pepper",q:"pinch"}],steps:["Stir-fry chicken in hot wok 3 min. Add garlic, carrot, peas 2 min.","Push aside, scramble eggs. Add rice, soy sauce, oyster sauce. Toss over high heat 3 min.","Finish with sesame oil, white pepper, green onion."]},
{id:262,name:"Cannoli",time:40,servings:12,diff:"Medium",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/55146542367_b1a317d58f_c.jpg",ing:[{n:"ricotta",q:"500g, drained overnight"},{n:"powdered sugar",q:"100g"},{n:"vanilla extract",q:"1 tsp"},{n:"mini chocolate chips",q:"60g"},{n:"candied citrus peel",q:"30g, diced"},{n:"cannoli shells",q:"12"},{n:"pistachios",q:"30g, chopped"},{n:"orange zest",q:"1 orange"}],steps:["Mix drained ricotta with powdered sugar, vanilla, orange zest. Fold in chocolate chips and citrus peel.","Chill filling 1 hour for best consistency.","Fill cannoli shells just before serving. Dip ends in chopped pistachios or chocolate chips."]},
{id:263,name:"Chicken Katsu Salad",time:20,servings:2,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/52941768930_0c11802a54_c.jpg",ing:[{n:"chicken breast",q:"2, pounded thin"},{n:"panko breadcrumbs",q:"100g"},{n:"egg",q:"1"},{n:"flour",q:"40g"},{n:"mixed greens",q:"150g"},{n:"avocado",q:"1"},{n:"edamame",q:"80g"},{n:"carrot",q:"1, julienned"},{n:"cucumber",q:"1/2, sliced"},{n:"sesame dressing",q:"3 tbsp"},{n:"sesame seeds",q:"1 tbsp"}],steps:["Bread chicken in flour, egg, panko. Deep fry 5 min until golden. Slice.","Arrange greens, avocado, edamame, carrot, cucumber in bowls.","Top with sliced katsu. Drizzle sesame dressing and sesame seeds."]},
{id:264,name:"Jamaican Jerk Pork",time:120,servings:6,diff:"Medium",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/3753/33328700116_cfcd607a8a_c.jpg",ing:[{n:"pork shoulder",q:"1kg"},{n:"scotch bonnet",q:"3"},{n:"allspice",q:"2 tbsp"},{n:"thyme",q:"2 tbsp"},{n:"garlic",q:"6 cloves"},{n:"ginger",q:"2 inch"},{n:"soy sauce",q:"3 tbsp"},{n:"lime",q:"2"},{n:"brown sugar",q:"2 tbsp"},{n:"green onion",q:"6"},{n:"cinnamon",q:"1/2 tsp"},{n:"rice and peas",q:"for serving"}],steps:["Blend all jerk ingredients into paste. Score pork deeply, rub paste all over.","Marinate 12-24 hours. Slow roast at 150C for 3 hours, or grill over pimento wood.","Slice or pull. Serve with rice and peas, festival bread, and extra lime."]},
{id:265,name:"Ravioli with Brown Butter and Sage",time:20,servings:4,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/8465/8097126894_24ff793b6d_c.jpg",ing:[{n:"ricotta-filled ravioli",q:"500g"},{n:"butter",q:"80g"},{n:"fresh sage",q:"20 leaves"},{n:"parmesan",q:"50g, grated"},{n:"lemon juice",q:"1 tbsp"},{n:"pine nuts",q:"30g, toasted"},{n:"salt and pepper",q:"to taste"}],steps:["Cook ravioli in salted water until they float. Reserve pasta water.","Cook butter until golden brown and nutty. Add sage leaves, they will crisp.","Toss ravioli in brown butter with lemon juice. Serve with parmesan and pine nuts."]},
{id:266,name:"Kedgeree",time:30,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54875699343_3f9cd34231_c.jpg",ing:[{n:"smoked haddock",q:"400g"},{n:"basmati rice",q:"250g"},{n:"eggs",q:"4, hard-boiled"},{n:"onion",q:"1, diced"},{n:"curry powder",q:"2 tsp"},{n:"turmeric",q:"1/2 tsp"},{n:"butter",q:"30g"},{n:"cream",q:"60ml"},{n:"parsley",q:"fresh"},{n:"lemon",q:"1"},{n:"cayenne",q:"pinch"}],steps:["Poach haddock in milk 8 min. Flake, reserve liquid. Cook rice.","Sauté onion in butter. Add curry powder, turmeric. Add rice, flaked fish, reserved liquid.","Fold in cream, halved eggs, parsley, lemon juice. Sprinkle cayenne."]},
{id:267,name:"Potato and Leek Soup",time:30,servings:6,diff:"Easy",tags:["gluten-free","nut-free"],img:"https://live.staticflickr.com/3854/15010202058_8f7d6ca342_c.jpg",ing:[{n:"leeks",q:"3, sliced"},{n:"potatoes",q:"600g, cubed"},{n:"onion",q:"1, diced"},{n:"garlic",q:"2 cloves"},{n:"chicken broth",q:"1L"},{n:"heavy cream",q:"100ml"},{n:"butter",q:"30g"},{n:"thyme",q:"fresh"},{n:"chives",q:"for garnish"},{n:"crispy bacon",q:"for garnish"}],steps:["Sauté leeks and onion in butter 8 min. Add garlic, potatoes, broth, thyme.","Simmer 15 min until potatoes are tender.","Blend until smooth. Stir in cream. Serve topped with chives and crispy bacon bits."]},
{id:268,name:"Steamed Fish with Ginger and Scallions",time:20,servings:2,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54612722378_52cbcd7567_c.jpg",ing:[{n:"whole sea bass or snapper",q:"1 (600g)"},{n:"ginger",q:"3 inch, julienned"},{n:"green onion",q:"4"},{n:"soy sauce",q:"3 tbsp"},{n:"Shaoxing wine",q:"1 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"sugar",q:"1/2 tsp"},{n:"cilantro",q:"fresh"},{n:"vegetable oil",q:"2 tbsp"},{n:"rice",q:"for serving"}],steps:["Score fish. Place on plate with half the ginger. Steam 10-12 min until flesh flakes.","Pour off liquid. Top with remaining ginger, green onion, cilantro.","Heat oil until smoking, pour over fish. Drizzle soy sauce mixed with sugar and sesame oil. Serve with rice."]},
{id:269,name:"Breakfast Burrito",time:15,servings:2,diff:"Easy",tags:["high-protein","nut-free"],img:"https://live.staticflickr.com/65535/55021625881_f336855d1c_c.jpg",ing:[{n:"flour tortillas",q:"2 large"},{n:"eggs",q:"4, scrambled"},{n:"chorizo or bacon",q:"100g"},{n:"cheddar cheese",q:"80g, shredded"},{n:"black beans",q:"100g"},{n:"avocado",q:"1/2"},{n:"salsa",q:"3 tbsp"},{n:"sour cream",q:"2 tbsp"},{n:"hot sauce",q:"to taste"}],steps:["Cook chorizo or bacon. Scramble eggs softly. Warm beans.","Warm tortillas. Layer beans, scrambled eggs, meat, cheese, avocado.","Add salsa and sour cream. Roll into tight burritos. Optional: griddle seam-side down."]},
{id:270,name:"Apple Crumble",time:40,servings:6,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/55094217108_7772f08e84_c.jpg",ing:[{n:"apples",q:"6 large, peeled and sliced"},{n:"sugar",q:"80g"},{n:"cinnamon",q:"1 tsp"},{n:"lemon juice",q:"1 tbsp"},{n:"flour",q:"120g"},{n:"oats",q:"60g"},{n:"brown sugar",q:"80g"},{n:"butter",q:"100g, cold and cubed"},{n:"vanilla ice cream",q:"for serving"}],steps:["Toss apple slices with sugar, cinnamon, lemon juice. Place in baking dish.","Rub flour, oats, brown sugar, and cold butter together until crumbly. Scatter over apples.","Bake 190C 30-35 min until golden and bubbling. Serve warm with vanilla ice cream."]},
{id:271,name:"Mujaddara",time:30,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/51505146131_81b8463701_c.jpg",ing:[{n:"green or brown lentils",q:"200g"},{n:"basmati rice",q:"200g"},{n:"onion",q:"3, thinly sliced"},{n:"cumin",q:"1 tsp"},{n:"cinnamon",q:"1/2 tsp"},{n:"allspice",q:"1/4 tsp"},{n:"olive oil",q:"80ml"},{n:"yogurt",q:"for serving"},{n:"parsley",q:"fresh"}],steps:["Cook lentils 15 min until almost done. Fry 2 onions in oil until deeply caramelized, 15-20 min.","Add rice, remaining onion, spices to lentils with proper water ratio. Cook covered 15 min.","Top with crispy fried onions, parsley, and yogurt."]},
{id:272,name:"Pan-Seared Scallops",time:15,servings:2,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54529152876_0665375642_c.jpg",ing:[{n:"large sea scallops",q:"8-10"},{n:"butter",q:"30g"},{n:"garlic",q:"2 cloves"},{n:"lemon",q:"1"},{n:"capers",q:"1 tbsp"},{n:"olive oil",q:"1 tbsp"},{n:"thyme",q:"fresh"},{n:"cauliflower puree or pea puree",q:"for serving"},{n:"microgreens",q:"for garnish"}],steps:["Pat scallops very dry. Season with salt and pepper. Heat oil in pan until smoking.","Sear scallops 2 min per side without moving. Add butter, garlic, thyme. Baste 30 sec.","Add capers and lemon juice. Serve on puree with pan sauce and microgreens."]},
{id:273,name:"Grilled Cheese & Tomato Soup",time:20,servings:2,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54530765787_fcd9f19525_c.jpg",ing:[{n:"sourdough bread",q:"4 slices"},{n:"cheddar cheese",q:"100g, sliced"},{n:"gruyere cheese",q:"60g, shredded"},{n:"butter",q:"30g"},{n:"tomato soup",q:"from recipe 15 or canned"},{n:"mayonnaise",q:"1 tbsp"}],steps:["Spread outside of bread with butter or mayo for extra crispiness.","Fill with cheddar and gruyere. Cook in pan on medium 3-4 min per side until golden and gooey.","Cut diagonally. Serve alongside hot tomato soup for dunking."]},
{id:274,name:"Thai Pineapple Fried Rice",time:15,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:U+"1565700549719-8c02187f3f0f?w=600&h=400&fit=crop",ing:[{n:"cooked jasmine rice",q:"400g, day-old"},{n:"shrimp",q:"200g"},{n:"pineapple",q:"150g, cubed"},{n:"cashews",q:"40g"},{n:"egg",q:"1"},{n:"curry powder",q:"1 tsp"},{n:"soy sauce",q:"2 tbsp"},{n:"fish sauce",q:"1 tbsp"},{n:"raisins",q:"2 tbsp"},{n:"green onion",q:"3"},{n:"cilantro",q:"fresh"}],steps:["Stir-fry shrimp 2 min, remove. Scramble egg, set aside.","Add rice, curry powder, soy sauce, fish sauce. Toss over high heat 2 min.","Add pineapple, cashews, raisins, shrimp, egg. Toss. Garnish with green onion and cilantro."]},
{id:275,name:"Bolognese al Forno",time:50,servings:6,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/50257623016_05e0716217_c.jpg",ing:[{n:"rigatoni",q:"400g"},{n:"bolognese sauce",q:"500g (from recipe 3)"},{n:"ricotta",q:"250g"},{n:"mozzarella",q:"200g, shredded"},{n:"parmesan",q:"60g"},{n:"egg",q:"1"},{n:"basil",q:"fresh"}],steps:["Cook rigatoni al dente. Mix ricotta with egg and half the parmesan.","Layer in baking dish: sauce, pasta, ricotta mixture, mozzarella. Repeat.","Top with remaining cheese. Bake 190C 25 min until bubbly and golden. Rest 10 min."]},
{id:276,name:"Beef Pho",time:45,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55095529754_bee7690e3c_c.jpg",ing:[{n:"beef sirloin",q:"200g, thinly sliced"},{n:"beef brisket",q:"300g"},{n:"rice noodles",q:"400g"},{n:"star anise",q:"3"},{n:"cinnamon stick",q:"1"},{n:"onion",q:"1, charred"},{n:"ginger",q:"3 inch, charred"},{n:"fish sauce",q:"3 tbsp"},{n:"sugar",q:"1 tsp"},{n:"bean sprouts",q:"100g"},{n:"Thai basil",q:"fresh"},{n:"lime",q:"2"},{n:"hoisin sauce",q:"for serving"},{n:"sriracha",q:"for serving"}],steps:["Simmer brisket with charred onion, ginger, star anise, cinnamon in 2L water 30 min. Strain.","Season broth with fish sauce, sugar. Slice brisket thin. Cook noodles.","Place noodles in bowls, top with brisket and raw sirloin. Ladle boiling broth over. Serve with herbs, sprouts, lime."]},
{id:277,name:"Wagyu Beef Tartare",time:15,servings:2,diff:"Hard",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/8868/18531015476_cd349cc441_c.jpg",ing:[{n:"wagyu or beef tenderloin",q:"300g, hand-chopped"},{n:"shallot",q:"1, finely minced"},{n:"capers",q:"1 tbsp, chopped"},{n:"cornichons",q:"2 tbsp, chopped"},{n:"Dijon mustard",q:"1 tsp"},{n:"egg yolk",q:"2"},{n:"Worcestershire sauce",q:"1 tsp"},{n:"Tabasco",q:"few drops"},{n:"olive oil",q:"2 tbsp"},{n:"toast points",q:"for serving"},{n:"microgreens",q:"for garnish"}],steps:["Hand-chop beef into small cubes (never machine grind). Keep very cold.","Gently mix beef with shallot, capers, cornichons, mustard, Worcestershire, Tabasco, olive oil, salt.","Plate with ring mold. Top with egg yolk, microgreens. Serve with toast points."]},
{id:278,name:"Shakshuka Pizza",time:25,servings:2,diff:"Medium",tags:["vegetarian"],img:"https://live.staticflickr.com/1778/42099963540_6252a8a35e_c.jpg",ing:[{n:"pizza dough",q:"300g"},{n:"canned tomatoes",q:"200g, crushed"},{n:"eggs",q:"3"},{n:"feta",q:"50g, crumbled"},{n:"garlic",q:"2 cloves"},{n:"cumin",q:"1/2 tsp"},{n:"red pepper flakes",q:"1/2 tsp"},{n:"mozzarella",q:"100g"},{n:"basil or cilantro",q:"fresh"},{n:"olive oil",q:"2 tbsp"}],steps:["Spread dough. Top with crushed tomatoes seasoned with garlic, cumin, pepper flakes.","Add mozzarella. Make 3 wells, crack eggs in.","Bake at max oven heat 10-12 min until crust is charred and eggs just set. Top with feta and herbs."]},
{id:279,name:"Congee with Century Egg",time:30,servings:2,diff:"Easy",tags:["dairy-free","gluten-free"],img:"https://live.staticflickr.com/65535/53626195277_3a3b16cc59_c.jpg",ing:[{n:"jasmine rice",q:"100g"},{n:"chicken broth",q:"1L"},{n:"century egg",q:"2, cubed"},{n:"ginger",q:"2 inch, sliced"},{n:"green onion",q:"3"},{n:"soy sauce",q:"1 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"white pepper",q:"to taste"},{n:"fried dough sticks",q:"for serving"},{n:"pork floss",q:"optional"}],steps:["Rinse rice. Simmer with broth and ginger 25-30 min, stirring occasionally until porridge consistency.","Season with soy sauce, white pepper.","Serve topped with cubed century egg, green onion, sesame oil, pork floss, fried dough sticks."]},
{id:280,name:"Biscuits and Gravy",time:25,servings:4,diff:"Easy",tags:["high-protein","nut-free"],img:"https://live.staticflickr.com/65535/54535061416_53bf9e3e7e_c.jpg",ing:[{n:"flour",q:"300g"},{n:"baking powder",q:"2 tsp"},{n:"butter",q:"80g, cold"},{n:"buttermilk",q:"200ml"},{n:"pork sausage",q:"400g"},{n:"flour for gravy",q:"3 tbsp"},{n:"milk",q:"500ml"},{n:"sage",q:"1/2 tsp"},{n:"black pepper",q:"1 tsp"},{n:"salt",q:"to taste"}],steps:["Cut cold butter into flour, baking powder, salt. Add buttermilk, mix until just combined. Bake at 220C 12-15 min.","Brown sausage, crumble. Add flour, cook 1 min. Whisk in milk. Simmer until thick. Season with sage, pepper.","Split biscuits, ladle sausage gravy generously over. Serve with hot sauce."]},
{id:281,name:"Chicken Paprikash",time:35,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55075403313_87e7b952a2_c.jpg",ing:[{n:"chicken thighs",q:"6, bone-in"},{n:"onion",q:"2, diced"},{n:"garlic",q:"3 cloves"},{n:"Hungarian paprika",q:"3 tbsp"},{n:"sour cream",q:"200g"},{n:"chicken broth",q:"200ml"},{n:"tomato",q:"1, diced"},{n:"butter",q:"30g"},{n:"flour",q:"1 tbsp"},{n:"egg noodles",q:"for serving"}],steps:["Brown chicken in butter. Remove. Sauté onions 8 min. Add garlic, paprika, tomato.","Return chicken. Add broth. Cover, simmer 25 min.","Remove chicken. Stir flour into sauce, then sour cream off heat. Serve chicken and sauce over egg noodles."]},
{id:282,name:"Cinnamon Rolls",time:90,servings:12,diff:"Medium",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/55154114306_943ea7572d_c.jpg",ing:[{n:"flour",q:"400g"},{n:"milk",q:"180ml, warm"},{n:"yeast",q:"7g"},{n:"sugar",q:"60g"},{n:"butter",q:"60g, softened"},{n:"egg",q:"1"},{n:"cinnamon",q:"2 tbsp"},{n:"brown sugar",q:"100g"},{n:"cream cheese",q:"100g"},{n:"powdered sugar",q:"80g"},{n:"vanilla",q:"1 tsp"}],steps:["Mix dough, knead 8 min. Rise 1 hour. Roll into rectangle.","Spread softened butter, brown sugar, cinnamon. Roll tightly. Slice into 12 rolls. Rise 30 min.","Bake 180C 22-25 min. Make glaze: cream cheese, powdered sugar, vanilla. Spread over warm rolls."]},
{id:283,name:"Pasta e Ceci",time:25,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","nut-free"],img:"https://live.staticflickr.com/8239/8535949222_855ac14fe1_c.jpg",ing:[{n:"chickpeas",q:"2 cans"},{n:"ditalini pasta",q:"150g"},{n:"canned tomatoes",q:"200g"},{n:"garlic",q:"4 cloves"},{n:"rosemary",q:"2 sprigs"},{n:"red pepper flakes",q:"1/2 tsp"},{n:"olive oil",q:"4 tbsp"},{n:"parmesan rind",q:"1 optional"},{n:"black pepper",q:"to taste"}],steps:["Sauté garlic and rosemary in olive oil. Add pepper flakes, tomatoes.","Add chickpeas with liquid. Mash half. Add water to thin. Simmer 10 min.","Add pasta, cook in the soup until al dente. Drizzle with good olive oil and pepper."]},
{id:284,name:"Beef Kebabs",time:20,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54612816160_ae0e97155e_c.jpg",ing:[{n:"beef sirloin",q:"600g, cubed"},{n:"bell pepper",q:"2, chunked"},{n:"red onion",q:"2, chunked"},{n:"cherry tomatoes",q:"12"},{n:"olive oil",q:"3 tbsp"},{n:"garlic",q:"3 cloves"},{n:"cumin",q:"1 tsp"},{n:"paprika",q:"1 tsp"},{n:"oregano",q:"1 tsp"},{n:"lemon",q:"1"},{n:"yogurt sauce",q:"for serving"},{n:"rice",q:"for serving"}],steps:["Marinate beef in oil, garlic, cumin, paprika, oregano, lemon 30 min.","Thread onto skewers alternating with vegetables.","Grill 10-12 min, turning occasionally. Serve with rice and yogurt sauce."]},
{id:285,name:"Dutch Baby Pancake",time:20,servings:2,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54998896885_5beb0ed9dc_c.jpg",ing:[{n:"eggs",q:"3"},{n:"flour",q:"80g"},{n:"milk",q:"100ml"},{n:"butter",q:"30g"},{n:"vanilla extract",q:"1 tsp"},{n:"salt",q:"pinch"},{n:"lemon",q:"1"},{n:"powdered sugar",q:"for dusting"},{n:"fresh berries",q:"for serving"}],steps:["Preheat oven to 220C with cast iron skillet inside. Blend eggs, flour, milk, vanilla, salt.","Melt butter in hot skillet, pour in batter immediately.","Bake 15-18 min until puffed and golden. Squeeze lemon, dust powdered sugar, add berries. Serve immediately."]},
{id:286,name:"Lamb Shoulder Slow Roast",time:240,servings:6,diff:"Easy",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/54534205747_39086f70c2_c.jpg",ing:[{n:"lamb shoulder",q:"2kg, bone-in"},{n:"garlic",q:"8 cloves"},{n:"rosemary",q:"4 sprigs"},{n:"anchovy fillets",q:"4"},{n:"olive oil",q:"3 tbsp"},{n:"white wine",q:"200ml"},{n:"lemon",q:"1"},{n:"potatoes",q:"500g"},{n:"onion",q:"2, quartered"}],steps:["Make incisions in lamb, insert garlic slivers and anchovy pieces.","Place lamb on potatoes and onions. Pour wine around. Rub with oil and rosemary. Season.","Cover tightly. Roast at 160C for 4 hours until falling-off-bone tender. Uncover last 30 min for browning."]},
{id:287,name:"Mango Lassi",time:5,servings:2,diff:"Easy",tags:["vegetarian","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/54833291926_ef2b058ea5_c.jpg",ing:[{n:"mango",q:"2, ripe (or 200g frozen)"},{n:"yogurt",q:"200g"},{n:"milk",q:"100ml"},{n:"sugar",q:"2 tbsp"},{n:"cardamom",q:"1/4 tsp, ground"},{n:"ice",q:"handful"},{n:"saffron",q:"pinch, optional"}],steps:["Blend mango, yogurt, milk, sugar, cardamom, ice until smooth.","Taste and adjust sweetness.","Pour into tall glasses. Garnish with saffron strands or a pinch of cardamom."]},
{id:288,name:"Claypot Rice",time:35,servings:3,diff:"Medium",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/55084148923_bf7acc4d97_c.jpg",ing:[{n:"jasmine rice",q:"250g"},{n:"Chinese sausage",q:"2, sliced"},{n:"chicken thigh",q:"200g, sliced"},{n:"ginger",q:"3 slices"},{n:"soy sauce",q:"3 tbsp"},{n:"dark soy sauce",q:"1 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"sugar",q:"1 tsp"},{n:"green onion",q:"3"},{n:"bok choy",q:"2 heads"}],steps:["Wash rice, place in clay pot with water and ginger. Bring to boil, reduce to low.","When rice is nearly done, add sausage and chicken on top. Cover, cook 10 min on low.","Drizzle soy sauce mixture around edges for crispy rice. Add blanched bok choy, green onion. Cover 3 min."]},
{id:289,name:"Bucatini all'Amatriciana",time:25,servings:4,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/52180972847_bfc02bff60_c.jpg",ing:[{n:"bucatini",q:"400g"},{n:"guanciale",q:"150g, cubed"},{n:"canned San Marzano tomatoes",q:"400g"},{n:"pecorino romano",q:"60g, grated"},{n:"red pepper flakes",q:"1/2 tsp"},{n:"dry white wine",q:"60ml"},{n:"black pepper",q:"to taste"}],steps:["Cook guanciale in dry pan until fat renders and meat is crispy. Remove.","Add pepper flakes, wine. Add tomatoes, crush. Simmer 15 min.","Cook bucatini. Toss with sauce, guanciale, and pecorino. Season with pepper."]},
{id:290,name:"Peri Peri Chicken",time:40,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/54878243260_fef08905bf_c.jpg",ing:[{n:"chicken",q:"1.5kg, spatchcocked"},{n:"red chili",q:"6"},{n:"red bell pepper",q:"2"},{n:"garlic",q:"6 cloves"},{n:"lemon",q:"2"},{n:"smoked paprika",q:"2 tsp"},{n:"oregano",q:"1 tsp"},{n:"olive oil",q:"60ml"},{n:"red wine vinegar",q:"3 tbsp"},{n:"rice",q:"for serving"},{n:"grilled corn",q:"for serving"}],steps:["Blend chilies, roasted peppers, garlic, lemon juice, paprika, oregano, oil, vinegar into sauce.","Marinate chicken in half the sauce 2 hours minimum.","Grill or roast at 200C 35-40 min until charred and cooked through. Serve with remaining sauce, rice, corn."]},
{id:291,name:"Grilled Vegetable Sandwich",time:15,servings:2,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54955362654_bf07da0a73_c.jpg",ing:[{n:"ciabatta",q:"2, split"},{n:"zucchini",q:"1, sliced"},{n:"eggplant",q:"1, sliced"},{n:"bell pepper",q:"1, quartered"},{n:"fresh mozzarella",q:"100g"},{n:"basil pesto",q:"3 tbsp"},{n:"balsamic glaze",q:"for drizzle"},{n:"arugula",q:"handful"},{n:"olive oil",q:"2 tbsp"}],steps:["Brush vegetables with olive oil, season. Grill 3-4 min per side until charred and tender.","Toast ciabatta. Spread with pesto.","Layer grilled vegetables, mozzarella, arugula. Drizzle balsamic glaze. Close sandwich."]},
{id:292,name:"Chicken Biryani",time:50,servings:6,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55152822733_9d3a47be53_c.jpg",ing:[{n:"chicken thighs",q:"600g, cubed"},{n:"basmati rice",q:"400g, soaked"},{n:"onion",q:"3, sliced"},{n:"yogurt",q:"150g"},{n:"ginger-garlic paste",q:"3 tbsp"},{n:"biryani masala",q:"2 tbsp"},{n:"saffron",q:"pinch, in 50ml warm milk"},{n:"mint",q:"fresh"},{n:"cilantro",q:"fresh"},{n:"green chili",q:"3"},{n:"ghee",q:"50g"},{n:"fried onions",q:"for garnish"},{n:"raita",q:"for serving"}],steps:["Marinate chicken in yogurt, ginger-garlic, spices 1 hour. Cook until half done with fried onions.","Par-boil rice. Layer rice over chicken. Drizzle saffron milk, herbs, ghee.","Seal pot tightly. Cook on very low heat 25-30 min. Do not open lid. Serve with raita."]},
{id:293,name:"Key Lime Pie",time:30,servings:8,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/55014715855_dc80c27e34_c.jpg",ing:[{n:"sweetened condensed milk",q:"400g"},{n:"lime juice",q:"150ml (key lime or regular)"},{n:"lime zest",q:"2 limes"},{n:"egg yolks",q:"4"},{n:"graham cracker crust",q:"1 pre-made or make your own"},{n:"whipped cream",q:"for topping"},{n:"lime slices",q:"for garnish"}],steps:["Whisk condensed milk, lime juice, lime zest, and egg yolks until smooth and thick.","Pour into crust. Bake 175C 15 min until just set. Cool, then refrigerate 4 hours.","Top with whipped cream and lime slices before serving."]},
{id:294,name:"Agedashi Tofu",time:20,servings:2,diff:"Medium",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/53890916277_9e9708860d_c.jpg",ing:[{n:"silken tofu",q:"400g"},{n:"cornstarch",q:"for coating"},{n:"dashi broth",q:"200ml"},{n:"soy sauce",q:"2 tbsp"},{n:"mirin",q:"2 tbsp"},{n:"grated daikon",q:"for serving"},{n:"grated ginger",q:"for serving"},{n:"green onion",q:"2"},{n:"bonito flakes",q:"for topping"},{n:"vegetable oil",q:"for frying"}],steps:["Cut tofu into blocks. Pat very dry. Coat lightly in cornstarch.","Deep fry at 180C 3-4 min until golden crust. Drain.","Heat dashi, soy sauce, mirin. Place tofu in bowls, pour broth over. Top with daikon, ginger, green onion, bonito."]},
{id:295,name:"Baked Salmon with Dill",time:20,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/7584/27545083000_30e7e9e434_c.jpg",ing:[{n:"salmon fillets",q:"4"},{n:"Dijon mustard",q:"2 tbsp"},{n:"honey",q:"1 tbsp"},{n:"fresh dill",q:"3 tbsp, chopped"},{n:"lemon",q:"1"},{n:"garlic",q:"2 cloves, minced"},{n:"olive oil",q:"1 tbsp"},{n:"asparagus",q:"200g"},{n:"salt and pepper",q:"to taste"}],steps:["Mix mustard, honey, dill, garlic, lemon juice. Spread over salmon.","Arrange salmon and asparagus on sheet pan. Drizzle asparagus with oil, season.","Bake 200C 12-15 min until salmon is flaky. Squeeze extra lemon to serve."]},
{id:296,name:"Chicken Saag",time:30,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/52289665061_dc7c9c832e_c.jpg",ing:[{n:"chicken thighs",q:"600g, cubed"},{n:"spinach",q:"400g"},{n:"onion",q:"1"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"1 inch"},{n:"green chili",q:"2"},{n:"garam masala",q:"2 tsp"},{n:"cumin",q:"1 tsp"},{n:"heavy cream",q:"60ml"},{n:"butter",q:"30g"},{n:"rice",q:"for serving"}],steps:["Blanch spinach, blend with green chili into paste.","Sauté onion, garlic, ginger in butter. Add spices, chicken. Cook 8 min.","Add spinach paste, cream. Simmer 10 min. Serve over rice."]},
{id:297,name:"Hawaiian Poke Bowl",time:15,servings:2,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:U+"1765751077345-4dbeb15244c4?w=600&h=400&fit=crop",ing:[{n:"sushi-grade ahi tuna",q:"300g, cubed"},{n:"sushi rice",q:"250g"},{n:"soy sauce",q:"3 tbsp"},{n:"sesame oil",q:"1 tbsp"},{n:"avocado",q:"1"},{n:"cucumber",q:"1"},{n:"seaweed salad",q:"50g"},{n:"edamame",q:"80g"},{n:"mango",q:"1/2"},{n:"macadamia nuts",q:"2 tbsp, chopped"},{n:"furikake",q:"for garnish"}],steps:["Season rice with vinegar. Marinate tuna in soy and sesame oil.","Build bowls: rice, marinated tuna, avocado, cucumber, seaweed salad, edamame, mango.","Top with macadamia nuts and furikake."]},
{id:298,name:"Toad in the Hole",time:40,servings:4,diff:"Easy",tags:["high-protein","nut-free"],img:"https://live.staticflickr.com/65535/52426452696_95b1f97079_c.jpg",ing:[{n:"pork sausages",q:"8"},{n:"flour",q:"120g"},{n:"eggs",q:"3"},{n:"milk",q:"200ml"},{n:"onion gravy",q:"for serving"},{n:"vegetable oil",q:"3 tbsp"},{n:"salt",q:"pinch"}],steps:["Make batter: whisk flour, eggs, milk, salt until smooth. Rest 30 min.","Heat oil and sausages in roasting tin at 220C 10 min until sizzling.","Pour batter around sausages. Bake 25-30 min until puffed and golden. Serve with onion gravy."]},
{id:299,name:"Mango Chicken Curry",time:30,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54520878757_66c84e9471_c.jpg",ing:[{n:"chicken thighs",q:"600g, cubed"},{n:"ripe mango",q:"2 or 1 can mango puree"},{n:"coconut milk",q:"200ml"},{n:"red curry paste",q:"2 tbsp"},{n:"onion",q:"1"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"fish sauce",q:"1 tbsp"},{n:"lime",q:"1"},{n:"basil",q:"fresh"},{n:"rice",q:"for serving"}],steps:["Fry curry paste with onion, garlic, ginger 3 min. Add chicken, cook 5 min.","Add coconut milk and mango puree. Simmer 15 min.","Season with fish sauce, lime. Garnish with basil. Serve over rice."]},
{id:300,name:"Lemon Bars",time:35,servings:12,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/55139591128_8be5727e59_c.jpg",ing:[{n:"butter",q:"120g, cold"},{n:"flour",q:"180g"},{n:"powdered sugar",q:"60g plus more for dusting"},{n:"eggs",q:"4"},{n:"sugar",q:"200g"},{n:"lemon juice",q:"120ml"},{n:"lemon zest",q:"2 lemons"},{n:"baking powder",q:"1/2 tsp"},{n:"salt",q:"pinch"}],steps:["Make crust: pulse butter, 150g flour, powdered sugar. Press into lined pan. Bake 180C 15 min.","Whisk eggs, sugar, lemon juice, zest, remaining flour, baking powder.","Pour over hot crust. Bake 20 min more until set. Cool completely. Dust with powdered sugar. Cut into bars."]},
{id:301,name:"Miso Soup",time:10,servings:4,diff:"Easy",tags:["dairy-free","gluten-free"],img:"https://live.staticflickr.com/65535/55151231887_c69844a051_c.jpg",ing:[{n:"dashi broth",q:"800ml"},{n:"white miso paste",q:"4 tbsp"},{n:"silken tofu",q:"200g, cubed"},{n:"wakame seaweed",q:"2 tbsp, dried"},{n:"green onion",q:"3, sliced"},{n:"enoki mushrooms",q:"50g"}],steps:["Bring dashi to gentle simmer. Do not boil.","Dissolve miso paste in a ladle of broth, then stir back into pot.","Add tofu, rehydrated wakame, mushrooms. Warm 2 min. Serve with green onion."]},
{id:302,name:"Chicken Pot Stickers",time:30,servings:24,diff:"Medium",tags:["dairy-free"],img:"https://live.staticflickr.com/626/20713865226_c4d1c07c38_c.jpg",ing:[{n:"ground chicken",q:"300g"},{n:"cabbage",q:"150g, finely chopped"},{n:"ginger",q:"1 tbsp, grated"},{n:"garlic",q:"2 cloves"},{n:"soy sauce",q:"2 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"green onion",q:"3"},{n:"dumpling wrappers",q:"24"},{n:"rice vinegar",q:"2 tbsp"},{n:"chili oil",q:"for dipping"},{n:"vegetable oil",q:"2 tbsp"}],steps:["Mix chicken, cabbage, ginger, garlic, soy sauce, sesame oil, green onion.","Place filling in wrappers, fold into half-moons, pleat edges.","Pan-fry in oil 2 min until golden. Add 60ml water, cover, steam 5 min. Serve with soy-vinegar-chili dipping sauce."]},
{id:303,name:"Watermelon Gazpacho",time:10,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/54688289970_af9aa925d3_c.jpg",ing:[{n:"watermelon",q:"500g, cubed"},{n:"cucumber",q:"1"},{n:"red bell pepper",q:"1"},{n:"red onion",q:"1/4"},{n:"lime",q:"2, juiced"},{n:"jalapeño",q:"1"},{n:"mint",q:"fresh"},{n:"olive oil",q:"2 tbsp"},{n:"salt",q:"to taste"}],steps:["Blend watermelon, cucumber, pepper, onion, jalapeño, lime juice until smooth.","Season with salt. Chill at least 1 hour.","Serve cold with fresh mint, olive oil drizzle, and diced cucumber."]},
{id:304,name:"Yakitori",time:20,servings:4,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/55139672769_29980aeddd_c.jpg",ing:[{n:"chicken thighs",q:"600g, cubed"},{n:"green onion",q:"6, cut into 3cm pieces"},{n:"soy sauce",q:"80ml"},{n:"mirin",q:"80ml"},{n:"sake",q:"2 tbsp"},{n:"sugar",q:"2 tbsp"},{n:"shichimi togarashi",q:"for serving"}],steps:["Make tare sauce: simmer soy sauce, mirin, sake, sugar until syrupy.","Thread chicken and green onion alternately on skewers.","Grill 3-4 min per side, basting with tare sauce. Sprinkle with shichimi."]},
{id:305,name:"Cacio e Uova",time:15,servings:4,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/7450/9117894506_edb02edd44_c.jpg",ing:[{n:"rigatoni",q:"400g"},{n:"eggs",q:"4"},{n:"pecorino romano",q:"100g, grated"},{n:"black pepper",q:"1 tsp"},{n:"peas",q:"100g, optional"},{n:"butter",q:"20g"}],steps:["Cook rigatoni. Reserve 200ml pasta water.","Whisk eggs with pecorino and pepper.","Toss hot pasta with butter, peas, then egg mixture off heat, adding pasta water for creaminess."]},
{id:306,name:"Berbere Lentil Stew",time:35,servings:6,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:U+"1541518763669-27fef04b14ea?w=600&h=400&fit=crop",ing:[{n:"red lentils",q:"300g"},{n:"onion",q:"2, diced"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"2 inch"},{n:"berbere spice",q:"3 tbsp"},{n:"canned tomatoes",q:"400g"},{n:"vegetable broth",q:"750ml"},{n:"olive oil",q:"3 tbsp"},{n:"lemon",q:"1"},{n:"injera or flatbread",q:"for serving"}],steps:["Sauté onions 8 min until softened. Add garlic, ginger, berbere 2 min.","Add lentils, tomatoes, broth. Simmer 20-25 min until lentils are soft.","Season with lemon juice and salt. Serve with injera or flatbread."]},
{id:307,name:"Taco Salad",time:15,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:U+"1768716697797-5eed4d2173f6?w=600&h=400&fit=crop",ing:[{n:"ground beef",q:"400g"},{n:"romaine lettuce",q:"1 head, chopped"},{n:"black beans",q:"1 can, drained"},{n:"corn",q:"1 can"},{n:"cherry tomatoes",q:"100g"},{n:"cheddar cheese",q:"100g, shredded"},{n:"avocado",q:"1"},{n:"tortilla chips",q:"for serving"},{n:"taco seasoning",q:"2 tbsp"},{n:"sour cream",q:"80ml"},{n:"salsa",q:"100ml"},{n:"lime",q:"1"}],steps:["Brown beef with taco seasoning and a splash of water. Simmer 5 min.","Arrange lettuce in bowls. Top with beef, beans, corn, tomatoes, cheese, avocado.","Crush tortilla chips over top. Drizzle with salsa, sour cream, lime juice."]},
{id:308,name:"Tofu Pad Thai",time:20,servings:2,diff:"Easy",tags:["vegan","vegetarian","dairy-free"],img:"https://live.staticflickr.com/65535/54020241652_b12c1b373b_c.jpg",ing:[{n:"rice noodles",q:"200g"},{n:"extra-firm tofu",q:"250g, cubed"},{n:"tamarind paste",q:"2 tbsp"},{n:"soy sauce",q:"1 tbsp"},{n:"palm sugar",q:"2 tbsp"},{n:"lime",q:"1"},{n:"bean sprouts",q:"100g"},{n:"peanuts",q:"40g, crushed"},{n:"garlic",q:"3 cloves"},{n:"green onion",q:"3"},{n:"vegetable oil",q:"3 tbsp"}],steps:["Soak noodles. Press and cube tofu. Make sauce: tamarind, soy sauce, sugar, water.","Fry tofu until golden. Add garlic 30 sec.","Add noodles, sauce. Toss 2 min. Add sprouts. Serve with crushed peanuts, lime, green onion."]},
{id:309,name:"Lamb Moussaka",time:75,servings:8,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54866661794_4729825b37_c.jpg",ing:[{n:"eggplant",q:"3, sliced"},{n:"ground lamb",q:"500g"},{n:"onion",q:"1"},{n:"garlic",q:"4 cloves"},{n:"canned tomatoes",q:"400g"},{n:"cinnamon",q:"1/2 tsp"},{n:"oregano",q:"1 tsp"},{n:"butter",q:"40g"},{n:"flour",q:"40g"},{n:"milk",q:"500ml"},{n:"egg yolks",q:"2"},{n:"nutmeg",q:"pinch"},{n:"potato",q:"2, sliced"}],steps:["Salt and fry eggplant. Brown lamb with onion, garlic, spices, tomatoes.","Make bechamel: butter, flour, milk, yolks, nutmeg.","Layer potato, eggplant, meat sauce. Repeat. Top with bechamel. Bake 180C 45 min until golden."]},
{id:310,name:"Smoothie Bowl",time:10,servings:1,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/55141446643_ee4e232b0d_c.jpg",ing:[{n:"frozen banana",q:"2"},{n:"frozen berries",q:"100g"},{n:"spinach",q:"50g"},{n:"almond milk",q:"80ml"},{n:"honey or maple syrup",q:"1 tbsp"},{n:"granola",q:"for topping"},{n:"chia seeds",q:"1 tbsp"},{n:"coconut flakes",q:"1 tbsp"},{n:"fresh fruit",q:"for topping"}],steps:["Blend frozen banana, berries, spinach, almond milk until thick. Should be spoonable, not drinkable.","Pour into bowl.","Top with granola, chia seeds, coconut flakes, fresh sliced fruit."]},

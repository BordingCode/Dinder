{id:88,name:"Salmon en Croute",time:40,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/7767/18210256011_b401645e87_c.jpg",ing:[{n:"salmon fillet",q:"600g, skinless"},{n:"puff pastry",q:"1 sheet"},{n:"cream cheese",q:"100g"},{n:"spinach",q:"100g, wilted"},{n:"dill",q:"2 tbsp, fresh"},{n:"lemon zest",q:"1 lemon"},{n:"egg",q:"1, for wash"}],steps:["Mix cream cheese with dill and lemon zest. Season.","Lay pastry, spread cream cheese. Layer spinach, then salmon. Wrap pastry tightly. Egg wash.","Bake 200C 25-30 min until pastry is golden and puffed. Rest 5 min. Slice."]},
{id:89,name:"Kung Pao Chicken",time:20,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/54878177220_923592702e_c.jpg",ing:[{n:"chicken thighs",q:"400g, cubed"},{n:"peanuts",q:"50g"},{n:"dried red chilies",q:"8"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"soy sauce",q:"2 tbsp"},{n:"rice vinegar",q:"2 tbsp"},{n:"hoisin sauce",q:"1 tbsp"},{n:"cornstarch",q:"1 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"green onion",q:"3"},{n:"rice",q:"for serving"}],steps:["Toss chicken with cornstarch and 1 tbsp soy sauce. Fry until golden, remove.","Stir-fry chilies, garlic, ginger 30 sec. Add peanuts.","Return chicken. Add remaining soy, vinegar, hoisin, sesame oil. Toss. Garnish with green onion."]},
{id:90,name:"Falafel Wraps",time:30,servings:4,diff:"Medium",tags:["vegan","vegetarian","dairy-free","nut-free"],img:"https://live.staticflickr.com/1977/44881728194_09ab784149_c.jpg",ing:[{n:"dried chickpeas",q:"250g, soaked overnight"},{n:"onion",q:"1/2"},{n:"garlic",q:"3 cloves"},{n:"cumin",q:"2 tsp"},{n:"coriander",q:"1 tsp"},{n:"parsley",q:"large bunch"},{n:"cilantro",q:"small bunch"},{n:"baking powder",q:"1/2 tsp"},{n:"pita bread",q:"4"},{n:"tahini sauce",q:"for serving"},{n:"tomato",q:"1, diced"},{n:"cucumber",q:"1/2, diced"},{n:"vegetable oil",q:"for frying"}],steps:["Blend soaked chickpeas with onion, garlic, herbs, spices until coarse. Chill 30 min.","Form into patties. Deep fry at 180C 3-4 min until dark golden.","Serve in warm pita with tahini, diced tomato, cucumber, and pickled vegetables."]},
{id:91,name:"Sichuan Mapo Eggplant",time:20,servings:3,diff:"Easy",tags:["vegan","vegetarian","dairy-free"],img:U+"1636423848781-d880c7c776db?w=600&h=400&fit=crop",ing:[{n:"Chinese eggplant",q:"4, cut into chunks"},{n:"doubanjiang",q:"2 tbsp"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"1 inch"},{n:"soy sauce",q:"1 tbsp"},{n:"Sichuan peppercorn",q:"1/2 tsp, ground"},{n:"sugar",q:"1 tsp"},{n:"cornstarch slurry",q:"1 tbsp"},{n:"green onion",q:"2"},{n:"sesame oil",q:"1 tsp"},{n:"vegetable oil",q:"3 tbsp"}],steps:["Deep fry or pan-fry eggplant until soft and golden. Drain.","Stir-fry doubanjiang, garlic, ginger 1 min. Add eggplant, soy sauce, sugar, 100ml water.","Simmer 3 min. Thicken with cornstarch. Finish with Sichuan pepper, sesame oil, green onion."]},
{id:92,name:"Coq au Vin",time:90,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54950453061_6409182389_c.jpg",ing:[{n:"chicken pieces",q:"1.5kg, bone-in"},{n:"red wine",q:"500ml"},{n:"bacon lardons",q:"100g"},{n:"mushrooms",q:"200g"},{n:"pearl onions",q:"200g"},{n:"garlic",q:"4 cloves"},{n:"tomato paste",q:"1 tbsp"},{n:"chicken broth",q:"200ml"},{n:"thyme",q:"3 sprigs"},{n:"bay leaf",q:"1"},{n:"butter",q:"30g"},{n:"flour",q:"2 tbsp"}],steps:["Brown chicken in butter. Remove. Cook bacon, mushrooms, onions. Add garlic, paste, flour.","Deglaze with wine. Add broth, herbs. Return chicken. Cover, simmer 60-75 min.","Sauce should be rich and thick. Serve with mashed potatoes or crusty bread."]},
{id:93,name:"Jerk Chicken",time:40,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/55121234078_8eb583760a_c.jpg",ing:[{n:"chicken thighs",q:"8, bone-in"},{n:"scotch bonnet pepper",q:"2"},{n:"allspice",q:"2 tsp"},{n:"thyme",q:"1 tbsp, dried"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"1 inch"},{n:"soy sauce",q:"2 tbsp"},{n:"lime",q:"2"},{n:"brown sugar",q:"2 tbsp"},{n:"green onion",q:"4"},{n:"vegetable oil",q:"2 tbsp"}],steps:["Blend all marinade ingredients until smooth. Coat chicken thoroughly. Marinate 4 hours minimum.","Grill or bake at 200C for 35-40 min, basting with marinade.","Chicken should be charred and juicy. Serve with rice and peas and extra lime."]},
{id:94,name:"Spaghetti alle Vongole",time:20,servings:4,diff:"Medium",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/54770630764_218b514793_c.jpg",ing:[{n:"spaghetti",q:"400g"},{n:"fresh clams",q:"1kg, scrubbed"},{n:"garlic",q:"6 cloves, sliced"},{n:"dry white wine",q:"150ml"},{n:"red pepper flakes",q:"1/2 tsp"},{n:"flat-leaf parsley",q:"large bunch, chopped"},{n:"extra virgin olive oil",q:"60ml"}],steps:["Cook spaghetti al dente. Reserve pasta water.","Heat oil, add garlic and pepper flakes 1 min. Add clams and wine. Cover, cook 5-7 min until opened.","Add spaghetti to pan with parsley. Toss vigorously. Add pasta water if needed."]},
{id:95,name:"Aloo Gobi",time:25,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/47929346731_3b5ed16832_c.jpg",ing:[{n:"cauliflower",q:"1 head, florets"},{n:"potato",q:"2 medium, cubed"},{n:"onion",q:"1, diced"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"turmeric",q:"1 tsp"},{n:"cumin seeds",q:"1 tsp"},{n:"coriander",q:"1 tsp"},{n:"garam masala",q:"1 tsp"},{n:"canned tomatoes",q:"200g"},{n:"cilantro",q:"fresh"},{n:"vegetable oil",q:"3 tbsp"}],steps:["Fry cumin seeds until they pop. Add onion 5 min, then garlic, ginger, spices 1 min.","Add potatoes, cauliflower, tomatoes, 100ml water. Cover, cook 15-18 min until tender.","Season well. Garnish with fresh cilantro. Serve with roti or rice."]},
{id:96,name:"Pasta Puttanesca",time:20,servings:4,diff:"Easy",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/55064042880_7ac4da5241_c.jpg",ing:[{n:"spaghetti",q:"400g"},{n:"canned tomatoes",q:"400g"},{n:"anchovy fillets",q:"6"},{n:"kalamata olives",q:"80g, pitted"},{n:"capers",q:"2 tbsp"},{n:"garlic",q:"4 cloves"},{n:"red pepper flakes",q:"1/2 tsp"},{n:"olive oil",q:"3 tbsp"},{n:"parsley",q:"fresh"}],steps:["Cook spaghetti al dente. In a pan, gently cook garlic and anchovies in oil until anchovies dissolve.","Add tomatoes, olives, capers, pepper flakes. Simmer 10-12 min.","Toss with spaghetti. Garnish with parsley."]},
{id:97,name:"Chicken Enchiladas",time:35,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55128059491_bf162c1c80_c.jpg",ing:[{n:"chicken breast",q:"400g, cooked and shredded"},{n:"flour tortillas",q:"8"},{n:"enchilada sauce",q:"500ml"},{n:"cheddar cheese",q:"200g, shredded"},{n:"sour cream",q:"100ml"},{n:"onion",q:"1, diced"},{n:"garlic",q:"2 cloves"},{n:"cumin",q:"1 tsp"},{n:"cilantro",q:"fresh"},{n:"black beans",q:"1 can, drained"}],steps:["Mix shredded chicken with beans, half the cheese, sour cream, onion, garlic, cumin.","Fill tortillas, roll, place seam-down in baking dish. Pour enchilada sauce over.","Top with remaining cheese. Bake 180C 20 min until bubbly. Garnish with cilantro."]},
{id:98,name:"Tonkotsu Ramen",time:180,servings:4,diff:"Hard",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/55099716639_917798316a_c.jpg",ing:[{n:"pork bones",q:"1.5kg"},{n:"pork belly",q:"300g"},{n:"ramen noodles",q:"400g"},{n:"soy sauce",q:"3 tbsp"},{n:"mirin",q:"2 tbsp"},{n:"ginger",q:"2 inch"},{n:"garlic",q:"6 cloves"},{n:"green onion",q:"4"},{n:"soft-boiled eggs",q:"4"},{n:"nori sheets",q:"4"},{n:"sesame oil",q:"1 tsp"},{n:"chili oil",q:"optional"}],steps:["Blanch bones 10 min. Start fresh with bones, garlic, ginger. Boil hard 3-4 hours for milky broth.","Braise pork belly in soy, mirin, water 1.5 hours. Slice. Marinate eggs in soy-mirin.","Season broth with soy and salt. Assemble: noodles, broth, pork belly, egg, green onion, nori."]},
{id:99,name:"Palak Paneer",time:25,servings:4,diff:"Easy",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/65535/53569672040_3ee2e652c9_c.jpg",ing:[{n:"paneer",q:"250g, cubed"},{n:"spinach",q:"400g, fresh"},{n:"onion",q:"1, diced"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"green chili",q:"1"},{n:"cumin seeds",q:"1 tsp"},{n:"garam masala",q:"1 tsp"},{n:"heavy cream",q:"3 tbsp"},{n:"butter or ghee",q:"2 tbsp"},{n:"naan",q:"for serving"}],steps:["Blanch spinach 2 min. Blend smooth. Pan-fry paneer cubes until golden.","Fry cumin seeds in butter. Add onion 5 min. Add garlic, ginger, chili, garam masala.","Add spinach puree, simmer 5 min. Add paneer and cream. Serve with naan or rice."]},
{id:100,name:"Shrimp & Grits",time:25,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54845085622_5b01992d0d_c.jpg",ing:[{n:"large shrimp",q:"400g, peeled"},{n:"stone-ground grits",q:"200g"},{n:"bacon",q:"4 strips, diced"},{n:"garlic",q:"3 cloves"},{n:"lemon",q:"1"},{n:"chicken broth",q:"400ml"},{n:"milk",q:"200ml"},{n:"cheddar cheese",q:"60g"},{n:"butter",q:"30g"},{n:"green onion",q:"3"},{n:"cajun seasoning",q:"1 tsp"}],steps:["Cook grits in broth and milk 20 min, stirring often. Stir in cheese and butter.","Cook bacon crispy. Add shrimp and cajun seasoning, cook 2 min per side.","Add garlic, lemon juice. Serve shrimp and bacon over creamy grits with green onion."]},
{id:101,name:"Birria Tacos",time:120,servings:6,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54858125892_886501b0d1_c.jpg",ing:[{n:"beef chuck",q:"1kg, cubed"},{n:"dried guajillo chilies",q:"6"},{n:"dried ancho chilies",q:"3"},{n:"onion",q:"1"},{n:"garlic",q:"6 cloves"},{n:"cumin",q:"1 tsp"},{n:"oregano",q:"1 tsp"},{n:"cloves",q:"3"},{n:"cinnamon stick",q:"1"},{n:"apple cider vinegar",q:"2 tbsp"},{n:"beef broth",q:"500ml"},{n:"corn tortillas",q:"12"},{n:"cilantro",q:"fresh"},{n:"onion",q:"for serving, diced"},{n:"lime",q:"for serving"}],steps:["Toast and rehydrate chilies. Blend with onion, garlic, spices, vinegar into paste.","Coat beef in chili paste. Add broth. Braise covered at 160C for 2.5-3 hours until falling apart.","Shred beef. Dip tortillas in consomme, fill with beef, pan-fry until crispy. Serve with consomme for dipping."]},
{id:102,name:"Osso Buco",time:150,servings:4,diff:"Hard",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/53499568720_2af6924ee4_c.jpg",ing:[{n:"veal shanks",q:"4, cross-cut"},{n:"onion",q:"1, diced"},{n:"carrot",q:"1, diced"},{n:"celery",q:"2 stalks, diced"},{n:"canned tomatoes",q:"400g"},{n:"white wine",q:"200ml"},{n:"beef broth",q:"300ml"},{n:"garlic",q:"4 cloves"},{n:"lemon zest",q:"1 lemon"},{n:"parsley",q:"fresh"},{n:"flour",q:"for dredging"},{n:"olive oil",q:"3 tbsp"}],steps:["Season and flour veal. Brown in olive oil 4 min per side. Remove.","Sauté onion, carrot, celery 5 min. Deglaze with wine. Add tomatoes, broth.","Return veal. Cover, braise at 160C for 2-2.5 hours. Make gremolata: parsley, lemon zest, garlic. Serve over risotto."]},
{id:103,name:"Khao Soi",time:30,servings:4,diff:"Medium",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/53453348059_655469a942_c.jpg",ing:[{n:"chicken thighs",q:"500g"},{n:"coconut milk",q:"800ml"},{n:"red curry paste",q:"3 tbsp"},{n:"turmeric",q:"1 tsp"},{n:"egg noodles",q:"400g"},{n:"shallots",q:"2, sliced"},{n:"lime",q:"2"},{n:"cilantro",q:"fresh"},{n:"chili oil",q:"for serving"},{n:"fish sauce",q:"2 tbsp"},{n:"palm sugar",q:"1 tbsp"},{n:"pickled mustard greens",q:"for serving"}],steps:["Fry curry paste and turmeric in coconut cream 2 min. Add chicken, cook 5 min.","Add remaining coconut milk, fish sauce, sugar. Simmer 15 min. Cook noodles.","Serve noodles in curry broth topped with crispy fried noodles, shallots, lime, cilantro."]},
{id:104,name:"Moussaka",time:75,servings:8,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55120920044_3a2e269edc_c.jpg",ing:[{n:"eggplant",q:"3, sliced"},{n:"ground lamb",q:"500g"},{n:"onion",q:"1, diced"},{n:"garlic",q:"4 cloves"},{n:"canned tomatoes",q:"400g"},{n:"cinnamon",q:"1/2 tsp"},{n:"oregano",q:"1 tsp"},{n:"butter",q:"40g"},{n:"flour",q:"40g"},{n:"milk",q:"500ml"},{n:"egg yolks",q:"2"},{n:"nutmeg",q:"pinch"},{n:"olive oil",q:"for frying"}],steps:["Salt and fry eggplant slices. Brown lamb with onion, garlic, spices, tomatoes.","Make bechamel: butter, flour, milk, egg yolks, nutmeg.","Layer eggplant, meat sauce, repeat. Top with bechamel. Bake 180C 45 min until golden."]},
{id:105,name:"Chicken Adobo",time:40,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/54512048546_ccc3f688c0_c.jpg",ing:[{n:"chicken thighs",q:"8, bone-in"},{n:"soy sauce",q:"80ml"},{n:"white vinegar",q:"80ml"},{n:"garlic",q:"8 cloves, crushed"},{n:"bay leaves",q:"3"},{n:"black peppercorns",q:"1 tsp"},{n:"brown sugar",q:"1 tbsp"},{n:"vegetable oil",q:"2 tbsp"},{n:"rice",q:"for serving"}],steps:["Brown chicken in oil 3 min per side. Remove.","Add garlic, soy sauce, vinegar, bay leaves, peppercorns, sugar. Return chicken.","Cover, simmer 30 min, flipping halfway. Uncover last 5 min to thicken. Serve over rice."]},
{id:106,name:"Risotto alla Milanese",time:30,servings:4,diff:"Medium",tags:["gluten-free"],img:"https://live.staticflickr.com/65535/52526222184_40d638e859_c.jpg",ing:[{n:"arborio rice",q:"300g"},{n:"saffron",q:"large pinch"},{n:"onion",q:"1, finely diced"},{n:"white wine",q:"150ml"},{n:"chicken broth",q:"1L, warm"},{n:"parmesan",q:"80g, grated"},{n:"butter",q:"50g"}],steps:["Bloom saffron in 50ml warm broth. Sauté onion in half the butter 3 min.","Toast rice 1 min. Add wine, stir until absorbed. Add broth one ladle at a time, stirring 18 min.","Stir in saffron broth, remaining butter, parmesan. Rest 2 min before serving."]},
{id:107,name:"Thai Green Curry",time:25,servings:4,diff:"Easy",tags:["dairy-free","gluten-free"],img:"https://www.themealdb.com/images/media/meals/sstssx1487349585.jpg/preview",ing:[{n:"chicken breast",q:"500g, sliced"},{n:"coconut milk",q:"400ml"},{n:"green curry paste",q:"3 tbsp"},{n:"Thai eggplant or regular eggplant",q:"150g"},{n:"bamboo shoots",q:"100g"},{n:"fish sauce",q:"2 tbsp"},{n:"palm sugar",q:"1 tbsp"},{n:"Thai basil",q:"handful"},{n:"kaffir lime leaves",q:"4"},{n:"rice",q:"for serving"}],steps:["Fry curry paste in coconut cream 2 min. Add chicken, cook 3 min.","Add remaining coconut milk, eggplant, bamboo shoots, lime leaves, fish sauce, sugar. Simmer 12 min.","Add Thai basil. Serve over jasmine rice."]},
{id:108,name:"Bibim Guksu",time:15,servings:2,diff:"Easy",tags:["dairy-free"],img:"https://live.staticflickr.com/3939/32111268073_958c17bcbb_c.jpg",ing:[{n:"somen noodles",q:"200g"},{n:"gochujang",q:"2 tbsp"},{n:"rice vinegar",q:"2 tbsp"},{n:"sesame oil",q:"1 tbsp"},{n:"sugar",q:"1 tbsp"},{n:"cucumber",q:"1, julienned"},{n:"kimchi",q:"100g"},{n:"hard-boiled egg",q:"2"},{n:"sesame seeds",q:"1 tbsp"},{n:"green onion",q:"2"}],steps:["Cook somen noodles. Rinse under cold water until chilled. Drain well.","Whisk gochujang, vinegar, sesame oil, sugar for sauce.","Toss noodles with sauce. Top with cucumber, kimchi, halved egg, sesame seeds, green onion."]},
{id:109,name:"Pasta e Fagioli",time:30,servings:6,diff:"Easy",tags:["dairy-free","nut-free"],img:"https://live.staticflickr.com/65535/52516022066_97e01272eb_c.jpg",ing:[{n:"cannellini beans",q:"2 cans"},{n:"ditalini pasta",q:"150g"},{n:"pancetta",q:"100g, diced"},{n:"onion",q:"1, diced"},{n:"carrot",q:"1, diced"},{n:"celery",q:"1 stalk, diced"},{n:"garlic",q:"3 cloves"},{n:"canned tomatoes",q:"400g"},{n:"chicken broth",q:"750ml"},{n:"rosemary",q:"1 sprig"},{n:"parmesan rind",q:"1 piece"},{n:"olive oil",q:"2 tbsp"}],steps:["Cook pancetta until crispy. Add onion, carrot, celery, garlic 5 min.","Add tomatoes, broth, beans, parmesan rind, rosemary. Simmer 15 min.","Add pasta, cook until tender. Remove rind. Serve with olive oil drizzle and parmesan."]},
{id:110,name:"Gochujang Salmon Bowl",time:20,servings:2,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://images.unsplash.com/photo-1673076529947-a5b9033739d9?w=600&h=400&fit=crop",ing:[{n:"salmon fillets",q:"2"},{n:"gochujang",q:"2 tbsp"},{n:"honey",q:"1 tbsp"},{n:"soy sauce",q:"1 tbsp"},{n:"rice",q:"250g, cooked"},{n:"cucumber",q:"1, sliced"},{n:"avocado",q:"1"},{n:"pickled radish",q:"50g"},{n:"sesame seeds",q:"1 tbsp"},{n:"green onion",q:"2"}],steps:["Mix gochujang, honey, soy sauce. Brush over salmon.","Broil salmon 8-10 min until caramelized and flaky.","Assemble bowls: rice, flaked salmon, cucumber, avocado, pickled radish, sesame seeds, green onion."]},
{id:111,name:"Saag Aloo",time:25,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/4476/26161029339_cced241827_c.jpg",ing:[{n:"potatoes",q:"500g, cubed"},{n:"spinach",q:"300g"},{n:"onion",q:"1, diced"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"cumin seeds",q:"1 tsp"},{n:"turmeric",q:"1/2 tsp"},{n:"garam masala",q:"1 tsp"},{n:"green chili",q:"1"},{n:"vegetable oil",q:"3 tbsp"},{n:"lemon juice",q:"1 tbsp"}],steps:["Par-boil potatoes 8 min. Fry cumin seeds until they pop.","Add onion 5 min. Add garlic, ginger, chili, turmeric. Add potatoes, cook 5 min.","Add spinach, garam masala. Cook until wilted. Finish with lemon juice."]},
{id:112,name:"Orecchiette with Broccoli Rabe",time:20,servings:4,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/2539/32365856093_6bba448649_c.jpg",ing:[{n:"orecchiette",q:"400g"},{n:"broccoli rabe",q:"300g, trimmed"},{n:"garlic",q:"5 cloves, sliced"},{n:"red pepper flakes",q:"1 tsp"},{n:"anchovy fillets",q:"4"},{n:"olive oil",q:"60ml"},{n:"parmesan",q:"40g"},{n:"lemon zest",q:"1 lemon"}],steps:["Cook orecchiette with broccoli rabe in same pot last 3 min.","Sauté garlic, anchovies, pepper flakes in olive oil until anchovies melt.","Toss pasta and broccoli rabe in the pan with pasta water. Top with parmesan and lemon zest."]},
{id:113,name:"Vietnamese Banh Mi",time:20,servings:2,diff:"Easy",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/54612706364_bfc34463a6_c.jpg",ing:[{n:"baguette",q:"2, split"},{n:"pork tenderloin",q:"300g"},{n:"lemongrass",q:"2 stalks, minced"},{n:"fish sauce",q:"2 tbsp"},{n:"sugar",q:"1 tbsp"},{n:"garlic",q:"3 cloves"},{n:"daikon",q:"100g, pickled"},{n:"carrot",q:"1, pickled"},{n:"cucumber",q:"1/2, sliced"},{n:"cilantro",q:"fresh"},{n:"jalapeno",q:"1, sliced"},{n:"mayonnaise",q:"2 tbsp"}],steps:["Marinate pork in lemongrass, fish sauce, sugar, garlic 30 min. Grill 4 min per side. Slice thin.","Toast baguettes. Spread with mayo.","Layer pork, pickled vegetables, cucumber, cilantro, jalapeno."]},
{id:114,name:"Shakshuka Verde",time:25,servings:3,diff:"Easy",tags:["vegetarian","gluten-free","nut-free"],img:U+"1613750406907-619c9c484fe3?w=600&h=400&fit=crop",ing:[{n:"eggs",q:"6"},{n:"tomatillos",q:"400g, husked and quartered"},{n:"onion",q:"1, diced"},{n:"jalapeno",q:"2"},{n:"garlic",q:"3 cloves"},{n:"cumin",q:"1 tsp"},{n:"spinach",q:"100g"},{n:"feta cheese",q:"50g"},{n:"cilantro",q:"fresh"},{n:"olive oil",q:"2 tbsp"},{n:"tortillas",q:"for serving"}],steps:["Roast tomatillos and jalapenos at 220C 10 min. Blend with garlic into salsa verde.","Sauté onion, add cumin, salsa verde, spinach. Simmer 5 min.","Make wells, crack eggs. Cover, cook 5-8 min. Top with feta and cilantro. Serve with tortillas."]},
{id:115,name:"Beef Stroganoff",time:30,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55122428710_af08159d61_c.jpg",ing:[{n:"beef sirloin",q:"500g, sliced thin"},{n:"mushrooms",q:"300g, sliced"},{n:"onion",q:"1, diced"},{n:"garlic",q:"3 cloves"},{n:"sour cream",q:"200g"},{n:"beef broth",q:"200ml"},{n:"Dijon mustard",q:"1 tsp"},{n:"paprika",q:"1 tsp"},{n:"butter",q:"30g"},{n:"flour",q:"1 tbsp"},{n:"egg noodles",q:"350g"}],steps:["Sear beef in batches. Remove. Sauté mushrooms and onion in butter 5 min.","Add garlic, paprika, flour. Add broth, simmer 5 min. Stir in mustard.","Return beef. Remove from heat, stir in sour cream. Serve over egg noodles."]},
{id:116,name:"Crispy Orange Chicken",time:25,servings:4,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/53715729184_0327d5e5c1_c.jpg",ing:[{n:"chicken thighs",q:"600g, cubed"},{n:"cornstarch",q:"60g"},{n:"egg",q:"1"},{n:"orange juice",q:"120ml"},{n:"orange zest",q:"1 orange"},{n:"soy sauce",q:"2 tbsp"},{n:"rice vinegar",q:"1 tbsp"},{n:"brown sugar",q:"3 tbsp"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"sesame oil",q:"1 tsp"},{n:"rice",q:"for serving"},{n:"green onion",q:"2"}],steps:["Coat chicken in cornstarch and egg. Deep fry until crispy and golden, 5-6 min.","Simmer OJ, zest, soy sauce, vinegar, sugar, garlic, ginger until syrupy.","Toss crispy chicken in sauce. Serve over rice with green onion."]},
{id:117,name:"Ribollita",time:40,servings:6,diff:"Easy",tags:["vegan","vegetarian","dairy-free","nut-free"],img:"https://live.staticflickr.com/65535/54990786262_3d73ef2412_c.jpg",ing:[{n:"cannellini beans",q:"2 cans"},{n:"cavolo nero or kale",q:"200g"},{n:"stale bread",q:"200g, cubed"},{n:"onion",q:"1"},{n:"carrot",q:"1"},{n:"celery",q:"2 stalks"},{n:"canned tomatoes",q:"400g"},{n:"vegetable broth",q:"750ml"},{n:"garlic",q:"3 cloves"},{n:"rosemary",q:"1 sprig"},{n:"olive oil",q:"4 tbsp"},{n:"parmesan rind",q:"1"}],steps:["Sauté onion, carrot, celery 5 min. Add garlic, rosemary.","Add tomatoes, broth, beans, parmesan rind. Simmer 20 min. Add kale 5 min.","Stir in bread cubes, let thicken 5 min. Drizzle with olive oil to serve."]},
{id:118,name:"General Tsos Chicken",time:25,servings:4,diff:"Medium",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/1892/29596674267_7d0c113322_c.jpg",ing:[{n:"chicken thighs",q:"600g, cubed"},{n:"cornstarch",q:"60g"},{n:"egg",q:"1"},{n:"soy sauce",q:"3 tbsp"},{n:"rice vinegar",q:"2 tbsp"},{n:"hoisin sauce",q:"1 tbsp"},{n:"brown sugar",q:"3 tbsp"},{n:"dried red chilies",q:"8"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"sesame oil",q:"1 tsp"},{n:"green onion",q:"2"},{n:"broccoli",q:"200g, steamed"},{n:"rice",q:"for serving"}],steps:["Coat chicken in cornstarch and egg. Deep fry until crispy, 5-6 min.","Stir-fry chilies, garlic, ginger 30 sec. Add soy, vinegar, hoisin, sugar. Simmer until thick.","Toss chicken in sauce. Serve over rice with steamed broccoli."]},
{id:119,name:"Smashed Burger",time:15,servings:4,diff:"Easy",tags:["high-protein"],img:U+"1634737118699-8bbb06e3fa2a?w=600&h=400&fit=crop",ing:[{n:"ground beef",q:"600g, 80/20"},{n:"brioche buns",q:"4"},{n:"American cheese",q:"4 slices"},{n:"onion",q:"1, thinly sliced"},{n:"pickles",q:"for serving"},{n:"lettuce",q:"leaves"},{n:"tomato",q:"1, sliced"},{n:"ketchup",q:"for serving"},{n:"mustard",q:"for serving"},{n:"salt and pepper",q:"to taste"}],steps:["Divide beef into 8 balls. Smash very thin on a screaming hot griddle or cast iron.","Season with salt and pepper. Cook 2 min, flip, add cheese, cook 1 min more.","Stack two patties per bun with lettuce, tomato, onion, pickles, ketchup, mustard."]},
{id:120,name:"Fattoush Salad",time:15,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","nut-free"],img:"https://live.staticflickr.com/65535/54039048946_7cffa55a44_c.jpg",ing:[{n:"pita bread",q:"2, torn and toasted"},{n:"romaine lettuce",q:"1 head, chopped"},{n:"cucumber",q:"1, diced"},{n:"tomato",q:"2, diced"},{n:"radish",q:"4, sliced"},{n:"red onion",q:"1/2, sliced"},{n:"mint",q:"fresh"},{n:"parsley",q:"fresh"},{n:"sumac",q:"2 tsp"},{n:"lemon",q:"1"},{n:"olive oil",q:"4 tbsp"},{n:"pomegranate molasses",q:"1 tbsp"}],steps:["Toast torn pita pieces until crispy.","Combine all chopped vegetables and herbs in a large bowl.","Whisk lemon juice, olive oil, pomegranate molasses, sumac. Toss with salad and crispy pita."]},
{id:121,name:"Gnocchi alla Sorrentina",time:30,servings:4,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54661930921_a25b84100d_c.jpg",ing:[{n:"potato gnocchi",q:"500g"},{n:"canned San Marzano tomatoes",q:"400g"},{n:"fresh mozzarella",q:"200g, torn"},{n:"garlic",q:"3 cloves"},{n:"fresh basil",q:"bunch"},{n:"olive oil",q:"2 tbsp"},{n:"parmesan",q:"30g"},{n:"salt and pepper",q:"to taste"}],steps:["Make sauce: sauté garlic in oil, add tomatoes, basil. Simmer 10 min.","Cook gnocchi until they float. Drain.","Combine gnocchi with sauce in baking dish. Top with torn mozzarella. Bake 200C 10-12 min until bubbly."]},
{id:122,name:"Chicken Lettuce Wraps",time:15,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55139801315_98eb3a6e43_c.jpg",ing:[{n:"ground chicken",q:"500g"},{n:"butter lettuce",q:"1 head, leaves separated"},{n:"water chestnuts",q:"1 can, diced"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"soy sauce",q:"3 tbsp"},{n:"hoisin sauce",q:"2 tbsp"},{n:"rice vinegar",q:"1 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"green onion",q:"3"},{n:"sriracha",q:"for serving"}],steps:["Stir-fry chicken in hot wok until browned. Add garlic, ginger 30 sec.","Add water chestnuts, soy sauce, hoisin, vinegar, sesame oil. Cook 2 min.","Spoon into lettuce cups. Top with green onion and sriracha."]},
{id:123,name:"Beef Bulgogi",time:25,servings:4,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/54630140466_3f214544f2_c.jpg",ing:[{n:"beef ribeye",q:"500g, thinly sliced"},{n:"Asian pear",q:"1/2, grated"},{n:"soy sauce",q:"4 tbsp"},{n:"sesame oil",q:"2 tbsp"},{n:"brown sugar",q:"2 tbsp"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"1 inch"},{n:"green onion",q:"3"},{n:"sesame seeds",q:"1 tbsp"},{n:"rice",q:"for serving"},{n:"lettuce leaves",q:"for wrapping"}],steps:["Mix grated pear, soy sauce, sesame oil, sugar, garlic, ginger. Marinate beef 30 min minimum.","Grill or pan-fry beef over very high heat 1-2 min per side until caramelized.","Serve with rice, lettuce leaves for wrapping, green onion, sesame seeds."]},
{id:124,name:"Tuscan White Bean Soup",time:30,servings:6,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/55100737935_0d5a6e62b1_c.jpg",ing:[{n:"cannellini beans",q:"2 cans"},{n:"onion",q:"1, diced"},{n:"carrot",q:"2, diced"},{n:"celery",q:"2 stalks"},{n:"garlic",q:"4 cloves"},{n:"vegetable broth",q:"1L"},{n:"rosemary",q:"2 sprigs"},{n:"kale",q:"150g, chopped"},{n:"lemon",q:"1"},{n:"olive oil",q:"3 tbsp"},{n:"red pepper flakes",q:"1/4 tsp"}],steps:["Sauté onion, carrot, celery in olive oil 5 min. Add garlic, rosemary, pepper flakes.","Add beans and broth. Simmer 15 min. Mash some beans against pot for thickness.","Add kale, cook 5 min. Finish with lemon juice. Drizzle with olive oil to serve."]},
{id:125,name:"Chicken Marsala",time:25,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55101605894_ef01be7d4f_c.jpg",ing:[{n:"chicken breast",q:"4, pounded thin"},{n:"mushrooms",q:"300g, sliced"},{n:"Marsala wine",q:"150ml"},{n:"chicken broth",q:"100ml"},{n:"garlic",q:"3 cloves"},{n:"flour",q:"50g"},{n:"butter",q:"40g"},{n:"olive oil",q:"2 tbsp"},{n:"parsley",q:"fresh, chopped"}],steps:["Dredge chicken in flour. Sear in butter and oil 3-4 min per side. Remove.","Sauté mushrooms and garlic 5 min. Deglaze with Marsala wine.","Add broth, simmer until reduced by half. Return chicken, simmer 5 min. Garnish with parsley."]},
{id:126,name:"Vietnamese Bun Cha",time:30,servings:4,diff:"Medium",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/53313034538_c3af12678f_c.jpg",ing:[{n:"ground pork",q:"300g"},{n:"pork belly",q:"200g, sliced"},{n:"rice vermicelli",q:"300g"},{n:"fish sauce",q:"3 tbsp"},{n:"sugar",q:"2 tbsp"},{n:"garlic",q:"4 cloves"},{n:"lime",q:"2"},{n:"rice vinegar",q:"2 tbsp"},{n:"carrot",q:"1, pickled"},{n:"lettuce",q:"leaves"},{n:"fresh herbs",q:"mint, cilantro, perilla"},{n:"chili",q:"1, sliced"}],steps:["Mix ground pork with garlic, 1 tbsp each fish sauce and sugar. Form small patties.","Make dipping sauce: fish sauce, sugar, lime, vinegar, water, garlic, chili.","Grill patties and pork belly. Serve with cold vermicelli, herbs, lettuce, dipping sauce."]},
{id:127,name:"Bangers and Mash",time:30,servings:4,diff:"Easy",tags:["nut-free"],img:"https://live.staticflickr.com/1277/4664179043_4dabeaa98a_c.jpg",ing:[{n:"pork sausages",q:"8"},{n:"potatoes",q:"800g, peeled"},{n:"onion",q:"2, sliced"},{n:"butter",q:"60g"},{n:"milk",q:"100ml"},{n:"beef broth",q:"300ml"},{n:"flour",q:"1 tbsp"},{n:"Worcestershire sauce",q:"1 tbsp"},{n:"thyme",q:"fresh"},{n:"vegetable oil",q:"1 tbsp"}],steps:["Brown sausages in oil 8-10 min. Remove. Caramelize onions in same pan 10 min.","Mash boiled potatoes with butter and milk until smooth.","Add flour to onions, stir. Add broth, Worcestershire, thyme. Simmer until thick. Serve sausages on mash with gravy."]},
{id:128,name:"Gambas al Ajillo",time:10,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/52308531962_24fa772091_c.jpg",ing:[{n:"large shrimp",q:"400g, peeled"},{n:"garlic",q:"8 cloves, thinly sliced"},{n:"dried guindilla chilies",q:"2"},{n:"olive oil",q:"100ml"},{n:"sherry",q:"2 tbsp"},{n:"smoked paprika",q:"1/2 tsp"},{n:"parsley",q:"fresh, chopped"},{n:"crusty bread",q:"for serving"}],steps:["Heat olive oil in a clay dish or skillet. Add garlic and chilies, cook 1 min.","Add shrimp and paprika. Cook 2 min per side until pink.","Add sherry, cook 30 sec. Garnish with parsley. Serve immediately with bread to soak up the oil."]},
{id:129,name:"Japchae",time:25,servings:4,diff:"Medium",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/55092201753_75b2f38ec0_c.jpg",ing:[{n:"sweet potato noodles",q:"250g"},{n:"beef sirloin",q:"200g, sliced"},{n:"spinach",q:"100g"},{n:"carrot",q:"1, julienned"},{n:"bell pepper",q:"1, sliced"},{n:"shiitake mushrooms",q:"100g"},{n:"onion",q:"1/2, sliced"},{n:"soy sauce",q:"4 tbsp"},{n:"sesame oil",q:"2 tbsp"},{n:"sugar",q:"1 tbsp"},{n:"garlic",q:"3 cloves"},{n:"sesame seeds",q:"1 tbsp"},{n:"egg",q:"1, for garnish"}],steps:["Cook noodles, drain. Sauté each vegetable separately. Cook seasoned beef.","Toss noodles with soy sauce, sesame oil, sugar.","Combine everything, garnish with sesame seeds and sliced egg crepe."]},
{id:130,name:"Huevos Rancheros",time:20,servings:2,diff:"Easy",tags:["vegetarian","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/54951205033_8f41c44291_c.jpg",ing:[{n:"eggs",q:"4"},{n:"corn tortillas",q:"4"},{n:"black beans",q:"1 can"},{n:"salsa roja",q:"200ml"},{n:"avocado",q:"1"},{n:"queso fresco",q:"50g"},{n:"cilantro",q:"fresh"},{n:"lime",q:"1"},{n:"vegetable oil",q:"for frying"},{n:"sour cream",q:"optional"}],steps:["Fry tortillas briefly in oil until slightly crispy. Warm beans with cumin.","Fry eggs sunny-side up.","Layer: tortilla, beans, egg, salsa roja. Top with avocado, queso fresco, cilantro, lime."]},
{id:131,name:"Crispy Pork Belly",time:90,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55149426033_0c8e8bff02_c.jpg",ing:[{n:"pork belly",q:"1kg, skin scored"},{n:"five spice",q:"1 tsp"},{n:"white pepper",q:"1/2 tsp"},{n:"salt",q:"2 tsp"},{n:"white vinegar",q:"1 tbsp"},{n:"garlic",q:"4 cloves"},{n:"rice",q:"for serving"},{n:"steamed bok choy",q:"for serving"}],steps:["Boil pork belly 20 min. Pat very dry. Rub underside with five spice, pepper, garlic.","Rub skin with vinegar and salt. Refrigerate uncovered 4 hours or overnight.","Roast at 220C 30 min, then broil 10-15 min until skin crackles. Rest, slice. Serve with rice."]},
{id:132,name:"Niçoise Salad",time:20,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/52715449579_29ccd97d5a_c.jpg",ing:[{n:"tuna steaks",q:"2 (or canned tuna 200g)"},{n:"green beans",q:"150g, blanched"},{n:"baby potatoes",q:"300g, boiled and halved"},{n:"eggs",q:"4, hard-boiled"},{n:"cherry tomatoes",q:"150g"},{n:"Niçoise olives",q:"60g"},{n:"red onion",q:"1/2, sliced"},{n:"anchovy fillets",q:"4"},{n:"lemon",q:"1"},{n:"olive oil",q:"4 tbsp"},{n:"Dijon mustard",q:"1 tsp"}],steps:["Sear tuna 1-2 min per side (or drain canned). Blanch green beans, boil potatoes and eggs.","Whisk olive oil, lemon juice, mustard for vinaigrette.","Arrange all ingredients on a platter. Drizzle with vinaigrette."]},
{id:133,name:"Tom Kha Gai",time:25,servings:4,diff:"Easy",tags:["dairy-free","gluten-free"],img:"https://live.staticflickr.com/65535/54834198134_0af385d4e1_c.jpg",ing:[{n:"chicken breast",q:"400g, sliced"},{n:"coconut milk",q:"800ml"},{n:"galangal",q:"3 slices"},{n:"lemongrass",q:"2 stalks, bruised"},{n:"kaffir lime leaves",q:"5"},{n:"mushrooms",q:"150g"},{n:"fish sauce",q:"3 tbsp"},{n:"lime juice",q:"3 tbsp"},{n:"chili paste",q:"1 tbsp"},{n:"cilantro",q:"fresh"},{n:"Thai chili",q:"2, crushed"}],steps:["Bring coconut milk, galangal, lemongrass, lime leaves to simmer.","Add chicken and mushrooms. Simmer 10-12 min until chicken is cooked.","Season with fish sauce, lime juice, chili paste. Serve garnished with cilantro and chili."]},
{id:134,name:"Chicken Gyros",time:25,servings:4,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54996806030_b34cd67b0d_c.jpg",ing:[{n:"chicken thighs",q:"600g, boneless"},{n:"Greek yogurt",q:"200g"},{n:"garlic",q:"4 cloves"},{n:"lemon",q:"1"},{n:"oregano",q:"2 tsp"},{n:"cumin",q:"1 tsp"},{n:"paprika",q:"1 tsp"},{n:"pita bread",q:"4"},{n:"tomato",q:"2, diced"},{n:"red onion",q:"1/2, sliced"},{n:"cucumber",q:"1/2, diced"},{n:"olive oil",q:"2 tbsp"}],steps:["Marinate chicken in half the yogurt, garlic, lemon, spices, oil. Marinate 1 hour minimum.","Grill or pan-fry chicken 5-6 min per side. Rest 5 min, slice.","Serve in warm pita with remaining yogurt-garlic sauce, tomato, cucumber, onion."]},
{id:135,name:"Pad Kra Pao",time:15,servings:2,diff:"Easy",tags:["dairy-free"],img:"https://live.staticflickr.com/7750/18179159791_7c43db0168_c.jpg",ing:[{n:"ground pork",q:"300g"},{n:"Thai holy basil",q:"large bunch"},{n:"garlic",q:"5 cloves, minced"},{n:"Thai chili",q:"3, minced"},{n:"soy sauce",q:"1 tbsp"},{n:"fish sauce",q:"1 tbsp"},{n:"oyster sauce",q:"1 tbsp"},{n:"sugar",q:"1 tsp"},{n:"egg",q:"2, fried"},{n:"rice",q:"for serving"},{n:"vegetable oil",q:"2 tbsp"}],steps:["Stir-fry garlic and chili in hot oil 30 sec. Add pork, cook until browned.","Add soy sauce, fish sauce, oyster sauce, sugar. Stir-fry 2 min.","Toss in holy basil until just wilted. Serve over rice topped with a crispy fried egg."]},
{id:136,name:"Spanakopita",time:45,servings:8,diff:"Medium",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/55133295839_655546447c_c.jpg",ing:[{n:"spinach",q:"500g, fresh"},{n:"feta cheese",q:"200g, crumbled"},{n:"ricotta",q:"100g"},{n:"onion",q:"1, diced"},{n:"garlic",q:"3 cloves"},{n:"dill",q:"2 tbsp, fresh"},{n:"egg",q:"2"},{n:"phyllo dough",q:"12 sheets"},{n:"butter",q:"80g, melted"},{n:"nutmeg",q:"pinch"}],steps:["Sauté onion, add wilted spinach, garlic. Cool. Mix with feta, ricotta, eggs, dill, nutmeg.","Layer 6 phyllo sheets in a baking dish, brushing each with melted butter.","Spread filling, top with 6 more buttered phyllo sheets. Score top. Bake 180C 35-40 min until golden."]},
{id:137,name:"Fish & Chips",time:30,servings:4,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55146650975_cdcb073c09_c.jpg",ing:[{n:"cod fillets",q:"4"},{n:"potatoes",q:"800g, cut into chips"},{n:"flour",q:"150g"},{n:"baking powder",q:"1 tsp"},{n:"beer",q:"200ml, cold"},{n:"egg",q:"1"},{n:"salt",q:"to taste"},{n:"vegetable oil",q:"for frying"},{n:"malt vinegar",q:"for serving"},{n:"tartare sauce",q:"for serving"},{n:"peas",q:"for serving"}],steps:["Soak chips in cold water 30 min. Dry well. Double fry: 130C 6 min, then 190C 3 min until crispy.","Make batter: whisk flour, baking powder, beer, egg. Season fish, dip in batter.","Deep fry fish at 180C 5-7 min until golden. Serve with chips, malt vinegar, tartare sauce."]},
{id:138,name:"Tteokbokki",time:20,servings:3,diff:"Easy",tags:["vegetarian","dairy-free"],img:"https://live.staticflickr.com/65535/55131401202_fee655f6fc_c.jpg",ing:[{n:"rice cakes",q:"400g"},{n:"gochujang",q:"3 tbsp"},{n:"gochugaru",q:"1 tbsp"},{n:"soy sauce",q:"1 tbsp"},{n:"sugar",q:"2 tbsp"},{n:"anchovy or kelp broth",q:"400ml"},{n:"fish cakes",q:"150g, sliced"},{n:"green onion",q:"3"},{n:"hard-boiled egg",q:"2"},{n:"sesame seeds",q:"1 tbsp"}],steps:["Bring broth to boil. Add gochujang, gochugaru, soy sauce, sugar. Stir well.","Add rice cakes and fish cakes. Simmer 10-12 min until rice cakes are soft and sauce thickens.","Garnish with green onion, hard-boiled egg halves, sesame seeds."]},
{id:139,name:"Beef Tacos",time:20,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55126554380_7e5fce2b08_c.jpg",ing:[{n:"skirt steak",q:"500g"},{n:"cumin",q:"1 tsp"},{n:"chili powder",q:"1 tsp"},{n:"lime",q:"2"},{n:"garlic",q:"3 cloves"},{n:"corn tortillas",q:"8"},{n:"onion",q:"1, diced"},{n:"cilantro",q:"fresh"},{n:"avocado",q:"1"},{n:"salsa verde",q:"for serving"},{n:"vegetable oil",q:"2 tbsp"}],steps:["Season steak with cumin, chili, garlic, salt. Sear 3-4 min per side for medium-rare.","Rest 5 min. Slice thin against the grain.","Serve in warm tortillas with onion, cilantro, avocado, salsa verde, lime."]},
{id:140,name:"Eggs Benedict",time:25,servings:2,diff:"Medium",tags:["high-protein"],img:"https://live.staticflickr.com/65535/55015463549_32fe0ab61c_c.jpg",ing:[{n:"eggs",q:"4"},{n:"English muffins",q:"2, split and toasted"},{n:"ham or Canadian bacon",q:"4 slices"},{n:"butter",q:"100g"},{n:"egg yolks",q:"3"},{n:"lemon juice",q:"1 tbsp"},{n:"white vinegar",q:"1 tbsp"},{n:"cayenne",q:"pinch"},{n:"chives",q:"fresh, chopped"}],steps:["Make hollandaise: whisk yolks and lemon over double boiler. Slowly stream in melted butter. Season.","Poach eggs in simmering water with vinegar 3-4 min.","Layer: muffin, ham, poached egg, hollandaise. Garnish with chives and cayenne."]},
{id:141,name:"Carne Asada",time:20,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/54933711434_0ced8359eb_c.jpg",ing:[{n:"flank steak",q:"600g"},{n:"lime",q:"3, juiced"},{n:"garlic",q:"6 cloves"},{n:"cilantro",q:"bunch"},{n:"jalapeno",q:"1"},{n:"cumin",q:"1 tsp"},{n:"olive oil",q:"3 tbsp"},{n:"corn tortillas",q:"8"},{n:"onion",q:"1, grilled"},{n:"salsa",q:"for serving"}],steps:["Blend lime, garlic, cilantro, jalapeno, cumin, oil. Marinate steak 2 hours minimum.","Grill steak over very high heat 4-5 min per side for medium. Rest 10 min.","Slice thin against the grain. Serve with warm tortillas, grilled onion, and salsa."]},
{id:142,name:"Avocado Toast with Poached Egg",time:10,servings:2,diff:"Easy",tags:["vegetarian","nut-free"],img:"https://live.staticflickr.com/65535/55068775160_b1c2317a39_c.jpg",ing:[{n:"sourdough bread",q:"2 thick slices"},{n:"avocado",q:"1, ripe"},{n:"eggs",q:"2"},{n:"lemon juice",q:"1 tsp"},{n:"red pepper flakes",q:"pinch"},{n:"salt flakes",q:"to taste"},{n:"olive oil",q:"drizzle"},{n:"white vinegar",q:"for poaching"}],steps:["Toast sourdough until golden and crispy.","Mash avocado with lemon juice, salt, and pepper. Spread on toast.","Poach eggs 3-4 min. Place on avocado toast. Top with pepper flakes, salt flakes, olive oil."]},
{id:143,name:"Classic French Crepes",time:20,servings:6,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/3716/9034221348_ff9ae59350_c.jpg",ing:[{n:"flour",q:"125g"},{n:"eggs",q:"2"},{n:"milk",q:"300ml"},{n:"butter",q:"30g, melted"},{n:"sugar",q:"1 tbsp"},{n:"salt",q:"pinch"},{n:"vanilla extract",q:"1 tsp"},{n:"Nutella",q:"for serving"},{n:"fresh strawberries",q:"for serving"},{n:"whipped cream",q:"for serving"}],steps:["Blend flour, eggs, milk, melted butter, sugar, salt, vanilla until smooth. Rest 30 min.","Heat a non-stick pan, ladle thin batter, swirl to coat. Cook 1-2 min per side.","Fill with Nutella and strawberries, fold. Top with whipped cream."]},
{id:144,name:"Doro Wat",time:60,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/52519956943_2e73da2afd_c.jpg",ing:[{n:"chicken drumsticks",q:"8"},{n:"onion",q:"4, finely diced"},{n:"berbere spice",q:"3 tbsp"},{n:"niter kibbeh or butter",q:"80g"},{n:"garlic",q:"6 cloves"},{n:"ginger",q:"2 inch"},{n:"tomato paste",q:"2 tbsp"},{n:"hard-boiled eggs",q:"4"},{n:"lemon juice",q:"1 tbsp"},{n:"injera",q:"for serving"}],steps:["Slowly cook onions without oil over medium heat 15-20 min until deep brown and dry.","Add butter, berbere, garlic, ginger, tomato paste. Cook 10 min.","Add chicken, 200ml water. Cover, simmer 30 min. Add eggs last 5 min. Serve with injera."]},
{id:145,name:"Classic Tiramisu",time:30,servings:8,diff:"Medium",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/55141268161_efa5b854fb_c.jpg",ing:[{n:"mascarpone",q:"500g"},{n:"eggs",q:"4, separated"},{n:"sugar",q:"100g"},{n:"strong espresso",q:"300ml, cooled"},{n:"ladyfinger biscuits",q:"200g"},{n:"cocoa powder",q:"for dusting"},{n:"Marsala wine",q:"2 tbsp"},{n:"vanilla extract",q:"1 tsp"}],steps:["Whisk yolks with sugar until pale. Fold in mascarpone, Marsala, vanilla.","Whip egg whites to stiff peaks. Fold into mascarpone mixture.","Dip ladyfingers briefly in espresso. Layer biscuits and cream. Repeat. Dust with cocoa. Chill 4 hours."]},
{id:146,name:"Chicken Congee",time:45,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/54041582701_d4d1542461_c.jpg",ing:[{n:"jasmine rice",q:"150g"},{n:"chicken thighs",q:"4, bone-in"},{n:"ginger",q:"2 inch, sliced"},{n:"garlic",q:"4 cloves"},{n:"chicken broth",q:"1.5L"},{n:"soy sauce",q:"2 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"green onion",q:"3"},{n:"fried shallots",q:"for topping"},{n:"white pepper",q:"to taste"}],steps:["Rinse rice. Combine with chicken, ginger, garlic, broth in pot. Bring to boil.","Reduce heat, simmer 35-40 min, stirring occasionally, until rice breaks down and is porridge-like.","Remove chicken, shred, return to pot. Season with soy, pepper. Top with green onion, sesame oil, fried shallots."]},
{id:147,name:"Baba Ganoush",time:15,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/54233186012_4e3a79cbbf_c.jpg",ing:[{n:"eggplant",q:"2 large"},{n:"tahini",q:"3 tbsp"},{n:"lemon juice",q:"2 tbsp"},{n:"garlic",q:"2 cloves"},{n:"olive oil",q:"3 tbsp"},{n:"cumin",q:"1/2 tsp"},{n:"smoked paprika",q:"for garnish"},{n:"parsley",q:"fresh"},{n:"pomegranate seeds",q:"for garnish"},{n:"pita bread",q:"for serving"}],steps:["Char eggplants directly over gas flame or under broiler until skin is blackened and flesh is soft.","Scoop out flesh. Mash with tahini, lemon, garlic, olive oil, cumin, salt.","Drizzle with olive oil, garnish with paprika, parsley, pomegranate seeds. Serve with warm pita."]},
{id:148,name:"Jollof Rice",time:45,servings:6,diff:"Medium",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/55112669582_6fbe648620_c.jpg",ing:[{n:"long grain rice",q:"400g"},{n:"canned tomatoes",q:"400g"},{n:"red bell pepper",q:"3"},{n:"scotch bonnet",q:"1"},{n:"onion",q:"2"},{n:"tomato paste",q:"3 tbsp"},{n:"chicken broth",q:"400ml"},{n:"thyme",q:"1 tsp"},{n:"curry powder",q:"1 tsp"},{n:"bay leaves",q:"2"},{n:"vegetable oil",q:"4 tbsp"},{n:"chicken thighs",q:"4"}],steps:["Blend tomatoes, peppers, scotch bonnet, 1 onion into paste. Fry in oil 20 min until reduced.","Add tomato paste, thyme, curry powder, bay leaves. Season chicken, nestle in.","Add washed rice and broth. Cover tightly, cook on low 30 min. Do not lift lid. Fluff and serve."]},
{id:149,name:"Pancakes",time:20,servings:4,diff:"Easy",tags:["vegetarian","nut-free"],img:"https://live.staticflickr.com/65535/55154052848_757b5e3725_c.jpg",ing:[{n:"flour",q:"200g"},{n:"milk",q:"250ml"},{n:"eggs",q:"2"},{n:"baking powder",q:"2 tsp"},{n:"sugar",q:"2 tbsp"},{n:"butter",q:"30g, melted"},{n:"vanilla extract",q:"1 tsp"},{n:"salt",q:"pinch"},{n:"maple syrup",q:"for serving"},{n:"fresh berries",q:"for serving"}],steps:["Whisk dry ingredients. Whisk wet ingredients separately. Combine until just mixed - lumps are OK.","Ladle onto hot buttered griddle. Cook until bubbles form and pop, 2-3 min. Flip, cook 1-2 min.","Stack and serve with butter, maple syrup, and fresh berries."]},
{id:150,name:"Massaman Curry",time:40,servings:4,diff:"Medium",tags:["dairy-free","gluten-free"],img:"https://live.staticflickr.com/65535/54329194230_dd8b2ed5fa_c.jpg",ing:[{n:"beef chuck",q:"500g, cubed"},{n:"coconut milk",q:"800ml"},{n:"massaman curry paste",q:"3 tbsp"},{n:"potato",q:"2, cubed"},{n:"onion",q:"1, quartered"},{n:"peanuts",q:"60g, roasted"},{n:"tamarind paste",q:"2 tbsp"},{n:"fish sauce",q:"2 tbsp"},{n:"palm sugar",q:"2 tbsp"},{n:"cinnamon stick",q:"1"},{n:"cardamom pods",q:"3"},{n:"rice",q:"for serving"}],steps:["Fry curry paste in coconut cream 2 min. Add beef, sear 3 min.","Add remaining coconut milk, potato, onion, cinnamon, cardamom. Simmer 30 min until beef is tender.","Add peanuts, tamarind, fish sauce, sugar. Cook 5 min more. Serve over jasmine rice."]},
{id:151,name:"Cauliflower Tikka Masala",time:30,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free"],img:"https://live.staticflickr.com/65535/52234087940_96c8d265d5_c.jpg",ing:[{n:"cauliflower",q:"1 large head, florets"},{n:"coconut cream",q:"200ml"},{n:"canned tomatoes",q:"400g"},{n:"onion",q:"1"},{n:"garlic",q:"4 cloves"},{n:"ginger",q:"1 inch"},{n:"garam masala",q:"2 tsp"},{n:"turmeric",q:"1 tsp"},{n:"chili powder",q:"1 tsp"},{n:"coconut oil",q:"2 tbsp"},{n:"cilantro",q:"fresh"},{n:"rice",q:"for serving"}],steps:["Roast cauliflower with oil, turmeric, salt at 220C 20 min until charred.","Sauté onion, garlic, ginger, spices. Add tomatoes, simmer 10 min. Add coconut cream.","Add roasted cauliflower. Simmer 5 min. Serve over rice with cilantro."]},
{id:152,name:"Soba Noodle Salad",time:15,servings:3,diff:"Easy",tags:["vegan","vegetarian","dairy-free"],img:"https://live.staticflickr.com/65535/54612816425_0dbcf7cb49_c.jpg",ing:[{n:"soba noodles",q:"250g"},{n:"edamame",q:"100g"},{n:"cucumber",q:"1, julienned"},{n:"carrot",q:"1, julienned"},{n:"red cabbage",q:"100g, shredded"},{n:"green onion",q:"3"},{n:"sesame seeds",q:"2 tbsp"},{n:"soy sauce",q:"3 tbsp"},{n:"rice vinegar",q:"2 tbsp"},{n:"sesame oil",q:"2 tbsp"},{n:"mirin",q:"1 tbsp"},{n:"ginger",q:"1 tsp, grated"}],steps:["Cook soba noodles. Rinse under cold water until chilled.","Whisk soy sauce, rice vinegar, sesame oil, mirin, ginger for dressing.","Toss noodles with vegetables, edamame, dressing. Top with sesame seeds and green onion."]},
{id:153,name:"Lamb Chops with Mint Chimichurri",time:20,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54612707109_1624fe933c_c.jpg",ing:[{n:"lamb chops",q:"8, frenched"},{n:"fresh mint",q:"large bunch"},{n:"parsley",q:"large bunch"},{n:"garlic",q:"3 cloves"},{n:"red wine vinegar",q:"3 tbsp"},{n:"olive oil",q:"80ml"},{n:"red pepper flakes",q:"1/2 tsp"},{n:"salt and pepper",q:"to taste"}],steps:["Blend mint, parsley, garlic, vinegar, olive oil, pepper flakes for chimichurri.","Season lamb chops generously. Sear in very hot pan 3 min per side for medium-rare.","Rest 5 min. Serve with chimichurri spooned over."]},
{id:154,name:"Corn Chowder",time:30,servings:6,diff:"Easy",tags:["gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/55144008700_1406c5700b_c.jpg",ing:[{n:"corn",q:"6 ears or 500g frozen"},{n:"bacon",q:"4 strips"},{n:"onion",q:"1, diced"},{n:"potato",q:"2, cubed"},{n:"garlic",q:"3 cloves"},{n:"chicken broth",q:"500ml"},{n:"heavy cream",q:"200ml"},{n:"thyme",q:"fresh"},{n:"butter",q:"20g"},{n:"chives",q:"for garnish"}],steps:["Cook bacon crispy. Remove. Sauté onion and garlic in bacon fat 3 min.","Add potatoes, broth, thyme. Simmer 10 min. Add corn, cook 5 min.","Blend half for creamy base. Return to pot, add cream. Serve with bacon and chives."]},
{id:155,name:"Kimchi Jjigae",time:25,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/53737089551_a2cc45a166_c.jpg",ing:[{n:"aged kimchi",q:"300g"},{n:"pork belly",q:"200g, sliced"},{n:"firm tofu",q:"200g, cubed"},{n:"onion",q:"1, sliced"},{n:"garlic",q:"3 cloves"},{n:"gochugaru",q:"1 tbsp"},{n:"soy sauce",q:"1 tbsp"},{n:"anchovy broth",q:"400ml"},{n:"green onion",q:"2"},{n:"sesame oil",q:"1 tsp"},{n:"rice",q:"for serving"}],steps:["Sauté pork belly until fat renders. Add kimchi and garlic, cook 3 min.","Add broth, gochugaru, soy sauce. Bring to boil, simmer 15 min.","Add tofu, simmer 5 min. Top with green onion, sesame oil. Serve with rice."]},
{id:156,name:"Mushroom Wellington",time:60,servings:6,diff:"Hard",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54489439167_3643f3c13a_c.jpg",ing:[{n:"mushrooms",q:"800g mixed, finely diced"},{n:"puff pastry",q:"2 sheets"},{n:"onion",q:"1, diced"},{n:"garlic",q:"4 cloves"},{n:"thyme",q:"2 tbsp, fresh"},{n:"Dijon mustard",q:"2 tbsp"},{n:"spinach",q:"150g"},{n:"cream cheese",q:"100g"},{n:"egg",q:"1, for wash"},{n:"salt and pepper",q:"to taste"}],steps:["Sauté mushrooms with onion, garlic, thyme until all moisture evaporates, 12-15 min. Cool.","Mix mushrooms with cream cheese, mustard, seasoning. Spread on pastry, add spinach layer. Roll tightly.","Egg wash. Bake 200C 30-35 min until golden and puffed. Rest 10 min before slicing."]},
{id:157,name:"Shrimp Fried Rice",time:15,servings:3,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/55100642369_c78b69ba36_c.jpg",ing:[{n:"large shrimp",q:"300g, peeled"},{n:"cooked jasmine rice",q:"400g, day-old"},{n:"egg",q:"2"},{n:"garlic",q:"3 cloves"},{n:"green onion",q:"3"},{n:"peas",q:"80g"},{n:"soy sauce",q:"3 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"white pepper",q:"pinch"},{n:"vegetable oil",q:"2 tbsp"}],steps:["Scramble eggs in hot wok, break into pieces. Remove.","Stir-fry shrimp with garlic 2 min. Add rice, peas, soy sauce. Toss over high heat 3 min.","Return egg, add sesame oil, white pepper. Garnish with green onion."]},
{id:158,name:"Croque Monsieur",time:15,servings:2,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/54743156917_d4802d3e62_c.jpg",ing:[{n:"white bread",q:"4 slices"},{n:"ham",q:"4 slices"},{n:"gruyere cheese",q:"150g, grated"},{n:"butter",q:"40g"},{n:"flour",q:"20g"},{n:"milk",q:"200ml"},{n:"Dijon mustard",q:"1 tsp"},{n:"nutmeg",q:"pinch"}],steps:["Make bechamel: melt butter, add flour, whisk in milk until thick. Add half the gruyere and nutmeg.","Spread mustard on bread. Layer ham and bechamel. Close sandwich.","Spread more bechamel on top, sprinkle remaining gruyere. Broil 3-5 min until golden and bubbly."]},
{id:159,name:"Chicken Satay with Peanut Sauce",time:25,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/1776/43825713282_465713f4b9_c.jpg",ing:[{n:"chicken breast",q:"600g, cubed"},{n:"coconut milk",q:"100ml"},{n:"turmeric",q:"1 tsp"},{n:"cumin",q:"1 tsp"},{n:"coriander",q:"1 tsp"},{n:"lemongrass",q:"1 stalk"},{n:"peanut butter",q:"3 tbsp"},{n:"soy sauce",q:"2 tbsp"},{n:"lime",q:"1"},{n:"chili flakes",q:"1 tsp"},{n:"sugar",q:"1 tbsp"},{n:"cucumber relish",q:"for serving"}],steps:["Marinate chicken in coconut milk, turmeric, cumin, coriander, lemongrass 30 min. Thread onto skewers.","Make peanut sauce: simmer peanut butter, coconut milk, soy sauce, lime, chili, sugar.","Grill skewers 3-4 min per side. Serve with peanut sauce and cucumber relish."]},
{id:160,name:"Gazpacho",time:15,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/55122189219_fa6ba74efb_c.jpg",ing:[{n:"ripe tomatoes",q:"1kg"},{n:"cucumber",q:"1"},{n:"red bell pepper",q:"1"},{n:"red onion",q:"1/2"},{n:"garlic",q:"2 cloves"},{n:"sherry vinegar",q:"2 tbsp"},{n:"olive oil",q:"60ml"},{n:"stale bread",q:"50g, soaked"},{n:"salt",q:"to taste"},{n:"croutons",q:"for serving"}],steps:["Roughly chop all vegetables. Blend with soaked bread, vinegar, and olive oil until smooth.","Season with salt. Chill at least 2 hours for flavors to meld.","Serve cold in bowls with a drizzle of olive oil, croutons, and diced cucumber."]},
{id:161,name:"Katsu Don",time:25,servings:2,diff:"Easy",tags:["high-protein"],img:"https://live.staticflickr.com/65535/53462384099_66a778cec5_c.jpg",ing:[{n:"pork cutlet",q:"2, breaded and fried"},{n:"eggs",q:"4"},{n:"onion",q:"1, sliced"},{n:"dashi broth",q:"200ml"},{n:"soy sauce",q:"3 tbsp"},{n:"mirin",q:"2 tbsp"},{n:"sugar",q:"1 tsp"},{n:"rice",q:"for serving"},{n:"green onion",q:"2"},{n:"nori",q:"for garnish"}],steps:["Simmer onion in dashi, soy sauce, mirin, sugar until soft.","Slice pork katsu, lay over onions. Pour beaten eggs over. Cover, cook 2 min until eggs are just set.","Slide over hot rice bowls. Garnish with green onion and nori."]},
{id:162,name:"Stuffed Mushrooms",time:25,servings:6,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55124389808_c954af5738_c.jpg",ing:[{n:"large portobello mushrooms",q:"6"},{n:"Italian sausage",q:"250g"},{n:"cream cheese",q:"100g"},{n:"garlic",q:"3 cloves"},{n:"parmesan",q:"40g"},{n:"breadcrumbs",q:"30g"},{n:"parsley",q:"fresh"},{n:"olive oil",q:"2 tbsp"}],steps:["Remove mushroom stems, dice them. Cook sausage with diced stems and garlic.","Mix with cream cheese, half the parmesan, parsley.","Fill mushroom caps, top with breadcrumbs and remaining parmesan. Bake 190C 18-20 min."]},
{id:163,name:"Caribbean Curry Chicken",time:40,servings:4,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/53242953947_044cac42d9_c.jpg",ing:[{n:"chicken thighs",q:"600g, cubed"},{n:"Caribbean curry powder",q:"3 tbsp"},{n:"onion",q:"1, diced"},{n:"garlic",q:"4 cloves"},{n:"scotch bonnet",q:"1, whole"},{n:"potato",q:"2, cubed"},{n:"coconut milk",q:"200ml"},{n:"thyme",q:"3 sprigs"},{n:"allspice",q:"1/2 tsp"},{n:"vegetable oil",q:"3 tbsp"},{n:"rice",q:"for serving"}],steps:["Season chicken with curry powder, salt. Brown in oil 3 min. Remove.","Sauté onion, garlic, thyme. Return chicken. Add potatoes, coconut milk, scotch bonnet, allspice.","Cover, simmer 25 min until potatoes tender and sauce thick. Remove scotch bonnet. Serve with rice."]},
{id:164,name:"Mushroom Bourguignon",time:45,servings:4,diff:"Medium",tags:["vegan","vegetarian","dairy-free","gluten-free"],img:"https://live.staticflickr.com/65535/51753376745_a51bbd7f66_c.jpg",ing:[{n:"mixed mushrooms",q:"600g"},{n:"red wine",q:"300ml"},{n:"vegetable broth",q:"200ml"},{n:"pearl onions",q:"200g"},{n:"carrot",q:"2, chunked"},{n:"garlic",q:"4 cloves"},{n:"tomato paste",q:"2 tbsp"},{n:"thyme",q:"3 sprigs"},{n:"bay leaf",q:"1"},{n:"olive oil",q:"3 tbsp"},{n:"flour",q:"1 tbsp"},{n:"mashed potatoes",q:"for serving"}],steps:["Sear mushrooms in batches until golden. Remove. Sauté pearl onions and carrot 5 min.","Add garlic, tomato paste, flour. Deglaze with wine. Add broth, herbs.","Return mushrooms. Simmer 25-30 min. Serve over mashed potatoes."]},
{id:165,name:"Cobb Salad",time:15,servings:2,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54889498166_c1b449cf1e_c.jpg",ing:[{n:"chicken breast",q:"2, grilled"},{n:"bacon",q:"4 strips, crispy"},{n:"eggs",q:"2, hard-boiled"},{n:"avocado",q:"1"},{n:"cherry tomatoes",q:"100g"},{n:"blue cheese",q:"60g, crumbled"},{n:"romaine lettuce",q:"1 head"},{n:"red wine vinegar",q:"2 tbsp"},{n:"olive oil",q:"3 tbsp"},{n:"Dijon mustard",q:"1 tsp"},{n:"chives",q:"fresh"}],steps:["Grill and slice chicken. Cook bacon crispy. Hard-boil eggs.","Chop lettuce, arrange on platter. Line rows of chicken, bacon, egg, avocado, tomatoes, blue cheese.","Whisk vinegar, oil, mustard. Drizzle over salad."]},
{id:166,name:"Arepas with Black Beans",time:25,servings:4,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:U+"1730766451299-9c019b78562d?w=600&h=400&fit=crop",ing:[{n:"pre-cooked corn flour",q:"200g"},{n:"warm water",q:"300ml"},{n:"salt",q:"1 tsp"},{n:"black beans",q:"1 can"},{n:"avocado",q:"1"},{n:"queso fresco",q:"50g"},{n:"cilantro",q:"fresh"},{n:"lime",q:"1"},{n:"cumin",q:"1/2 tsp"},{n:"vegetable oil",q:"for cooking"}],steps:["Mix corn flour, water, salt. Knead 3 min. Form into 8 discs.","Cook in oiled skillet 3-4 min per side until golden crust forms.","Split open, fill with seasoned black beans, avocado, queso fresco, cilantro, lime."]},
{id:167,name:"Lobster Bisque",time:45,servings:4,diff:"Medium",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55096954587_741c64f95e_c.jpg",ing:[{n:"lobster shells and meat",q:"from 2 lobsters"},{n:"onion",q:"1, diced"},{n:"carrot",q:"1, diced"},{n:"celery",q:"1 stalk"},{n:"garlic",q:"3 cloves"},{n:"tomato paste",q:"2 tbsp"},{n:"brandy",q:"60ml"},{n:"heavy cream",q:"200ml"},{n:"fish stock",q:"750ml"},{n:"butter",q:"40g"},{n:"tarragon",q:"fresh"},{n:"cayenne",q:"pinch"}],steps:["Sauté shells in butter 5 min. Add vegetables, garlic, tomato paste. Cook 5 min.","Add brandy and flambe. Add stock, simmer 30 min. Strain, pressing shells.","Reduce by third. Add cream, cayenne, tarragon. Serve with lobster meat on top."]},
{id:168,name:"Lemon Ricotta Pancakes",time:20,servings:4,diff:"Easy",tags:["vegetarian","nut-free"],img:"https://live.staticflickr.com/65535/52031342270_bb36d55e0e_c.jpg",ing:[{n:"ricotta",q:"250g"},{n:"eggs",q:"3, separated"},{n:"flour",q:"100g"},{n:"lemon",q:"1, zested and juiced"},{n:"sugar",q:"2 tbsp"},{n:"baking powder",q:"1 tsp"},{n:"vanilla extract",q:"1 tsp"},{n:"butter",q:"for cooking"},{n:"blueberries",q:"for serving"},{n:"maple syrup",q:"for serving"}],steps:["Whisk yolks with ricotta, lemon zest, juice, sugar, vanilla. Add flour and baking powder.","Whip whites to soft peaks. Fold gently into batter.","Cook on buttered griddle 2-3 min per side. Serve with blueberries and maple syrup."]},
{id:169,name:"Char Siu Pork",time:90,servings:4,diff:"Medium",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/53389974529_3ee2c71446_c.jpg",ing:[{n:"pork shoulder",q:"600g, cut into strips"},{n:"hoisin sauce",q:"3 tbsp"},{n:"soy sauce",q:"2 tbsp"},{n:"honey",q:"3 tbsp"},{n:"five spice",q:"1 tsp"},{n:"red fermented bean curd",q:"1 tbsp"},{n:"garlic",q:"3 cloves"},{n:"sesame oil",q:"1 tsp"},{n:"red food coloring",q:"optional"},{n:"rice",q:"for serving"},{n:"steamed bok choy",q:"for serving"}],steps:["Mix all sauce ingredients. Marinate pork strips 4 hours or overnight.","Roast at 180C 30 min, basting every 10 min. Increase to 220C, brush with honey, broil 3-5 min.","Rest 10 min. Slice. Serve with rice and bok choy."]},
{id:170,name:"Tortilla Espanola",time:30,servings:4,diff:"Easy",tags:["vegetarian","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/54530766887_d0d81b869e_c.jpg",ing:[{n:"potatoes",q:"500g, thinly sliced"},{n:"onion",q:"1, thinly sliced"},{n:"eggs",q:"6"},{n:"olive oil",q:"150ml"},{n:"salt",q:"to taste"}],steps:["Gently fry potatoes and onion in olive oil over medium-low 15-20 min until very tender. Drain, save oil.","Beat eggs, season. Fold in potato-onion mixture. Let sit 5 min.","Cook in oiled pan 5 min until edges set. Flip onto plate, slide back. Cook 3-4 min more. Serve at room temp."]},
{id:171,name:"Mango Sticky Rice",time:30,servings:2,diff:"Easy",tags:["vegan","vegetarian","dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/55096936228_f94f5951b2_c.jpg",ing:[{n:"glutinous rice",q:"200g, soaked 4 hours"},{n:"coconut milk",q:"300ml"},{n:"sugar",q:"80g"},{n:"salt",q:"1/4 tsp"},{n:"ripe mango",q:"2, sliced"},{n:"sesame seeds",q:"1 tbsp"},{n:"pandan leaf",q:"optional"}],steps:["Steam soaked glutinous rice 20-25 min until tender.","Warm coconut milk with sugar and salt. Pour 2/3 over hot rice. Let absorb 15 min.","Mound rice on plates. Arrange mango slices alongside. Drizzle remaining coconut sauce. Top with sesame seeds."]},
{id:172,name:"Shakshuka with Sausage",time:30,servings:4,diff:"Medium",tags:["gluten-free","nut-free"],img:"https://live.staticflickr.com/1628/24362934099_7464a35a2d_c.jpg",ing:[{n:"Italian sausage",q:"4 links, casings removed"},{n:"canned tomatoes",q:"800g"},{n:"onion",q:"1, diced"},{n:"bell pepper",q:"2, diced"},{n:"garlic",q:"4 cloves"},{n:"eggs",q:"6"},{n:"cumin",q:"1 tsp"},{n:"smoked paprika",q:"1 tsp"},{n:"feta",q:"50g"},{n:"cilantro",q:"fresh"},{n:"olive oil",q:"2 tbsp"},{n:"bread",q:"for serving"}],steps:["Brown sausage, break into chunks. Add onion, pepper, garlic 5 min.","Add tomatoes, spices. Simmer 10 min.","Make 6 wells, crack eggs. Cover, cook 5-8 min. Top with feta and cilantro."]},
{id:173,name:"Vegetable Tempura",time:20,servings:4,diff:"Medium",tags:["vegan","vegetarian","dairy-free"],img:"https://live.staticflickr.com/65535/54885500049_ac0c06d358_c.jpg",ing:[{n:"sweet potato",q:"1, sliced thin"},{n:"broccoli florets",q:"100g"},{n:"bell pepper",q:"1, sliced"},{n:"onion",q:"1, rings"},{n:"shiitake mushrooms",q:"6"},{n:"flour",q:"100g"},{n:"cornstarch",q:"50g"},{n:"sparkling water",q:"200ml, ice cold"},{n:"egg",q:"1"},{n:"vegetable oil",q:"for frying"},{n:"soy sauce",q:"for dipping"},{n:"grated daikon",q:"for serving"}],steps:["Mix flour, cornstarch, egg, ice cold sparkling water loosely - lumps are good. Keep cold.","Heat oil to 180C. Dip vegetables in batter, fry 2-3 min until light and crispy.","Drain on wire rack. Serve immediately with soy dipping sauce and grated daikon."]},
{id:174,name:"Pork Schnitzel",time:20,servings:4,diff:"Easy",tags:["high-protein","nut-free"],img:"https://live.staticflickr.com/65535/54730061246_8e91be9949_c.jpg",ing:[{n:"pork loin",q:"4, pounded thin"},{n:"flour",q:"80g"},{n:"eggs",q:"2, beaten"},{n:"breadcrumbs",q:"150g"},{n:"lemon",q:"2"},{n:"butter",q:"40g"},{n:"vegetable oil",q:"for frying"},{n:"salt and pepper",q:"to taste"},{n:"potato salad",q:"for serving"},{n:"lingonberry jam",q:"for serving"}],steps:["Season pork. Dredge in flour, egg, breadcrumbs.","Fry in mix of butter and oil 3-4 min per side until golden and crispy.","Serve with lemon wedges, potato salad, and lingonberry jam."]},
{id:175,name:"Clam Chowder",time:30,servings:6,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55130052380_c4985695df_c.jpg",ing:[{n:"clams",q:"1kg or 2 cans"},{n:"bacon",q:"4 strips, diced"},{n:"onion",q:"1, diced"},{n:"celery",q:"2 stalks, diced"},{n:"potato",q:"3, cubed"},{n:"garlic",q:"3 cloves"},{n:"flour",q:"2 tbsp"},{n:"milk",q:"400ml"},{n:"heavy cream",q:"200ml"},{n:"thyme",q:"fresh"},{n:"bay leaf",q:"1"},{n:"oyster crackers",q:"for serving"}],steps:["Cook bacon. Add onion, celery, garlic 5 min. Add flour, stir 1 min.","Add potatoes, milk, thyme, bay leaf. Simmer 15 min until potatoes tender.","Add clams and cream. Cook 5 min. Season. Serve with oyster crackers."]},
{id:176,name:"Chimichurri Steak",time:20,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/55018391121_989662f0c0_c.jpg",ing:[{n:"ribeye steak",q:"2 large, 3cm thick"},{n:"parsley",q:"large bunch"},{n:"oregano",q:"1 tbsp, fresh"},{n:"garlic",q:"4 cloves"},{n:"red wine vinegar",q:"3 tbsp"},{n:"olive oil",q:"80ml"},{n:"red pepper flakes",q:"1 tsp"},{n:"salt and pepper",q:"to taste"}],steps:["Make chimichurri: finely chop parsley, oregano, garlic. Mix with vinegar, oil, pepper flakes, salt.","Season steaks generously. Sear in smoking hot pan 4 min per side for medium-rare. Rest 5 min.","Slice against grain. Spoon chimichurri generously over top."]},
{id:177,name:"Chocolate Lava Cakes",time:20,servings:4,diff:"Medium",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54611628477_0131f827d8_c.jpg",ing:[{n:"dark chocolate",q:"200g"},{n:"butter",q:"120g"},{n:"eggs",q:"4"},{n:"sugar",q:"80g"},{n:"flour",q:"40g"},{n:"vanilla extract",q:"1 tsp"},{n:"salt",q:"pinch"},{n:"powdered sugar",q:"for dusting"},{n:"whipped cream",q:"for serving"}],steps:["Melt chocolate and butter together. Whisk eggs with sugar until thick.","Fold chocolate into eggs. Add flour, vanilla, salt. Pour into greased ramekins.","Bake 200C 10-12 min until edges set but center jiggles. Invert onto plates. Dust with powdered sugar."]},
{id:178,name:"Nasi Goreng",time:15,servings:2,diff:"Easy",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/54930962091_678102e1b8_c.jpg",ing:[{n:"cooked jasmine rice",q:"400g, day-old"},{n:"shrimp",q:"150g"},{n:"chicken breast",q:"150g, diced"},{n:"garlic",q:"3 cloves"},{n:"shallots",q:"3, sliced"},{n:"kecap manis",q:"3 tbsp"},{n:"sambal oelek",q:"1 tbsp"},{n:"egg",q:"2, fried"},{n:"cucumber",q:"for serving"},{n:"prawn crackers",q:"for serving"},{n:"green onion",q:"2"}],steps:["Stir-fry chicken and shrimp in hot wok 3 min. Add garlic, shallots 1 min.","Add rice, kecap manis, sambal. Toss over high heat 3 min.","Serve topped with fried egg, cucumber slices, prawn crackers, green onion."]},
{id:179,name:"Beef Rendang",time:120,servings:6,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54521749951_cf384e1d69_c.jpg",ing:[{n:"beef chuck",q:"1kg, cubed"},{n:"coconut milk",q:"800ml"},{n:"lemongrass",q:"3 stalks, bruised"},{n:"galangal",q:"3 slices"},{n:"turmeric leaves",q:"2 or 1 tsp turmeric"},{n:"kaffir lime leaves",q:"5"},{n:"onion",q:"3"},{n:"garlic",q:"6 cloves"},{n:"ginger",q:"2 inch"},{n:"dried chilies",q:"10, soaked"},{n:"toasted coconut",q:"3 tbsp"},{n:"salt",q:"to taste"},{n:"rice",q:"for serving"}],steps:["Blend onion, garlic, ginger, chilies into paste. Fry in oil 5 min.","Add coconut milk, lemongrass, galangal, lime leaves, beef. Simmer uncovered.","Cook 2-2.5 hours, stirring occasionally, until sauce is dry and meat is dark and tender. Add toasted coconut."]},
{id:180,name:"Frittata",time:20,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55093117534_431fdddbb0_c.jpg",ing:[{n:"eggs",q:"8"},{n:"cherry tomatoes",q:"100g, halved"},{n:"spinach",q:"100g"},{n:"goat cheese",q:"60g"},{n:"red onion",q:"1/2, sliced"},{n:"garlic",q:"2 cloves"},{n:"olive oil",q:"2 tbsp"},{n:"salt and pepper",q:"to taste"},{n:"fresh herbs",q:"basil, chives"}],steps:["Sauté onion and garlic 2 min. Add spinach until wilted.","Pour in beaten, seasoned eggs. Add tomatoes, dot with goat cheese. Cook 5 min until edges set.","Transfer to broiler 3-4 min until top is puffed and golden. Slide out, cut into wedges."]},
{id:181,name:"Chicken Pot Pie",time:50,servings:6,diff:"Medium",tags:["high-protein","nut-free"],img:"https://live.staticflickr.com/65535/55049382830_610f581591_c.jpg",ing:[{n:"chicken breast",q:"400g, cooked and diced"},{n:"puff pastry",q:"1 sheet"},{n:"onion",q:"1, diced"},{n:"carrot",q:"2, diced"},{n:"peas",q:"100g"},{n:"potato",q:"1, cubed"},{n:"butter",q:"40g"},{n:"flour",q:"30g"},{n:"chicken broth",q:"300ml"},{n:"milk",q:"100ml"},{n:"thyme",q:"1 tsp"},{n:"egg",q:"1, for wash"}],steps:["Cook carrot and potato in broth 10 min. Make roux: butter, flour, milk. Combine with broth and vegetables.","Add chicken, peas, onion, thyme. Pour into baking dish.","Top with puff pastry, crimp edges, egg wash. Cut slits. Bake 200C 25-30 min until golden."]},
{id:182,name:"Tamales",time:120,servings:12,diff:"Hard",tags:["dairy-free","gluten-free","nut-free"],img:"https://live.staticflickr.com/65535/55146718807_0f45797ebc_c.jpg",ing:[{n:"masa harina",q:"500g"},{n:"lard or vegetable shortening",q:"200g"},{n:"chicken broth",q:"400ml"},{n:"baking powder",q:"1 tsp"},{n:"salt",q:"1 tsp"},{n:"chicken thighs",q:"500g, cooked and shredded"},{n:"salsa verde",q:"200ml"},{n:"corn husks",q:"12, soaked"},{n:"cilantro",q:"fresh"}],steps:["Beat lard until fluffy. Mix in masa harina, broth, baking powder, salt until dough is light.","Spread dough on corn husks. Add shredded chicken and salsa verde. Fold and tie.","Steam tamales upright in steamer 60-75 min until dough pulls away from husk cleanly."]},
{id:183,name:"Paneer Tikka",time:25,servings:4,diff:"Easy",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/65535/51932469678_37d0d59c87_c.jpg",ing:[{n:"paneer",q:"400g, cubed"},{n:"yogurt",q:"150g"},{n:"ginger-garlic paste",q:"2 tbsp"},{n:"garam masala",q:"1 tsp"},{n:"turmeric",q:"1/2 tsp"},{n:"chili powder",q:"1 tsp"},{n:"lemon juice",q:"2 tbsp"},{n:"bell pepper",q:"2, chunked"},{n:"onion",q:"1, chunked"},{n:"oil",q:"2 tbsp"},{n:"chaat masala",q:"for serving"},{n:"mint chutney",q:"for serving"}],steps:["Marinate paneer and vegetables in yogurt, spices, lemon 30 min minimum.","Thread onto skewers. Grill or broil 4-5 min per side until charred.","Sprinkle with chaat masala and lemon juice. Serve with mint chutney."]},
{id:184,name:"Panna Cotta",time:15,servings:4,diff:"Easy",tags:["gluten-free"],img:"https://live.staticflickr.com/65535/55154344049_40c8fbbbcd_c.jpg",ing:[{n:"heavy cream",q:"400ml"},{n:"milk",q:"100ml"},{n:"sugar",q:"60g"},{n:"vanilla bean",q:"1, split"},{n:"gelatin sheets",q:"3"},{n:"mixed berries",q:"200g"},{n:"lemon juice",q:"1 tsp"},{n:"extra sugar",q:"2 tbsp"}],steps:["Soak gelatin in cold water. Heat cream, milk, sugar, vanilla until just simmering.","Remove from heat. Squeeze gelatin, stir in until dissolved.","Pour into 4 molds. Chill 4-6 hours. Top with macerated berries before serving."]},
{id:185,name:"Risotto ai Funghi Porcini",time:35,servings:4,diff:"Medium",tags:["vegetarian","gluten-free"],img:"https://live.staticflickr.com/65535/54346378224_583d434afc_c.jpg",ing:[{n:"arborio rice",q:"300g"},{n:"dried porcini mushrooms",q:"30g, rehydrated"},{n:"fresh mushrooms",q:"200g"},{n:"onion",q:"1, finely diced"},{n:"white wine",q:"150ml"},{n:"vegetable broth",q:"1L"},{n:"parmesan",q:"60g"},{n:"butter",q:"40g"},{n:"truffle oil",q:"optional, drizzle"}],steps:["Rehydrate porcini in warm water 15 min. Save liquid. Sauté fresh mushrooms 5 min.","Toast rice, add wine. Add porcini liquid and broth one ladle at a time, stirring 18-20 min.","Fold in mushrooms, butter, parmesan. Drizzle truffle oil if using."]},
{id:186,name:"Carnitas Bowl",time:25,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54550976589_49fdaba131_c.jpg",ing:[{n:"pulled pork carnitas",q:"400g (leftover or store-bought)"},{n:"rice",q:"250g"},{n:"black beans",q:"1 can"},{n:"corn",q:"1 can"},{n:"avocado",q:"1"},{n:"pico de gallo",q:"150g"},{n:"queso fresco",q:"50g"},{n:"lime",q:"2"},{n:"cilantro",q:"fresh"},{n:"sour cream",q:"for serving"}],steps:["Crisp carnitas in a hot pan. Cook cilantro-lime rice.","Warm beans with cumin. Drain corn.","Assemble bowls: rice, beans, corn, carnitas, avocado, pico de gallo, queso fresco, sour cream, lime."]},
{id:187,name:"Prawn Toast",time:15,servings:4,diff:"Easy",tags:["dairy-free","high-protein"],img:U+"1612570964312-e0f339a84d6f?w=600&h=400&fit=crop",ing:[{n:"raw shrimp",q:"300g, peeled"},{n:"white bread",q:"8 slices, crusts removed"},{n:"garlic",q:"2 cloves"},{n:"ginger",q:"1 tsp"},{n:"sesame oil",q:"1 tsp"},{n:"egg white",q:"1"},{n:"white pepper",q:"pinch"},{n:"sesame seeds",q:"3 tbsp"},{n:"vegetable oil",q:"for frying"},{n:"sweet chili sauce",q:"for serving"}],steps:["Blend shrimp, garlic, ginger, sesame oil, egg white, pepper, salt into paste.","Spread paste thickly on bread slices. Press sesame seeds on top. Cut diagonally.","Deep fry shrimp-side down at 180C 2-3 min, flip 1 min. Serve with sweet chili sauce."]},
{id:188,name:"Banana Bread",time:55,servings:8,diff:"Easy",tags:["vegetarian","nut-free"],img:"https://live.staticflickr.com/65535/55122316760_1d503acca3_c.jpg",ing:[{n:"ripe bananas",q:"3, mashed"},{n:"butter",q:"100g, melted"},{n:"sugar",q:"150g"},{n:"eggs",q:"2"},{n:"vanilla extract",q:"1 tsp"},{n:"flour",q:"200g"},{n:"baking soda",q:"1 tsp"},{n:"salt",q:"pinch"},{n:"cinnamon",q:"1 tsp"},{n:"walnuts",q:"60g, optional"}],steps:["Mash bananas. Mix with melted butter, sugar, eggs, vanilla.","Fold in flour, baking soda, salt, cinnamon. Add walnuts if using.","Pour into greased loaf pan. Bake 175C 50-55 min until toothpick comes out clean. Cool 10 min."]},
{id:189,name:"Wonton Soup",time:35,servings:4,diff:"Medium",tags:["dairy-free"],img:"https://live.staticflickr.com/65535/55104580372_9832d62e53_c.jpg",ing:[{n:"ground pork",q:"250g"},{n:"shrimp",q:"100g, minced"},{n:"wonton wrappers",q:"40"},{n:"ginger",q:"1 tbsp, grated"},{n:"green onion",q:"3"},{n:"soy sauce",q:"2 tbsp"},{n:"sesame oil",q:"1 tsp"},{n:"chicken broth",q:"1L"},{n:"bok choy",q:"200g"},{n:"chili oil",q:"for serving"}],steps:["Mix pork, shrimp, ginger, 1 green onion chopped, 1 tbsp soy sauce, sesame oil.","Place teaspoon of filling in each wrapper, fold and seal.","Simmer broth with remaining soy sauce. Cook wontons 3-4 min. Add bok choy. Serve with chili oil and green onion."]},
{id:190,name:"Ceviche",time:20,servings:4,diff:"Easy",tags:["dairy-free","gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/55140317714_7173c50374_c.jpg",ing:[{n:"white fish",q:"400g, cubed (sea bass or halibut)"},{n:"lime juice",q:"150ml, fresh"},{n:"red onion",q:"1, thinly sliced"},{n:"tomato",q:"2, diced"},{n:"cilantro",q:"large bunch"},{n:"jalapeno",q:"1, minced"},{n:"avocado",q:"1"},{n:"cucumber",q:"1/2, diced"},{n:"salt",q:"to taste"},{n:"tortilla chips",q:"for serving"}],steps:["Cube fish into 1cm pieces. Toss with lime juice. Refrigerate 30-45 min until fish is opaque.","Drain most of the lime juice. Add onion, tomato, cilantro, jalapeno, cucumber.","Toss gently. Season with salt. Serve with sliced avocado and tortilla chips."]},
{id:191,name:"Baked Mac & Cheese",time:35,servings:6,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/54902286674_763e6fea5b_c.jpg",ing:[{n:"elbow macaroni",q:"400g"},{n:"sharp cheddar",q:"250g, grated"},{n:"gruyere",q:"100g, grated"},{n:"milk",q:"500ml"},{n:"butter",q:"40g"},{n:"flour",q:"30g"},{n:"Dijon mustard",q:"1 tsp"},{n:"paprika",q:"1/2 tsp"},{n:"panko breadcrumbs",q:"50g"},{n:"salt and pepper",q:"to taste"}],steps:["Cook macaroni. Make roux: butter, flour, then whisk in milk until thick.","Remove from heat, stir in cheeses, mustard, seasoning. Fold in macaroni.","Transfer to baking dish, top with panko and paprika. Bake 190C 20 min until golden and bubbly."]},
{id:192,name:"Chicken Korma",time:35,servings:4,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/54771592982_4888507a33_c.jpg",ing:[{n:"chicken thighs",q:"600g, cubed"},{n:"onion",q:"1, diced"},{n:"garlic",q:"3 cloves"},{n:"ginger",q:"1 inch"},{n:"ground almonds",q:"50g"},{n:"yogurt",q:"100g"},{n:"heavy cream",q:"100ml"},{n:"garam masala",q:"2 tsp"},{n:"turmeric",q:"1/2 tsp"},{n:"cardamom",q:"3 pods"},{n:"butter",q:"30g"},{n:"cilantro",q:"fresh"},{n:"rice",q:"for serving"}],steps:["Sauté onion in butter 5 min. Add garlic, ginger, spices 1 min.","Add chicken, cook 3 min. Add yogurt and ground almonds. Simmer 20 min.","Stir in cream. Garnish with cilantro. Serve with basmati rice."]},
{id:193,name:"Pulled Pork Nachos",time:20,servings:6,diff:"Easy",tags:["gluten-free","high-protein"],img:"https://live.staticflickr.com/4294/35407165913_288940c8e4_c.jpg",ing:[{n:"pulled pork",q:"400g"},{n:"tortilla chips",q:"300g"},{n:"cheddar cheese",q:"200g, shredded"},{n:"jalapenos",q:"pickled, sliced"},{n:"black beans",q:"1 can, drained"},{n:"sour cream",q:"100ml"},{n:"guacamole",q:"150g"},{n:"salsa",q:"150g"},{n:"green onion",q:"3"},{n:"cilantro",q:"fresh"}],steps:["Spread chips on a baking sheet. Layer with pulled pork, beans, and cheese.","Bake 190C 8-10 min until cheese is melted and bubbly.","Top with jalapenos, sour cream, guacamole, salsa, green onion, cilantro. Serve immediately."]},
{id:194,name:"Cioppino",time:40,servings:6,diff:"Medium",tags:["dairy-free","gluten-free","high-protein"],img:"https://live.staticflickr.com/65535/55036950573_63e4d675c5_c.jpg",ing:[{n:"white fish",q:"300g, cubed"},{n:"shrimp",q:"200g"},{n:"mussels",q:"300g"},{n:"squid",q:"150g, rings"},{n:"canned tomatoes",q:"800g"},{n:"onion",q:"1"},{n:"garlic",q:"6 cloves"},{n:"fennel",q:"1 bulb, sliced"},{n:"white wine",q:"200ml"},{n:"fish stock",q:"300ml"},{n:"red pepper flakes",q:"1/2 tsp"},{n:"basil",q:"fresh"},{n:"crusty bread",q:"for serving"}],steps:["Sauté fennel, onion, garlic 5 min. Add pepper flakes, wine. Cook 2 min.","Add tomatoes and fish stock. Simmer 15 min.","Add fish and squid 3 min. Add shrimp and mussels 3 min more. Serve with bread."]},
{id:195,name:"Full English Breakfast",time:25,servings:2,diff:"Easy",tags:["gluten-free","high-protein","nut-free"],img:"https://live.staticflickr.com/65535/54919135193_3ffee0d088_c.jpg",ing:[{n:"eggs",q:"4"},{n:"bacon",q:"4 rashers"},{n:"sausages",q:"4"},{n:"baked beans",q:"1 can"},{n:"mushrooms",q:"100g"},{n:"tomatoes",q:"2, halved"},{n:"toast",q:"4 slices"},{n:"butter",q:"for toast"},{n:"HP sauce",q:"for serving"},{n:"black pudding",q:"optional"}],steps:["Grill sausages 12-15 min. Fry bacon until crispy. Grill tomatoes.","Sauté mushrooms in butter. Warm baked beans.","Fry eggs to preference. Arrange everything on plates. Serve with toast and HP sauce."]},
{id:196,name:"Tacos de Pescado",time:20,servings:4,diff:"Easy",tags:["dairy-free","high-protein"],img:"https://live.staticflickr.com/65535/52557738865_7c57b8b5c8_c.jpg",ing:[{n:"white fish fillets",q:"400g"},{n:"corn tortillas",q:"8"},{n:"chipotle powder",q:"1 tsp"},{n:"cumin",q:"1 tsp"},{n:"lime",q:"2"},{n:"red cabbage slaw",q:"200g"},{n:"avocado crema",q:"100ml"},{n:"cilantro",q:"fresh"},{n:"radish",q:"4, sliced"},{n:"vegetable oil",q:"2 tbsp"}],steps:["Season fish with chipotle, cumin, salt. Pan-fry in oil 3-4 min per side.","Make slaw: toss cabbage with lime juice, salt. Mix crema with lime.","Flake fish into warm tortillas. Top with slaw, avocado crema, radish, cilantro, lime."]},
{id:197,name:"Chocolate Chip Cookies",time:25,servings:24,diff:"Easy",tags:["vegetarian"],img:"https://live.staticflickr.com/65535/55153212232_1b02bea4ce_c.jpg",ing:[{n:"butter",q:"170g, softened"},{n:"brown sugar",q:"150g"},{n:"white sugar",q:"50g"},{n:"eggs",q:"2"},{n:"vanilla extract",q:"2 tsp"},{n:"flour",q:"300g"},{n:"baking soda",q:"1 tsp"},{n:"salt",q:"1 tsp"},{n:"chocolate chips",q:"250g"}],steps:["Cream butter and sugars until fluffy. Beat in eggs and vanilla.","Fold in flour, baking soda, salt. Stir in chocolate chips. Chill dough 30 min.","Scoop onto baking sheets. Bake 190C 10-12 min until edges are golden but centers soft."]},
